name: dcm2niix
url: https://www.nitrc.org/plugins/mwiki/index.php/dcm2nii:MainPage
binaries:
  builder: neurodocker
  arguments:
    required:
    - version
    optional:
      install_path: /opt/dcm2niix-{{ self.version }}
  urls:
    latest: https://github.com/rordenlab/dcm2niix/releases/latest/download/dcm2niix_lnx.zip
  dependencies:
    apt:
    - ca-certificates
    - curl
    - unzip
    yum:
    - curl
    - unzip
  directives:
  - environment:
      PATH: '{{ self.install_path }}:$PATH'
  - run: '{{ self.install_dependencies() }}

      mkdir -p {{ self.install_path }}

      cd {{ self.install_path }}

      curl -fsSL -o dcm2niix.zip {{ self.urls[self.version] }}

      unzip dcm2niix.zip

      rm dcm2niix.zip

      chmod +x dcm2niix

      '
source:
  builder: neurodocker
  arguments:
    required:
    - version
    optional:
      repo: https://github.com/rordenlab/dcm2niix
      install_path: /opt/dcm2niix-{{ self.version }}
      cmake_opts: ''
      make_opts: -j1
  dependencies:
    apt:
    - ca-certificates
    - cmake
    - g++
    - gcc
    - git
    - make
    - pigz
    - zlib1g-dev
    yum:
    - ca-certificates
    - cmake
    - gcc-c++
    - git
    - libstdc++-static
    - make
    - pigz
    - zlib-devel
  directives:
  - environment:
      PATH: '{{ self.install_path }}/bin:$PATH'
  - run: '{{ self.install_dependencies() }}

      git clone {{ self.repo }} /tmp/dcm2niix

      {% if self.version != "master" and self.version != "latest" -%}

      cd /tmp/dcm2niix

      git fetch --tags

      git checkout {{ self.version }}

      {% endif -%}

      mkdir /tmp/dcm2niix/build

      cd /tmp/dcm2niix/build

      cmake {{ self.cmake_opts }} -DCMAKE_INSTALL_PREFIX:PATH={{ self.install_path }} ..

      make {{ self.make_opts }}

      make install

      rm -rf /tmp/dcm2niix

      '
