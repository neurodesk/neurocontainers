name: run-fulltest

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Fulltest suite to run: niimath, all, or a comma-separated list"
        required: true
        default: "niimath"
        type: string
      version:
        description: "Optional release version (for example 25.2.3). Leave blank to use latest."
        required: false
        default: ""
        type: string
      containers_dir:
        description: "Directory for downloaded .simg files"
        required: false
        default: "/tmp/containers"
        type: string
      docker_to_simg:
        description: "Pull Docker images and convert them to SIMG before testing"
        required: false
        default: false
        type: boolean
      docker_registry:
        description: "GHCR namespace for Docker images"
        required: false
        default: "neurodesk"
        type: string

jobs:
  plan:
    name: Select fulltest suites
    runs-on: ubuntu-22.04
    outputs:
      suites: ${{ steps.plan.outputs.suites }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build suite matrix
        id: plan
        env:
          REQUESTED_SUITE: ${{ github.event.inputs.suite || 'niimath' }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import sys
          from pathlib import Path

          recipes = Path("recipes")
          requested = os.environ["REQUESTED_SUITE"].strip() or "niimath"
          available = sorted(path.parent.name for path in recipes.glob("*/fulltest.yaml"))

          if not available:
              print("No fulltest recipes found under recipes/", file=sys.stderr)
              sys.exit(1)

          if requested.lower() == "all":
              selected = available
          else:
              selected = []
              missing = []
              for item in requested.replace("\n", ",").split(","):
                  suite = item.strip()
                  if not suite:
                      continue
                  if suite not in available:
                      missing.append(suite)
                  else:
                      selected.append(suite)
              if missing:
                  print(f"Unknown fulltest suite(s): {', '.join(missing)}", file=sys.stderr)
                  print(f"Available suites: {', '.join(available)}", file=sys.stderr)
                  sys.exit(1)

          selected = list(dict.fromkeys(selected))
          if not selected:
              print("No fulltest suites selected", file=sys.stderr)
              sys.exit(1)

          print(f"suites={json.dumps(selected)}")
          PY

  run-fulltest:
    name: ${{ matrix.suite }}
    needs: plan
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJson(needs.plan.outputs.suites) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Apptainer
        uses: ./.github/actions/setup-apptainer
        with:
          apptainer-version: 1.4.3

      - name: Set up Go
        if: ${{ github.event.inputs.docker_to_simg == 'true' }}
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.5"

      - name: Login to GHCR
        if: ${{ github.event.inputs.docker_to_simg == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Install test dependencies
        run: |
          uv pip install --system datalad datalad-installer
          datalad-installer --sudo ok git-annex -m datalad/packages
          git-annex version
          datalad --version

      - name: Configure git for DataLad
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Pull container and run fulltest
        env:
          SUITE: ${{ matrix.suite }}
          VERSION: ${{ github.event.inputs.version }}
          CONTAINERS_DIR: ${{ github.event.inputs.containers_dir }}
          DOCKER_TO_SIMG: ${{ github.event.inputs.docker_to_simg || 'false' }}
          DOCKER_REGISTRY: ${{ github.event.inputs.docker_registry || 'neurodesk' }}
          DOCKER_SAVE_TO_SIMG: builder/docker-save-to-simg.go
          PYTHONUNBUFFERED: "1"
        run: |
          mkdir -p "$CONTAINERS_DIR"
          uv run python -u - <<'PY'
          import json
          import os
          import subprocess
          import sys
          from pathlib import Path

          from workflows.container_tester import (
              DockerToSimgConverter,
              ReleaseContainerDownloader,
              build_release_docker_image_ref_candidates,
          )
          from workflows.test_utils import find_latest_release_file

          suite = os.environ["SUITE"].strip()
          requested_version = os.environ.get("VERSION", "").strip()
          containers_dir = Path(os.environ["CONTAINERS_DIR"]).resolve()
          docker_to_simg = os.environ.get("DOCKER_TO_SIMG", "false").lower() == "true"
          docker_registry = os.environ.get("DOCKER_REGISTRY", "neurodesk") or "neurodesk"
          converter_source = os.environ.get("DOCKER_SAVE_TO_SIMG", "builder/docker-save-to-simg.go")

          suite_path = Path("recipes") / suite / "fulltest.yaml"
          if not suite_path.is_file():
              print(f"Suite file not found: {suite_path}", file=sys.stderr)
              sys.exit(1)

          releases_dir = Path("releases") / suite
          if not releases_dir.is_dir():
              print(f"Release directory not found: {releases_dir}", file=sys.stderr)
              sys.exit(1)

          if requested_version:
              release_file = releases_dir / f"{requested_version}.json"
              release_version = requested_version
              if not release_file.is_file():
                  print(f"Release file not found: {release_file}", file=sys.stderr)
                  sys.exit(1)
          else:
              release_file, release_version, _ = find_latest_release_file(releases_dir)
              if not release_file:
                  print(f"No release file found for {suite}", file=sys.stderr)
                  sys.exit(1)

          try:
              release = json.loads(release_file.read_text(encoding="utf-8"))
              apps = release.get("apps", {})
              app_entry = next(iter(apps.values()), None) if isinstance(apps, dict) else None
              if not app_entry:
                  print(f"No app entry in release file: {release_file}", file=sys.stderr)
                  sys.exit(1)
              build_date = str(app_entry.get("version", "")).strip()
          except Exception as exc:
              print(f"Failed to parse release file {release_file}: {exc}", file=sys.stderr)
              sys.exit(1)

          if not build_date:
              print(f"Build date missing in release file: {release_file}", file=sys.stderr)
              sys.exit(1)

          if docker_to_simg:
              image_refs = build_release_docker_image_ref_candidates(
                  suite,
                  release_version,
                  build_date,
                  docker_registry=docker_registry,
              )
              converter = DockerToSimgConverter(
                  cache_dir=str(containers_dir),
                  converter_source=converter_source,
              )
              errors = []
              for image_ref in image_refs:
                  try:
                      container_file = converter.convert(
                          image_ref,
                          f"{suite}_{release_version}_{build_date}.docker.simg",
                          verbose=True,
                      )
                      break
                  except Exception as exc:
                      errors.append(f"{image_ref}: {exc}")
              else:
                  print("Failed to convert any Docker image candidate:", file=sys.stderr)
                  for error in errors:
                      print(f"  - {error}", file=sys.stderr)
                  sys.exit(1)
          else:
              downloader = ReleaseContainerDownloader(cache_dir=str(containers_dir))
              container_file = downloader.download_from_release(suite, release_version, build_date)
              if not container_file:
                  print(
                      f"Failed to download container {suite}:{release_version} "
                      f"with build date {build_date}",
                      file=sys.stderr,
                  )
                  sys.exit(1)

          print(f"Using container file: {container_file}")

          workdir = Path("results")
          workdir.mkdir(exist_ok=True)
          output_json = workdir / f"{suite}-fulltest.json"
          output_log = workdir / f"{suite}-fulltest.log"

          cmd = [
              "uv",
              "run",
              "builder/run_tests.py",
              str(suite_path),
              "-c",
              str(containers_dir),
              "-o",
              str(output_json),
              "--log",
              str(output_log),
          ]
          print(f"Running: {' '.join(cmd)}")
          result = subprocess.run(cmd, check=False, text=True)
          if result.returncode != 0:
              print("run_tests.py returned non-zero exit status", file=sys.stderr)
              sys.exit(result.returncode)
          PY

      - name: Upload fulltest outputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fulltest-results-${{ matrix.suite }}
          path: results/
