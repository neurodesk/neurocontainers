name: auto-build

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

on:
  push:
    paths:
      - recipes/**
      - "!recipes/**/fulltest.yaml"
      - "!recipes/**/test.yaml"
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  list-apps:
    runs-on: ubuntu-22.04
    if: ${{ !contains(github.event.head_commit.message, 'skipci') && !contains(github.event.head_commit.message, 'skip-ci') && !contains(github.event.head_commit.message, 'skip ci') }}
    outputs:
      app_list: ${{ steps.find_changed_recipes.outputs.app_list }}
      runner: ${{ steps.select_runner.outputs.runner }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Find all recipe directories with changes
        id: find_changed_dirs
        uses: tj-actions/changed-files@v47
        with:
          files: "recipes/**"
          dir_names: "true"
          json: "true"
      - name: Filter down to changed recipes
        id: find_changed_recipes
        if: steps.find_changed_dirs.outputs.any_changed == 'true'
        run: |
          # Get dir changelist -> remove test-only diffs -> extract app name only -> remove duplicate apps
          changed_files=$(echo "${{ steps.find_changed_dirs.outputs.all_changed_files }}" | jq -rc '.[]' | grep -Ev '/(fulltest|test)\.yaml$' || true)
          if [ -z "$changed_files" ]; then
            changed_recipes='[]'
          else
            changed_recipes=$(echo "$changed_files" | cut -d/ -s -f 2-2 | jq -ncR '[inputs]' | jq -rc 'unique')
          fi
          echo "changed_recipes=${changed_recipes}"

          app_list='['
          for APPLICATION in $(echo "${changed_recipes}" | jq -r '.[]'); do
            AUTOBUILD=$(cat .github/workflows/build-config.json | jq ".${APPLICATION} .autoBuild")
            [ "$AUTOBUILD" == "null" ] && AUTOBUILD=$(cat .github/workflows/build-config.json | jq ".default .autoBuild")
            if [ "$AUTOBUILD" = "true" ]; then
                app_list+="\"${APPLICATION}\","
            else
                echo "$APPLICATION:autoBuild:$AUTOBUILD in build-config.json"
            fi
          done
          app_list=$(sed '$s/,$//' <<< $app_list)
          app_list+=']'
          echo "app_list=${app_list}"
          echo "app_list=${app_list}" >> $GITHUB_OUTPUT
      - name: Select runner
        id: select_runner
        run: |
          # Temporary: routing main-repo auto-builds to self-hosted VMs
          # while cluster team investigates DinD networking failures on ARC pods.
          # Manual dispatch retains all runner options. Revert once ARC is healthy.
          # Output is JSON-encoded so build-app.yml can fromJSON() it into runs-on.
          if [ "${{ github.repository }}" = "neurodesk/neurocontainers" ]; then
            runner='"self-hosted"'
          else
            runner='"ubuntu-22.04"'
          fi
          echo "runner=${runner}" >> "$GITHUB_OUTPUT"

  build-app:
    needs: list-apps
    strategy:
      fail-fast: false
      matrix:
        application: ${{ fromJSON(needs.list-apps.outputs.app_list) }}
    uses: ./.github/workflows/build-app.yml
    with:
      application: ${{ matrix.application }}
      runner: ${{ needs.list-apps.outputs.runner }}
    secrets: inherit
