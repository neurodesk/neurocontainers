name: auto-build

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  id-token: write

on:
  push:
    paths:
      - recipes/**
      - "!recipes/**/fulltest.yaml"
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  list-apps:
    runs-on: ubuntu-22.04
    if: ${{ !contains(github.event.head_commit.message, 'skipci') && !contains(github.event.head_commit.message, 'skip-ci') && !contains(github.event.head_commit.message, 'skip ci') }}
    outputs:
      build_matrix: ${{ steps.expand_variants.outputs.build_matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Find all recipe directories with changes
        id: find_changed_dirs
        uses: tj-actions/changed-files@v47
        with:
          files: "recipes/**"
          dir_names: "true"
          json: "true"
      - name: Filter down to changed recipes
        id: find_changed_recipes
        if: steps.find_changed_dirs.outputs.any_changed == 'true'
        run: |
          # Get dir changelist -> remove test-only diffs -> extract app name only -> remove duplicate apps
          changed_files=$(echo "${{ steps.find_changed_dirs.outputs.all_changed_files }}" | jq -rc '.[]' | grep -Ev '/(fulltest|test)\.yaml$' || true)
          if [ -z "$changed_files" ]; then
            changed_recipes='[]'
          else
            changed_recipes=$(echo "$changed_files" | cut -d/ -s -f 2-2 | jq -ncR '[inputs]' | jq -rc 'unique')
          fi
          echo "changed_recipes=${changed_recipes}"

          app_list='['
          for APPLICATION in $(echo "${changed_recipes}" | jq -r '.[]'); do
            AUTOBUILD=$(cat .github/workflows/build-config.json | jq ".${APPLICATION} .autoBuild")
            [ "$AUTOBUILD" == "null" ] && AUTOBUILD=$(cat .github/workflows/build-config.json | jq ".default .autoBuild")
            if [ "$AUTOBUILD" = "true" ]; then
                app_list+="\"${APPLICATION}\","
            else
                echo "$APPLICATION:autoBuild:$AUTOBUILD in build-config.json"
            fi
          done
          app_list=$(sed '$s/,$//' <<< $app_list)
          app_list+=']'
          echo "app_list=${app_list}"
          echo "app_list=${app_list}" >> $GITHUB_OUTPUT
      - name: Select runner
        id: select_runner
        run: |
          # Main repo auto-builds go to ARC. Forks fall back to
          # github-hosted (no access to the runner-neurocontainers group).
          # Output is JSON-encoded so build-app.yml can fromJSON() it into runs-on.
          if [ "${{ github.repository }}" = "neurodesk/neurocontainers" ]; then
            runner='"neurodesk-syd-arcrunner-neurocontainers"'
            # syd2 cutover: once neurodesk-syd2-arcrunner-neurocontainers is validated,
            # swap the line above for:
            # runner='"neurodesk-syd2-arcrunner-neurocontainers"'
          else
            runner='"ubuntu-22.04"'
          fi
          echo "runner=${runner}" >> "$GITHUB_OUTPUT"
      - name: Expand named variants
        id: expand_variants
        env:
          APPLICATIONS: ${{ steps.find_changed_recipes.outputs.app_list }}
          DEFAULT_RUNNER: ${{ steps.select_runner.outputs.runner }}
          ARM64_RUNNER: '"blacksmith-8vcpu-ubuntu-2404-arm"'
        run: |
          python3 -m pip install pyyaml
          build_matrix=$(python3 tools/variant_matrix.py \
            --applications "$APPLICATIONS" \
            --default-runner "$DEFAULT_RUNNER" \
            --arm64-runner "$ARM64_RUNNER")
          echo "build_matrix=${build_matrix}" >> "$GITHUB_OUTPUT"

  build-app:
    needs: list-apps
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.list-apps.outputs.build_matrix) }}
    uses: ./.github/workflows/build-app.yml
    with:
      application: ${{ matrix.application }}
      variant: ${{ matrix.variant }}
      runner: ${{ matrix.runner }}
    secrets: inherit
