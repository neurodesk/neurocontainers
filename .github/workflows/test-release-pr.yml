name: Test Release PR Containers

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "releases/*/**.json"
      - "recipes/**/fulltest.yaml"
    branches:
      - master
      - main

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      modified-releases: ${{ steps.detect.outputs.modified-releases }}
      has-changes: ${{ steps.detect.outputs.has-changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect release and test-only changes
        id: detect
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          python -m workflows.release_pr_changes \
            --base-ref "origin/${BASE_REF}" \
            --output "${GITHUB_OUTPUT}"

  test-containers:
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        release: ${{ fromJson(needs.detect-changes.outputs.modified-releases) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          clean: false
          path: source

      - name: Prepare release test workspace
        working-directory: source
        run: |
          rm -rf \
            builder/test-results-* \
            builder/test-report-* \
            builder/comment-* \
            builder/status-* \
            builder/fulltest-* \
            builder/fulltest-containers || true
          mkdir -p builder

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        working-directory: source
        run: |
          # Matrix jobs can share the same self-hosted machine and system Python.
          # Serialize dependency installation to avoid pip/apt/git-annex races.
          (
            flock 9
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            uv pip install --system datalad datalad-installer
            if ! command -v git-annex >/dev/null 2>&1; then
              datalad-installer --sudo ok git-annex -m datalad/packages
            fi
          ) 9>/tmp/neurocontainers-release-test-deps.lock
          git-annex version
          datalad --version

      - name: Configure git for DataLad
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify container runtimes
        run: |
          # Verify that container runtimes are available on self-hosted runner
          docker --version
          apptainer --version || singularity --version

      - name: Debug matrix values
        working-directory: source
        run: |
          echo "Matrix release data:"
          echo "Name: ${{ matrix.release.name }}"
          echo "Version: ${{ matrix.release.version }}"
          echo "File: ${{ matrix.release.file }}"
          echo "Current directory: $(pwd)"
          echo "Release file exists: $([ -f '${{ matrix.release.file }}' ] && echo 'yes' || echo 'no')"

      - name: Find test configuration
        id: find-tests
        working-directory: source
        run: |
          # Look for the fulltest configuration in the recipe directory
          RECIPE_DIR="recipes/${{ matrix.release.name }}"
          TEST_CONFIG=""

          if [ -f "$RECIPE_DIR/fulltest.yaml" ]; then
            TEST_CONFIG="$RECIPE_DIR/fulltest.yaml"
            echo "Found fulltest.yaml"
          else
            echo "No fulltest.yaml found in $RECIPE_DIR"
            ls -la "$RECIPE_DIR" || echo "Recipe directory not found"
          fi

          echo "test-config=$TEST_CONFIG" >> $GITHUB_OUTPUT

      - name: Analyze image layer waste with Dive
        id: dive
        working-directory: source
        env:
          RECIPE: ${{ matrix.release.name }}
          VERSION: ${{ matrix.release.version }}
          RELEASE_FILE: ${{ matrix.release.file }}
          DIVE_IMAGE: wagoodman/dive:v0.13.1
        run: |
          set +e
          mkdir -p builder

          IMAGE_DETAILS="$(python - "${RELEASE_FILE}" "${RECIPE}" "${VERSION}" <<'PY'
          import json
          import sys
          from pathlib import Path

          release_file, recipe, version = sys.argv[1:]
          data = json.loads(Path(release_file).read_text(encoding="utf-8"))
          apps = data.get("apps", {}) or {}
          if not apps:
              raise SystemExit(f"No apps metadata found in {release_file}")

          first_app = next(iter(apps.values()))
          build_date = str(first_app.get("version", "")).strip()
          image_name = str(first_app.get("image", "")).strip()
          if not image_name:
              image_name = f"{recipe}_{version}"
          if not build_date:
              raise SystemExit(f"No build date found in {release_file}")

          print(f"{image_name.lower()} {build_date}")
          PY
          )"
          METADATA_STATUS=$?
          RAW_REPORT="builder/dive-${RECIPE}.raw.txt"
          REPORT="builder/dive-${RECIPE}.txt"
          STATUS="error"
          TOOL_STATUS="${METADATA_STATUS}"
          IMAGE="unresolved"

          if [ "${METADATA_STATUS}" -eq 0 ]; then
            read -r IMAGE_NAME BUILD_DATE <<< "${IMAGE_DETAILS}"
            IMAGE="ghcr.io/neurodesk/${IMAGE_NAME}:${BUILD_DATE}"
            docker pull "${IMAGE}" > "${RAW_REPORT}" 2>&1
            PULL_STATUS=$?

            if [ "${PULL_STATUS}" -eq 0 ]; then
              docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                -v "${PWD}/.github/.dive-ci.yml:/tmp/.dive-ci.yml:ro" \
                "${DIVE_IMAGE}" \
                --ci \
                --ci-config /tmp/.dive-ci.yml \
                "${IMAGE}" >> "${RAW_REPORT}" 2>&1
              TOOL_STATUS=$?

              if grep -q "Result:FAIL" "${RAW_REPORT}"; then
                STATUS="failed"
              elif [ "${TOOL_STATUS}" -eq 0 ]; then
                STATUS="passed"
              fi
            else
              TOOL_STATUS="${PULL_STATUS}"
            fi
          else
            printf 'Unable to resolve the Docker image from %s.\n' "${RELEASE_FILE}" > "${RAW_REPORT}"
          fi

          sed -E 's/\x1B\[[0-9;]*[A-Za-z]//g' "${RAW_REPORT}" > "${REPORT}" 2>/dev/null \
            || cp "${RAW_REPORT}" "${REPORT}"
          cat "${REPORT}"
          printf '%s\n' "${STATUS}" > "builder/dive-status-${RECIPE}.txt"

          {
            echo "status=${STATUS}"
            echo "image=${IMAGE}"
            echo "exit_code=${TOOL_STATUS}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Dive image layer waste analysis"
            echo ""
            echo "- Status: \`${STATUS}\`"
            echo "- Image: \`${IMAGE}\`"
            echo "- Dive image: \`${DIVE_IMAGE}\`"
            echo "- Exit code: \`${TOOL_STATUS}\`"
            echo "- Config: \`.github/.dive-ci.yml\`"
            echo ""
            echo '```text'
            head -c 50000 "${REPORT}"
            echo ""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${STATUS}" = "failed" ]; then
            echo "::warning::Dive detected image layer waste above the configured thresholds."
          elif [ "${STATUS}" = "error" ]; then
            echo "::warning::Dive could not complete the image layer waste analysis."
          fi
          exit 0

      - name: Run container tests
        id: test
        working-directory: source
        env:
          RECIPE: ${{ matrix.release.name }}
          VERSION: ${{ matrix.release.version }}
          RELEASE_FILE: ${{ matrix.release.file }}
          TEST_CONFIG: ${{ steps.find-tests.outputs.test-config }}
        run: |
          echo "Testing container: ${RECIPE}:${VERSION}"
          echo "Release file: ${RELEASE_FILE}"
          echo "Test config: ${TEST_CONFIG}"

          mkdir -p builder

          python -m workflows.release_test_runner \
            --recipe "${RECIPE}" \
            --version "${VERSION}" \
            --release-file "${RELEASE_FILE}" \
            --test-config "${TEST_CONFIG}" \
            --runtime apptainer \
            --location auto \
            --output-dir builder \
            --results-path "builder/test-results-${RECIPE}.json" \
            --github-output "${GITHUB_OUTPUT}" \
            --verbose
        continue-on-error: true

      - name: Normalize test workspace permissions
        if: always()
        working-directory: source
        run: |
          for path in builder work; do
            if [ -e "$path" ]; then
              sudo chown -R "$(id -u):$(id -g)" "$path" || true
              chmod -R u+rwX "$path" || true
            fi
          done

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.release.name }}
          path: |
            source/builder/test-results-${{ matrix.release.name }}.json
            source/builder/test-report-${{ matrix.release.name }}.md
            source/builder/comment-${{ matrix.release.name }}.md
            source/builder/status-${{ matrix.release.name }}.txt
            source/builder/fulltest-raw-${{ matrix.release.name }}.json
            source/builder/fulltest-${{ matrix.release.name }}.jsonl
            source/builder/fulltest-${{ matrix.release.name }}.log
            source/builder/fulltest-suite-${{ matrix.release.name }}.yaml
            source/builder/dive-${{ matrix.release.name }}.txt
            source/builder/dive-status-${{ matrix.release.name }}.txt

      - name: Comment test results on PR
        if: always()
        uses: actions/github-script@v9
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const releaseName = '${{ matrix.release.name }}';
            const releaseVersion = '${{ matrix.release.version }}';
            const reportFile = `source/builder/test-report-${releaseName}.md`;
            const diveReportFile = `source/builder/dive-${releaseName}.txt`;
            const diveStatus = '${{ steps.dive.outputs.status }}' || 'error';
            const diveImage = '${{ steps.dive.outputs.image }}' || 'unresolved';
            const diveExitCode = '${{ steps.dive.outputs.exit_code }}' || 'unknown';

            let reportContent = `## Test Results for ${releaseName}:${releaseVersion}\n\n`;

            try {
              if (fs.existsSync(reportFile)) {
                reportContent = fs.readFileSync(reportFile, 'utf8');
              } else {
                reportContent += "❌ Test report not generated - check logs for errors.";
              }
            } catch (error) {
              reportContent += `❌ Error reading test report: ${error.message}`;
            }

            const diveIcons = {
              passed: '✅',
              failed: '⚠️',
              error: '⚠️',
            };
            const diveLabels = {
              passed: 'passed',
              failed: 'wasted space detected',
              error: 'analysis unavailable',
            };
            let diveOutput = 'Dive report not generated - check logs for errors.';
            try {
              if (fs.existsSync(diveReportFile)) {
                diveOutput = fs.readFileSync(diveReportFile, 'utf8');
                if (diveOutput.length > 12000) {
                  diveOutput = `${diveOutput.slice(0, 12000)}\n... output truncated`;
                }
              }
            } catch (error) {
              diveOutput = `Error reading Dive report: ${error.message}`;
            }

            reportContent += `\n\n### Dive image layer waste analysis\n\n`;
            reportContent += `${diveIcons[diveStatus] || '⚠️'} **Status:** ${diveLabels[diveStatus] || diveStatus}\n\n`;
            reportContent += `- Image: \`${diveImage}\`\n`;
            reportContent += `- Exit code: \`${diveExitCode}\`\n`;
            reportContent += `- Config: \`.github/.dive-ci.yml\`\n\n`;
            reportContent += `<details><summary>Dive output</summary>\n\n\`\`\`text\n${diveOutput}\n\`\`\`\n\n</details>`;

            // Find existing comment for this release
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes(`Test Results for ${releaseName}:${releaseVersion}`)
            );

            const commentBody = `${reportContent}\n\n---\n*Automated test results for container: ${releaseName}:${releaseVersion}*`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

  summarize-results:
    needs: [detect-changes, test-containers]
    if: always() && needs.detect-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: test-results-*
          merge-multiple: true
          path: test-results

      - name: Summarize test results
        id: summary
        run: |
          mkdir -p test-results
          cd test-results

          TOTAL_RECIPES=0
          PASSED_RECIPES=0
          FAILED_RECIPES=0
          WASTED_SPACE_RECIPES=0
          DIVE_ERROR_RECIPES=0

          for file in test-results-*.json; do
            if [ -f "$file" ]; then
              TOTAL_RECIPES=$((TOTAL_RECIPES + 1))
              
              # Check if any tests failed
              FAILED_TESTS=$(jq '.failed' "$file" 2>/dev/null || echo "1")
              if [ "$FAILED_TESTS" -eq 0 ]; then
                PASSED_RECIPES=$((PASSED_RECIPES + 1))
              else
                FAILED_RECIPES=$((FAILED_RECIPES + 1))
              fi
            fi
          done

          for file in dive-status-*.txt; do
            if [ -f "$file" ]; then
              DIVE_STATUS="$(tr -d '[:space:]' < "$file")"
              if [ "$DIVE_STATUS" = "failed" ]; then
                WASTED_SPACE_RECIPES=$((WASTED_SPACE_RECIPES + 1))
              elif [ "$DIVE_STATUS" = "error" ]; then
                DIVE_ERROR_RECIPES=$((DIVE_ERROR_RECIPES + 1))
              fi
            fi
          done

          if [ "$TOTAL_RECIPES" -eq 0 ]; then
            FAILED_RECIPES=1
            echo "No test result artifacts were produced"
          fi

          {
            echo "total=$TOTAL_RECIPES"
            echo "passed=$PASSED_RECIPES"
            echo "failed=$FAILED_RECIPES"
            echo "wasted_space=$WASTED_SPACE_RECIPES"
            echo "dive_errors=$DIVE_ERROR_RECIPES"
          } >> "$GITHUB_OUTPUT"

          echo "Test Summary: $PASSED_RECIPES/$TOTAL_RECIPES recipes passed"
          echo "Dive Summary: $WASTED_SPACE_RECIPES wasted-space warning(s), $DIVE_ERROR_RECIPES analysis error(s)"

      - name: Set PR status
        uses: actions/github-script@v9
        with:
          script: |
            const total = parseInt('${{ steps.summary.outputs.total }}');
            const passed = parseInt('${{ steps.summary.outputs.passed }}');
            const failed = parseInt('${{ steps.summary.outputs.failed }}');
            const wastedSpace = parseInt('${{ steps.summary.outputs.wasted_space }}');
            const diveErrors = parseInt('${{ steps.summary.outputs.dive_errors }}');

            let summary = `## 🧪 Container Test Summary\n\n`;
            if (total === 0) {
              summary += `**Results:** no test result artifacts were produced\n\n`;
              summary += `❌ Container testing did not reach the result upload step.\n`;
              summary += `Please check the workflow logs for the infrastructure failure.\n\n`;
            } else {
              summary += `**Results:** ${passed}/${total} recipes passed\n\n`;

              if (failed > 0) {
                summary += `❌ ${failed} recipe(s) failed testing\n`;
                summary += `Please check the individual test results above for details.\n\n`;
              } else {
                summary += `✅ All modified containers passed testing!\n\n`;
              }
            }

            summary += `**Dive image layer analysis:** ${wastedSpace} wasted-space warning(s), ${diveErrors} analysis error(s)\n\n`;
            if (wastedSpace > 0) {
              summary += `⚠️ Review the Dive output in the per-container test comment before merging.\n\n`;
            } else if (diveErrors > 0) {
              summary += `⚠️ Dive could not analyze one or more images; check the workflow logs.\n\n`;
            }

            summary += `*This comment will be updated as tests complete.*`;

            try {
              // Find existing summary comment
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

              const summaryComment = comments.data.find(comment =>
                comment.user.type === 'Bot' &&
                comment.body.includes('Container Test Summary')
              );

              if (summaryComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: summaryComment.id,
                  body: summary
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: summary
                });
              }
            } catch (error) {
              core.warning(`Unable to write container test summary comment: ${error.message}`);
            }

            // Fail the workflow if any tests failed
            if (failed > 0) {
              if (total === 0) {
                core.setFailed('No container test result artifacts were produced');
              } else {
                core.setFailed(`${failed} out of ${total} container tests failed`);
              }
            }
