  #         sudo mkdir -p /mnt/tmp
  #         sudo chown $USER /mnt/tmp
  #         sudo mkdir -p /mnt/docker
  #         echo '{"data-root": "/mnt/docker"}' | sudo tee /etc/docker/daemon.json
  #         sudo systemctl restart docker

  #     - name: Download build artifact
  #       uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
  #       with:
  #         name: ${{ needs.config.outputs.IMAGENAME }}-${{ needs.config.outputs.BUILDDATE }}
  #         path: /tmp/

  #     - name: Load Docker Image from Artifact
  #       if: inputs.skip_docker_build != 'true'
  #       run: docker load --input /tmp/${{ needs.config.outputs.IMAGENAME }}-${{ needs.config.outputs.BUILDDATE }}.tar

  #     - name: Login to GHCR
  #       uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
  #       with:
  #         registry: ghcr.io
  #         username: ${{ github.repository_owner }}
  #         password: ${{ secrets.GITHUB_TOKEN }}

  #     - name: Push to GHCR
  #       env:
  #         GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
  #       run: |
  #         docker tag ghcr.io/${GH_REGISTRY}/${{ needs.config.outputs.IMAGENAME }}:${{ needs.config.outputs.BUILDDATE }} ghcr.io/${GH_REGISTRY}/${{ needs.config.outputs.IMAGENAME }}:latest
  #         docker push --all-tags ghcr.io/${GH_REGISTRY}/${{ needs.config.outputs.IMAGENAME }}

  push-dockerhub:
    needs: [config, build-image]
    if: ${{ needs.build-image.outputs.IMGDIFFERS == 'true' || inputs.force_push_dockerhub == 'true' }}
    # Docker Hub is a public mirror. GHCR, SIF generation, and object storage are
    # the release-critical outputs, so transient Docker Hub failures should not
    # block release PR creation.
    continue-on-error: true
    runs-on: ubuntu-22.04
    permissions:
      packages: write
    env:
      APPLICATION: ${{ inputs.application }}
      BUILDDATE: ${{ needs.config.outputs.BUILDDATE }}
      IMAGENAME: ${{ inputs.application }}_${{ needs.config.outputs.VERSION }}${{ needs.config.outputs.IMAGE_SUFFIX }}

    steps:
      - name: Configure GitHub-hosted runner
        if: ${{ runner.environment == 'github-hosted' }}
        run: |
          BASE_PATH=/mnt
          echo "BASE_PATH=$BASE_PATH" >> "$GITHUB_ENV"
          sudo swapoff -a && sudo rm -rf "$BASE_PATH"/*
          sudo mkdir -p "$BASE_PATH/tmp"
          sudo chown "$USER" "$BASE_PATH/tmp"
          sudo mkdir -p "$BASE_PATH/docker"
          printf '{"data-root": "%s"}\n' "$BASE_PATH/docker" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image from registry
        env:
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
        run: |
          docker pull ghcr.io/${GH_REGISTRY}/${IMAGENAME}:${BUILDDATE}

      # - name: Download image artifact
      #   uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
      #   with:
      #     name: ${{ needs.config.outputs.IMAGENAME }}-${{ needs.config.outputs.BUILDDATE }}
      #     path: /tmp/

      # - name: Load Docker Image from Artifact
      #   if: inputs.skip_docker_build != 'true'
      #   run: docker load --input /tmp/${{ needs.config.outputs.IMAGENAME }}-${{ needs.config.outputs.BUILDDATE }}.tar

      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Push to DockerHub
        env:
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
          DOCKERHUB_ORG: ${{ secrets.DOCKERHUB_ORG }}
        run: |
          docker tag ghcr.io/${GH_REGISTRY}/${IMAGENAME}:${BUILDDATE} ${DOCKERHUB_ORG}/${IMAGENAME}:${BUILDDATE}
          docker tag ghcr.io/${GH_REGISTRY}/${IMAGENAME}:${BUILDDATE} ${DOCKERHUB_ORG}/${IMAGENAME}:latest
          for attempt in 1 2 3; do
            if docker push --all-tags ${DOCKERHUB_ORG}/${IMAGENAME}; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 30))
          done

  push-nectar-registry:
    needs: [config, build-image]
    if: ${{ needs.build-image.outputs.IMGDIFFERS == 'true' || inputs.force_push_nectar_registry == 'true' }}
    # Nectar is a best-effort mirror; outages must not block the release path.
    continue-on-error: true
    runs-on: ubuntu-22.04
    permissions:
      packages: write
    env:
      APPLICATION: ${{ inputs.application }}
      BUILDDATE: ${{ needs.config.outputs.BUILDDATE }}
      IMAGENAME: ${{ inputs.application }}_${{ needs.config.outputs.VERSION }}${{ needs.config.outputs.IMAGE_SUFFIX }}
      NECTAR_REGISTRY: registry.rc.nectar.org.au
      NECTAR_REGISTRY_NAMESPACE: ssdsorg

    steps:
      - name: Configure GitHub-hosted runner
        if: ${{ runner.environment == 'github-hosted' }}
        run: |
          BASE_PATH=/mnt
          echo "BASE_PATH=$BASE_PATH" >> "$GITHUB_ENV"
          sudo swapoff -a && sudo rm -rf "$BASE_PATH"/*
          sudo mkdir -p "$BASE_PATH/tmp"
          sudo chown "$USER" "$BASE_PATH/tmp"
          sudo mkdir -p "$BASE_PATH/docker"
          printf '{"data-root": "%s"}\n' "$BASE_PATH/docker" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image from GHCR
        env:
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
        run: |
          docker pull "ghcr.io/${GH_REGISTRY}/${IMAGENAME}:${BUILDDATE}"

      - name: Login to Nectar Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: registry.rc.nectar.org.au
          username: s.bollmann@uq.edu.au
          password: ${{ secrets.REGISTRY_RC_NECTAR_ORG_AU_CLI_KEY }}

      - name: Push to Nectar Container Registry
        env:
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
        run: |
          NECTAR_IMAGE="${NECTAR_REGISTRY}/${NECTAR_REGISTRY_NAMESPACE}/${IMAGENAME}"
          docker tag "ghcr.io/${GH_REGISTRY}/${IMAGENAME}:${BUILDDATE}" "${NECTAR_IMAGE}:${BUILDDATE}"
          docker tag "ghcr.io/${GH_REGISTRY}/${IMAGENAME}:${BUILDDATE}" "${NECTAR_IMAGE}:latest"
          docker push "${NECTAR_IMAGE}:${BUILDDATE}"
          docker push "${NECTAR_IMAGE}:latest"

  build-simg:
    needs: [config, build-image]
    if: ${{ inputs.skip_simg_build != 'true' && (needs.build-image.outputs.IMGDIFFERS == 'true' || inputs.force_upload_nectar == 'true' || inputs.force_upload_s3 == 'true' || inputs.skip_simg_build == 'false') }}
    runs-on: ${{ fromJSON(inputs.runner) }}
    permissions:
      packages: write
    env:
      APPLICATION: ${{ inputs.application }}
      BUILDDATE: ${{ needs.config.outputs.BUILDDATE }}
      IMAGETAG: ${{ needs.config.outputs.IMAGETAG }}
      IMAGENAME: ${{ inputs.application }}_${{ needs.config.outputs.VERSION }}${{ needs.config.outputs.IMAGE_SUFFIX }}

    steps:
      - name: Set runner base path
        id: base-path
        run: |
          BASE_PATH=/mnt
          if [ -d /storage ]; then
            BASE_PATH=/storage
          elif [ -d /home/runner/_work ]; then
            BASE_PATH=/home/runner/_work
          fi
          sudo mkdir -p "$BASE_PATH/tmp" "$BASE_PATH/apptainer/cache" "$BASE_PATH/apptainer/tmp"
          sudo chown -R "$(id -u):$(id -g)" "$BASE_PATH/tmp" "$BASE_PATH/apptainer"
          sudo chmod -R u+rwX "$BASE_PATH/tmp" "$BASE_PATH/apptainer"
          echo "BASE_PATH=$BASE_PATH" >> "$GITHUB_ENV"
          echo "base_path=$BASE_PATH" >> "$GITHUB_OUTPUT"
          APPTAINER_CACHEDIR="$BASE_PATH/apptainer/cache"
          echo "APPTAINER_CACHEDIR=$APPTAINER_CACHEDIR" >> "$GITHUB_ENV"
          APPTAINER_TMPDIR="$BASE_PATH/apptainer/tmp"
          echo "APPTAINER_TMPDIR=$APPTAINER_TMPDIR" >> "$GITHUB_ENV"

          SINGULARITY_CACHEDIR="$BASE_PATH/apptainer/cache"
          echo "SINGULARITY_CACHEDIR=$SINGULARITY_CACHEDIR" >> "$GITHUB_ENV"
          SINGULARITY_TMPDIR="$BASE_PATH/apptainer/tmp"
          echo "SINGULARITY_TMPDIR=$SINGULARITY_TMPDIR" >> "$GITHUB_ENV"

      - name: Configure GitHub-hosted runner
        if: ${{ runner.environment == 'github-hosted' }}
        run: |
          BASE_PATH=/mnt
          echo "BASE_PATH=$BASE_PATH" >> "$GITHUB_ENV"
          sudo swapoff -a && sudo rm -rf "$BASE_PATH"/*
          sudo mkdir -p "$BASE_PATH/tmp"
          sudo chown "$USER" "$BASE_PATH/tmp"
          sudo mkdir -p "$BASE_PATH/docker"
          printf '{"data-root": "%s"}\n' "$BASE_PATH/docker" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

          sudo mkdir -p "$BASE_PATH/apptainer/cache" "$BASE_PATH/apptainer/tmp"
          sudo chown "$USER" "$BASE_PATH/apptainer/cache" "$BASE_PATH/apptainer/tmp"

          APPTAINER_CACHEDIR="$BASE_PATH/apptainer/cache"
          echo "APPTAINER_CACHEDIR=$APPTAINER_CACHEDIR" >> "$GITHUB_ENV"
          APPTAINER_TMPDIR="$BASE_PATH/apptainer/tmp"
          echo "APPTAINER_TMPDIR=$APPTAINER_TMPDIR" >> "$GITHUB_ENV"

          SINGULARITY_CACHEDIR="$BASE_PATH/apptainer/cache"
          echo "SINGULARITY_CACHEDIR=$SINGULARITY_CACHEDIR" >> "$GITHUB_ENV"
          SINGULARITY_TMPDIR="$BASE_PATH/apptainer/tmp"
          echo "SINGULARITY_TMPDIR=$SINGULARITY_TMPDIR" >> "$GITHUB_ENV"

          # sudo mkdir -p /mnt/apptainer
          # sudo chown $USER /mnt/apptainer
          # git clone https://github.com/apptainer/apptainer.git /mnt/apptainer
          # cd /mnt/apptainer
          # ./mconfig --prefix=/mnt/apptainer
          # make -C builddir
          # sudo make -C builddir install
          # export PATH="/mnt/apptainer/bin:$PATH"
          # echo "/mnt/apptainer/bin" >> $GITHUB_PATH

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Apptainer
        uses: ./.github/actions/setup-apptainer
        with:
          apptainer-version: 1.4.3

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # - name: Download image artifact
      #   uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
      #   with:
      #     name: ${{ needs.config.outputs.IMAGENAME }}-${{ needs.config.outputs.BUILDDATE }}
      #     path: /mnt/tmp/

      # - name: Load Docker Image from Artifact
      #   run: |
      #     docker load --input /mnt/tmp/${{ needs.config.outputs.IMAGENAME }}-${{ needs.config.outputs.BUILDDATE }}.tar
      #     rm /mnt/tmp/${{ needs.config.outputs.IMAGENAME }}-${{ needs.config.outputs.BUILDDATE }}.tar

      - name: Debug storage
        run: |
          sudo df -ha
          sudo du -sh --exclude="$BASE_PATH/docker" "$BASE_PATH"

      - name: Build simg file
        if: inputs.skip_simg_build != 'true'
        env:
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
        run: |
          echo "[DEBUG] building singularity image from docker image:"
          SIMG_PATH="$BASE_PATH/tmp/${IMAGENAME}_${BUILDDATE}.simg"
          DOCKER_IMAGE_REF="ghcr.io/${GH_REGISTRY}/${IMAGENAME}:${IMAGETAG}"
          IMAGE_REF="docker://${DOCKER_IMAGE_REF}"
          ARCHIVE_PATH="$BASE_PATH/tmp/${IMAGENAME}_${BUILDDATE}.docker.tar"

          cleanup_archive() {
            rm -f "$ARCHIVE_PATH"
          }
          trap cleanup_archive EXIT

          if time singularity build "$SIMG_PATH" "$IMAGE_REF"; then
            echo "[DEBUG] direct singularity build from docker image succeeded"
          else
            DIRECT_BUILD_STATUS=$?
            echo "::warning::Direct singularity build from ${IMAGE_REF} failed with exit code ${DIRECT_BUILD_STATUS}; falling back to docker-archive conversion"
            rm -f "$SIMG_PATH" "$ARCHIVE_PATH"
            docker pull "$DOCKER_IMAGE_REF"
            docker save "$DOCKER_IMAGE_REF" -o "$ARCHIVE_PATH"
            time singularity build "$SIMG_PATH" "docker-archive://${ARCHIVE_PATH}"
          fi

          echo "[DEBUG] done building singularity image from docker image!"
          # Verify the image was created successfully
          if [ ! -f "$SIMG_PATH" ]; then
            echo "ERROR: Singularity image file was not created"
            exit 1
          fi

      - name: Debug storage
        run: |
          sudo df -ha
          sudo du -sh --exclude="$BASE_PATH/docker" "$BASE_PATH"

      - name: Upload simg artifact
        if: inputs.skip_simg_build != 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ env.IMAGENAME }}_${{ env.BUILDDATE }}.simg
          path: ${{ steps.base-path.outputs.base_path }}/tmp/${{ env.IMAGENAME }}_${{ env.BUILDDATE }}.simg
          # Upload the single SIF/Singularity image as a raw file to avoid zip/unzip overhead.
          archive: false
          retention-days: 7

  upload-nectar:
    needs: [config, build-image, build-simg]
    if: ${{ inputs.skip_simg_build != 'true' && (needs.build-image.outputs.IMGDIFFERS == 'true' || inputs.force_upload_nectar == 'true') }}
    # Nectar object storage is a best-effort mirror; S3 remains the blocking upload.
    continue-on-error: true
    runs-on: ${{ fromJSON(inputs.runner) }}
    permissions:
      packages: write
    env:
      APPLICATION: ${{ inputs.application }}
      BUILDDATE: ${{ needs.config.outputs.BUILDDATE }}
      IMAGENAME: ${{ inputs.application }}_${{ needs.config.outputs.VERSION }}${{ needs.config.outputs.IMAGE_SUFFIX }}

    steps:
      - name: Bootstrap build tooling
        shell: bash
        run: |
          set -eu
          # Idempotency check: skip when everything's already pre-baked
          # (legacy self-hosted VMs). Runs in full on ARC pods.
          if command -v docker >/dev/null 2>&1 \
            && command -v aws >/dev/null 2>&1 \
            && python3 -c "import swiftclient" 2>/dev/null \
            && command -v gh >/dev/null 2>&1 \
            && command -v jq >/dev/null 2>&1; then
            echo "All build tooling already present; skipping bootstrap."
            exit 0
          fi
          set -x
          sudo apt-get update
          APT_PACKAGES=(ca-certificates curl git gh jq python3 python3-pip python3-venv unzip)
          if ! command -v docker >/dev/null 2>&1; then
            APT_PACKAGES+=(docker.io)
          fi
          sudo apt-get install -y --no-install-recommends --no-upgrade "${APT_PACKAGES[@]}"
          case "$(uname -m)" in
            x86_64)
              AWSCLI_ARCH=x86_64
              ;;
            aarch64|arm64)
              AWSCLI_ARCH=aarch64
              ;;
            *)
              echo "Unsupported machine architecture: $(uname -m)"
              exit 1
              ;;
          esac
          python3 -m venv "$RUNNER_TEMP/openstack-client-venv"
          "$RUNNER_TEMP/openstack-client-venv/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/openstack-client-venv/bin/python" -m pip install \
            python-swiftclient python-keystoneclient
          echo "$RUNNER_TEMP/openstack-client-venv/bin" >> "$GITHUB_PATH"
          export PATH="$RUNNER_TEMP/openstack-client-venv/bin:$PATH"
          # AWS CLI v2 — guarded so a pre-existing install isn't clobbered.
          if ! command -v aws >/dev/null 2>&1; then
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-${AWSCLI_ARCH}.zip" \
              -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp
            sudo /tmp/aws/install
            rm -rf /tmp/aws /tmp/awscliv2.zip
          fi
          docker --version && aws --version
          gh --version && jq --version && swift --version

      - name: Download simg artifact
        if: inputs.skip_simg_build != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ env.IMAGENAME }}_${{ env.BUILDDATE }}.simg
          path: ${{ runner.temp }}/

      - name: Upload simg to Nectar
        env:
          OS_AUTH_URL: ${{ secrets.SWIFT_OS_AUTH_URL }}
          OS_APPLICATION_CREDENTIAL_ID: ${{ secrets.SWIFT_OS_APPLICATION_CREDENTIAL_ID }}
          OS_APPLICATION_CREDENTIAL_SECRET: ${{ secrets.SWIFT_OS_APPLICATION_CREDENTIAL_SECRET }}
          OS_AUTH_TYPE: v3applicationcredential
          OS_IDENTITY_API_VERSION: "3"
        run: |
          echo "[DEBUG] Attempting upload to Nectar Object Storage:"
          swift upload neurodesk \
            "${RUNNER_TEMP}/${IMAGENAME}_${BUILDDATE}.simg" \
            --object-name "${IMAGENAME}_${BUILDDATE}.simg" \
            --segment-size 1073741824 \
            --segment-threads 10
          echo "[DEBUG] Done with uploading to Nectar Object Storage!"

  upload-s3:
    needs: [config, build-image, build-simg]
    if: ${{ inputs.skip_simg_build != 'true' && (needs.build-image.outputs.IMGDIFFERS == 'true' || inputs.force_upload_s3 == 'true') }}
    runs-on: ubuntu-22.04
    permissions:
      packages: write
      id-token: write
    env:
      APPLICATION: ${{ inputs.application }}
      BUILDDATE: ${{ needs.config.outputs.BUILDDATE }}
      IMAGENAME: ${{ inputs.application }}_${{ needs.config.outputs.VERSION }}${{ needs.config.outputs.IMAGE_SUFFIX }}
      AWSCLI_ARCH: x86_64
    steps:
      - name: Configure runner
        run: |
          sudo swapoff -a && sudo rm -rf /mnt/*
          sudo mkdir -p /mnt/tmp
          sudo chown $USER /mnt/tmp

      - name: Configure aws credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - name: Download simg artifact
        if: inputs.skip_simg_build != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ env.IMAGENAME }}_${{ env.BUILDDATE }}.simg
          path: /mnt/tmp/

      - name: Install AWS CLI
        run: |
          if ! command -v aws &>/dev/null; then
            echo "[DEBUG] Installing AWS CLI"
            curl "https://awscli.amazonaws.com/awscli-exe-linux-${AWSCLI_ARCH}.zip" -o "awscliv2.zip" && unzip awscliv2.zip && sudo ./aws/install && rm -rf aws awscliv2.zip
          fi

      - name: Upload to AWS S3
        run: |
          aws s3 cp "/mnt/tmp/${IMAGENAME}_${BUILDDATE}.simg" "s3://neurocontainers/${IMAGENAME}_${BUILDDATE}.simg"
          if ! aws s3api head-object --bucket neurocontainers --key "${IMAGENAME}_${BUILDDATE}.simg" > /dev/null 2>&1; then
            echo "::error::File verification failed. The file was not found in S3."
            exit 1
          else
            echo "[DEBUG] File upload verified. The file exists in S3."
          fi

  push-quay:
    needs: [config, build-image, build-simg]
    # Requires org secrets QUAY_USERNAME + QUAY_ROBOT_TOKEN.
    if: ${{ inputs.skip_simg_build != 'true' && needs.build-image.outputs.IMGDIFFERS == 'true' && needs.config.outputs.IMAGE_SUFFIX == '' }}
    continue-on-error: true
    runs-on: ubuntu-22.04
    permissions:
      packages: write
    env:
      APPLICATION: ${{ inputs.application }}
      VERSION: ${{ needs.config.outputs.VERSION }}
      BUILDDATE: ${{ needs.config.outputs.BUILDDATE }}
      LEGACY_IMAGENAME: ${{ inputs.application }}_${{ needs.config.outputs.VERSION }}
      QUAY_REPO: quay.io/neurodesk/${{ inputs.application }}
      SIF_MEDIATYPE: application/vnd.sylabs.sif.layer.v1.sif
    steps:
      - name: Configure GitHub-hosted runner
        if: ${{ runner.environment == 'github-hosted' }}
        run: |
          BASE_PATH=/mnt
          sudo swapoff -a && sudo rm -rf "$BASE_PATH"/*
          sudo mkdir -p "$BASE_PATH/tmp" "$BASE_PATH/docker"
          sudo chown "$USER" "$BASE_PATH/tmp"
          printf '{"data-root": "%s"}\n' "$BASE_PATH/docker" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Install oras
        run: |
          curl -fsSL https://github.com/oras-project/oras/releases/download/v1.2.0/oras_1.2.0_linux_amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin oras
          oras version

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Quay
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Push image to Quay (calver + floating tags)
        env:
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
        run: |
          set -euo pipefail
          SRC="ghcr.io/${GH_REGISTRY}/${LEGACY_IMAGENAME}:${BUILDDATE}"
          V2_TAG="${VERSION}_${BUILDDATE}"
          docker pull "${SRC}"
          docker tag "${SRC}" "${QUAY_REPO}:${V2_TAG}"
          docker tag "${SRC}" "${QUAY_REPO}:${VERSION}"
          docker tag "${SRC}" "${QUAY_REPO}:latest"
          docker push "${QUAY_REPO}:${V2_TAG}"
          docker push "${QUAY_REPO}:${VERSION}"
          docker push "${QUAY_REPO}:latest"

      # New Quay repos are created PRIVATE on first push, which breaks anonymous
      # pulls. Flip to public via the API so publishing stays hands-off. Needs an
      # OAuth token (repo:admin) in secrets.QUAY_API_TOKEN — the robot registry
      # token used above cannot call the REST API. Idempotent (already-public is a
      # no-op) and non-fatal: a missing token or API error only warns.
      - name: Make Quay repo public
        env:
          QUAY_API_TOKEN: ${{ secrets.QUAY_API_TOKEN }}
        run: |
          set -uo pipefail
          if [ -z "${QUAY_API_TOKEN:-}" ]; then
            echo "QUAY_API_TOKEN not set; skipping visibility change for neurodesk/${APPLICATION}."
            exit 0
          fi
          code=$(curl -sS -o /tmp/quay_vis.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${QUAY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"visibility":"public"}' \
            "https://quay.io/api/v1/repository/neurodesk/${APPLICATION}/changevisibility") || true
          if [ "${code}" = "200" ]; then
            echo "neurodesk/${APPLICATION} is public (HTTP ${code})."
          else
            echo "::warning::Could not set neurodesk/${APPLICATION} public (HTTP ${code})."
            cat /tmp/quay_vis.json 2>/dev/null || true
          fi

      - name: Download SIF (.simg) artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ env.LEGACY_IMAGENAME }}_${{ env.BUILDDATE }}.simg
          path: /mnt/tmp/

      - name: Attach SIF as OCI Referrer to Quay
        run: |
          set -euo pipefail
          cd /mnt/tmp   # oras path-validation needs a relative SIF path
          SIF="${LEGACY_IMAGENAME}_${BUILDDATE}.simg"
          oras attach --artifact-type "${SIF_MEDIATYPE}" \
            --annotation "org.opencontainers.image.title=${APPLICATION}" \
            --annotation "org.opencontainers.image.version=${VERSION}_${BUILDDATE}" \
            "${QUAY_REPO}:${VERSION}_${BUILDDATE}" \
            "${SIF}:${SIF_MEDIATYPE}"

  push-ghcr:
    needs: [config, build-image, build-simg]
    if: ${{ inputs.skip_simg_build != 'true' && needs.build-image.outputs.IMGDIFFERS == 'true' && needs.config.outputs.IMAGE_SUFFIX == '' }}
    continue-on-error: true
    runs-on: ubuntu-22.04
    permissions:
      packages: write
    env:
      APPLICATION: ${{ inputs.application }}
      VERSION: ${{ needs.config.outputs.VERSION }}
      BUILDDATE: ${{ needs.config.outputs.BUILDDATE }}
      LEGACY_IMAGENAME: ${{ inputs.application }}_${{ needs.config.outputs.VERSION }}
      SIF_MEDIATYPE: application/vnd.sylabs.sif.layer.v1.sif
    steps:
      - name: Configure GitHub-hosted runner
        if: ${{ runner.environment == 'github-hosted' }}
        run: |
          BASE_PATH=/mnt
          sudo swapoff -a && sudo rm -rf "$BASE_PATH"/*
          sudo mkdir -p "$BASE_PATH/tmp" "$BASE_PATH/docker"
          sudo chown "$USER" "$BASE_PATH/tmp"
          printf '{"data-root": "%s"}\n' "$BASE_PATH/docker" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Install oras
        run: |
          curl -fsSL https://github.com/oras-project/oras/releases/download/v1.2.0/oras_1.2.0_linux_amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin oras
          oras version

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR new name (calver + floating tags)
        env:
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
        run: |
          set -euo pipefail
          SRC="ghcr.io/${GH_REGISTRY}/${LEGACY_IMAGENAME}:${BUILDDATE}"
          DST="ghcr.io/${GH_REGISTRY}/${APPLICATION}"
          V2_TAG="${VERSION}_${BUILDDATE}"
          docker pull "${SRC}"
          docker tag "${SRC}" "${DST}:${V2_TAG}"
          docker tag "${SRC}" "${DST}:${VERSION}"
          docker tag "${SRC}" "${DST}:latest"
          docker push "${DST}:${V2_TAG}"
          docker push "${DST}:${VERSION}"
          docker push "${DST}:latest"

      - name: Download SIF (.simg) artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ env.LEGACY_IMAGENAME }}_${{ env.BUILDDATE }}.simg
          path: /mnt/tmp/

      - name: Attach SIF as OCI Referrer to GHCR
        env:
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
        run: |
          set -euo pipefail
          cd /mnt/tmp   # oras path-validation needs a relative SIF path
          SIF="${LEGACY_IMAGENAME}_${BUILDDATE}.simg"
          oras attach --artifact-type "${SIF_MEDIATYPE}" \
            --annotation "org.opencontainers.image.title=${APPLICATION}" \
            --annotation "org.opencontainers.image.version=${VERSION}_${BUILDDATE}" \
            "ghcr.io/${GH_REGISTRY}/${APPLICATION}:${VERSION}_${BUILDDATE}" \
            "${SIF}:${SIF_MEDIATYPE}"

  create-pr:
    needs: [config, build-image, push-dockerhub, upload-nectar, upload-s3]
    if: ${{ needs.build-image.outputs.IMGDIFFERS == 'true' || inputs.force_create_pr == 'true'}}
    runs-on: ubuntu-22.04
    permissions:
      packages: write
      id-token: write
      contents: read
    env:
      APPLICATION: ${{ inputs.application }}
      BUILDDATE: ${{ needs.config.outputs.BUILDDATE }}
      IMAGENAME: ${{ inputs.application }}_${{ needs.config.outputs.VERSION }}${{ needs.config.outputs.IMAGE_SUFFIX }}
      ARCHITECTURE: ${{ needs.config.outputs.ARCHITECTURE }}
      SHORT_SHA: ${{ needs.config.outputs.SHORT_SHA }}
    steps:
    - uses: actions/checkout@v5
      with:
        token: ${{ secrets.NEURODESK_GITHUB_TOKEN_ISSUE_AUTOMATION }}
    - name: Install Builder Dependencies
      run: |
        pip install -r requirements.txt
    - name: Generate Release File
      id: generate
      run: |
        echo "APPLICATION: $APPLICATION"
        python3 -m builder release "$APPLICATION" --write --architecture "$ARCHITECTURE"

    - name: Create Release File Pull Request
      if: steps.generate.outputs.container_name
      env:
        GH_TOKEN: ${{ secrets.NEURODESK_GITHUB_TOKEN_ISSUE_AUTOMATION }}
        CONTAINER_NAME: ${{ steps.generate.outputs.container_name }}
        CONTAINER_VERSION: ${{ steps.generate.outputs.container_version }}
        RELEASE_CONTENT: ${{ steps.generate.outputs.release_file_content }}
      run: |
        gh auth setup-git

        # Configure git
        git config --global user.name "neurocontainers-bot"
        git config --global user.email "neurocontainers-bot@neurodesk.github.io"

        # Rebase onto the latest main before creating the release branch.
        # This avoids pushing stale workflow file states from an older checkout.
        git fetch origin main
        git checkout -B main origin/main

        # Create the release file
        RELEASE_DIR="releases/${CONTAINER_NAME}"
        RELEASE_FILE="${RELEASE_DIR}/${CONTAINER_VERSION}.json"

        mkdir -p "$RELEASE_DIR"
        printf '%s\n' "$RELEASE_CONTENT" > "$RELEASE_FILE"

        # Check if this is a new file or an update
        if git ls-files --error-unmatch "$RELEASE_FILE" 2>/dev/null; then
          ACTION="Update"
        else
          ACTION="Add"
        fi

        # Skip PR creation when the generated release file is already current on main.
        git add "$RELEASE_FILE"
        if git diff --cached --quiet; then
          echo "No changes detected in ${RELEASE_FILE}; skipping release PR creation."
          exit 0
        fi

        # Create a new branch for the release
        BRANCH_NAME="release/${CONTAINER_NAME}-${CONTAINER_VERSION}-$(date +%Y%m%d-%H%M%S)"
        git checkout -b "$BRANCH_NAME"

        # Add and commit the release file
        git add "$RELEASE_FILE"
        git commit -m "${ACTION} release file for ${CONTAINER_NAME} ${CONTAINER_VERSION}

        Auto-generated release file from container build.

        🤖 Generated by neurocontainers CI"

        # Rebase once more in case main advanced during this job's runtime.
        git fetch origin main
        git rebase origin/main

        # Push the branch
        git push origin "$BRANCH_NAME"

        # Create the pull request first. Label updates use a separate retryable,
        # idempotent REST request so a transient API failure cannot recreate it.
        PR_URL="$(gh pr create \
          --title "${ACTION} release for ${CONTAINER_NAME} ${CONTAINER_VERSION}" \
          --body "## Summary

        This PR ${ACTION,,}s the release file for **${CONTAINER_NAME} ${CONTAINER_VERSION}**.

        ## Changes

        - ${ACTION} \`${RELEASE_FILE}\` with container metadata
        - Generated automatically from successful container build
        - Contains categories and GUI applications from build.yaml

        ## Testing Instructions

        To test this container on Neurodesk (either a local installation or https://play.neurodesk.org/):
        \`\`\`bash
        bash /neurocommand/local/fetch_and_run.sh ${IMAGENAME//_/ } ${BUILDDATE}
        \`\`\`

        Or, for testing directly with Apptainer/Singularity:
        \`\`\`bash
        curl -X GET https://neurocontainers.neurodesk.workers.dev/${IMAGENAME}_${BUILDDATE}.simg -O
        singularity shell --overlay /tmp/apptainer_overlay ${IMAGENAME}_${BUILDDATE}.simg
        \`\`\`

        ## Review Checklist

        - [ ] Release file format is correct
        - [ ] Categories are appropriate for this container
        - [ ] GUI applications (if any) are correctly defined
        - [ ] Version and build date are accurate
        - [ ] Container has been tested using the commands above

        ## Next Steps

        After merging this PR:
        1. The apps.json update workflow will automatically regenerate apps.json from all release files
        2. A PR will be created to the neurocommand repository
        3. The container will become available in neurodesk

        If additional releases are needed:
        - Add to apps.json to release to Neurodesk: https://github.com/NeuroDesk/neurocommand/edit/main/neurodesk/apps.json
        - Or add to the Open Recon recipes: https://github.com/NeuroDesk/openrecon/tree/main/recipes

        🤖 Generated by neurocontainers CI | Created by @${GITHUB_ACTOR}" \
          --head "$BRANCH_NAME" \
          --base main)"

        bash workflows/add_pr_labels_with_retry.sh "$PR_URL" automated release

        echo "✅ Pull request created for ${CONTAINER_NAME} ${CONTAINER_VERSION}: ${PR_URL}"
    - name: Detect OpenReconLabel.json
      id: detect_openrecon
      if: steps.generate.outputs.container_name && env.ARCHITECTURE == 'x86_64'
      env:
        CONTAINER_NAME: ${{ steps.generate.outputs.container_name }}
      run: |
        SOURCE_LABEL_FILE="recipes/${CONTAINER_NAME}/OpenReconLabel.json"
        if [ -f "$SOURCE_LABEL_FILE" ]; then
          echo "has_openrecon_label=true" >> "$GITHUB_OUTPUT"
          echo "Found OpenRecon label: $SOURCE_LABEL_FILE"
        else
          echo "has_openrecon_label=false" >> "$GITHUB_OUTPUT"
          echo "No OpenRecon label found for ${CONTAINER_NAME}; skipping OpenRecon PR."
        fi

    - name: Create OpenRecon Pull Request
      if: steps.detect_openrecon.outputs.has_openrecon_label == 'true'
      env:
        GH_TOKEN: ${{ secrets.NEURODESK_GITHUB_TOKEN_ISSUE_AUTOMATION }}
        CONTAINER_NAME: ${{ steps.generate.outputs.container_name }}
        CONTAINER_VERSION: ${{ steps.generate.outputs.container_version }}
      run: |
        set -euo pipefail

        gh auth setup-git

        # Configure git
        git config --global user.name "neurocontainers-bot"
        git config --global user.email "neurocontainers-bot@neurodesk.github.io"

        WORKDIR="$(mktemp -d)"
        trap 'rm -rf "$WORKDIR"' EXIT
        OPENRECON_DIR="${WORKDIR}/openrecon"

        gh repo clone neurodesk/openrecon "$OPENRECON_DIR"

        SOURCE_LABEL_FILE="${GITHUB_WORKSPACE}/recipes/${CONTAINER_NAME}/OpenReconLabel.json"
        SOURCE_README_FILE="${GITHUB_WORKSPACE}/recipes/${CONTAINER_NAME}/OpenReconREADME.md"
        TARGET_RECIPE_DIR="${OPENRECON_DIR}/recipes/${CONTAINER_NAME}"
        TARGET_LABEL_FILE="${TARGET_RECIPE_DIR}/OpenReconLabel.json"
        TARGET_PARAMS_FILE="${TARGET_RECIPE_DIR}/params.sh"
        TARGET_README_FILE="${TARGET_RECIPE_DIR}/README.md"
        OPENRECON_PATHS=(
          "recipes/${CONTAINER_NAME}/OpenReconLabel.json"
          "recipes/${CONTAINER_NAME}/params.sh"
        )
        OPENRECON_README_CHANGE_NOTE=""
        OPENRECON_BOOTSTRAP_CHANGE_NOTE=""

        if [ ! -d "$TARGET_RECIPE_DIR" ]; then
          mkdir -p "$TARGET_RECIPE_DIR"
          OPENRECON_BOOTSTRAP_CHANGE_NOTE="- Create \`recipes/${CONTAINER_NAME}\` in OpenRecon because it did not exist yet"
          echo "Created OpenRecon recipe directory: ${TARGET_RECIPE_DIR}"
        fi

        if [ ! -f "$TARGET_PARAMS_FILE" ]; then
          {
            echo '#!/bin/bash'
            echo '# Auto-generated by neurocontainers CI.'
            echo "export toolName=${CONTAINER_NAME}"
            echo "export version=${CONTAINER_VERSION}"
            echo "export baseDockerImage=vnmd/\${toolName}_\${version}"
          } > "$TARGET_PARAMS_FILE"
          echo "Created OpenRecon params file: ${TARGET_PARAMS_FILE}"
        fi

        cp "$SOURCE_LABEL_FILE" "$TARGET_LABEL_FILE"

        if [ -f "$SOURCE_README_FILE" ]; then
          cp "$SOURCE_README_FILE" "$TARGET_README_FILE"
          OPENRECON_PATHS+=("recipes/${CONTAINER_NAME}/README.md")
          OPENRECON_README_CHANGE_NOTE="- Copy \`recipes/${CONTAINER_NAME}/OpenReconREADME.md\` from neurocontainers to \`recipes/${CONTAINER_NAME}/README.md\` for OpenRecon PDF generation"
          echo "Copied OpenRecon README: ${SOURCE_README_FILE} -> ${TARGET_README_FILE}"
        else
          echo "No OpenRecon README found for ${CONTAINER_NAME}; skipping README sync."
        fi

        ESCAPED_CONTAINER_VERSION="$(printf '%s\n' "$CONTAINER_VERSION" | sed 's/[&|]/\\&/g')"

        if grep -qE '^[[:space:]]*export[[:space:]]+version=' "$TARGET_PARAMS_FILE"; then
          sed -Ei "s|^[[:space:]]*export[[:space:]]+version=.*$|export version=${ESCAPED_CONTAINER_VERSION}|" "$TARGET_PARAMS_FILE"
        elif grep -qE '^[[:space:]]*version=' "$TARGET_PARAMS_FILE"; then
          sed -Ei "s|^[[:space:]]*version=.*$|version=${ESCAPED_CONTAINER_VERSION}|" "$TARGET_PARAMS_FILE"
        elif grep -qE '^[[:space:]]*export[[:space:]]+VERSION=' "$TARGET_PARAMS_FILE"; then
          sed -Ei "s|^[[:space:]]*export[[:space:]]+VERSION=.*$|export VERSION=${ESCAPED_CONTAINER_VERSION}|" "$TARGET_PARAMS_FILE"
        elif grep -qE '^[[:space:]]*VERSION=' "$TARGET_PARAMS_FILE"; then
          sed -Ei "s|^[[:space:]]*VERSION=.*$|VERSION=${ESCAPED_CONTAINER_VERSION}|" "$TARGET_PARAMS_FILE"
        else
          echo "::warning::No supported version assignment found in ${TARGET_PARAMS_FILE}. Skipping OpenRecon PR."
          exit 0
        fi

        cd "$OPENRECON_DIR"

        if [ -z "$(git status --porcelain -- "${OPENRECON_PATHS[@]}")" ]; then
          echo "No OpenRecon changes detected for ${CONTAINER_NAME}; skipping OpenRecon PR."
          exit 0
        fi

        EXISTING_PR_URL="$(gh pr list \
          --repo neurodesk/openrecon \
          --state open \
          --search "in:title Update ${CONTAINER_NAME} OpenRecon metadata to ${CONTAINER_VERSION}" \
          --json url \
          --jq '.[0].url')"

        if [ -n "$EXISTING_PR_URL" ] && [ "$EXISTING_PR_URL" != "null" ]; then
          echo "Open OpenRecon PR already exists for ${CONTAINER_NAME} ${CONTAINER_VERSION}: ${EXISTING_PR_URL}"
          exit 0
        fi

        BRANCH_NAME="sync-openrecon/${CONTAINER_NAME}-${CONTAINER_VERSION}-$(date +%Y%m%d-%H%M%S)"
        git checkout -b "$BRANCH_NAME"
        git add "${OPENRECON_PATHS[@]}"
        git commit -m "Update ${CONTAINER_NAME} OpenRecon metadata to ${CONTAINER_VERSION}

        Auto-generated from neurocontainers CI."
        git push origin "$BRANCH_NAME"

        gh pr create \
          --repo neurodesk/openrecon \
          --title "Update ${CONTAINER_NAME} OpenRecon metadata to ${CONTAINER_VERSION}" \
          --body "## Summary

        This PR updates OpenRecon metadata for **${CONTAINER_NAME}** from the latest successful neurocontainers build.

        ## Changes

        - Update \`recipes/${CONTAINER_NAME}/OpenReconLabel.json\` from neurocontainers
        - Set \`recipes/${CONTAINER_NAME}/params.sh\` version to \`${CONTAINER_VERSION}\`
        ${OPENRECON_BOOTSTRAP_CHANGE_NOTE}
        ${OPENRECON_README_CHANGE_NOTE}

        🤖 Generated by neurocontainers CI | Created by @${GITHUB_ACTOR}" \
          --head "$BRANCH_NAME" \
          --base main

        echo "✅ OpenRecon pull request created for ${CONTAINER_NAME} ${CONTAINER_VERSION}"
    - name: Generate job output
      run: |
        echo "The container has been successfully build. To test the container, run this:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY # this is a blank line
        echo "bash /neurocommand/local/fetch_and_run.sh ${IMAGENAME//_/ } $BUILDDATE" >> $GITHUB_STEP_SUMMARY

  report-auto-build-failure:
    needs: [config, build-image, push-dockerhub, build-simg, upload-s3, create-pr]
    if: ${{ always() && !cancelled() && github.event_name == 'push' && contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      issues: write
      pull-requests: read
    env:
      APPLICATION: ${{ inputs.application }}
      BUILDDATE: ${{ needs.config.outputs.BUILDDATE }}
      VERSION: ${{ needs.config.outputs.VERSION }}
      ARCHITECTURE: ${{ needs.config.outputs.ARCHITECTURE }}
      IMAGE_SUFFIX: ${{ needs.config.outputs.IMAGE_SUFFIX }}
      CONFIG_RESULT: ${{ needs.config.result }}
      BUILD_IMAGE_RESULT: ${{ needs.build-image.result }}
      PUSH_DOCKERHUB_RESULT: ${{ needs.push-dockerhub.result }}
      BUILD_SIMG_RESULT: ${{ needs.build-simg.result }}
      UPLOAD_S3_RESULT: ${{ needs.upload-s3.result }}
      CREATE_PR_RESULT: ${{ needs.create-pr.result }}
      GH_TOKEN: ${{ secrets.NEURODESK_GITHUB_TOKEN_ISSUE_AUTOMATION || github.token }}
    steps:
      - name: Open or update auto-build failure issue
        run: |
          set -euo pipefail

          workflow_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          title="Auto-build failed for ${APPLICATION}"

          pr_number="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            --jq '.[0].number // empty' 2>/dev/null || true)"
          submitter=""
          if [ -n "${pr_number}" ] && [ "${pr_number}" != "null" ]; then
            submitter="$(gh api --paginate \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/pulls/${pr_number}/commits" \
              --jq '[.[] | .author.login // empty | select(. != "" and . != "github-actions[bot]" and . != "neurocontainers-bot" and (endswith("[bot]") | not))][0] // empty' 2>/dev/null || true)"
            if [ -z "${submitter}" ] || [ "${submitter}" = "null" ]; then
              submitter="$(gh api \
                -H "Accept: application/vnd.github+json" \
                "/repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" \
                --jq '.user.login // empty' 2>/dev/null || true)"
            fi
          fi
          if [ -z "${submitter}" ] || [ "${submitter}" = "null" ]; then
            submitter="${GITHUB_ACTOR}"
          fi

          body="$(mktemp "${RUNNER_TEMP}/auto-build-failure.XXXXXX.md")"
          {
            echo "@${submitter} the auto-build for \`${APPLICATION}\` failed."
            echo ""
            echo "## Summary"
            echo ""
            echo "- Application: \`${APPLICATION}\`"
            echo "- Version: \`${VERSION:-unknown}\`"
            echo "- Architecture: \`${ARCHITECTURE:-unknown}\`"
            echo "- Image suffix: \`${IMAGE_SUFFIX:-none}\`"
            echo "- Build date: \`${BUILDDATE:-unknown}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Workflow run: ${workflow_url}"
            echo ""
            echo "## Job Results"
            echo ""
            echo "- config: \`${CONFIG_RESULT}\`"
            echo "- build-image: \`${BUILD_IMAGE_RESULT}\`"
            echo "- push-dockerhub: \`${PUSH_DOCKERHUB_RESULT}\`"
            echo "- build-simg: \`${BUILD_SIMG_RESULT}\`"
            echo "- upload-s3: \`${UPLOAD_S3_RESULT}\`"
            echo "- create-pr: \`${CREATE_PR_RESULT}\`"
            echo ""
            echo "Please check the workflow logs and push a fix or rerun the build once the underlying problem is resolved."
          } > "${body}"

          existing_issue="$(TITLE="${title}" gh issue list \
            --repo "${GITHUB_REPOSITORY}" \
            --state open \
            --label "automated" \
            --limit 100 \
            --json number,title \
            --jq 'map(select(.title == env.TITLE))[0].number // ""')"

          if [ -n "${existing_issue}" ]; then
            gh issue comment "${existing_issue}" \
              --repo "${GITHUB_REPOSITORY}" \
              --body-file "${body}"
            echo "Updated existing auto-build failure issue #${existing_issue}."
          else
            gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${title}" \
              --body-file "${body}" \
              --label "automated"
          fi
