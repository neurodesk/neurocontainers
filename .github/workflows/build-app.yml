name: build-app

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  id-token: write

on:
  workflow_call:
    inputs:
      application:
        required: true
        type: string
      runner:
        required: true
        type: string
      disable_auto_upload:
        required: false
        type: string
      force_push_ghcr:
        required: false
        type: string
      force_push_dockerhub:
        required: false
        type: string
      force_upload_nectar:
        required: false
        type: string
      force_upload_s3:
        required: false
        type: string
      force_create_pr:
        required: false
        type: string
      skip_docker_build:
        required: false
        type: string
      skip_simg_build:
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Workflow needs the following set in GitHub
# - secrets.NEURODESK_GITHUB_TOKEN_ISSUE_AUTOMATION
# - secrets.GH_REGISTRY
# - secrets.DOCKERHUB_USERNAME
# - secrets.DOCKERHUB_PASSWORD
# - secrets.DOCKERHUB_ORG
# - secrets.AWS_ROLE_ARN

jobs:
  config:
    runs-on: ${{ fromJSON(inputs.runner) }}
    outputs:
      BUILDDATE: ${{ steps.envars.outputs.BUILDDATE }}
      SHORT_SHA: ${{ steps.envars.outputs.SHORT_SHA }}
      IMAGETAG: ${{ steps.envars.outputs.IMAGETAG }}
      VERSION: ${{ steps.envars.outputs.VERSION }}
      ARCHITECTURE: ${{ steps.envars.outputs.ARCHITECTURE }}
      IMAGE_SUFFIX: ${{ steps.envars.outputs.IMAGE_SUFFIX }}
      RELEASE_VERSION: ${{ steps.envars.outputs.RELEASE_VERSION }}
      ROOTFS_CACHE: ${{ steps.getrootfs.outputs.ROOTFS_CACHE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.NEURODESK_GITHUB_TOKEN_ISSUE_AUTOMATION }}
          fetch-depth: 0

      - name: Bootstrap build tooling
        shell: bash
        run: |
          set -eu
          # Idempotency check: skip when everything's already pre-baked
          # (legacy self-hosted VMs). Runs in full on ARC pods and partially
          # on github-hosted runners (forks).
          if command -v docker >/dev/null 2>&1 \
            && command -v apptainer >/dev/null 2>&1 \
            && command -v aws >/dev/null 2>&1 \
            && command -v swift >/dev/null 2>&1 \
            && command -v gh >/dev/null 2>&1 \
            && command -v jq >/dev/null 2>&1; then
            echo "All build tooling already present; skipping bootstrap."
            exit 0
          fi
          set -x
          sudo apt-get update
          APT_PACKAGES=(ca-certificates curl git gh jq python3 python3-pip python3-venv unzip)
          if ! command -v docker >/dev/null 2>&1; then
            APT_PACKAGES+=(docker.io)
          fi
          sudo apt-get install -y --no-install-recommends --no-upgrade "${APT_PACKAGES[@]}"
          case "$(uname -m)" in
            x86_64)
              APPTAINER_ARCH=amd64
              AWSCLI_ARCH=x86_64
              ;;
            aarch64|arm64)
              APPTAINER_ARCH=arm64
              AWSCLI_ARCH=aarch64
              ;;
            *)
              echo "Unsupported machine architecture: $(uname -m)"
              exit 1
              ;;
          esac
          APPTAINER_VER=$(curl -fsSL https://api.github.com/repos/apptainer/apptainer/releases/latest \
            | grep '"tag_name"' | head -1 | cut -d'"' -f4 | sed 's/^v//')
          if [ "$APPTAINER_ARCH" = "arm64" ]; then
            sudo apt-get install -y --no-install-recommends software-properties-common
            sudo add-apt-repository -y ppa:apptainer/ppa
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends apptainer
          else
            curl -fsSL "https://github.com/apptainer/apptainer/releases/download/v${APPTAINER_VER}/apptainer_${APPTAINER_VER}_${APPTAINER_ARCH}.deb" \
              -o /tmp/apptainer.deb
            sudo apt-get install -y /tmp/apptainer.deb
            rm /tmp/apptainer.deb
          fi
          python3 -m venv "$RUNNER_TEMP/openstack-client-venv"
          "$RUNNER_TEMP/openstack-client-venv/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/openstack-client-venv/bin/python" -m pip install \
            python-swiftclient python-keystoneclient
          echo "$RUNNER_TEMP/openstack-client-venv/bin" >> "$GITHUB_PATH"
          export PATH="$RUNNER_TEMP/openstack-client-venv/bin:$PATH"
          # AWS CLI v2 — guarded so a pre-existing install isn't clobbered.
          if ! command -v aws >/dev/null 2>&1; then
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-${AWSCLI_ARCH}.zip" \
              -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp
            sudo /tmp/aws/install
            rm -rf /tmp/aws /tmp/awscliv2.zip
          fi
          docker --version && apptainer --version && aws --version
          gh --version && jq --version && swift --version

      - name: Set environment variables
        id: envars
        run: |
          APPLICATION=${{ inputs.application }}
          SHORT_SHA=$(git rev-parse --short $GITHUB_SHA)
          VERSION=$(sed -n 's/^version:[[:space:]]*//p' "recipes/${APPLICATION}/build.yaml" | head -1 | tr -d "\"'")
          if [ -z "$VERSION" ]; then
            echo "Recipe version not found for $APPLICATION"
            exit 1
          fi
          ARCHITECTURE="x86_64"
          IMAGE_SUFFIX=""
          RELEASE_VERSION="$VERSION"
          if [[ "${{ inputs.runner }}" == *"arm"* ]]; then
            ARCHITECTURE="aarch64"
            IMAGE_SUFFIX="_arm64"
            RELEASE_VERSION="${VERSION}-arm64"
          fi
          # Get the commit date of the recipe's build.yaml file
          # This ensures consistent build dates based on when the recipe was last modified
          BUILDDATE=$(git log -1 --format=%ad --date=format:%Y%m%d -- recipes/${APPLICATION}/build.yaml)
          # Fallback to current date if git log fails (e.g., new file not yet committed)
          if [ -z "$BUILDDATE" ]; then
            BUILDDATE=`date +%Y%m%d`
          fi
          echo "APPLICATION=$APPLICATION" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "ARCHITECTURE=$ARCHITECTURE" >> $GITHUB_ENV
          echo "ARCHITECTURE=$ARCHITECTURE" >> $GITHUB_OUTPUT
          echo "IMAGE_SUFFIX=$IMAGE_SUFFIX" >> $GITHUB_ENV
          echo "IMAGE_SUFFIX=$IMAGE_SUFFIX" >> $GITHUB_OUTPUT
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "BUILDDATE=$BUILDDATE" >> $GITHUB_ENV
          echo "BUILDDATE=$BUILDDATE" >> $GITHUB_OUTPUT
          if [ "${{ inputs.skip_docker_build }}" = "true" ]; then
            echo "IMAGETAG=latest" >> $GITHUB_OUTPUT
          else
            echo "IMAGETAG=${BUILDDATE}" >> $GITHUB_OUTPUT
          fi

      - name: Install builder dependencies
        run: |
          PIP_BREAK_SYSTEM_PACKAGES=""
          if python3 -m pip install --help | grep -q -- '--break-system-packages'; then
            PIP_BREAK_SYSTEM_PACKAGES="--break-system-packages"
          fi
          python3 -m pip install ${PIP_BREAK_SYSTEM_PACKAGES} -r requirements.txt

      - name: Generate Dockerfile and Release file
        id: generate
        run: |
          echo "APPLICATION: $APPLICATION"
          python3 -m builder build "$APPLICATION" --recreate --generate-release

      - name: Set image variables
        id: imgvars
        env:
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
        run: |
          DOCKERFILE_PATH=$(find "./build/$APPLICATION/" -type f -iname "*.dockerfile" | head -1)
          # if the dockerfile is not found, exit with error
          if [ -z "$DOCKERFILE_PATH" ]; then
            echo "Dockerfile not found for $APPLICATION"
            exit 1
          fi
          DOCKERFILE=$(basename "$DOCKERFILE_PATH")
          BASE_IMAGENAME=$(echo "${DOCKERFILE%.*}" | tr '[:upper:]' '[:lower:]')
          IMAGENAME="${BASE_IMAGENAME}${IMAGE_SUFFIX}"
          echo "DOCKERFILE: $DOCKERFILE"
          echo "IMAGENAME: $IMAGENAME"
          echo "DOCKERFILE=$DOCKERFILE" >> "$GITHUB_ENV"
          echo "IMAGENAME=$IMAGENAME" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image from registry and get rootfs
        id: getrootfs
        if: inputs.skip_docker_build != 'true'
        env:
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
        run: |
          docker pull ghcr.io/${GH_REGISTRY}/${{ env.IMAGENAME }}:latest && ROOTFS_CACHE=$(docker inspect --format='{{.RootFS}}' ghcr.io/${GH_REGISTRY}/${{ env.IMAGENAME }}:latest) || true
          echo "ROOTFS_CACHE=$ROOTFS_CACHE" >> $GITHUB_OUTPUT

  build-image:
    needs: config
    runs-on: ${{ fromJSON(inputs.runner) }}
    outputs:
      IMGDIFFERS: ${{ steps.imgcompare.outputs.IMGDIFFERS }}

    permissions:
      packages: write
      id-token: write
      contents: write
      issues: write
    env:
      APPLICATION: ${{ inputs.application }}
      BUILDDATE: ${{ needs.config.outputs.BUILDDATE }}
      IMAGETAG: ${{ needs.config.outputs.IMAGETAG }}
      ROOTFS_CACHE: ${{ needs.config.outputs.ROOTFS_CACHE }}
      SHORT_SHA: ${{ needs.config.outputs.SHORT_SHA }}
      ARCHITECTURE: ${{ needs.config.outputs.ARCHITECTURE }}
      IMAGE_SUFFIX: ${{ needs.config.outputs.IMAGE_SUFFIX }}
    steps:
      - name: Set runner base path
        run: |
          BASE_PATH=/mnt
          if [ -d /storage ]; then
            BASE_PATH=/storage
          fi
          echo "BASE_PATH=$BASE_PATH" >> "$GITHUB_ENV"

      - name: Configure GitHub-hosted runner
        if: ${{ runner.environment == 'github-hosted' }}
        run: |
          BASE_PATH=/mnt
          echo "BASE_PATH=$BASE_PATH" >> "$GITHUB_ENV"
          sudo swapoff -a && sudo rm -rf "$BASE_PATH"/*
          sudo mkdir -p "$BASE_PATH/tmp"
          sudo chown "$USER" "$BASE_PATH/tmp"
          sudo mkdir -p "$BASE_PATH/docker"
          printf '{"data-root": "%s"}\n' "$BASE_PATH/docker" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Bootstrap build tooling
        shell: bash
        run: |
          set -eu
          # Idempotency check: skip when everything's already pre-baked
          # (legacy self-hosted VMs). Runs in full on ARC pods and partially
          # on github-hosted runners (forks).
          if command -v docker >/dev/null 2>&1 \
            && command -v apptainer >/dev/null 2>&1 \
            && command -v aws >/dev/null 2>&1 \
            && command -v swift >/dev/null 2>&1 \
            && command -v gh >/dev/null 2>&1 \
            && command -v jq >/dev/null 2>&1; then
            echo "All build tooling already present; skipping bootstrap."
            exit 0
          fi
          set -x
          sudo apt-get update
          APT_PACKAGES=(ca-certificates curl git gh jq python3 python3-pip python3-venv unzip)
          if ! command -v docker >/dev/null 2>&1; then
            APT_PACKAGES+=(docker.io)
          fi
          sudo apt-get install -y --no-install-recommends --no-upgrade "${APT_PACKAGES[@]}"
          case "$(uname -m)" in
            x86_64)
              APPTAINER_ARCH=amd64
              AWSCLI_ARCH=x86_64
              ;;
            aarch64|arm64)
              APPTAINER_ARCH=arm64
              AWSCLI_ARCH=aarch64
              ;;
            *)
              echo "Unsupported machine architecture: $(uname -m)"
              exit 1
              ;;
          esac
          APPTAINER_VER=$(curl -fsSL https://api.github.com/repos/apptainer/apptainer/releases/latest \
            | grep '"tag_name"' | head -1 | cut -d'"' -f4 | sed 's/^v//')
          if [ "$APPTAINER_ARCH" = "arm64" ]; then
            sudo apt-get install -y --no-install-recommends software-properties-common
            sudo add-apt-repository -y ppa:apptainer/ppa
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends apptainer
          else
            curl -fsSL "https://github.com/apptainer/apptainer/releases/download/v${APPTAINER_VER}/apptainer_${APPTAINER_VER}_${APPTAINER_ARCH}.deb" \
              -o /tmp/apptainer.deb
            sudo apt-get install -y /tmp/apptainer.deb
            rm /tmp/apptainer.deb
          fi
          python3 -m venv "$RUNNER_TEMP/openstack-client-venv"
          "$RUNNER_TEMP/openstack-client-venv/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/openstack-client-venv/bin/python" -m pip install \
            python-swiftclient python-keystoneclient
          echo "$RUNNER_TEMP/openstack-client-venv/bin" >> "$GITHUB_PATH"
          export PATH="$RUNNER_TEMP/openstack-client-venv/bin:$PATH"
          # AWS CLI v2 — guarded so a pre-existing install isn't clobbered.
          if ! command -v aws >/dev/null 2>&1; then
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-${AWSCLI_ARCH}.zip" \
              -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp
            sudo /tmp/aws/install
            rm -rf /tmp/aws /tmp/awscliv2.zip
          fi
          docker --version && apptainer --version && aws --version
          gh --version && jq --version && swift --version

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.NEURODESK_GITHUB_TOKEN_ISSUE_AUTOMATION }}

      - name: Install builder dependencies
        run: |
          PIP_BREAK_SYSTEM_PACKAGES=""
          if python3 -m pip install --help | grep -q -- '--break-system-packages'; then
            PIP_BREAK_SYSTEM_PACKAGES="--break-system-packages"
          fi
          python3 -m pip install ${PIP_BREAK_SYSTEM_PACKAGES} -r requirements.txt

      - name: Generate Dockerfile and Release file
        id: generate
        run: |
          echo "APPLICATION: $APPLICATION"
          python3 -m builder build "$APPLICATION" --recreate --generate-release --architecture "$ARCHITECTURE"

      - name: Set image variables
        id: imgvars
        env:
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
        run: |
          DOCKERFILE_PATH=$(find "./build/$APPLICATION/" -type f -iname "*.dockerfile" | head -1)
          # if the dockerfile is not found, exit with error
          if [ -z "$DOCKERFILE_PATH" ]; then
            echo "Dockerfile not found for $APPLICATION"
            exit 1
          fi
          DOCKERFILE=$(basename "$DOCKERFILE_PATH")
          BASE_IMAGENAME=$(echo "${DOCKERFILE%.*}" | tr '[:upper:]' '[:lower:]')
          IMAGENAME="${BASE_IMAGENAME}${IMAGE_SUFFIX}"
          echo "DOCKERFILE: $DOCKERFILE"
          echo "IMAGENAME: $IMAGENAME"
          echo "DOCKERFILE=$DOCKERFILE" >> $GITHUB_ENV
          echo "IMAGENAME=$IMAGENAME" >> $GITHUB_ENV
          echo "IMAGENAME_TEST=${IMAGENAME//_/ }" >> $GITHUB_ENV
          echo "test command: bash /neurocommand/local/fetch_and_run.sh ${IMAGENAME//_/ } $BUILDDATE"

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ inputs.skip_docker_build != 'true' && !contains(inputs.runner, 'blacksmith') }}
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

      - name: Set up Blacksmith Docker builder
        if: ${{ inputs.skip_docker_build != 'true' && contains(inputs.runner, 'blacksmith') }}
        uses: useblacksmith/setup-docker-builder@v1

      - name: Debug Dockerfile
        run: cat ./build/${APPLICATION}/${DOCKERFILE}

      - name: Debug storage
        run: |
          sudo df -ha
          sudo du -sh --exclude="$BASE_PATH/docker" "$BASE_PATH"

      - name: Build new image
        if: inputs.skip_docker_build != 'true'
        env:
          DISABLE_AUTO_UPLOAD: ${{ inputs.disable_auto_upload }}
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
          IS_BLACKSMITH_RUNNER: ${{ contains(inputs.runner, 'blacksmith') }}
        run: |
          cd "./build/${APPLICATION}"
          CACHE_REF=ghcr.io/${GH_REGISTRY}/${IMAGENAME}:buildcache
          CACHE_FROM_ARGS=()
          CACHE_TO_ARGS=()
          if [ "${IS_BLACKSMITH_RUNNER}" = "true" ]; then
            echo "Using Blacksmith Docker layer cache"
          else
            CACHE_TO_ARGS=(--cache-to type=inline)
            if docker buildx imagetools inspect "${CACHE_REF}" >/dev/null 2>&1; then
              echo "Using cache image ${CACHE_REF}"
              CACHE_FROM_ARGS=(--cache-from "type=registry,ref=${CACHE_REF}")
            else
              echo "Cache image ${CACHE_REF} is unavailable; building without --cache-from"
            fi
            if [ "${DISABLE_AUTO_UPLOAD}" != "true" ]; then
              CACHE_TO_ARGS+=(--cache-to "type=registry,ref=${CACHE_REF},mode=max")
            else
              echo "Auto-upload is disabled. Skipping registry cache export."
            fi
          fi
          mkdir -p cache
          docker buildx build . \
            --load \
            --file "${DOCKERFILE}" \
            --tag "ghcr.io/${GH_REGISTRY}/${IMAGENAME}:${BUILDDATE}" \
            --build-context "neurocontainer-cache=./cache" \
            "${CACHE_FROM_ARGS[@]}" \
            "${CACHE_TO_ARGS[@]}" \
            --label "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}" \
            --label "GITHUB_SHA=${SHORT_SHA}"

      - name: Debug storage
        run: |
          sudo df -ha
          sudo du -sh --exclude="$BASE_PATH/docker" "$BASE_PATH"

      # - name: Save new image to file
      #   if: inputs.skip_docker_build != 'true'
      #   env:
      #     GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
      #   run: docker save ghcr.io/${GH_REGISTRY}/${IMAGENAME}:${BUILDDATE} -o /tmp/${{ env.IMAGENAME }}-${{ env.BUILDDATE }}.tar

      # - name: Debug storage
      #   run: |
      #     sudo df -ha
      #     sudo du -sh /mnt
      #     sudo du -sh /mnt/*

      # - name: Build and save new image
      #   uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
      #   with:
      #     context: ./build/${{ env.APPLICATION }}
      #     file: ./build/${{ env.APPLICATION }}/${{ env.IMAGENAME }}.Dockerfile
      #     push: false
      #     load: true
      #     tags: ghcr.io/${{ secrets.GH_REGISTRY }}/${{ env.IMAGENAME }}:${{ env.BUILDDATE }}
      #     cache-from: type=registry,ref=ghcr.io/${{ secrets.GH_REGISTRY }}/${{ env.IMAGENAME }}:latest
      #     cache-to: type=inline
      #     outputs: type=docker,dest=/tmp/${{ env.IMAGENAME }}-${{ env.BUILDDATE }}.tar

      - name: Compare new and cached images
        id: imgcompare
        if: inputs.skip_docker_build != 'true'
        env:
          DISABLE_AUTO_UPLOAD: ${{ inputs.disable_auto_upload }}
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
        run: |
          # Check if the image exists before trying to inspect it
          if docker inspect ghcr.io/${GH_REGISTRY}/${IMAGENAME}:${BUILDDATE} >/dev/null 2>&1; then
            ROOTFS_NEW=$(docker inspect --format='{{.RootFS}}' ghcr.io/${GH_REGISTRY}/${IMAGENAME}:${BUILDDATE})
            echo "ROOTFS_NEW=$ROOTFS_NEW" >> $GITHUB_ENV

            if [ "$DISABLE_AUTO_UPLOAD" = "true" ]; then
              echo "Auto-upload is disabled. Skipping push to registry."
            elif [ "$ROOTFS_NEW" = "$ROOTFS_CACHE" ]; then
              echo "No changes found. Skipping push to registry. "
            else
              echo "Pushing to registry. Changes found"
              echo "IMGDIFFERS=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "ERROR: Image ghcr.io/${GH_REGISTRY}/${IMAGENAME}:${BUILDDATE} does not exist. Build failed."
            exit 1
          fi

      - name: Analyze image layer waste with Dive
        id: dive
        if: inputs.skip_docker_build != 'true' && steps.imgcompare.outputs.IMGDIFFERS == 'true'
        env:
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
          DIVE_IMAGE: wagoodman/dive:v0.13.1
          DIVE_LOWEST_EFFICIENCY: "0.90"
          DIVE_HIGHEST_USER_WASTED_PERCENT: "0.10"
        run: |
          set +e
          IMAGE="ghcr.io/${GH_REGISTRY}/${IMAGENAME}:${BUILDDATE}"
          RAW_REPORT="${RUNNER_TEMP}/dive-${APPLICATION}-${BUILDDATE}.raw.txt"
          REPORT="${RUNNER_TEMP}/dive-${APPLICATION}-${BUILDDATE}.txt"

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            "${DIVE_IMAGE}" \
            --ci \
            --lowestEfficiency "${DIVE_LOWEST_EFFICIENCY}" \
            --highestUserWastedPercent "${DIVE_HIGHEST_USER_WASTED_PERCENT}" \
            "${IMAGE}" > "${RAW_REPORT}" 2>&1
          DIVE_STATUS=$?

          sed -E 's/\x1B\[[0-9;]*[A-Za-z]//g' "${RAW_REPORT}" > "${REPORT}" 2>/dev/null || cp "${RAW_REPORT}" "${REPORT}"
          cat "${REPORT}"

          {
            echo "image=${IMAGE}"
            echo "report_path=${REPORT}"
            echo "exit_code=${DIVE_STATUS}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Dive image layer waste analysis"
            echo ""
            echo "- Image: \`${IMAGE}\`"
            echo "- Dive image: \`${DIVE_IMAGE}\`"
            echo "- Exit code: \`${DIVE_STATUS}\`"
            echo "- Thresholds: lowest efficiency \`${DIVE_LOWEST_EFFICIENCY}\`, highest user wasted percent \`${DIVE_HIGHEST_USER_WASTED_PERCENT}\`"
            echo ""
            echo '```text'
            cat "${REPORT}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          WASTED_SPACE=false
          if grep -q "Result:FAIL" "${REPORT}"; then
            WASTED_SPACE=true
          else
            if [ "${DIVE_STATUS}" -ne 0 ]; then
              echo "::warning::Dive analysis failed before producing a CI failure result. See the step log for details."
            fi
          fi
          echo "wasted_space=${WASTED_SPACE}" >> "$GITHUB_OUTPUT"

      - name: Open issue for Dive wasted space
        if: steps.dive.outputs.wasted_space == 'true'
        env:
          GH_TOKEN: ${{ secrets.NEURODESK_GITHUB_TOKEN_ISSUE_AUTOMATION }}
          DIVE_IMAGE_REF: ${{ steps.dive.outputs.image }}
          DIVE_REPORT_PATH: ${{ steps.dive.outputs.report_path }}
          DIVE_EXIT_CODE: ${{ steps.dive.outputs.exit_code }}
        run: |
          set -euo pipefail
          TITLE="Dive wasted space detected for ${IMAGENAME}"
          BODY="${RUNNER_TEMP}/dive-issue-${APPLICATION}-${BUILDDATE}.md"
          WORKFLOW_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          {
            echo "## Summary"
            echo ""
            echo "Dive reported wasted Docker image space for \`${DIVE_IMAGE_REF}\`."
            echo ""
            echo "- Application: \`${APPLICATION}\`"
            echo "- Image: \`${DIVE_IMAGE_REF}\`"
            echo "- Build date: \`${BUILDDATE}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Workflow run: ${WORKFLOW_URL}"
            echo "- Dive exit code: \`${DIVE_EXIT_CODE}\`"
            echo "- Thresholds: lowest efficiency \`0.90\`, highest user wasted percent \`0.10\`"
            echo ""
            echo "## Dive Output"
            echo ""
            echo '```text'
            head -c 50000 "${DIVE_REPORT_PATH}"
            echo ""
            echo '```'
          } > "${BODY}"

          EXISTING_ISSUE="$(gh issue list \
            --repo "${GITHUB_REPOSITORY}" \
            --state open \
            --search "${TITLE} in:title" \
            --json number \
            --jq '.[0].number // ""')"

          if [ -n "${EXISTING_ISSUE}" ]; then
            gh issue comment "${EXISTING_ISSUE}" \
              --repo "${GITHUB_REPOSITORY}" \
              --body-file "${BODY}"
            echo "Updated existing Dive wasted-space issue #${EXISTING_ISSUE}."
          else
            gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${TITLE}" \
              --body-file "${BODY}"
          fi

      # - name: Upload new image as build artifact
