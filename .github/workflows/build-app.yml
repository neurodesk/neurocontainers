name: build-app

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

on:
  workflow_call:
    inputs:
      application:
        required: true
        type: string
      runner:
        required: true
        type: string
      disable_auto_upload:
        required: false
        type: string
      force_push_ghcr:
        required: false
        type: string
      force_push_dockerhub:
        required: false
        type: string
      force_upload_nectar:
        required: false
        type: string
      force_upload_s3:
        required: false
        type: string
      force_create_pr:
        required: false
        type: string
      skip_docker_build:
        required: false
        type: string
      skip_simg_build:
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Workflow needs the following set in GitHub
# - secrets.NEURODESK_GITHUB_TOKEN_ISSUE_AUTOMATION
# - secrets.GH_REGISTRY
# - secrets.DOCKERHUB_USERNAME
# - secrets.DOCKERHUB_PASSWORD
# - secrets.DOCKERHUB_ORG
# - secrets.AWS_ROLE_ARN

jobs:
  config:
    runs-on: ${{ fromJSON(inputs.runner) }}
    outputs:
      APPLICATION: ${{ steps.envars.outputs.APPLICATION }}
      BUILDDATE: ${{ steps.envars.outputs.BUILDDATE }}
      SHORT_SHA: ${{ steps.envars.outputs.SHORT_SHA }}
      IMAGETAG: ${{ steps.envars.outputs.IMAGETAG }}
      IMAGENAME: ${{ steps.imgvars.outputs.IMAGENAME }}
      DOCKERFILE: ${{ steps.imgvars.outputs.DOCKERFILE }}
      ROOTFS_CACHE: ${{ steps.getrootfs.outputs.ROOTFS_CACHE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.NEURODESK_GITHUB_TOKEN_ISSUE_AUTOMATION }}

      - name: Bootstrap build tooling
        shell: bash
        run: |
          set -eu
          # Idempotency check: skip when everything's already pre-baked
          # (legacy self-hosted VMs). Runs in full on ARC pods and partially
          # on github-hosted runners (forks).
          if command -v docker >/dev/null 2>&1 \
            && command -v apptainer >/dev/null 2>&1 \
            && command -v aws >/dev/null 2>&1 \
            && command -v swift >/dev/null 2>&1 \
            && command -v gh >/dev/null 2>&1 \
            && command -v jq >/dev/null 2>&1; then
            echo "All build tooling already present; skipping bootstrap."
            exit 0
          fi
          set -x
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --no-upgrade \
            ca-certificates curl docker.io git gh jq python3 python3-pip python3-venv unzip
          APPTAINER_VER=$(curl -fsSL https://api.github.com/repos/apptainer/apptainer/releases/latest \
            | grep '"tag_name"' | head -1 | cut -d'"' -f4 | sed 's/^v//')
          curl -fsSL "https://github.com/apptainer/apptainer/releases/download/v${APPTAINER_VER}/apptainer_${APPTAINER_VER}_amd64.deb" \
            -o /tmp/apptainer.deb
          sudo apt-get install -y /tmp/apptainer.deb
          rm /tmp/apptainer.deb
          sudo python3 -m pip install --break-system-packages \
            python-swiftclient python-keystoneclient
          # AWS CLI v2 — guarded so a pre-existing install isn't clobbered.
          if ! command -v aws >/dev/null 2>&1; then
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" \
              -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp
            sudo /tmp/aws/install
            rm -rf /tmp/aws /tmp/awscliv2.zip
          fi
          docker --version && apptainer --version && aws --version
          gh --version && jq --version && swift --version

      - name: Set environment variables
        id: envars
        run: |
          APPLICATION=${{ inputs.application }}
          SHORT_SHA=$(git rev-parse --short $GITHUB_SHA)
          # Get the commit date of the recipe's build.yaml file
          # This ensures consistent build dates based on when the recipe was last modified
          BUILDDATE=$(git log -1 --format=%ad --date=format:%Y%m%d -- recipes/${APPLICATION}/build.yaml)
          # Fallback to current date if git log fails (e.g., new file not yet committed)
          if [ -z "$BUILDDATE" ]; then
            BUILDDATE=`date +%Y%m%d`
          fi
          echo "APPLICATION=$APPLICATION" >> $GITHUB_ENV
          echo "APPLICATION=$APPLICATION" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "BUILDDATE=$BUILDDATE" >> $GITHUB_ENV
          echo "BUILDDATE=$BUILDDATE" >> $GITHUB_OUTPUT
          if [ "${{ inputs.skip_docker_build }}" = "true" ]; then
            echo "IMAGETAG=latest" >> $GITHUB_OUTPUT
          else
            echo "IMAGETAG=${BUILDDATE}" >> $GITHUB_OUTPUT
          fi

      - name: Install builder dependencies
        run: |
          pip install --break-system-packages -r requirements.txt

      - name: Generate Dockerfile and Release file
        id: generate
        run: |
          echo "APPLICATION: $APPLICATION"
          ./builder/build.py generate $APPLICATION --recreate --auto-build --generate-release

      - name: Set image variables
        id: imgvars
        env:
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
        run: |
          DOCKERFILE_PATH=$(find "./build/$APPLICATION/" -type f -iname "*.dockerfile" | head -1)
          # if the dockerfile is not found, exit with error
          if [ -z "$DOCKERFILE_PATH" ]; then
            echo "Dockerfile not found for $APPLICATION"
            exit 1
          fi
          DOCKERFILE=$(basename "$DOCKERFILE_PATH")
          IMAGENAME=$(echo "${DOCKERFILE%.*}" | tr '[:upper:]' '[:lower:]')
          echo "DOCKERFILE: $DOCKERFILE"
          echo "IMAGENAME: $IMAGENAME"
          echo "DOCKERFILE=$DOCKERFILE" >> $GITHUB_OUTPUT
          echo "DOCKERFILE=$DOCKERFILE" >> $GITHUB_ENV
          echo "IMAGENAME=$IMAGENAME" >> $GITHUB_OUTPUT
          echo "IMAGENAME=$IMAGENAME" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image from registry and get rootfs
        id: getrootfs
        if: inputs.skip_docker_build != 'true'
        env:
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
        run: |
          docker pull ghcr.io/${GH_REGISTRY}/${{ env.IMAGENAME }}:latest && ROOTFS_CACHE=$(docker inspect --format='{{.RootFS}}' ghcr.io/${GH_REGISTRY}/${{ env.IMAGENAME }}:latest) || true
          echo "ROOTFS_CACHE=$ROOTFS_CACHE" >> $GITHUB_OUTPUT

  build-image:
    needs: config
    runs-on: ${{ fromJSON(inputs.runner) }}
    outputs:
      IMGDIFFERS: ${{ steps.imgcompare.outputs.IMGDIFFERS }}

    permissions:
      packages: write
      id-token: write
      contents: write
    env:
      APPLICATION: ${{ needs.config.outputs.APPLICATION }}
      BUILDDATE: ${{ needs.config.outputs.BUILDDATE }}
      DOCKERFILE: ${{ needs.config.outputs.DOCKERFILE }}
      IMAGENAME: ${{ needs.config.outputs.IMAGENAME }}
      IMAGETAG: ${{ needs.config.outputs.IMAGETAG }}
      ROOTFS_CACHE: ${{ needs.config.outputs.ROOTFS_CACHE }}
      SHORT_SHA: ${{ needs.config.outputs.SHORT_SHA }}
    steps:
      - name: Set runner base path
        run: |
          BASE_PATH=/mnt
          if [ -d /storage ]; then
            BASE_PATH=/storage
          fi
          echo "BASE_PATH=$BASE_PATH" >> "$GITHUB_ENV"

      - name: Configure GitHub-hosted runner
        if: ${{ runner.environment == 'github-hosted' }}
        run: |
          BASE_PATH=/mnt
          echo "BASE_PATH=$BASE_PATH" >> "$GITHUB_ENV"
          sudo swapoff -a && sudo rm -rf "$BASE_PATH"/*
          sudo mkdir -p "$BASE_PATH/tmp"
          sudo chown "$USER" "$BASE_PATH/tmp"
          sudo mkdir -p "$BASE_PATH/docker"
          printf '{"data-root": "%s"}\n' "$BASE_PATH/docker" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Bootstrap build tooling
        shell: bash
        run: |
          set -eu
          # Idempotency check: skip when everything's already pre-baked
          # (legacy self-hosted VMs). Runs in full on ARC pods and partially
          # on github-hosted runners (forks).
          if command -v docker >/dev/null 2>&1 \
            && command -v apptainer >/dev/null 2>&1 \
            && command -v aws >/dev/null 2>&1 \
            && command -v swift >/dev/null 2>&1 \
            && command -v gh >/dev/null 2>&1 \
            && command -v jq >/dev/null 2>&1; then
            echo "All build tooling already present; skipping bootstrap."
            exit 0
          fi
          set -x
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --no-upgrade \
            ca-certificates curl docker.io git gh jq python3 python3-pip python3-venv unzip
          APPTAINER_VER=$(curl -fsSL https://api.github.com/repos/apptainer/apptainer/releases/latest \
            | grep '"tag_name"' | head -1 | cut -d'"' -f4 | sed 's/^v//')
          curl -fsSL "https://github.com/apptainer/apptainer/releases/download/v${APPTAINER_VER}/apptainer_${APPTAINER_VER}_amd64.deb" \
            -o /tmp/apptainer.deb
          sudo apt-get install -y /tmp/apptainer.deb
          rm /tmp/apptainer.deb
          sudo python3 -m pip install --break-system-packages \
            python-swiftclient python-keystoneclient
          # AWS CLI v2 — guarded so a pre-existing install isn't clobbered.
          if ! command -v aws >/dev/null 2>&1; then
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" \
              -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp
            sudo /tmp/aws/install
            rm -rf /tmp/aws /tmp/awscliv2.zip
          fi
          docker --version && apptainer --version && aws --version
          gh --version && jq --version && swift --version

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.NEURODESK_GITHUB_TOKEN_ISSUE_AUTOMATION }}

      - name: Install builder dependencies
        run: |
          pip install --break-system-packages -r requirements.txt

      - name: Generate Dockerfile and Release file
        id: generate
        run: |
          echo "APPLICATION: $APPLICATION"
          ./builder/build.py generate $APPLICATION --recreate --auto-build --generate-release

      - name: Set image variables
        id: imgvars
        env:
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
        run: |
          DOCKERFILE_PATH=$(find "./build/$APPLICATION/" -type f -iname "*.dockerfile" | head -1)
          # if the dockerfile is not found, exit with error
          if [ -z "$DOCKERFILE_PATH" ]; then
            echo "Dockerfile not found for $APPLICATION"
            exit 1
          fi
          DOCKERFILE=$(basename "$DOCKERFILE_PATH")
          IMAGENAME=$(echo "${DOCKERFILE%.*}" | tr '[:upper:]' '[:lower:]')
          echo "DOCKERFILE: $DOCKERFILE"
          echo "IMAGENAME: $IMAGENAME"
          echo "DOCKERFILE=$DOCKERFILE" >> $GITHUB_ENV
          echo "IMAGENAME=$IMAGENAME" >> $GITHUB_ENV
          echo "IMAGENAME_TEST=${IMAGENAME//_/ }" >> $GITHUB_ENV
          echo "test command: bash /neurocommand/local/fetch_and_run.sh ${IMAGENAME//_/ } $BUILDDATE"

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # - name: Set up Docker Buildx
      #   uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

      - name: Debug Dockerfile
        run: cat ./build/${APPLICATION}/${DOCKERFILE}

      - name: Debug storage
        run: |
          sudo df -ha
          sudo du -sh --exclude="$BASE_PATH/docker" "$BASE_PATH"

      - name: Build new image
        if: inputs.skip_docker_build != 'true'
        env:
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
        run: |
          cd ./build/${APPLICATION}
          CACHE_IMAGE=ghcr.io/${GH_REGISTRY}/${IMAGENAME}:latest
          CACHE_FROM_ARGS=""
          if docker pull "${CACHE_IMAGE}"; then
            echo "Using cache image ${CACHE_IMAGE}"
            CACHE_FROM_ARGS="--cache-from ${CACHE_IMAGE}"
          else
            echo "Cache image ${CACHE_IMAGE} is unavailable; building without --cache-from"
          fi
          mkdir -p "$HOME/.cache/neurocontainers/build-context"
          docker build . --file ${DOCKERFILE} --tag ghcr.io/${GH_REGISTRY}/${IMAGENAME}:${BUILDDATE} --build-context neurocontainer-cache="$HOME/.cache/neurocontainers/build-context" ${CACHE_FROM_ARGS} --label "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}" --label "GITHUB_SHA=${SHORT_SHA}"
          
      - name: Debug storage
        run: |
          sudo df -ha
          sudo du -sh --exclude="$BASE_PATH/docker" "$BASE_PATH"
          
      # - name: Save new image to file
      #   if: inputs.skip_docker_build != 'true'
      #   env:
      #     GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
      #   run: docker save ghcr.io/${GH_REGISTRY}/${IMAGENAME}:${BUILDDATE} -o /tmp/${{ env.IMAGENAME }}-${{ env.BUILDDATE }}.tar
          
      # - name: Debug storage
      #   run: |
      #     sudo df -ha
      #     sudo du -sh /mnt
      #     sudo du -sh /mnt/*

      # - name: Build and save new image 
      #   uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
      #   with:
      #     context: ./build/${{ env.APPLICATION }}
      #     file: ./build/${{ env.APPLICATION }}/${{ env.IMAGENAME }}.Dockerfile
      #     push: false
      #     load: true
      #     tags: ghcr.io/${{ secrets.GH_REGISTRY }}/${{ env.IMAGENAME }}:${{ env.BUILDDATE }}
      #     cache-from: type=registry,ref=ghcr.io/${{ secrets.GH_REGISTRY }}/${{ env.IMAGENAME }}:latest
      #     cache-to: type=inline
      #     outputs: type=docker,dest=/tmp/${{ env.IMAGENAME }}-${{ env.BUILDDATE }}.tar

      - name: Compare new and cached images
        id: imgcompare
        if: inputs.skip_docker_build != 'true'
        env:
          DISABLE_AUTO_UPLOAD: ${{ inputs.disable_auto_upload }}
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
        run: |
          # Check if the image exists before trying to inspect it
          if docker inspect ghcr.io/${GH_REGISTRY}/${IMAGENAME}:${BUILDDATE} >/dev/null 2>&1; then
            ROOTFS_NEW=$(docker inspect --format='{{.RootFS}}' ghcr.io/${GH_REGISTRY}/${IMAGENAME}:${BUILDDATE})
            echo "ROOTFS_NEW=$ROOTFS_NEW" >> $GITHUB_ENV
            
            if [ "$DISABLE_AUTO_UPLOAD" = "true" ]; then
              echo "Auto-upload is disabled. Skipping push to registry."
            elif [ "$ROOTFS_NEW" = "$ROOTFS_CACHE" ]; then
              echo "No changes found. Skipping push to registry. "
            else
              echo "Pushing to registry. Changes found"
              echo "IMGDIFFERS=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "ERROR: Image ghcr.io/${GH_REGISTRY}/${IMAGENAME}:${BUILDDATE} does not exist. Build failed."
            exit 1
          fi

      # - name: Upload new image as build artifact
      #   if: inputs.skip_docker_build != 'true'
      #   uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      #   with:
      #     name: ${{ env.IMAGENAME }}-${{ env.BUILDDATE }}
      #     path: /tmp/${{ env.IMAGENAME }}-${{ env.BUILDDATE }}.tar
      #     retention-days: 7
        
      - name: Push to GHCR
        if: steps.imgcompare.outputs.IMGDIFFERS == 'true'
        env:
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
        run: |
          docker tag ghcr.io/${GH_REGISTRY}/${IMAGENAME}:${BUILDDATE} ghcr.io/${GH_REGISTRY}/${IMAGENAME}:latest
          docker push ghcr.io/${GH_REGISTRY}/${IMAGENAME}:${BUILDDATE}
          docker push ghcr.io/${GH_REGISTRY}/${IMAGENAME}:latest

  # push-ghcr:
  #   needs: [config, build-image]
  #   if: ${{ needs.build-image.outputs.IMGDIFFERS == 'true' || inputs.force_push_ghcr == 'true' }}
  #   runs-on: ubuntu-22.04
  #   permissions:
  #     packages: write

  #   steps:
  #     - name: Configure runner
  #       run: |
  #         sudo swapoff -a && sudo rm -rf /mnt/*
  #         sudo mkdir -p /mnt/tmp
  #         sudo chown $USER /mnt/tmp
  #         sudo mkdir -p /mnt/docker
  #         echo '{"data-root": "/mnt/docker"}' | sudo tee /etc/docker/daemon.json
  #         sudo systemctl restart docker

  #     - name: Download build artifact
  #       uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
  #       with:
  #         name: ${{ needs.config.outputs.IMAGENAME }}-${{ needs.config.outputs.BUILDDATE }}
  #         path: /tmp/

  #     - name: Load Docker Image from Artifact
  #       if: inputs.skip_docker_build != 'true'
  #       run: docker load --input /tmp/${{ needs.config.outputs.IMAGENAME }}-${{ needs.config.outputs.BUILDDATE }}.tar

  #     - name: Login to GHCR
  #       uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
  #       with:
  #         registry: ghcr.io
  #         username: ${{ github.repository_owner }}
  #         password: ${{ secrets.GITHUB_TOKEN }}

  #     - name: Push to GHCR
  #       env:
  #         GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
  #       run: |
  #         docker tag ghcr.io/${GH_REGISTRY}/${{ needs.config.outputs.IMAGENAME }}:${{ needs.config.outputs.BUILDDATE }} ghcr.io/${GH_REGISTRY}/${{ needs.config.outputs.IMAGENAME }}:latest
  #         docker push --all-tags ghcr.io/${GH_REGISTRY}/${{ needs.config.outputs.IMAGENAME }}

  push-dockerhub:
    needs: [config, build-image]
    if: ${{ needs.build-image.outputs.IMGDIFFERS == 'true' || inputs.force_push_dockerhub == 'true' }}
    runs-on: ubuntu-22.04
    permissions:
      packages: write

    steps:
      - name: Configure GitHub-hosted runner
        if: ${{ runner.environment == 'github-hosted' }}
        run: |
          BASE_PATH=/mnt
          echo "BASE_PATH=$BASE_PATH" >> "$GITHUB_ENV"
          sudo swapoff -a && sudo rm -rf "$BASE_PATH"/*
          sudo mkdir -p "$BASE_PATH/tmp"
          sudo chown "$USER" "$BASE_PATH/tmp"
          sudo mkdir -p "$BASE_PATH/docker"
          printf '{"data-root": "%s"}\n' "$BASE_PATH/docker" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image from registry
        env:
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
        run: |
          docker pull ghcr.io/${GH_REGISTRY}/${{ needs.config.outputs.IMAGENAME }}:${{ needs.config.outputs.BUILDDATE }}

      # - name: Download image artifact
      #   uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
      #   with:
      #     name: ${{ needs.config.outputs.IMAGENAME }}-${{ needs.config.outputs.BUILDDATE }}
      #     path: /tmp/

      # - name: Load Docker Image from Artifact
      #   if: inputs.skip_docker_build != 'true'
      #   run: docker load --input /tmp/${{ needs.config.outputs.IMAGENAME }}-${{ needs.config.outputs.BUILDDATE }}.tar

      - name: Login to DockerHub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Push to DockerHub
        env:
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
          DOCKERHUB_ORG: ${{ secrets.DOCKERHUB_ORG }}
        run: |
          docker tag ghcr.io/${GH_REGISTRY}/${{ needs.config.outputs.IMAGENAME }}:${{ needs.config.outputs.BUILDDATE }} ${DOCKERHUB_ORG}/${{ needs.config.outputs.IMAGENAME }}:${{ needs.config.outputs.BUILDDATE }}
          docker tag ghcr.io/${GH_REGISTRY}/${{ needs.config.outputs.IMAGENAME }}:${{ needs.config.outputs.BUILDDATE }} ${DOCKERHUB_ORG}/${{ needs.config.outputs.IMAGENAME }}:latest
          docker push --all-tags ${DOCKERHUB_ORG}/${{ needs.config.outputs.IMAGENAME }}

  build-simg:
    needs: [config, build-image]
    if: ${{ needs.build-image.outputs.IMGDIFFERS == 'true' || inputs.force_upload_nectar == 'true' || inputs.force_upload_s3 == 'true' || inputs.skip_simg_build == 'false' }}
    runs-on: ubuntu-22.04
    permissions:
      packages: write

    steps:
      - name: Set runner base path
        id: base-path
        run: |
          BASE_PATH=/mnt
          if [ -d /storage ]; then
            BASE_PATH=/storage
          fi
          echo "BASE_PATH=$BASE_PATH" >> "$GITHUB_ENV"
          echo "base_path=$BASE_PATH" >> "$GITHUB_OUTPUT"

      - name: Configure GitHub-hosted runner
        if: ${{ runner.environment == 'github-hosted' }}
        run: |
          BASE_PATH=/mnt
          echo "BASE_PATH=$BASE_PATH" >> "$GITHUB_ENV"
          sudo swapoff -a && sudo rm -rf "$BASE_PATH"/*
          sudo mkdir -p "$BASE_PATH/tmp"
          sudo chown "$USER" "$BASE_PATH/tmp"
          sudo mkdir -p "$BASE_PATH/docker"
          printf '{"data-root": "%s"}\n' "$BASE_PATH/docker" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

          sudo mkdir -p "$BASE_PATH/apptainer/cache" "$BASE_PATH/apptainer/tmp"
          sudo chown "$USER" "$BASE_PATH/apptainer/cache" "$BASE_PATH/apptainer/tmp"

          APPTAINER_CACHEDIR="$BASE_PATH/apptainer/cache"
          echo "APPTAINER_CACHEDIR=$APPTAINER_CACHEDIR" >> "$GITHUB_ENV"
          APPTAINER_TMPDIR="$BASE_PATH/apptainer/tmp"
          echo "APPTAINER_TMPDIR=$APPTAINER_TMPDIR" >> "$GITHUB_ENV"

          SINGULARITY_CACHEDIR="$BASE_PATH/apptainer/cache"
          echo "SINGULARITY_CACHEDIR=$SINGULARITY_CACHEDIR" >> "$GITHUB_ENV"
          SINGULARITY_TMPDIR="$BASE_PATH/apptainer/tmp"
          echo "SINGULARITY_TMPDIR=$SINGULARITY_TMPDIR" >> "$GITHUB_ENV"

          # sudo mkdir -p /mnt/apptainer
          # sudo chown $USER /mnt/apptainer
          # git clone https://github.com/apptainer/apptainer.git /mnt/apptainer
          # cd /mnt/apptainer
          # ./mconfig --prefix=/mnt/apptainer
          # make -C builddir
          # sudo make -C builddir install
          # export PATH="/mnt/apptainer/bin:$PATH"
          # echo "/mnt/apptainer/bin" >> $GITHUB_PATH

      - name: Install Apptainer
        if: ${{ runner.environment == 'github-hosted' }}
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.4.3

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # - name: Download image artifact
      #   uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
      #   with:
      #     name: ${{ needs.config.outputs.IMAGENAME }}-${{ needs.config.outputs.BUILDDATE }}
      #     path: /mnt/tmp/

      # - name: Load Docker Image from Artifact
      #   run: |
      #     docker load --input /mnt/tmp/${{ needs.config.outputs.IMAGENAME }}-${{ needs.config.outputs.BUILDDATE }}.tar
      #     rm /mnt/tmp/${{ needs.config.outputs.IMAGENAME }}-${{ needs.config.outputs.BUILDDATE }}.tar

      - name: Debug storage
        run: |
          sudo df -ha
          sudo du -sh --exclude="$BASE_PATH/docker" "$BASE_PATH"

      - name: Build simg file
        if: inputs.skip_simg_build != 'true'
        env:
          GH_REGISTRY: ${{ secrets.GH_REGISTRY }}
        run: |
          echo "[DEBUG] building singularity image from docker image:"
          SIMG_PATH="$BASE_PATH/tmp/${{ needs.config.outputs.IMAGENAME }}_${{ needs.config.outputs.BUILDDATE }}.simg"
          IMAGE_REF="docker://ghcr.io/${GH_REGISTRY}/${{ needs.config.outputs.IMAGENAME }}:${{ needs.config.outputs.IMAGETAG }}"
          time singularity build "$SIMG_PATH" "$IMAGE_REF"
          echo "[DEBUG] done building singularity image from docker image!"
          # Verify the image was created successfully
          if [ ! -f "$SIMG_PATH" ]; then
            echo "ERROR: Singularity image file was not created"
            exit 1
          fi

      - name: Debug storage
        run: |
          sudo df -ha
          sudo du -sh --exclude="$BASE_PATH/docker" "$BASE_PATH"
  
      - name: Upload simg artifact
        if: inputs.skip_simg_build != 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          path: ${{ steps.base-path.outputs.base_path }}/tmp/${{ needs.config.outputs.IMAGENAME }}_${{ needs.config.outputs.BUILDDATE }}.simg
          # Upload the single SIF/Singularity image as a raw file to avoid zip/unzip overhead.
          archive: false
          retention-days: 7

  upload-nectar:
    needs: [config, build-image, build-simg]
    if: ${{ needs.build-image.outputs.IMGDIFFERS == 'true' || inputs.force_upload_nectar == 'true' }}
    runs-on: ${{ fromJSON(inputs.runner) }}
    permissions:
      packages: write

    steps:
      - name: Bootstrap build tooling
        shell: bash
        run: |
          set -eu
          # Idempotency check: skip when everything's already pre-baked
          # (legacy self-hosted VMs). Runs in full on ARC pods.
          if command -v docker >/dev/null 2>&1 \
            && command -v apptainer >/dev/null 2>&1 \
            && command -v aws >/dev/null 2>&1 \
            && command -v swift >/dev/null 2>&1 \
            && command -v gh >/dev/null 2>&1 \
            && command -v jq >/dev/null 2>&1; then
            echo "All build tooling already present; skipping bootstrap."
            exit 0
          fi
          set -x
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --no-upgrade \
            ca-certificates curl docker.io git gh jq python3 python3-pip python3-venv unzip
          APPTAINER_VER=$(curl -fsSL https://api.github.com/repos/apptainer/apptainer/releases/latest \
            | grep '"tag_name"' | head -1 | cut -d'"' -f4 | sed 's/^v//')
          curl -fsSL "https://github.com/apptainer/apptainer/releases/download/v${APPTAINER_VER}/apptainer_${APPTAINER_VER}_amd64.deb" \
            -o /tmp/apptainer.deb
          sudo apt-get install -y /tmp/apptainer.deb
          rm /tmp/apptainer.deb
          sudo python3 -m pip install --break-system-packages \
            python-swiftclient python-keystoneclient
          # AWS CLI v2 — guarded so a pre-existing install isn't clobbered.
          if ! command -v aws >/dev/null 2>&1; then
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" \
              -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp
            sudo /tmp/aws/install
            rm -rf /tmp/aws /tmp/awscliv2.zip
          fi
          docker --version && apptainer --version && aws --version
          gh --version && jq --version && swift --version

      - name: Download simg artifact
        if: inputs.skip_simg_build != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ needs.config.outputs.IMAGENAME }}_${{ needs.config.outputs.BUILDDATE }}.simg
          path: ${{ runner.temp }}/

      - name: Upload simg to Nectar
        env:
          OS_AUTH_URL: ${{ secrets.SWIFT_OS_AUTH_URL }}
          OS_APPLICATION_CREDENTIAL_ID: ${{ secrets.SWIFT_OS_APPLICATION_CREDENTIAL_ID }}
          OS_APPLICATION_CREDENTIAL_SECRET: ${{ secrets.SWIFT_OS_APPLICATION_CREDENTIAL_SECRET }}
          OS_AUTH_TYPE: v3applicationcredential
          OS_IDENTITY_API_VERSION: "3"
        run: |
          echo "[DEBUG] Attempting upload to Nectar Object Storage:"
          swift upload neurodesk \
            "${RUNNER_TEMP}/${{ needs.config.outputs.IMAGENAME }}_${{ needs.config.outputs.BUILDDATE }}.simg" \
            --object-name "${{ needs.config.outputs.IMAGENAME }}_${{ needs.config.outputs.BUILDDATE }}.simg" \
            --segment-size 1073741824 \
            --segment-threads 10
          echo "[DEBUG] Done with uploading to Nectar Object Storage!"
  
  upload-s3:
    needs: [config, build-image, build-simg]
    if: ${{ needs.build-image.outputs.IMGDIFFERS == 'true' || inputs.force_upload_s3 == 'true' }}
    runs-on: ubuntu-22.04
    permissions:
      packages: write
      id-token: write
    steps:
      - name: Configure runner
        run: |
          sudo swapoff -a && sudo rm -rf /mnt/*
          sudo mkdir -p /mnt/tmp
          sudo chown $USER /mnt/tmp

      - name: Configure aws credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - name: Download simg artifact
        if: inputs.skip_simg_build != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ needs.config.outputs.IMAGENAME }}_${{ needs.config.outputs.BUILDDATE }}.simg
          path: /mnt/tmp/

      - name: Install AWS CLI
        run: |
          if ! command -v aws &>/dev/null; then
            echo "[DEBUG] Installing AWS CLI"
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip" && unzip awscliv2.zip && sudo ./aws/install && rm -rf aws awscliv2.zip
          fi

      - name: Upload to AWS S3
        run: |
          aws s3 cp "/mnt/tmp/${{ needs.config.outputs.IMAGENAME }}_${{ needs.config.outputs.BUILDDATE }}.simg" "s3://neurocontainers/${{ needs.config.outputs.IMAGENAME }}_${{ needs.config.outputs.BUILDDATE }}.simg"
          if ! aws s3api head-object --bucket neurocontainers --key "${{ needs.config.outputs.IMAGENAME }}_${{ needs.config.outputs.BUILDDATE }}.simg" > /dev/null 2>&1; then
            echo "::error::File verification failed. The file was not found in S3."
            exit 1
          else
            echo "[DEBUG] File upload verified. The file exists in S3."
          fi

  create-pr:
    needs: [config, build-image, push-dockerhub, upload-s3, upload-nectar]
    if: ${{ needs.build-image.outputs.IMGDIFFERS == 'true' || inputs.force_create_pr == 'true'}}
    runs-on: ubuntu-22.04
    permissions:
      packages: write
      id-token: write
      contents: read
    env:
      APPLICATION: ${{ needs.config.outputs.APPLICATION }}
      BUILDDATE: ${{ needs.config.outputs.BUILDDATE }}
      IMAGENAME: ${{ needs.config.outputs.IMAGENAME }}
      SHORT_SHA: ${{ needs.config.outputs.SHORT_SHA }}
    steps:
    - uses: actions/checkout@v5
      with:
        token: ${{ secrets.NEURODESK_GITHUB_TOKEN_ISSUE_AUTOMATION }}
    - name: Install Builder Dependencies
      run: |
        pip install -r requirements.txt
    - name: Generate Dockerfile and Release File
      id: generate
      run: |
        echo "APPLICATION: $APPLICATION"
        ./builder/build.py generate $APPLICATION --recreate --auto-build --generate-release

    - name: Create Release File Pull Request
      if: steps.generate.outputs.container_name
      env:
        GH_TOKEN: ${{ secrets.NEURODESK_GITHUB_TOKEN_ISSUE_AUTOMATION }}
        CONTAINER_NAME: ${{ steps.generate.outputs.container_name }}
        CONTAINER_VERSION: ${{ steps.generate.outputs.container_version }}
        RELEASE_CONTENT: ${{ steps.generate.outputs.release_file_content }}
      run: |
        gh auth setup-git

        # Configure git
        git config --global user.name "neurocontainers-bot"
        git config --global user.email "neurocontainers-bot@neurodesk.github.io"

        # Rebase onto the latest main before creating the release branch.
        # This avoids pushing stale workflow file states from an older checkout.
        git fetch origin main
        git checkout -B main origin/main

        # Create the release file
        RELEASE_DIR="releases/${CONTAINER_NAME}"
        RELEASE_FILE="${RELEASE_DIR}/${CONTAINER_VERSION}.json"

        mkdir -p "$RELEASE_DIR"
        printf '%s\n' "$RELEASE_CONTENT" > "$RELEASE_FILE"

        # Check if this is a new file or an update
        if git ls-files --error-unmatch "$RELEASE_FILE" 2>/dev/null; then
          ACTION="Update"
        else
          ACTION="Add"
        fi

        # Skip PR creation when the generated release file is already current on main.
        git add "$RELEASE_FILE"
        if git diff --cached --quiet; then
          echo "No changes detected in ${RELEASE_FILE}; skipping release PR creation."
          exit 0
        fi

        # Create a new branch for the release
        BRANCH_NAME="release/${CONTAINER_NAME}-${CONTAINER_VERSION}-$(date +%Y%m%d-%H%M%S)"
        git checkout -b "$BRANCH_NAME"

        # Add and commit the release file
        git add "$RELEASE_FILE"
        git commit -m "${ACTION} release file for ${CONTAINER_NAME} ${CONTAINER_VERSION}

        Auto-generated release file from container build.

        🤖 Generated by neurocontainers CI"

        # Rebase once more in case main advanced during this job's runtime.
        git fetch origin main
        git rebase origin/main

        # Push the branch
        git push origin "$BRANCH_NAME"

        # Create pull request
        gh pr create \
          --title "${ACTION} release for ${CONTAINER_NAME} ${CONTAINER_VERSION}" \
          --body "## Summary

        This PR ${ACTION,,}s the release file for **${CONTAINER_NAME} ${CONTAINER_VERSION}**.

        ## Changes

        - ${ACTION} \`${RELEASE_FILE}\` with container metadata
        - Generated automatically from successful container build
        - Contains categories and GUI applications from build.yaml

        ## Testing Instructions

        To test this container on Neurodesk (either a local installation or https://play.neurodesk.org/):
        \`\`\`bash
        bash /neurocommand/local/fetch_and_run.sh ${IMAGENAME//_/ } ${BUILDDATE}
        \`\`\`

        Or, for testing directly with Apptainer/Singularity:
        \`\`\`bash
        curl -X GET https://neurocontainers.s3.us-east-2.amazonaws.com/${IMAGENAME}_${BUILDDATE}.simg -O
        singularity shell --overlay /tmp/apptainer_overlay ${IMAGENAME}_${BUILDDATE}.simg
        \`\`\`

        ## Review Checklist

        - [ ] Release file format is correct
        - [ ] Categories are appropriate for this container
        - [ ] GUI applications (if any) are correctly defined
        - [ ] Version and build date are accurate
        - [ ] Container has been tested using the commands above

        ## Next Steps

        After merging this PR:
        1. The apps.json update workflow will automatically regenerate apps.json from all release files
        2. A PR will be created to the neurocommand repository
        3. The container will become available in neurodesk

        If additional releases are needed:
        - Add to apps.json to release to Neurodesk: https://github.com/NeuroDesk/neurocommand/edit/main/neurodesk/apps.json
        - Or add to the Open Recon recipes: https://github.com/NeuroDesk/openrecon/tree/main/recipes

        🤖 Generated by neurocontainers CI | Created by @${GITHUB_ACTOR}" \
          --head "$BRANCH_NAME" \
          --base main \
          --label "automated" \
          --label "release"

        echo "✅ Pull request created for ${CONTAINER_NAME} ${CONTAINER_VERSION}"
    - name: Detect OpenReconLabel.json
      id: detect_openrecon
      if: steps.generate.outputs.container_name
      env:
        CONTAINER_NAME: ${{ steps.generate.outputs.container_name }}
      run: |
        SOURCE_LABEL_FILE="recipes/${CONTAINER_NAME}/OpenReconLabel.json"
        if [ -f "$SOURCE_LABEL_FILE" ]; then
          echo "has_openrecon_label=true" >> "$GITHUB_OUTPUT"
          echo "Found OpenRecon label: $SOURCE_LABEL_FILE"
        else
          echo "has_openrecon_label=false" >> "$GITHUB_OUTPUT"
          echo "No OpenRecon label found for ${CONTAINER_NAME}; skipping OpenRecon PR."
        fi

    - name: Create OpenRecon Pull Request
      if: steps.detect_openrecon.outputs.has_openrecon_label == 'true'
      env:
        GH_TOKEN: ${{ secrets.NEURODESK_GITHUB_TOKEN_ISSUE_AUTOMATION }}
        CONTAINER_NAME: ${{ steps.generate.outputs.container_name }}
        CONTAINER_VERSION: ${{ steps.generate.outputs.container_version }}
      run: |
        set -euo pipefail

        gh auth setup-git

        # Configure git
        git config --global user.name "neurocontainers-bot"
        git config --global user.email "neurocontainers-bot@neurodesk.github.io"

        WORKDIR="$(mktemp -d)"
        trap 'rm -rf "$WORKDIR"' EXIT
        OPENRECON_DIR="${WORKDIR}/openrecon"

        gh repo clone neurodesk/openrecon "$OPENRECON_DIR"

        SOURCE_LABEL_FILE="${GITHUB_WORKSPACE}/recipes/${CONTAINER_NAME}/OpenReconLabel.json"
        SOURCE_README_FILE="${GITHUB_WORKSPACE}/recipes/${CONTAINER_NAME}/OpenReconREADME.md"
        TARGET_RECIPE_DIR="${OPENRECON_DIR}/recipes/${CONTAINER_NAME}"
        TARGET_LABEL_FILE="${TARGET_RECIPE_DIR}/OpenReconLabel.json"
        TARGET_PARAMS_FILE="${TARGET_RECIPE_DIR}/params.sh"
        TARGET_README_FILE="${TARGET_RECIPE_DIR}/README.md"
        OPENRECON_PATHS=(
          "recipes/${CONTAINER_NAME}/OpenReconLabel.json"
          "recipes/${CONTAINER_NAME}/params.sh"
        )
        OPENRECON_README_CHANGE_NOTE=""
        OPENRECON_BOOTSTRAP_CHANGE_NOTE=""

        if [ ! -d "$TARGET_RECIPE_DIR" ]; then
          mkdir -p "$TARGET_RECIPE_DIR"
          OPENRECON_BOOTSTRAP_CHANGE_NOTE="- Create \`recipes/${CONTAINER_NAME}\` in OpenRecon because it did not exist yet"
          echo "Created OpenRecon recipe directory: ${TARGET_RECIPE_DIR}"
        fi

        if [ ! -f "$TARGET_PARAMS_FILE" ]; then
          {
            echo '#!/bin/bash'
            echo '# Auto-generated by neurocontainers CI.'
            echo "export toolName=${CONTAINER_NAME}"
            echo "export version=${CONTAINER_VERSION}"
            echo "export baseDockerImage=vnmd/\${toolName}_\${version}"
          } > "$TARGET_PARAMS_FILE"
          echo "Created OpenRecon params file: ${TARGET_PARAMS_FILE}"
        fi

        cp "$SOURCE_LABEL_FILE" "$TARGET_LABEL_FILE"

        if [ -f "$SOURCE_README_FILE" ]; then
          cp "$SOURCE_README_FILE" "$TARGET_README_FILE"
          OPENRECON_PATHS+=("recipes/${CONTAINER_NAME}/README.md")
          OPENRECON_README_CHANGE_NOTE="- Copy \`recipes/${CONTAINER_NAME}/OpenReconREADME.md\` from neurocontainers to \`recipes/${CONTAINER_NAME}/README.md\` for OpenRecon PDF generation"
          echo "Copied OpenRecon README: ${SOURCE_README_FILE} -> ${TARGET_README_FILE}"
        else
          echo "No OpenRecon README found for ${CONTAINER_NAME}; skipping README sync."
        fi

        ESCAPED_CONTAINER_VERSION="$(printf '%s\n' "$CONTAINER_VERSION" | sed 's/[&|]/\\&/g')"

        if grep -qE '^[[:space:]]*export[[:space:]]+version=' "$TARGET_PARAMS_FILE"; then
          sed -Ei "s|^[[:space:]]*export[[:space:]]+version=.*$|export version=${ESCAPED_CONTAINER_VERSION}|" "$TARGET_PARAMS_FILE"
        elif grep -qE '^[[:space:]]*version=' "$TARGET_PARAMS_FILE"; then
          sed -Ei "s|^[[:space:]]*version=.*$|version=${ESCAPED_CONTAINER_VERSION}|" "$TARGET_PARAMS_FILE"
        elif grep -qE '^[[:space:]]*export[[:space:]]+VERSION=' "$TARGET_PARAMS_FILE"; then
          sed -Ei "s|^[[:space:]]*export[[:space:]]+VERSION=.*$|export VERSION=${ESCAPED_CONTAINER_VERSION}|" "$TARGET_PARAMS_FILE"
        elif grep -qE '^[[:space:]]*VERSION=' "$TARGET_PARAMS_FILE"; then
          sed -Ei "s|^[[:space:]]*VERSION=.*$|VERSION=${ESCAPED_CONTAINER_VERSION}|" "$TARGET_PARAMS_FILE"
        else
          echo "::warning::No supported version assignment found in ${TARGET_PARAMS_FILE}. Skipping OpenRecon PR."
          exit 0
        fi

        cd "$OPENRECON_DIR"

        if [ -z "$(git status --porcelain -- "${OPENRECON_PATHS[@]}")" ]; then
          echo "No OpenRecon changes detected for ${CONTAINER_NAME}; skipping OpenRecon PR."
          exit 0
        fi

        EXISTING_PR_URL="$(gh pr list \
          --repo neurodesk/openrecon \
          --state open \
          --search "in:title Update ${CONTAINER_NAME} OpenRecon metadata to ${CONTAINER_VERSION}" \
          --json url \
          --jq '.[0].url')"

        if [ -n "$EXISTING_PR_URL" ] && [ "$EXISTING_PR_URL" != "null" ]; then
          echo "Open OpenRecon PR already exists for ${CONTAINER_NAME} ${CONTAINER_VERSION}: ${EXISTING_PR_URL}"
          exit 0
        fi

        BRANCH_NAME="sync-openrecon/${CONTAINER_NAME}-${CONTAINER_VERSION}-$(date +%Y%m%d-%H%M%S)"
        git checkout -b "$BRANCH_NAME"
        git add "${OPENRECON_PATHS[@]}"
        git commit -m "Update ${CONTAINER_NAME} OpenRecon metadata to ${CONTAINER_VERSION}

        Auto-generated from neurocontainers CI."
        git push origin "$BRANCH_NAME"

        gh pr create \
          --repo neurodesk/openrecon \
          --title "Update ${CONTAINER_NAME} OpenRecon metadata to ${CONTAINER_VERSION}" \
          --body "## Summary

        This PR updates OpenRecon metadata for **${CONTAINER_NAME}** from the latest successful neurocontainers build.

        ## Changes

        - Update \`recipes/${CONTAINER_NAME}/OpenReconLabel.json\` from neurocontainers
        - Set \`recipes/${CONTAINER_NAME}/params.sh\` version to \`${CONTAINER_VERSION}\`
        ${OPENRECON_BOOTSTRAP_CHANGE_NOTE}
        ${OPENRECON_README_CHANGE_NOTE}

        🤖 Generated by neurocontainers CI | Created by @${GITHUB_ACTOR}" \
          --head "$BRANCH_NAME" \
          --base main

        echo "✅ OpenRecon pull request created for ${CONTAINER_NAME} ${CONTAINER_VERSION}"
    - name: Generate job output
      run: |
        echo "The container has been successfully build. To test the container, run this:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY # this is a blank line
        echo "bash /neurocommand/local/fetch_and_run.sh ${IMAGENAME//_/ } $BUILDDATE" >> $GITHUB_STEP_SUMMARY


