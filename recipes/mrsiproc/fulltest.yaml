name: mrsiproc
version: 0.2.0
container: mrsiproc_${version}_REFERENCE.simg

env_setup: |
  export LD_LIBRARY_PATH=/opt/MATLAB_Runtime_R2021b/v911/runtime/glnxa64:/opt/MATLAB_Runtime_R2021b/v911/bin/glnxa64:/opt/MATLAB_Runtime_R2021b/v911/sys/os/glnxa64:/opt/MATLAB_Runtime_R2021b/v911/sys/opengl/lib/glnxa64:/opt/MATLAB_Runtime_R2021b/v911/extern/bin/glnxa64:$LD_LIBRARY_PATH

test_data:
  output_dir: test_output

setup:
  script: |
    set -e
    mkdir -p ${output_dir}

tests:
  - name: Container README exists
    description: Verify the generated README is present
    command: cat /README.md | head -5
    expected_output_contains: "mrsiproc"

  - name: Core command line tools resolve
    description: Verify deployed tools from the recipe are on PATH
    command: bash -lc 'which python julia dcm2niix lcmodel parallel hd-bet Part1_ProcessMRSI.sh Part2_EvaluateMRSI.sh update_mrsi.sh'
    expected_output_contains: "Part2_EvaluateMRSI.sh"

  - name: MINC tools resolve
    description: Verify the MINC binaries installed by the template are available
    command: bash -lc 'which nii2mnc dcm2mnc rawtominc mincresample mincmath minctoraw mnc2nii'
    expected_output_contains: "mnc2nii"

  - name: HD-BET help starts
    description: Verify the vendored HD-BET package has the paths metadata expected by its entrypoint
    command: hd-bet --help 2>&1 | head -20
    expected_output_contains: "usage"

  - name: MATLAB Runtime exists
    description: Verify MATLAB Runtime was installed at the configured path
    command: test -d /opt/MATLAB_Runtime_R2021b/v911/bin/glnxa64
    expected_exit_code: 0

  - name: LCModel responds
    description: Verify LCModel can be invoked
    command: /opt/lcmodel-6.3/.lcmodel/bin/lcmodel 2>&1 || true
    expected_output_contains: "FATAL ERROR"

  - name: MRSI pipeline scripts exist
    description: Verify the current pipeline entry scripts are present
    command: >-
      bash -lc 'test -x /opt/mrsi_pipeline_neurodesk/Part1/Part1_ProcessMRSI.sh && test -x /opt/mrsi_pipeline_neurodesk/Part2/Part2_EvaluateMRSI.sh && test -x /opt/mrsi_pipeline_neurodesk/update_mrsi.sh'
    expected_exit_code: 0

  - name: Julia environment starts
    description: Verify Julia starts with the bundled depot
    command: julia -e 'println("julia works")'
    expected_output_contains: "julia works"
