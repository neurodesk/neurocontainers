name: bidsvue
version: 0.1.20260704

copyright:
  - license: BSD-2-Clause
    url: https://github.com/niivue/BIDSvue/blob/main/LICENSE

architectures:
  - x86_64

build:
  kind: neurodocker
  base-image: ubuntu:24.04
  pkg-manager: apt

  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive
        XDG_CACHE_HOME: /tmp/bidsvue/cache
        XDG_CONFIG_HOME: /tmp/bidsvue/config
        XDG_DATA_HOME: /tmp/bidsvue/data
        WEBKIT_DISABLE_COMPOSITING_MODE: "1"

    - install:
        - ca-certificates
        - libgtk-3-0
        - libwebkit2gtk-4.1-0

    - workdir: /opt

    - run:
        - cp {{ get_file("bidsvue_deb") }} bidsvue.deb
        - apt-get install -y ./bidsvue.deb
        - rm -f bidsvue.deb
        - mkdir -p /tmp/bidsvue/cache /tmp/bidsvue/config /tmp/bidsvue/data
        - chmod -R a+rwx /tmp/bidsvue

    - test:
        name: check BIDSvue install
        script: |
          #!/usr/bin/env bash
          set -euo pipefail

          test -x /usr/bin/bidsvue
          test -f /usr/share/applications/BIDSvue.desktop
          test -f /usr/share/icons/hicolor/32x32/apps/bidsvue.png
          grep -q "Name=BIDSvue" /usr/share/applications/BIDSvue.desktop

deploy:
  bins:
    - bidsvue

categories:
  - "data organisation"
  - "bids apps"
  - "visualization"

gui_apps:
  - name: "BIDSvue"
    exec: "bidsvue"

icon: data:image/png;base64,

readme: |-
  ----------------------------------
  ## bidsvue/{{ context.version }} ##

  BIDSvue is a cross-platform desktop UI for creating, inspecting, and modifying BIDS neuroimaging datasets.

  Example:
  ```
  ml bidsvue/{{ context.version }}
  bidsvue
  ```

  More documentation can be found here: https://github.com/niivue/BIDSvue

  To run container outside of this environment: ml bidsvue/{{ context.version }}

  ----------------------------------

files:
  - name: bidsvue_deb
    url: https://github.com/niivue/BIDSvue/releases/download/v{{ context.version }}/bidsvue_{{ context.version }}_amd64.deb
