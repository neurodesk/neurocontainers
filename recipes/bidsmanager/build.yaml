name: bidsmanager
version: 1.2.3

copyright:
  - license: MIT
    url: https://github.com/ANCPLabOldenburg/BIDS-Manager/blob/main/LICENSE

architectures:
  - x86_64
  - aarch64

build:
  kind: neurodocker
  base-image: ubuntu:24.04
  pkg-manager: apt

  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive
        XDG_CACHE_HOME: /tmp/bidsmanager/cache
        XDG_CONFIG_HOME: /tmp/bidsmanager/config

    - install:
        - python3
        - python3-pip
        - python-is-python3
        - python3-pyqt6
        - libdbus-1-3
        - libegl1
        - libfontconfig1
        - libglib2.0-0
        - libgl1
        - libnss3
        - libopengl0
        - libx11-6
        - libx11-xcb1
        - libxcb-cursor0
        - libxcb-icccm4
        - libxcb-image0
        - libxcb-keysyms1
        - libxcb-randr0
        - libxcb-render-util0
        - libxcb-shape0
        - libxcb-xfixes0
        - libxcb-xinerama0
        - libxcomposite1
        - libxdamage1
        - libxext6
        - libxi6
        - libxkbcommon0
        - libxkbcommon-x11-0
        - libxrender1
        - libxshmfence1
        - xvfb

    - run:
        - python3 -m pip install --break-system-packages --no-cache-dir bids-manager=={{ context.version }}
        - mkdir -p /tmp/bidsmanager/cache /tmp/bidsmanager/config
        - chmod -R a+rwx /tmp/bidsmanager

deploy:
  bins:
    - bidsmgr
    - bidsmgr-create
    - bidsmgr-project
    - bidsmgr-scan
    - bidsmgr-convert
    - bidsmgr-rebuild
    - bidsmgr-metadata
    - bidsmgr-validate
    - dcm2niix

readme: |-
  ----------------------------------
  ## bidsmanager/{{ context.version }} ##
  BIDS Manager is a GUI and command-line tool for converting, curating, editing, and validating MRI, EEG, MEG, and physiological recordings in BIDS datasets.

  Tools included:
  ```
  bidsmgr
  bidsmgr-create
  bidsmgr-project
  bidsmgr-scan
  bidsmgr-convert
  bidsmgr-rebuild
  bidsmgr-metadata
  bidsmgr-validate
  dcm2niix
  ```

  Example:
  ```
  ml bidsmanager/{{ context.version }}

  # Launch the GUI:
  bidsmgr

  # Or use the command-line workflow:
  bidsmgr-create /data/my_bids_dataset --name "My BIDS dataset"
  bidsmgr-scan /data/raw /data/my_bids_dataset
  bidsmgr-convert /data/raw /data/my_bids_dataset
  bidsmgr-metadata /data/my_bids_dataset
  bidsmgr-validate /data/my_bids_dataset
  ```

  More documentation can be found here: https://ancplaboldenburg.github.io/bids_manager_documentation/

  To run container outside of this environment: ml bidsmanager/{{ context.version }}

  ----------------------------------

categories:
  - "data organisation"
  - "bids apps"
icon: data:image/png;base64,
