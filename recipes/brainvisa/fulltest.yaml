tests:
  - name: BrainVISA launchers are available
    script: |
      set -eu
      command -v brainvisa
      command -v anatomist
      command -v morphologist

  - name: BrainVISA wrapper prepares Qt runtime directory
    script: |
      set -eu
      unset XDG_RUNTIME_DIR
      runtime_dir="$(brainvisa --neurocontainers-print-xdg-runtime-dir)"
      test -n "${runtime_dir}"
      test -d "${runtime_dir}"
      test -w "${runtime_dir}"
      test "$(stat -c '%u' "${runtime_dir}")" = "$(id -u)"
      test "$(stat -c '%a' "${runtime_dir}")" = "700"

  - name: BrainVISA Python modules import
    script: |
      set -eu
      python - <<'PY'
      import brainvisa.axon
      from soma import aims

      print("BrainVISA imports OK")
      print(aims.__name__)
      PY

  - name: BrainVISA batch help starts
    script: |
      set -eu
      brainvisa -b --help 2>&1 | grep -i "brainvisa"
