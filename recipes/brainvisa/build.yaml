name: brainvisa
version: 6.0.38

copyright:
  - license: CECILL-B
    url: https://brainvisa.info/web/download.html#licences
  - license: CECILL-2.0
    url: https://brainvisa.info/web/download.html#licences

architectures:
  - x86_64

files:
  - name: brainvisa-runtime-wrapper
    executable: true
    contents: |
      #!/usr/bin/env bash
      set -euo pipefail

      tool="$(basename "$0")"
      real_binary="/opt/miniconda/envs/brainvisa/bin/${tool}"
      export CONDA_PREFIX="/opt/miniconda/envs/brainvisa"

      runtime_dir_is_valid() {
        [ -n "${XDG_RUNTIME_DIR:-}" ] || return 1
        [ -d "${XDG_RUNTIME_DIR}" ] || return 1
        [ -w "${XDG_RUNTIME_DIR}" ] || return 1
        [ -x "${XDG_RUNTIME_DIR}" ] || return 1
        [ "$(stat -c '%u' "${XDG_RUNTIME_DIR}")" = "$(id -u)" ] || return 1
        [ "$(stat -c '%a' "${XDG_RUNTIME_DIR}")" = "700" ] || return 1
      }

      if ! runtime_dir_is_valid; then
        runtime_base="${TMPDIR:-/tmp}"
        runtime_base="${runtime_base%/}"
        runtime_candidate="${runtime_base}/runtime-$(id -u)"

        if mkdir -p "${runtime_candidate}" 2>/dev/null \
          && chmod 700 "${runtime_candidate}" 2>/dev/null; then
          export XDG_RUNTIME_DIR="${runtime_candidate}"
        fi

        if ! runtime_dir_is_valid; then
          export XDG_RUNTIME_DIR="$(mktemp -d "${runtime_base}/runtime-$(id -u)-XXXXXX")"
          chmod 700 "${XDG_RUNTIME_DIR}"
        fi
      fi

      if [ -z "${MCR_CACHE_ROOT:-}" ]; then
        if [ -n "${HOME:-}" ] && [ "${HOME}" != "/" ]; then
          MCR_CACHE_ROOT="${HOME%/}/.cache/brainvisa/mcr_cache"
        else
          MCR_CACHE_ROOT="${TMPDIR:-/tmp}/brainvisa-mcr-cache-$(id -u)"
        fi
      fi

      if ! mkdir -p "${MCR_CACHE_ROOT}" 2>/dev/null; then
        fallback_mcr_cache_root="${TMPDIR:-/tmp}/brainvisa-mcr-cache-$(id -u)"
        echo "Could not create MATLAB Runtime cache in ${MCR_CACHE_ROOT}; falling back to ${fallback_mcr_cache_root}" >&2
        MCR_CACHE_ROOT="${fallback_mcr_cache_root}"
        mkdir -p "${MCR_CACHE_ROOT}"
      fi
      chmod 700 "${MCR_CACHE_ROOT}" 2>/dev/null || true
      export MCR_CACHE_ROOT

      if [ "${1:-}" = "--neurocontainers-print-xdg-runtime-dir" ]; then
        printf '%s\n' "${XDG_RUNTIME_DIR}"
        exit 0
      fi

      if [ "${1:-}" = "--neurocontainers-print-mcr-cache-root" ]; then
        printf '%s\n' "${MCR_CACHE_ROOT:-}"
        exit 0
      fi

      if ! find "${MCR_CACHE_ROOT}" -mindepth 1 -maxdepth 1 -print -quit 2>/dev/null | grep -q .; then
        echo "Preparing MATLAB Runtime cache in ${MCR_CACHE_ROOT}; first BrainVISA launch may take a few minutes..." >&2
      fi

      exec "${real_binary}" "$@"

build:
  kind: neurodocker
  base-image: ubuntu:24.04
  pkg-manager: apt

  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive

    - install:
        - dbus-x11
        - libegl1
        - libgl1
        - libsm6
        - libxext6
        - libxkbcommon-x11-0
        - libxrender1
        - libxcb-cursor0

    - template:
        name: miniconda
        version: py312_25.5.1-0
        install_path: /opt/miniconda
        env_name: brainvisa
        env_exists: "false"
        mamba: "true"
        conda_opts: "-q --override-channels -c https://brainvisa.info/neuro-forge -c conda-forge"
        conda_install: "brainvisa={{ context.version }}"

    - run:
        - conda run -n brainvisa brainvisa -b --setup

    - run:
        - mkdir -p /opt/brainvisa-wrapper/bin

    - copy:
        - brainvisa-runtime-wrapper
        - /opt/brainvisa-wrapper/bin/brainvisa-runtime-wrapper

    - run:
        - chmod 755 /opt/brainvisa-wrapper/bin/brainvisa-runtime-wrapper
        - ln -sf brainvisa-runtime-wrapper /opt/brainvisa-wrapper/bin/brainvisa
        - ln -sf brainvisa-runtime-wrapper /opt/brainvisa-wrapper/bin/anatomist
        - ln -sf brainvisa-runtime-wrapper /opt/brainvisa-wrapper/bin/morphologist
        - ln -sf brainvisa-runtime-wrapper /opt/brainvisa-wrapper/bin/spm12

    - environment:
        PATH: /opt/brainvisa-wrapper/bin:/opt/miniconda/envs/brainvisa/bin:$PATH
        QT_QPA_PLATFORM: xcb

deploy:
  bins:
    - anatomist
    - brainvisa
    - morphologist
  path:
    - /opt/brainvisa-wrapper/bin
    - /opt/miniconda/envs/brainvisa/bin

gui_apps:
  - name: brainvisaGUI
    exec: brainvisa
  - name: anatomistGUI
    exec: anatomist

categories:
  - structural imaging
  - image segmentation
  - image registration
  - visualization
  - workflows

structured_readme:
  description: |
    BrainVISA is a modular neuroimaging software platform that provides a common graphical interface, workflow management, databases, and toolboxes such as Anatomist and Morphologist.
  example: |
    brainvisa

    brainvisa -b --setup

    anatomist
  documentation: https://brainvisa.info/web/download.html
  citation: |
    See the BrainVISA publications page for project-specific references: https://brainvisa.info/web/publications.html

readme: |
  ----------------------------------
  ## brainvisa/{{ context.version }} ##

  BrainVISA is a modular neuroimaging software platform that provides a common graphical interface, workflow management, databases, and toolboxes such as Anatomist and Morphologist.

  Example:
  ```
  brainvisa
  brainvisa -b --setup
  anatomist
  ```

  MATLAB Runtime cache files are written under `$HOME/.cache/brainvisa/mcr_cache`
  when possible, with a fallback to `/tmp/brainvisa-mcr-cache-$(id -u)`.

  More documentation can be found here: https://brainvisa.info/web/download.html

  BrainVISA has mixed licensing across subpackages. Core components include CeCILL-B and CeCILL-v2 software; some toolboxes include closed-source code free for non-profit use. See the upstream license page for details.

  To run container outside of this environment: ml brainvisa/{{ context.version }}

  ----------------------------------

