name: gouhfi
version: 0.0.1
container: gouhfi_0.0.1_20260527.simg
default_timeout: 300

env:
  GOUHFI_HOME: /opt/GOUHFI
  nnUNet_raw: /opt/GOUHFI/nnUNet_raw
  nnUNet_preprocessed: /opt/GOUHFI/nnUNet_preprocessed
  nnUNet_results: /opt/GOUHFI/trained_model

tests:
  - name: Python reports version
    command: "python --version"
    expected_exit_code: 0
  - name: GOUHFI distribution metadata is installed
    command: "python -c \"import importlib.metadata as m; assert m.version('gouhfi'); print(m.version('gouhfi'))\""
    expected_exit_code: 0
  - name: GOUHFI imports from the installed source tree
    command: "python -c \"import data_utils; assert data_utils.__file__.startswith('/opt/GOUHFI/'); print(data_utils.__file__)\""
    expected_exit_code: 0
  - name: GOUHFI home directory exists
    command: "test -d /opt/GOUHFI"
    expected_exit_code: 0
  - name: GOUHFI README is bundled
    command: "test -s /opt/GOUHFI/README.md"
    expected_exit_code: 0
  - name: GOUHFI license is bundled
    command: "test -s /opt/GOUHFI/LICENSE"
    expected_exit_code: 0
  - name: GOUHFI project metadata is bundled
    command: "test -s /opt/GOUHFI/pyproject.toml"
    expected_exit_code: 0
  - name: GOUHFI setup script is bundled
    command: "test -s /opt/GOUHFI/setup.py"
    expected_exit_code: 0
  - name: Example raw NIfTI image is bundled
    command: "test -s /opt/GOUHFI/test_data/input-images-raw/sub004-t1w-07iso_0000.nii.gz"
    expected_exit_code: 0
  - name: Example NIfTI image loads
    command: "python -c \"import nibabel as nib; nib.load('/opt/GOUHFI/test_data/input-images-raw/sub004-t1w-07iso_0000.nii.gz'); print('ok')\""
    expected_exit_code: 0
  - name: Example NIfTI image is three dimensional
    command: "python -c \"import nibabel as nib; assert len(nib.load('/opt/GOUHFI/test_data/input-images-raw/sub004-t1w-07iso_0000.nii.gz').shape) == 3\""
    expected_exit_code: 0
  - name: Example NIfTI image values are finite
    command: "python -c \"import nibabel as nib, numpy as np; assert np.isfinite(nib.load('/opt/GOUHFI/test_data/input-images-raw/sub004-t1w-07iso_0000.nii.gz').get_fdata()).all()\""
    expected_exit_code: 0
  - name: Example NIfTI image has nonempty dimensions
    command: "python -c \"import nibabel as nib; assert all(n > 0 for n in nib.load('/opt/GOUHFI/test_data/input-images-raw/sub004-t1w-07iso_0000.nii.gz').shape)\""
    expected_exit_code: 0
  - name: Example NIfTI voxel spacing is positive
    command: "python -c \"import nibabel as nib; assert all(v > 0 for v in nib.load('/opt/GOUHFI/test_data/input-images-raw/sub004-t1w-07iso_0000.nii.gz').header.get_zooms()[:3])\""
    expected_exit_code: 0
  - name: Example NIfTI affine is nonsingular
    command: "python -c \"import nibabel as nib, numpy as np; assert abs(np.linalg.det(nib.load('/opt/GOUHFI/test_data/input-images-raw/sub004-t1w-07iso_0000.nii.gz').affine[:3,:3])) > 0\""
    expected_exit_code: 0
