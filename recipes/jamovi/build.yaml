name: jamovi
version: 2.7.4

icon: data:image/svg+xml;base64,

copyright:
  - license: AGPL-3.0-or-later
    url: https://github.com/jamovi/jamovi/blob/current-dev/LICENSE.md
  - license: GPL-2.0-or-later
    url: https://github.com/jamovi/jamovi/blob/current-dev/LICENSE.md

architectures:
  - x86_64

build:
  kind: neurodocker
  base-image: jamovi/jamovi:{{ context.version }}
  pkg-manager: apt
  add-default-template: false
  add-tzdata: false

  directives:
    - environment:
        JAMOVI_ALLOW_ARBITRARY_CODE: "false"

    - copy: jamovi /usr/local/bin/jamovi
    - copy: jamovi-entrypoint /usr/local/bin/jamovi-entrypoint

    - run:
        - chmod +x /usr/local/bin/jamovi
        - chmod +x /usr/local/bin/jamovi-entrypoint

    - entrypoint: /usr/local/bin/jamovi-entrypoint

deploy:
  bins:
    - jamovi

categories:
  - statistics

readme: |
  ----------------------------------
  ## jamovi/{{ context.version }} ##

  jamovi is a free and open statistical spreadsheet built on top of R.

  Example:
  ```
  jamovi start
  ```

  This starts the jamovi server on `${NEURODESK_WEBAPP_PORT}` when set, otherwise on `${JAMOVI_PORT}` or port `41337`.

  More documentation can be found here: https://www.jamovi.org/

  Citation:
  ```
  The jamovi project. jamovi (Version {{ context.version }}) [Computer Software]. Retrieved from https://www.jamovi.org
  ```

  To run container outside of this environment: ml jamovi/{{ context.version }}

  ----------------------------------

files:
  - name: jamovi-entrypoint
    contents: |
      #!/usr/bin/env bash
      set -e

      export USER="${USER:-$(whoami)}"

      if [ "$#" -gt 0 ]; then
        exec "$@"
      fi

      exec /usr/bin/env bash

  - name: jamovi
    contents: |
      #!/usr/bin/env bash
      set -euo pipefail

      case "${1:-start}" in
        start|server)
          port="${NEURODESK_WEBAPP_PORT:-${JAMOVI_PORT:-41337}}"
          export HOME="${JAMOVI_HOME_DIR:-/tmp/jamovi-home}"
          export XDG_CACHE_HOME="${XDG_CACHE_HOME:-/tmp/jamovi-cache}"
          export XDG_CONFIG_HOME="${XDG_CONFIG_HOME:-/tmp/jamovi-config}"
          export XDG_DATA_HOME="${XDG_DATA_HOME:-/tmp/jamovi-data}"
          mkdir -p "${HOME}" "${XDG_CACHE_HOME}" "${XDG_CONFIG_HOME}" "${XDG_DATA_HOME}"

          export JAMOVI_ACCESS_KEY="${JAMOVI_ACCESS_KEY:-}"
          export JAMOVI_ALLOW_ARBITRARY_CODE="${JAMOVI_ALLOW_ARBITRARY_CODE:-false}"
          export JAMOVI_HOST_A="${JAMOVI_HOST_A:-localhost:${port}}"
          export JAMOVI_HOST_B="${JAMOVI_HOST_B:-localhost:${port}/analyses}"
          export JAMOVI_HOST_C="${JAMOVI_HOST_C:-localhost:${port}/results}"

          exec /usr/bin/python3 -u -m jamovi.server "${port}" --if=*
          ;;
        version|--version|-v)
          cat /usr/lib/jamovi/version
          ;;
        *)
          exec /usr/bin/python3 -u -m jamovi.server "$@"
          ;;
      esac
