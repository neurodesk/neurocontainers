name: connectomemapper3
version: 3.2.0
container: connectomemapper3_${version}_REFERENCE.simg
default_timeout: 240

test_data:
  output_dir: test_output

env_setup: |
  export PATH=/opt/miniconda-py39_23.11.0-2/envs/cmp3/bin:$PATH
  export FS_LICENSE=/opt/freesurfer/license.txt

setup:
  script: |
    set -e
    mkdir -p ${output_dir}
    python - <<'PY'
    import numpy as np
    import nibabel as nib
    data = np.zeros((16, 16, 16), dtype="float32")
    data[4:12, 4:12, 4:12] = 100
    nib.save(nib.Nifti1Image(data, np.eye(4)), "${output_dir}/synthetic_t1.nii.gz")
    PY

tests:
  - name: Connectome Mapper entrypoints are available
    description: Verify key deployed Connectome Mapper commands resolve on PATH.
    command: |
      set -e
      which connectomemapper3
      which connectomemapper3_docker
      which connectomemapper3_singularity
      which cmpbidsappmanager
    expected_output_contains:
      - connectomemapper3
      - cmpbidsappmanager

  - name: Connectome Mapper CLI help starts
    description: Verify the BIDS App entrypoint exposes command-line help.
    command: connectomemapper3 --help 2>&1 | head -40
    expected_exit_code: 0

  - name: Docker helper help starts
    description: Verify the Docker wrapper entrypoint is installed.
    command: connectomemapper3_docker --help 2>&1 | head -40
    expected_exit_code: 0

  - name: Singularity helper help starts
    description: Verify the Singularity wrapper entrypoint is installed.
    command: connectomemapper3_singularity --help 2>&1 | head -40
    expected_exit_code: 0

  - name: Python connectomemapper package imports
    description: Verify the installed Connectome Mapper Python package imports.
    command: |
      python - <<'PY'
      import cmtklib
      import cmp
      import connectomemapper
      print("connectomemapper", connectomemapper.__version__ if hasattr(connectomemapper, "__version__") else "installed")
      print("cmp", cmp.__file__)
      print("cmtklib", cmtklib.__file__)
      PY
    expected_output_contains:
      - cmp
      - cmtklib

  - name: Neuroimaging Python stack imports
    description: Verify core pipeline dependencies import.
    command: |
      python - <<'PY'
      import bids
      import dipy
      import mne
      import nibabel
      import nipype
      import pydicom
      print("pybids", bids.__version__)
      print("dipy", dipy.__version__)
      print("nipype", nipype.__version__)
      PY
    expected_output_contains:
      - pybids
      - dipy
      - nipype

  - name: MRtrix3 tools are available
    description: Verify MRtrix3 command-line tools bundled with CMP3 are on PATH.
    command: |
      mrinfo --version 2>&1 | head -1
      which mrconvert
      which dwidenoise
    expected_output_contains: mrconvert

  - name: mrinfo reads synthetic image
    description: Read synthetic NIfTI metadata with MRtrix.
    command: mrinfo ${output_dir}/synthetic_t1.nii.gz
    expected_output_contains: Dimensions

  - name: mrconvert creates MIF
    description: Convert synthetic NIfTI to MRtrix format.
    command: mrconvert ${output_dir}/synthetic_t1.nii.gz ${output_dir}/synthetic_t1.mif -force
    validate:
      - output_exists: ${output_dir}/synthetic_t1.mif

  - name: mrcalc thresholds image
    description: Exercise voxelwise MRtrix image math.
    command: mrcalc ${output_dir}/synthetic_t1.nii.gz 50 -gt ${output_dir}/synthetic_mask.nii.gz -force
    validate:
      - output_exists: ${output_dir}/synthetic_mask.nii.gz

  - name: FSL commands are available
    description: Verify FSL tools bundled for CMP3 are on PATH.
    command: |
      which bet
      which flirt
      which fslmaths
      which fslstats
    expected_output_contains:
      - bet
      - fslmaths

  - name: fslmaths thresholds synthetic image
    description: Exercise FSL image math on synthetic data.
    command: fslmaths ${output_dir}/synthetic_t1.nii.gz -thr 50 -bin ${output_dir}/fsl_mask.nii.gz
    validate:
      - output_exists: ${output_dir}/fsl_mask.nii.gz

  - name: fslstats reports nonzero voxels
    description: Verify FSL can inspect the image generated by fslmaths.
    command: fslstats ${output_dir}/fsl_mask.nii.gz -V
    depends_on: fslmaths thresholds synthetic image
    expected_exit_code: 0

  - name: ANTs commands are available
    description: Verify ANTs registration tools are installed.
    command: |
      antsRegistration --version 2>&1 | head -5
      which N4BiasFieldCorrection
    expected_output_contains: N4BiasFieldCorrection

  - name: N4 bias correction runs on synthetic image
    description: Exercise an ANTs preprocessing command on synthetic data.
    timeout: 300
    command: N4BiasFieldCorrection -d 3 -i ${output_dir}/synthetic_t1.nii.gz -o ${output_dir}/n4_t1.nii.gz -s 2 -c '[10x10,0.001]'
    validate:
      - output_exists: ${output_dir}/n4_t1.nii.gz

  - name: AFNI commands are available
    description: Verify AFNI tools bundled for skull stripping are installed.
    command: |
      which 3dSkullStrip
      3dinfo -help 2>&1 | head -5
    expected_output_contains: 3dSkullStrip

  - name: AFNI reads synthetic image
    description: Verify AFNI can inspect the synthetic NIfTI file.
    command: 3dinfo ${output_dir}/synthetic_t1.nii.gz 2>&1 | head -20
    expected_exit_code: 0

  - name: FreeSurfer commands are available
    description: Verify FreeSurfer tools bundled for anatomical pipelines are installed.
    command: |
      which recon-all
      which mri_info
      recon-all -version 2>&1 | head -3
    expected_output_contains: recon-all

  - name: mri_info reads synthetic image
    description: Verify FreeSurfer can inspect the synthetic NIfTI file.
    command: mri_info ${output_dir}/synthetic_t1.nii.gz 2>&1 | head -20
    expected_exit_code: 0

  - name: DataLad stack imports
    description: Verify dataset-management dependencies used by CMP3 import.
    command: |
      python - <<'PY'
      import datalad
      import datalad_container
      import datalad_neuroimaging
      print("datalad", datalad.__version__)
      print("container extension ok")
      print("neuroimaging extension ok")
      PY
    expected_output_contains:
      - datalad
      - container extension ok
