tests:
  - name: Manual sodiumnufft container smoke test
    manual: true
    script: |
      source env/bin/activate
      python builder/build.py generate sodiumnufft --recreate --build --login --architecture x86_64 --offline_mode true

      input_dat=/buildhostdirectory/meas_MID00126_FID18530_tpiTqf_HighSpoil_23Na_n50_TE05_Ref480.dat
      input_mrd=/buildhostdirectory/meas_MID00126_FID18530_tpiTqf_HighSpoil_23Na_n50_TE05_Ref480.mrd
      output_mrd=/buildhostdirectory/sodiumnufft_output.h5
      output_nii=/buildhostdirectory/sodiumnufft_output_magnitude.nii.gz
      config_json=/opt/sodiumnufft/sodiumnufft.json

      rm -f "${input_mrd}"
      python3 /opt/code/python-ismrmrd-server/twix2mrd.py \
        -f "${input_dat}" \
        -o "${input_mrd}" \
        --matrix-size 128 \
        --fov-mm 220

      printf '%s\n' \
        '{' \
        '  "parameters": {' \
        '    "maxworkers": 1' \
        '  }' \
        '}' > "${config_json}"

      # Start OpenRecon server
      python3 /opt/code/python-ismrmrd-server/main.py -v -r -H=0.0.0.0 -p=9002 -s -S=/tmp/share/saved_data &
      sleep 2

      # Run the sodiumnufft reconstruction
      rm -f "${output_mrd}"
      python3 /opt/code/python-ismrmrd-server/client.py \
        -G dataset \
        -o "${output_mrd}" \
        "${input_mrd}" \
        -c sodiumnufft

      # convert data to NIFTI format for visualization
      rm -f "${output_nii}"
      python3 /opt/code/python-ismrmrd-server/mrd2nifti.py \
        -i "${output_mrd}" \
        -o "${output_nii}" \
        --component magnitude