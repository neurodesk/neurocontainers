name: noddi
version: "1.0"
architectures:
  - x86_64
readme: |-
  ----------------------------------
  ## noddi/{{ context.version }} ##
  This MATLAB toolbox implements a data fitting routine for Neurite Orientation
  Dispersion and Density Imaging (NODDI). NODDI is a new diffusion MRI technique
  for imaging brain tissue microstructure. Compared to DTI, it provides measures
  of tissue microstructure that are more direct and specific, by adopting a
  model-based strategy that relates diffusion MRI signals to geometric models of
  tissue microstructure.

  Example (inside the container):
  ```
  noddi <NODDI_image> <brain_mask> <NODDI_roi.mat> <bval> <bvec> <FittedParams.mat> <output_prefix>
  ```

  Example (from outside the container via Singularity):
  ```
  singularity run --cleanenv \
      --bind /path/to/data:/In_fold \
      noddi_1.0.sif \
      /In_fold/DWI.nii.gz \
      /In_fold/brain_mask.nii.gz \
      /In_fold/NODDI_roi.mat \
      /In_fold/bvals \
      /In_fold/bvecs \
      /In_fold/FittedParams.mat \
      /In_fold/output
  ```

  More documentation: https://github.com/CyclotronResearchCentre/NODDI_singularity

  Citation:
  ```
  Zhang, H., Schneider, T., Wheeler-Kingshott, C. A., & Alexander, D. C. (2012).
  NODDI: practical in vivo neurite orientation dispersion and density imaging of
  the human brain. NeuroImage, 61(4), 1000-1016.

  Sherif, S., Grignard, M., & Phillips, C. (July 12, 2021).
  noddi-singularity Zenodo doi:10.5281/zenodo.5093701
  ```

  To run container outside of this environment: ml noddi/{{ context.version }}
  ----------------------------------

files:
  - name: noddi_wrapper
    contents: |
      #!/usr/bin/env bash
      # Wrapper script for NODDI (ss_noddi) compiled MATLAB application
      #
      # Usage: noddi <DWI> <mask> <roi.mat> <bval> <bvec> <FittedParams.mat> <output>
      #
      # Arguments:
      #   DWI             - Diffusion weighted image (e.g. NODDI_DWI.nii.gz)
      #   mask            - Brain mask (e.g. brain_mask.nii.gz)
      #   roi.mat         - NODDI ROI definition file (e.g. NODDI_roi.mat)
      #   bval            - b-value file
      #   bvec            - b-vector file
      #   FittedParams    - Output fitted parameters file (.mat)
      #   output          - Output map prefix/folder
      #
      if [ "$#" -lt 7 ]; then
          echo "Usage: noddi <DWI> <mask> <roi.mat> <bval> <bvec> <FittedParams.mat> <output>"
          echo ""
          echo "Arguments:"
          echo "  DWI             Diffusion weighted image (.nii.gz or .hdr)"
          echo "  mask            Brain mask"
          echo "  roi.mat         NODDI ROI definition file"
          echo "  bval            b-value file"
          echo "  bvec            b-vector file"
          echo "  FittedParams    Output fitted parameters file (.mat)"
          echo "  output          Output map prefix/folder"
          echo ""
          echo "Example:"
          echo "  noddi DWI.nii.gz mask.nii.gz NODDI_roi.mat data.bval data.bvec FittedParams.mat output"
          exit 1
      fi
      exec bash /opt/ss_noddi/run_ss_noddi.sh /usr/local/MATLAB/v99 "$@"

build:
  kind: neurodocker
  base-image: ubuntu:20.04
  pkg-manager: apt
  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive
    - template:
        name: matlabmcr
        install_path: /usr/local/MATLAB
        version: 2020b
    - run:
        - mkdir -p /In_fold
        - mkdir -p /Out_fold
    - install:
        curl unzip
    - run:
        - mkdir -p /opt/ss_noddi
        - curl -fsSL -o /tmp/ss_noddi.zip https://github.com/CyclotronResearchCentre/NODDI_singularity/archive/refs/heads/main.zip
        - unzip -q /tmp/ss_noddi.zip -d /opt/ss_noddi_tmp
        - cp -r /opt/ss_noddi_tmp/NODDI_singularity-main/ss_noddi_App/* /opt/ss_noddi/
        - rm -rf /opt/ss_noddi_tmp /tmp/ss_noddi.zip
        - chmod +x /opt/ss_noddi/run_ss_noddi.sh
        - chmod +x /opt/ss_noddi/ss_noddi
    - copy:
        - noddi_wrapper
        - /usr/local/bin/noddi
    - run:
        - chmod +x /usr/local/bin/noddi

deploy:
  bins:
    - noddi

copyright:
  - license: GPL-3.0-only
    url: https://github.com/CyclotronResearchCentre/NODDI_singularity?tab=GPL-3.0-1-ov-file

