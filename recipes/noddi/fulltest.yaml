name: noddi
version: '1.0'
container: noddi_1.0_20260520.simg
default_timeout: 120
tests:
- name: NODDI wrapper usage
  description: Verify the container runtime smoke test for this tool.
  command: |
    set -eu
    command -v noddi
    test -x /usr/local/bin/noddi
    test -x /opt/ss_noddi/run_ss_noddi.sh
    test -x /opt/ss_noddi/ss_noddi

    set +e
    output="$(noddi 2>&1)"
    status="$?"
    set -e

    printf '%s\n' "${output}"
    test "${status}" -eq 1
    printf '%s\n' "${output}" | grep -F "Usage: noddi <DWI> <mask> <roi.mat> <bval> <bvec> <FittedParams.mat> <output>"
    printf '%s\n' "${output}" | grep -F "Example:"
- name: NODDI MATLAB Runtime launcher
  description: Verify the container runtime smoke test for this tool.
  command: |
    set -eu

    set +e
    output="$(timeout 180 bash /opt/ss_noddi/run_ss_noddi.sh "${MCRROOT:-/usr/local/MATLAB/v99}" 2>&1)"
    status="$?"
    set -e

    printf '%s\n' "${output}"
    if [ "${status}" -eq 124 ]; then
        echo "NODDI MATLAB Runtime launcher timed out"
        exit 1
    fi
    if printf '%s\n' "${output}" | grep -Eiq 'libmwlaunchermain\.so|error while loading shared libraries|cannot open shared object file|MATLAB Runtime.*not found'; then
        echo "NODDI MATLAB Runtime launcher failed before reaching application code"
        exit 1
    fi
    echo "NODDI MATLAB Runtime launcher reached application code"
