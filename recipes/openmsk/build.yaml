build:
  kind: neurodocker
  # Official TensorFlow GPU base with Python 3.11, Ubuntu 22.04, and TensorFlow
  # built for CUDA 11.8/cuDNN 8. Keep TensorFlow and PyTorch on matching CUDA
  # 11.8 stacks so DOSMA segmentation can run on scanner GPUs.
  base-image: tensorflow/tensorflow:2.14.0-gpu
  pkg-manager: apt

  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive
    - install:
        - bzip2
        - ca-certificates
        # TensorFlow/cuDNN dlopens libnvrtc.so during DOSMA segmentation.
        - cuda-nvrtc-11-8
        - cuda-nvrtc-dev-11-8
        - git
        - libgl1
        - libglib2.0-0
        - libgomp1
        - libsm6
        - libxext6
        - libxrender1
        # The OpenRecon macro invokes /usr/bin/python3 -m pip after its apt
        # layer, so the system Python needs pip even though TensorFlow ships a
        # separate /usr/local Python environment.
        - python3-pip
        - unzip

    # The TensorFlow image keeps pip in its Python 3.11 environment, but the
    # OpenRecon macro's apt layer restores /usr/bin/python3 to Ubuntu's 3.10
    # interpreter. Keep python3-pip installed for the macro's python3 -m pip
    # calls, and point pip/pip3 at /usr/bin/python for later unqualified pip
    # calls before that apt layer runs.
    - run:
        - python -m pip --version
        - sed -i '1s|.*|#!/usr/bin/python|' /usr/local/bin/pip /usr/local/bin/pip3
        - python -c "import tensorflow as tf, keras, pathlib; pathlib.Path('/opt/pip-constraints.txt').write_text('tensorflow==%s\nkeras==%s\nnumpy==1.24.3\n' % (tf.__version__, keras.__version__))"
        - cat /opt/pip-constraints.txt
        - pip3 --version
    - environment:
        PIP_CONSTRAINT: /opt/pip-constraints.txt

    - include: macros/openrecon/neurodocker.yaml

    # Add the CUDA 11.8 PyTorch stack used by optional NSM / nnU-Net paths, then
    # pin both deep-learning stacks so later dependency installs cannot replace
    # the TensorFlow base or the matching PyTorch wheels.
    - run:
        - pip install --no-cache-dir --extra-index-url https://download.pytorch.org/whl/cu118 torch==2.2.2+cu118 torchvision==0.17.2+cu118
        - python -c "import torch, torchvision, pathlib; path = pathlib.Path('/opt/pip-constraints.txt'); path.write_text(path.read_text() + 'torch==%s\ntorchvision==%s\n' % (torch.__version__, torchvision.__version__))"
        - cat /opt/pip-constraints.txt

    - workdir: /opt
    - run:
        - pip install --no-cache-dir huggingface-hub==0.24.7
        # NSM: drop the unpinned torch* lines and install against baseline torch.
        - git clone https://github.com/gattia/nsm /opt/nsm
        - cd /opt/nsm
        - sed -i -E '/^[[:space:]]*(torch|torchvision|torchaudio)[[:space:]]*$/d' requirements.txt
        - pip install --no-cache-dir -r requirements.txt
        - pip install --no-cache-dir --no-deps .
        # DOSMA bone_seg branch (qDESS bone/cartilage segmentation).
        - git clone https://github.com/gattia/DOSMA /opt/DOSMA
        - cd /opt/DOSMA
        - git checkout bone_seg
        - pip install --no-cache-dir '.[ai]'
        # pymeshfix pinned to 0.16.2: pymskt's fix_mesh() calls
        # MeshFix.repair(verbose=...), a kwarg removed in pymeshfix >=0.17.
        - pip install --no-cache-dir mskt nnunetv2==2.4.2 SimpleITK==2.3.1 pandas==2.0.3 Pillow==10.4.0 pymeshfix==0.16.2
        # KneePipeline's TF 2.11 / nnU-Net numpy compromise (resolved last).
        - pip install --no-cache-dir "numpy==1.24.3"
        - install -D -m 0644 {{ get_file("nnunet_numpy_compat.py") }} /opt/openmsk_compat/sitecustomize.py
        - PYTHONPATH=/opt/openmsk_compat python -c "import numpy, numpy._core, numpy._core.multiarray; print('nnU-Net NumPy compat loaded for numpy', numpy.__version__)"
    - run:
        - git clone --recurse-submodules https://github.com/gattia/KneePipeline /opt/KneePipeline
        - cd /opt/KneePipeline
        - git checkout {{ context.kneepipeline_commit }}
        - git submodule update --init --recursive
        - python {{ get_file("openmsk_nnunet_worker_patch.py") }} /opt/KneePipeline/DEPENDENCIES/nnunet_knee_inference/scripts/inference.py
        - mkdir -p /opt/DOSMA_WEIGHTS /opt/NSM_MODELS /opt/KneePipeline/DEPENDENCIES/nnunet_knee_inference/huggingface/models/Dataset500_KneeMRI/nnUNetTrainer__nnUNetResEncUNetMPlans__3d_fullres/fold_1
        - cp {{ get_file("dosma_qdess_model") }} /opt/DOSMA_WEIGHTS/Goyal_Bone_Cart_July_2024_best_model.h5
        - cp {{ get_file("dosma_sagittal_model") }} /opt/DOSMA_WEIGHTS/sagittal_best_model.h5
        - cp {{ get_file("dosma_coronal_model") }} /opt/DOSMA_WEIGHTS/coronal_best_model.h5
        - cp {{ get_file("dosma_axial_model") }} /opt/DOSMA_WEIGHTS/axial_best_model.h5
        - cp {{ get_file("nnunet_fullres_dataset") }} /opt/KneePipeline/DEPENDENCIES/nnunet_knee_inference/huggingface/models/Dataset500_KneeMRI/nnUNetTrainer__nnUNetResEncUNetMPlans__3d_fullres/dataset.json
        - cp {{ get_file("nnunet_fullres_model_config") }} /opt/KneePipeline/DEPENDENCIES/nnunet_knee_inference/huggingface/models/Dataset500_KneeMRI/nnUNetTrainer__nnUNetResEncUNetMPlans__3d_fullres/model_config.json
        - cp {{ get_file("nnunet_fullres_plans") }} /opt/KneePipeline/DEPENDENCIES/nnunet_knee_inference/huggingface/models/Dataset500_KneeMRI/nnUNetTrainer__nnUNetResEncUNetMPlans__3d_fullres/plans.json
        - cp {{ get_file("nnunet_fullres_checkpoint_best") }} /opt/KneePipeline/DEPENDENCIES/nnunet_knee_inference/huggingface/models/Dataset500_KneeMRI/nnUNetTrainer__nnUNetResEncUNetMPlans__3d_fullres/fold_1/checkpoint_best.pth
        - cp {{ get_file("openmsk_config") }} /opt/KneePipeline/config.json
        - find /opt/KneePipeline -name .git -type d -prune -exec rm -rf {} +
        - find /opt/nsm -name .git -type d -prune -exec rm -rf {} +
        - find /opt/DOSMA -name .git -type d -prune -exec rm -rf {} +
        - pip cache purge || true
        - install -m 0755 {{ get_file("openmsk") }} /usr/local/bin/openmsk
        - mkdir -p /tmp/share/debug
        - chmod 1777 /tmp/share /tmp/share/debug
    # Runtime environment. CUDA libs from the TensorFlow base image plus the
    # NVIDIA runtime mounts let TensorFlow/torch load on a GPU host; harmless on
    # CPU-only hosts.
    - environment:
        OPENMSK_VERSION: "{{ context.version }}"
        KNEEPIPELINE_HOME: /opt/KneePipeline
        KNEEPIPELINE_CONFIG: /opt/KneePipeline/config.json
        OPENMSK_NNUNET_NUMPY_COMPAT_PATH: /opt/openmsk_compat
        OPENMSK_NNUNET_NUM_PROCESSES_PREPROCESSING: "1"
        OPENMSK_NNUNET_NUM_PROCESSES_EXPORT: "1"
        PYTHONPATH: /opt/openmsk_compat
        LD_LIBRARY_PATH: /usr/local/cuda/lib64:/usr/local/nvidia/lib:/usr/local/nvidia/lib64:$LD_LIBRARY_PATH
        # The DOSMA qDESS TF models are saved channels-first (NCHW). On a GPU
        # that runs natively; on CPU-only hosts oneDNN is required for NCHW
        # Conv2D, so enable it (harmless on GPU).
        TF_ENABLE_ONEDNN_OPTS: "1"
    - run:
        - cp {{ get_file("openmsk.py") }} /opt/code/python-ismrmrd-server/openmsk.py
        - cp {{ get_file("OpenReconLabel.json") }} /opt/code/python-ismrmrd-server/OpenReconLabel.json
        - cp {{ get_file("OpenReconREADME.md") }} /opt/code/python-ismrmrd-server/OpenReconREADME.md
        - cp {{ get_file("enhanceddicom2mrd.py") }} /opt/code/python-ismrmrd-server/enhanceddicom2mrd.py
        - cp {{ get_file("nifti2mrd.py") }} /opt/code/python-ismrmrd-server/nifti2mrd.py
        - cp {{ get_file("enhanced2singleframe.py") }} /opt/code/python-ismrmrd-server/enhanced2singleframe.py
    # Utility: expand Siemens qDESS Enhanced (multi-frame) DICOM into classic
    # single-frame DICOM so the direct `run_pipeline.py <dicom_dir>` path (DOSMA
    # QDess.from_dicom: qDESS RSS segmentation + T2) can read it.

deploy:
  bins:
    - python
    - openmsk

readme: |-
  ----------------------------------
  ## openmsk/{{ context.version }} ##

  OpenMSK packages the KneePipeline knee MRI toolbox as a Siemens OpenRecon
  image-to-image module for qDESS knee MRI. The OpenRecon path receives MRD
  images from the scanner, reconstructs an echo-1 NIfTI, runs KneePipeline, and
  returns bone/cartilage segmentation with geometry copied from the source
  images. The wrapper preserves both qDESS echo groups and synthesizes a
  minimal two-echo DICOM series with TR/TE/flip and GL/TG values so
  KneePipeline's qDESS loader can run its analytical T2 step from OpenRecon
  MRD input. It mirrors KneePipeline's split steps: it runs mesh
  generation/cartilage thickness when requested, runs qDESS T2 mapping when
  KneePipeline identifies qDESS input, and returns subregion segmentation,
  T2 maps, and a burned-in metrics report image series whenever those artifacts
  are written. The same metrics are copied into output metadata comments.
  The packaged segmentation models are
  `acl_qdess_bone_july_2024`, `goyal_sagittal`, `goyal_coronal`,
  `goyal_axial`, and `nnunet_knee`. Optional mesh/thickness analysis can run
  after segmentation when the `computethickness` OpenRecon option is enabled.
  The `nnunet_knee` path is packaged with single preprocessing/export worker
  defaults for scanner-side memory stability.
  Legacy `runnsm` and `runbscore` protocol parameters are accepted for scanner
  conversion compatibility but ignored because gated ShapeMedKnee assets are not
  packaged.

  Direct DICOM usage keeps the qDESS GL/TG private tags and can produce the
  full output set including T2:

  ```bash
  ml openmsk/{{ context.version }}
  python /opt/KneePipeline/run_pipeline.py /path/to/qDESS/dicom_dir /path/to/out --config /opt/KneePipeline/config.json
  ```

  ----------------------------------
