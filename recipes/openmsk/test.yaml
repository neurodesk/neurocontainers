tests:
  - name: Test openmsk
    manual: true
    script: |
      # Build/login. The large model files are expected to be available in the
      # recipe cache or local build context for offline mode.
      source env/bin/activate
      sf-login openmsk --architecture x86_64 --offline-mode

      # TensorFlow and PyTorch must both use CUDA 11.8 for the Siemens MARS
      # scanner environment.
      python - <<'PY'
      import torch
      from tensorflow.python.platform import build_info

      tf_cuda = build_info.build_info["cuda_version"]
      torch_cuda = torch.version.cuda
      print(f"TensorFlow CUDA: {tf_cuda}")
      print(f"PyTorch CUDA: {torch_cuda}")
      assert tf_cuda == "11.8"
      assert torch_cuda == "11.8"
      PY

      # Convert qDESS Enhanced DICOM to MRD for the OpenRecon path.
      rm -f /buildhostdirectory/input.h5
      python /opt/code/python-ismrmrd-server/enhanceddicom2mrd.py \
        -o /buildhostdirectory/input.h5 \
        /buildhostdirectory/dicom_data/qDESS

      # Start the OpenRecon server and run the client with config=openmsk.
      python /opt/code/python-ismrmrd-server/main.py \
        -v -r -H=0.0.0.0 -p=9002 -s -S=/tmp/share/saved_data &
      sleep 2

      rm -f /buildhostdirectory/output.h5
      python /opt/code/python-ismrmrd-server/client.py \
        -G dataset \
        -o /buildhostdirectory/output.h5 \
        /buildhostdirectory/input.h5 \
        -c openmsk
      python - /buildhostdirectory/output.h5 <<'PY'
      import h5py
      import numpy as np
      import xml.etree.ElementTree as ET

      output_h5 = "/buildhostdirectory/output.h5"
      with h5py.File(output_h5, "r") as dataset:
          assert "image_101" in dataset["dataset"], "missing OpenMSK segmentation series"
          segment = dataset["dataset/image_101"]
          data = segment["data"][:]
          assert np.count_nonzero(data) > 0, "OpenMSK segmentation is empty"
          meta = {}
          root = ET.fromstring(segment["attributes"][0].decode("utf-8"))
          for item in root.findall("meta"):
              name = item.findtext("name")
              meta[name] = [value.text or "" for value in item.findall("value")]

          def first(key):
              values = meta.get(key, [])
              return values[0] if values else None

          assert first("DataRole") == "Segmentation"
          assert first("SeriesDescription") == "openmsk_segmentation"
          assert first("SegmentSourceGeometry") == "1"
          assert first("ImageTypeValue3") is None
      PY

      # Also run the full KneePipeline directly on the qDESS DICOM. Siemens qDESS
      # exports as Enhanced multi-frame DICOM, which DOSMA's QDess.from_dicom
      # cannot parse, so first expand it into classic single-frame DICOM.
      rm -rf /buildhostdirectory/qDESS_sf /buildhostdirectory/out_direct
      python /opt/code/python-ismrmrd-server/enhanced2singleframe.py \
        /buildhostdirectory/dicom_data/qDESS \
        /buildhostdirectory/qDESS_sf

      # Segmentation + cartilage thickness always run. T2 mapping also runs when
      # the qDESS GL_AREA (0019,10B6) / TG (0019,10B7) private tags survived the
      # export; DOSMA skips T2 with a warning if they were stripped.
      python /opt/KneePipeline/run_pipeline.py \
        /buildhostdirectory/qDESS_sf \
        /buildhostdirectory/out_direct \
        --config /opt/KneePipeline/config.json

      find /buildhostdirectory/out_direct -maxdepth 1 -type f | sort
      ls -lh /buildhostdirectory/out_direct/*_all-labels.nii.gz
      ls -lh /buildhostdirectory/out_direct/*_thickness_results.json
      ls -lh /buildhostdirectory/out_direct/*_t2_results.json 2>/dev/null || echo "T2 skipped (qDESS GL/TG private tags not present)"
