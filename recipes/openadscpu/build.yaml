structured_readme:
  description: |-
    OpenADS is an end-to-end medical imaging pipeline for stroke analysis, covering preprocessing, registration, segmentation, and report generation for DWI and PWI workflows.
    This is the CPU version of the neurocontainer.
  example: |-
    # Example usage

    ```bash
    # DWI example
    ads dwi --subject-path /opt/openads/assets/examples/dwi/sub-02e8eb42 --all --gpu 0
    
    # PWI example
    ads pwi --subject-path /opt/openads/assets/examples/pwi/sub-02e8eb42 --all --gpu 0
    
    # Combined
    ads combined \
      --dwi-subject-path /opt/openads/assets/examples/dwi/sub-02e8eb42 \
      --pwi-subject-path /opt/openads/assets/examples/pwi/sub-02e8eb42 \
      --all --gpu 0

    # Write outputs to a custom directory (CPU only)
    ads dwi --subject-path /data/dwi/sub-01 --all --gpu 0 \
      --output-root /output/results

    # Check available options
    ads --help
    ads dwi --help
    ```
  documentation: https://github.com/farialab/OpenADS
  citation: |-
    For stroke segmentation and quantification: Liu CF, Hsu J, Xu X, Ramachandran S, Wang V, Miller MI, Hillis AE, Faria AV. Deep learning-based detection and segmentation of diffusion abnormalities in acute ischemic stroke. Commun Med 1, 61 (2021) https://doi.org/10.1038/s43856-021-00062-8

    For ASPECTS calculation: Liu CF, Li J, Kim G, Miller MI, Hillis AE, Faria AV. Automatic comprehensive aspects reports in clinical acute stroke MRIs. Sci Rep 13, 3784 (2023). https://doi.org/10.1038/s41598-023-30242-6

    For automatic radiological reports: Liu CF, Zhao Y, Yedavalli V, Leigh R, Falcao V, Miller MI, Hillis AE, Faria AV. Automatic comprehensive radiological reports for clinical acute stroke MRIs. Commun Med 3, 95 (2023). https://doi.org/10.1038/s43856-023-00327-4

    For the dataset: Liu CF, Leigh R, Johnson B, Urrutia V, Hsu J, Xu X, Li X, Mori S, Hillis AE, Faria AV. A large public dataset of annotated clinical MRIs and metadata of patients with acute stroke. Sci Data 10, 548 (2023). https://doi.org/10.1038/s41597-023-02457-9

    For the dataset source: Faria, Andreia V. Annotated Clinical MRIs and Linked Metadata of Patients with Acute Stroke, Baltimore, Maryland, 2009-2019. Inter-university Consortium for Political and Social Research [distributor], 2022-12-12. https://doi.org/10.3886/ICPSR38464.v5
readme: |-
  ----------------------------------
  ## openadscpu/{{ context.version }} ##

  OpenADS is an end-to-end medical imaging pipeline for stroke analysis, covering preprocessing, registration, segmentation, and report generation for DWI and PWI workflows.
  This is the CPU version of the neurocontainer.

  Example:
  ```
  # Example usage

  ```bash
  # Run the full DWI pipeline (CPU only)
  ads dwi --subject-path /data/dwi/sub-01 --all --gpu 0

  # Run the full PWI pipeline (CPU only)
  ads pwi --subject-path /data/pwi/sub-01 --all --gpu 0

  # Run the combined DWI + PWI pipeline (CPU only)
  ads combined \
    --dwi-subject-path /data/dwi/sub-01 \
    --pwi-subject-path /data/pwi/sub-01 \
    --all --gpu 0

  # Write outputs to a custom directory (CPU only)
  ads dwi --subject-path /data/dwi/sub-01 --all --gpu 0 \
    --output-root /output/results

  # Check available options
  ads --help
  ads dwi --help
  ```
  ```

  More documentation can be found here: https://github.com/farialab/OpenADS

  Citation:
  ```
  For stroke segmentaion and quantification: Liu CF, Hsu J, Xu X, Ramachandran S, Wang V, Miller MI, Hillis AE, Faria AV. Deep learning-based detection and segmentation of diffusion abnormalities in acute ischemic stroke. Commun Med 1, 61 (2021) https://doi.org/10.1038/s43856-021-00062-8

  For ASPECTS calculation: Liu CF, Li J, Kim G, Miller MI, Hillis AE, Faria AV. Automatic comprehensive aspects reports in clinical acute stroke MRIs. Sci Rep 13, 3784 (2023). https://doi.org/10.1038/s41598-023-30242-6

  For automatic radiological reports: Liu CF, Zhao Y, Yedavalli V, Leigh R, Falcao V, Miller MI, Hillis AE, Faria AV. Automatic comprehensive radiological reports for clinical acute stroke MRIs. Commun Med 3, 95 (2023). https://doi.org/10.1038/s43856-023-00327-4

  For the dataset: Liu CF, Leigh R, Johnson B, Urrutia V, Hsu J, Xu X, Li X, Mori S, Hillis AE, Faria AV. A large public dataset of annotated clinical MRIs and metadata of patients with acute stroke. Sci Data 10, 548 (2023). https://doi.org/10.1038/s41597-023-02457-9

  For the dataset source: Faria, Andreia V. Annotated Clinical MRIs and Linked Metadata of Patients with Acute Stroke, Baltimore, Maryland, 2009-2019. Inter-university Consortium for Political and Social Research [distributor], 2022-12-12. https://doi.org/10.3886/ICPSR38464.v5
  ```

  To run container outside of this environment: ml openadscpu/{{ context.version }}

  ----------------------------------
build:
  kind: neurodocker
  base-image: ubuntu:24.04
  pkg-manager: apt
  directives:
    - install: git libgomp1 build-essential
    - template:
        name: miniconda
        version: latest
        conda_install: python=3.11
    - run:
        - apt-get update && apt-get install -y --no-install-recommends gcc g++ && rm -rf /var/lib/apt/lists/*
        - pip install torch==2.5.1 --index-url https://download.pytorch.org/whl/cpu
        - pip install numpy==2.0.1 antspyx==0.5.4 pandas==2.2.3 matplotlib==3.9.2 scikit-image==0.24.0 scipy==1.13.1 pyyaml==6.0.2 tqdm==4.67.1
        - pip install nibabel==5.3.2 scikit-learn==1.7.2 surfa==0.6.3 shap==0.50.0
        - git clone https://github.com/farialab/OpenADS /opt/openads
        - pip install /opt/openads --no-deps
        - rm -rf /opt/openads/.git
        - ln -s /opt/openads/scripts /opt/miniconda-latest/lib/python3.11/scripts
    - deploy:
        bins:
          - ads
    - test:
        name: verify_installation
        script: |-
          # Test Python and conda installation
          python --version
          conda --version

          # Test that pip packages were installed
          python -c "import sys; print('Python path:', sys.path)"
          pip list | grep -i "ads"

          # Test the main package import
          python -c "import ads; print('ads imported successfully')"

          # Test the CLI is available
          ads --help
    - test:
        name: Simple Deploy Bins/Path Test
        builtin: test_deploy.sh
categories:
  - image segmentation
icon: data:image/png;base64,
