name: lesionquantificationtoolkit
version: 0.1.0
container: lesionquantificationtoolkit_${version}_REFERENCE.simg
default_timeout: 60
tests:
  - name: R resolves on PATH
    command: command -v R
    expected_exit_code: 0
  - name: R runtime starts
    command: R --version
    expected_exit_code: 0
  - name: R site library exists
    command: test -d /usr/local/lib/R/site-library
    expected_exit_code: 0
  - name: LQT library loads
    command: R --slave -e 'library(LQT)'
    expected_exit_code: 0
  - name: LQT package version
    command: R --slave -e 'stopifnot(as.character(packageVersion("LQT")) == "0.1.0")'
    expected_exit_code: 0
  - name: LQT package title
    command: R --slave -e 'stopifnot(packageDescription("LQT")$Title == "Lesion Quantification Toolkit")'
    expected_exit_code: 0
  - name: LQT package license
    command: R --slave -e 'stopifnot(packageDescription("LQT")$License == "GPL-2")'
    expected_exit_code: 0
  - name: LQT package directory exists
    command: R --slave -e 'stopifnot(dir.exists(system.file(package = "LQT")))'
    expected_exit_code: 0
  - name: LQT DESCRIPTION exists
    command: R --slave -e 'stopifnot(file.exists(system.file("DESCRIPTION", package = "LQT")))'
    expected_exit_code: 0
  - name: LQT namespace exports functions
    command: R --slave -e 'stopifnot(length(getNamespaceExports("LQT")) >= 10)'
    expected_exit_code: 0
  - name: compile_data is exported
    command: R --slave -e 'stopifnot("compile_data" %in% getNamespaceExports("LQT"))'
    expected_exit_code: 0
  - name: compile_data resolves
    command: R --slave -e 'stopifnot(exists("compile_data", envir = asNamespace("LQT"), inherits = FALSE))'
    expected_exit_code: 0
  - name: compile_data is a function
    command: R --slave -e 'stopifnot(is.function(get("compile_data", envir = asNamespace("LQT"))))'
    expected_exit_code: 0
  - name: compile_data belongs to LQT
    command: R --slave -e 'stopifnot(identical(environmentName(environment(get("compile_data", envir = asNamespace("LQT")))), "LQT"))'
    expected_exit_code: 0
