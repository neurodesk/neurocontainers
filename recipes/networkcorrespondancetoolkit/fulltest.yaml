# networkcorrespondancetoolkit container test suite
# Focused ARM64 verification for the packaged Python environment and installed modules.

name: networkcorrespondancetoolkit
version: 0.3.3
container: networkcorrespondancetoolkit_0.3.3.simg

test_data:
  output_dir: test_output

setup:
  script: |
    #!/usr/bin/env bash
    set -e
    mkdir -p ${output_dir}

tests:
  - name: Native ARM64 runtime
    description: Verify the local Docker image runs natively on ARM64
    script: |
      uname -m | grep -x 'aarch64'

  - name: Python 3.11 runtime
    description: Verify the pinned Python runtime used for ARM64 wheel compatibility
    script: |
      python --version | grep 'Python 3.11'

  - name: Package metadata version
    description: Verify the packaged toolkit version matches the built image tag
    script: |
      python - <<'PY'
      import importlib.metadata as md
      print(md.version("cbig-network-correspondence"))
      PY
      python - <<'PY' | grep -x '0.3.3'
      import importlib.metadata as md
      print(md.version("cbig-network-correspondence"))
      PY

  - name: Core modules discoverable
    description: Verify the installed toolkit and key scientific dependencies resolve on disk
    script: |
      python - <<'PY'
      import importlib.util as u
      mods = [
          "cbig_network_correspondence",
          "nibabel",
          "numpy",
          "scipy",
          "nilearn",
          "matplotlib",
          "seaborn",
          "pandas",
          "sklearn",
          "brainspace",
          "regfusion",
          "vtk",
          "git",
      ]
      for mod in mods:
          spec = u.find_spec(mod)
          assert spec is not None, mod
          print(mod, spec.origin)
      PY
      python - <<'PY' | grep 'cbig_network_correspondence'
      import importlib.util as u
      print(u.find_spec("cbig_network_correspondence").origin)
      PY

  - name: ARM64-sensitive dependency versions
    description: Verify the ARM64 wheel-backed dependencies that were explicitly aligned in the recipe
    script: |
      python - <<'PY'
      import importlib.metadata as md
      for pkg in ["brainspace", "regfusion", "vtk", "gitpython", "nilearn", "pandas"]:
          print(pkg, md.version(pkg))
      PY
      python - <<'PY' | grep -x 'vtk 9.6.1'
      import importlib.metadata as md
      print("vtk", md.version("vtk"))
      PY
