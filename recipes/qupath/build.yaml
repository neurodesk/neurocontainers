    url: https://github.com/qupath/qupath/blob/v{{ context.version }}/LICENSE
  - license: Apache-2.0
    url: https://github.com/BIOP/qupath-extension-cellpose/blob/v{{ context.cellpose_extension_version }}/LICENSE
  - license: BSD-3-Clause
    url: https://github.com/MouseLand/cellpose/blob/v{{ context.cellpose_version }}/LICENSE
