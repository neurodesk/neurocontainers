name: libreoffice
version: 26.2.4

copyright:
  - license: MPL-2.0
    url: https://www.libreoffice.org/about-us/licenses/
  - license: LGPL-3.0-or-later
    url: https://www.libreoffice.org/about-us/licenses/

architectures:
  - x86_64
  - aarch64

variables:
  libreoffice_archive:
    try:
      - value: libreoffice_x86_64_deb
        condition: arch == "x86_64"
      - value: libreoffice_aarch64_deb
        condition: arch == "aarch64"

files:
  - name: libreoffice_x86_64_deb
    url: https://download.documentfoundation.org/libreoffice/stable/{{ context.version }}/deb/x86_64/LibreOffice_{{ context.version }}_Linux_x86-64_deb.tar.gz
    condition: arch == "x86_64"
  - name: libreoffice_aarch64_deb
    url: https://download.documentfoundation.org/libreoffice/stable/{{ context.version }}/deb/aarch64/LibreOffice_{{ context.version }}_Linux_aarch64_deb.tar.gz
    condition: arch == "aarch64"

build:
  kind: neurodocker
  base-image: ubuntu:24.04
  pkg-manager: apt

  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive
        LANG: en_US.UTF-8
        LANGUAGE: en_US:en
        LC_ALL: en_US.UTF-8

    - install:
        - ca-certificates
        - default-jre
        - fonts-dejavu
        - fonts-liberation
        - fontconfig
        - hunspell-en-us
        - hyphen-en-us
        - libdbus-1-3
        - libgl1
        - libglu1-mesa
        - libgtk-3-0
        - libnss3
        - libsm6
        - libx11-6
        - libxext6
        - libxinerama1
        - libxrandr2
        - libxrender1
        - libxtst6
        - locales
        - mythes-en-us
        - tar

    - run:
        - locale-gen en_US.UTF-8

    - workdir: /tmp

    - run:
        - mkdir -p /tmp/libreoffice
        - tar -xzf {{ get_file(context.libreoffice_archive) }} -C /tmp/libreoffice --strip-components=1
        - apt-get update
        - apt-get install -y --no-install-recommends /tmp/libreoffice/DEBS/*.deb /tmp/libreoffice/DEBS/desktop-integration/*.deb
        - LO_DIR="/opt/libreoffice{{ context.version.split('.')[0] }}.{{ context.version.split('.')[1] }}"
        - test -x "${LO_DIR}/program/soffice"
        - ln -sfn "${LO_DIR}/program/soffice" /usr/local/bin/libreoffice
        - ln -sfn "${LO_DIR}/program/soffice" /usr/local/bin/soffice
        - ln -sfn "${LO_DIR}/program/swriter" /usr/local/bin/lowriter
        - ln -sfn "${LO_DIR}/program/scalc" /usr/local/bin/localc
        - ln -sfn "${LO_DIR}/program/simpress" /usr/local/bin/loimpress
        - ln -sfn "${LO_DIR}/program/sdraw" /usr/local/bin/lodraw
        - ln -sfn "${LO_DIR}/program/sbase" /usr/local/bin/lobase
        - ln -sfn "${LO_DIR}/program/smath" /usr/local/bin/lomath
        - rm -rf /tmp/libreoffice /var/lib/apt/lists/*

    - environment:
        PATH: /opt/libreoffice{{ context.version.split('.')[0] }}.{{ context.version.split('.')[1] }}/program:$PATH

deploy:
  bins:
    - libreoffice
    - soffice
    - lowriter
    - localc
    - loimpress
    - lodraw
    - lobase
    - lomath

gui_apps:
  - name: libreofficeGUI
    exec: libreoffice
  - name: libreofficeWriterGUI
    exec: lowriter
  - name: libreofficeCalcGUI
    exec: localc
  - name: libreofficeImpressGUI
    exec: loimpress
  - name: libreofficeDrawGUI
    exec: lodraw
  - name: libreofficeBaseGUI
    exec: lobase
  - name: libreofficeMathGUI
    exec: lomath

categories:
  - data organisation

icon: data:image/svg+xml;base64,

readme: |-
  ----------------------------------
  ## libreoffice/{{ context.version }} ##

  LibreOffice is a free and open-source office suite with applications for word processing, spreadsheets, presentations, vector drawing, databases, and formula editing.

  Examples:
  ```
  libreoffice --version
  lowriter
  localc
  loimpress
  lodraw
  lobase
  lomath
  ```

  More documentation can be found here: https://documentation.libreoffice.org/

  To run container outside of this environment: ml libreoffice/{{ context.version }}

  ----------------------------------
