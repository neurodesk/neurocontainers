tests:
  - name: Test vesselboost
    manual: true
    script: |
      source .venv/bin/activate
      ./builder/build.py generate vesselboost --recreate --build --login --architecture x86_64 --offline_mode true

      # check that the CUDA version is valid for MARS: has to be CUDA 11.x
      python -c "import torch; print(torch.version.cuda)"

      # Convert NIFTI to ISMRMRD format
      rm /buildhostdirectory/tof.h5
      python3 /opt/code/python-ismrmrd-server/nifti2mrd.py \
              -i /buildhostdirectory/tof_Se1_Res0.3_0.3_Spac0.3.nii \
              -o /buildhostdirectory/tof.h5


      # Start OpenRecon server
      python3 /opt/code/python-ismrmrd-server/main.py -v -r -H=0.0.0.0 -p=9002 -s -S=/tmp/share/saved_data &
      sleep 2

      # Default setup:
      rm -f /buildhostdirectory/output.h5
      rm -f vesselboost.json
      python3 /opt/code/python-ismrmrd-server/client.py \
        -G dataset \
        -o /buildhostdirectory/output.h5 \
        /buildhostdirectory/tof_named_with_minihead.h5 \
        -c vesselboost

      assert_vesselboost_metadata /buildhostdirectory/output.h5 default

      default_openrecon_nii_dir=/tmp/share/debug/vesselboost_openrecon/prediction_prep1_brain1_blend0/tof_output
      rm -rf /buildhostdirectory/tof_openrecon_output
      mkdir -p /buildhostdirectory/tof_openrecon_output
      cp -a "${default_openrecon_nii_dir}/." /buildhostdirectory/tof_openrecon_output/



      # Test with Brain extraction:
      rm -f /buildhostdirectory/output_brain_extraction.h5
      printf '%s\n' \
        '{' \
        '  "parameters": {' \
        '    "config": "vesselboost",' \
        '    "vbuseblending": false,' \
        '    "vboverlap": 50,' \
        '    "vbbiasfieldcorrection": true,' \
        '    "vbdenoising": false,' \
        '    "vbbrainextraction": true,' \
        '    "vboutputname": "prediction_prep1_brain1_blend0"' \
        '  }' \
        '}' > vesselboost.json
      python3 /opt/code/python-ismrmrd-server/client.py \
        -G dataset \
        -o /buildhostdirectory/output_brain_extraction.h5 \
        /buildhostdirectory/tof_named_with_minihead.h5 \
        -c vesselboost

      brain_extraction_openrecon_nii_dir=/tmp/share/debug/vesselboost_openrecon/prediction_prep1_brain1_blend0/tof_output
      rm -rf /buildhostdirectory/tof_openrecon_brain_extraction_output
      mkdir -p /buildhostdirectory/tof_openrecon_brain_extraction_output
      cp -a "${brain_extraction_openrecon_nii_dir}/." /buildhostdirectory/tof_openrecon_brain_extraction_output/
      rm -f vesselboost.json

      # Test sendoriginal=false.
      rm -f /buildhostdirectory/output_no_original.h5
      printf '%s\n' \
        '{' \
        '  "parameters": {' \
        '    "config": "vesselboost",' \
        '    "sendoriginal": false,' \
        '    "vbuseblending": false,' \
        '    "vboverlap": 50,' \
        '    "vbbiasfieldcorrection": true,' \
        '    "vbdenoising": false,' \
        '    "vbbrainextraction": true' \
        '  }' \
        '}' > vesselboost.json
      python3 /opt/code/python-ismrmrd-server/client.py \
        -G dataset \
        -o /buildhostdirectory/output_no_original.h5 \
        /buildhostdirectory/tof_named_with_minihead.h5 \
        -c vesselboost
      assert_vesselboost_metadata /buildhostdirectory/output_no_original.h5 sendoriginal_false
      rm -f vesselboost.json

      # Test reslice naming.
      rm -f /buildhostdirectory/output_reslice.h5
      printf '%s\n' \
        '{' \
        '  "parameters": {' \
        '    "config": "vesselboost",' \
        '    "sendoriginal": true,' \
        '    "vbuseblending": false,' \
        '    "vboverlap": 50,' \
        '    "vbbiasfieldcorrection": true,' \
        '    "vbdenoising": false,' \
        '    "vbbrainextraction": true,' \
        '    "vbreslicesagittal": true,' \
        '    "vbreslicecoronal": true' \
        '  }' \
        '}' > vesselboost.json
      python3 /opt/code/python-ismrmrd-server/client.py \
        -G dataset \
        -o /buildhostdirectory/output_reslice.h5 \
        /buildhostdirectory/tof_named_with_minihead.h5 \
        -c vesselboost
      assert_vesselboost_metadata /buildhostdirectory/output_reslice.h5 reslice
      rm -f vesselboost.json


      # Test exhaustive OpenRecon parameter matrix.
      export VESSELBOOST_TEST_ALL_OPENRECON_PARAMS=1
      if [ "${VESSELBOOST_TEST_ALL_OPENRECON_PARAMS:-0}" = "1" ]; then
        matrix_dir=/tmp/vesselboost_openrecon_parameter_matrix
        matrix_output_dir=/buildhostdirectory/vesselboost_openrecon_parameter_matrix_outputs
        rm -rf "${matrix_dir}"
        rm -rf "${matrix_output_dir}"
        mkdir -p "${matrix_output_dir}"
        python3 /opt/code/python-ismrmrd-server/vesselboost.py \
          --write-openrecon-test-configs "${matrix_dir}" \
          --modules "${VESSELBOOST_OPENRECON_MATRIX_MODULES:-prediction}"

        for config_file in "${matrix_dir}"/*.json; do
          test_name=$(basename "${config_file}" .json)
          cp "${config_file}" vesselboost.json
          test_output_dir="${matrix_output_dir}/${test_name}"
          mkdir -p "${test_output_dir}"
          cp "${config_file}" "${test_output_dir}/config.json"
          python3 /opt/code/python-ismrmrd-server/client.py \
            -G dataset \
            -o "${test_output_dir}/output.h5" \
            /buildhostdirectory/tof.h5 \
            -c vesselboost
          mkdir -p "${test_output_dir}/debug_workspace"
          cp -a "/tmp/share/debug/vesselboost_openrecon/${test_name}/." \
            "${test_output_dir}/debug_workspace/"
        done
        rm -f vesselboost.json
      fi



      # Create an input with scanner-like TOF naming and IceMiniHead so
      # the OpenRecon output metadata can be tested.
      rm -f /buildhostdirectory/tof_named_with_minihead.h5
      python3 -c 'import textwrap; exec(textwrap.dedent("""
      import base64

      import ismrmrd

      source_path = "/buildhostdirectory/tof.h5"
      target_path = "/buildhostdirectory/tof_named_with_minihead.h5"
      source_series = "tof_fl3d_tra"
      source_type = "TOF"
      minihead_text = "\\n".join(
          [
              "<ParamString.\\"SequenceDescription\\">\\t{ \\"tof_fl3d_tra\\" }",
              "<ParamString.\\"SeriesNumberRangeNameUID\\">\\t{ \\"tof_fl3d_tra\\" }",
              "<ParamString.\\"ImageType\\">\\t{ \\"ORIGINAL\\\\\\\\PRIMARY\\\\\\\\M\\\\\\\\TOF\\" }",
              "<ParamString.\\"ImageTypeValue3\\">\\t{ \\"M\\" }",
              "<ParamString.\\"ComplexImageComponent\\">\\t{ \\"MAGNITUDE\\" }",
              "<ParamArray.\\"ImageTypeValue4\\">\\t{",
              "\\t{ \\"TOF\\" }",
              "}",
          ]
      ) + "\\n"
      encoded_minihead = base64.b64encode(minihead_text.encode("utf-8")).decode("ascii")

      src = ismrmrd.Dataset(source_path, "dataset")
      dst = ismrmrd.Dataset(target_path, "dataset")
      dst._file.require_group("dataset")
      dst.write_xml_header(src.read_xml_header())

      image_groups = sorted(
          name for name in src._file["dataset"].keys()
          if name.startswith("image_")
      )
      for image_group in image_groups:
          for image_index in range(src.number_of_images(image_group)):
              image = src.read_image(image_group, image_index)
              meta = ismrmrd.Meta.deserialize(image.attribute_string)
              meta["SeriesDescription"] = source_series
              meta["SequenceDescription"] = source_series
              meta["SeriesNumberRangeNameUID"] = source_series
              meta["ImageType"] = f"ORIGINAL\\\\PRIMARY\\\\M\\\\{source_type}"
              meta["ImageTypeValue3"] = "M"
              meta["ImageTypeValue4"] = source_type
              meta["DicomImageType"] = f"ORIGINAL\\\\PRIMARY\\\\M\\\\{source_type}"
              meta["ImageComments"] = source_series
              meta["IceMiniHead"] = encoded_minihead
              image.attribute_string = meta.serialize()
              image.image_series_index = 1
              dst.append_image("image_1", image)

      src.close()
      dst.close()
      """))'

      assert_vesselboost_metadata() {
        output_path="$1"
        scenario="$2"
        python3 -c 'import textwrap; exec(textwrap.dedent("""
        import base64
        import sys

        import ismrmrd

        output_path = sys.argv[1]
        scenario = sys.argv[2]
        expected_source = "tof_fl3d_tra"
        expected_derived = "tof_fl3d_tra_vesselboost_segmentation"
        expected_original = f"{expected_source}_original"
        expected_sagittal = f"{expected_derived}_sagittal"
        expected_coronal = f"{expected_derived}_coronal"

        def get_text(meta_obj, key):
            try:
                value = meta_obj.get(key)
            except Exception:
                value = None
            if isinstance(value, (list, tuple)):
                for item in value:
                    text = str(item).strip()
                    if text:
                        return text
                return ""
            if value is None:
                return ""
            return str(value).strip()

        dataset = ismrmrd.Dataset(output_path, "dataset")
        image_groups = sorted(
            name for name in dataset._file["dataset"].keys()
            if name.startswith("image_")
        )
        summaries = []
        for image_group in image_groups:
            image_count = dataset.number_of_images(image_group)
            image = dataset.read_image(image_group, 0)
            last_image = dataset.read_image(image_group, image_count - 1)
            header = image.getHead()
            last_header = last_image.getHead()
            headers = [
                dataset.read_image(image_group, index).getHead()
                for index in range(image_count)
            ]
            image_indices = [
                int(getattr(image_header, "image_index", 0))
                for image_header in headers
            ]
            slice_indices = [
                int(getattr(image_header, "slice", 0))
                for image_header in headers
            ]
            meta = ismrmrd.Meta.deserialize(image.attribute_string)
            ice_minihead = get_text(meta, "IceMiniHead")
            if ice_minihead:
                ice_minihead = base64.b64decode(ice_minihead).decode("utf-8")
            summaries.append(
                {
                    "group": image_group,
                    "image_count": image_count,
                    "series_index": int(getattr(header, "image_series_index", 0)),
                    "image_index": int(getattr(header, "image_index", 0)),
                    "last_image_index": int(getattr(last_header, "image_index", 0)),
                    "first_slice": int(getattr(header, "slice", 0)),
                    "last_slice": int(getattr(last_header, "slice", 0)),
                    "image_indices": image_indices,
                    "slice_indices": slice_indices,
                    "series_description": get_text(meta, "SeriesDescription"),
                    "sequence_description": get_text(meta, "SequenceDescription"),
                    "sequence_description_additional": get_text(meta, "SequenceDescriptionAdditional"),
                    "grouping": get_text(meta, "SeriesNumberRangeNameUID"),
                    "image_type": get_text(meta, "ImageType"),
                    "image_type_value4": get_text(meta, "ImageTypeValue4"),
                    "dicom_image_type": get_text(meta, "DicomImageType"),
                    "image_comments": get_text(meta, "ImageComments"),
                    "image_comment": get_text(meta, "ImageComment"),
                    "keep_image_geometry": get_text(meta, "Keep_image_geometry"),
                    "matrix_x": int(header.matrix_size[0]),
                    "matrix_y": int(header.matrix_size[1]),
                    "pixel_spacing_x": float(header.field_of_view[0]) / float(header.matrix_size[0]),
                    "pixel_spacing_y": float(header.field_of_view[1]) / float(header.matrix_size[1]),
                    "ice_minihead": ice_minihead,
                }
            )
        dataset.close()

        if scenario == "default":
            assert len(summaries) == 2, summaries
            derived, original = summaries
            assert derived["series_index"] == 2, derived
            assert derived["series_description"] == expected_derived, derived
            assert derived["sequence_description"] == expected_derived, derived
            assert derived["grouping"] == expected_derived, derived
            assert derived["grouping"] != original["grouping"], summaries
            assert derived["image_type"] == "DERIVED\\\\PRIMARY\\\\M\\\\VESSELBOOST_SEGMENTATION", derived
            assert derived["dicom_image_type"] == "DERIVED\\\\PRIMARY\\\\M\\\\VESSELBOOST_SEGMENTATION", derived
            assert derived["image_type_value4"] == "vesselboost_segmentation", derived
            assert derived["image_comments"] == "vesselboost_segmentation", derived
            assert derived["image_comment"] == "vesselboost_segmentation", derived
            assert derived["sequence_description_additional"] == "openrecon", derived
            assert derived["image_index"] == 1, derived
            assert derived["last_image_index"] == derived["image_count"], derived
            assert derived["last_slice"] == derived["image_count"] - 1, derived
            assert expected_derived in derived["ice_minihead"], derived["ice_minihead"]
            assert "SequenceDescription" in derived["ice_minihead"], derived["ice_minihead"]
            assert "SeriesNumberRangeNameUID" in derived["ice_minihead"], derived["ice_minihead"]
            assert original["series_index"] == 3, original
            assert original["series_description"] == expected_original, original
            assert original["sequence_description"] == expected_original, original
            assert original["grouping"] == expected_original, original
            assert original["image_type"] == "DERIVED\\\\PRIMARY\\\\M\\\\ORIGINAL", original
            assert original["dicom_image_type"] == "DERIVED\\\\PRIMARY\\\\M\\\\ORIGINAL", original
            assert original["image_type_value4"] == "original", original
            assert original["image_comments"] == "original", original
            assert original["image_comment"] == "original", original
            assert original["sequence_description_additional"] == "openrecon", original
            assert expected_original in original["ice_minihead"], original["ice_minihead"]
            assert original["grouping"] != expected_source, original
            assert original["image_index"] == 1, original
            assert original["last_image_index"] == original["image_count"], original
            assert original["last_slice"] == original["image_count"] - 1, original
        elif scenario == "sendoriginal_false":
            assert len(summaries) == 1, summaries
            derived = summaries[0]
            assert derived["series_index"] == 2, derived
            assert derived["series_description"] == expected_derived, derived
            assert derived["sequence_description"] == expected_derived, derived
            assert derived["grouping"] == expected_derived, derived
            assert derived["image_type_value4"] == "vesselboost_segmentation", derived
            assert derived["image_index"] == 1, derived
            assert derived["last_image_index"] == derived["image_count"], derived
            assert derived["last_slice"] == derived["image_count"] - 1, derived
        elif scenario == "reslice":
            assert len(summaries) == 4, summaries
            assert [summary["series_index"] for summary in summaries] == [2, 3, 4, 5], summaries
            assert [summary["series_description"] for summary in summaries] == [
                expected_derived,
                expected_sagittal,
                expected_coronal,
                expected_original,
            ], summaries
            assert [summary["grouping"] for summary in summaries] == [
                expected_derived,
                expected_sagittal,
                expected_coronal,
                expected_original,
            ], summaries
            derived = summaries[0]
            sagittal = summaries[1]
            coronal = summaries[2]
            original = summaries[3]
            assert derived["image_index"] == 1, derived
            assert derived["last_image_index"] == derived["image_count"], derived
            assert derived["last_slice"] == derived["image_count"] - 1, derived
            assert original["image_type_value4"] == "original", original
            assert expected_original in original["ice_minihead"], original["ice_minihead"]
            for reformat in (sagittal, coronal):
                assert reformat["image_indices"] == list(range(1, reformat["image_count"] + 1)), reformat
                assert reformat["slice_indices"] == list(range(reformat["image_count"])), reformat
                assert reformat["first_slice"] == 0, reformat
                assert reformat["last_slice"] == reformat["image_count"] - 1, reformat
            assert sagittal["sequence_description_additional"] == "openrecon", sagittal
            assert coronal["sequence_description_additional"] == "openrecon", coronal
            assert sagittal["keep_image_geometry"] == "0", sagittal
            assert coronal["keep_image_geometry"] == "0", coronal
            assert not sagittal["ice_minihead"], sagittal
            assert not coronal["ice_minihead"], coronal
            assert sagittal["matrix_x"] % 2 == sagittal["matrix_y"] % 2, sagittal
            assert coronal["matrix_x"] % 2 == coronal["matrix_y"] % 2, coronal
            assert abs(sagittal["pixel_spacing_x"] - sagittal["pixel_spacing_y"]) < 1e-3, sagittal
            assert abs(coronal["pixel_spacing_x"] - coronal["pixel_spacing_y"]) < 1e-3, coronal
        else:
            raise ValueError(f"Unknown scenario: {scenario}")

        print(f"{scenario} metadata assertions passed for {output_path}")
        """))' "$output_path" "$scenario"
      }        


      ## Test vesselboost on it's own:
      python test_time_adaptation.py --ds_path "/root/Desktop/eval_data/" --out_path "/root/Desktop/eval_out/" --pretrained "./saved_models/Init_ep1000_lr1e3_tver" --ep 2000 --prep_mode 4

      test_time_adaptation.py --ds_path tof_input --out_path tof_output --pretrained /opt/VesselBoost/saved_models/manual_0429 --ep 100 --prep_mode 4

      chmod a+x angiboost.py
      mkdir tof_input
      cp /data/tof.nii tof_input
      mkdir tof_output
      angiboost.py --ds_path tof_input --out_path tof_output --lb_path init_label --pretrained /opt/VesselBoost/saved_models/manual_0429 --outmo tof_output/outmo --ep 100 --lr 0.05 --prep_mode 4

  - name: OpenRecon output metadata contract
    script: |
      python3 - <<'PY'
      import base64
      import importlib.util
      import sys
      from pathlib import Path

      import ismrmrd
      import numpy as np

      wrapper_path = Path("/opt/code/python-ismrmrd-server/vesselboost.py")
      spec = importlib.util.spec_from_file_location("vesselboost", wrapper_path)
      module = importlib.util.module_from_spec(spec)
      sys.modules["vesselboost"] = module
      spec.loader.exec_module(module)

      def first(value):
          return value[0] if isinstance(value, list) else value

      def make_minihead(series_name, series_uid, sop_uid, source_type, index):
          minihead_text = "\n".join(
              [
                  f'<ParamString."SeriesDescription">\t{{ "{series_name}" }}',
                  f'<ParamString."SequenceDescription">\t{{ "{series_name}" }}',
                  f'<ParamString."ProtocolName">\t{{ "{series_name}" }}',
                  f'<ParamString."SeriesNumberRangeNameUID">\t{{ "{series_name}" }}',
                  f'<ParamString."SeriesInstanceUID">\t{{ "{series_uid}" }}',
                  f'<ParamString."SOPInstanceUID">\t{{ "{sop_uid}" }}',
                  f'<ParamString."ImageType">\t{{ "ORIGINAL\\PRIMARY\\M\\{source_type}" }}',
                  '<ParamString."ImageTypeValue3">\t{ "M" }',
                  '<ParamString."ComplexImageComponent">\t{ "MAGNITUDE" }',
                  '<ParamArray."ImageTypeValue4">\t{',
                  f'\t{{ "{source_type}" }}',
                  '}',
                  '<ParamLong."Actual3DImagePartNumber">\t{ 9 }',
                  '<ParamLong."AnatomicalPartitionNo">\t{ 9 }',
                  f'<ParamLong."AnatomicalSliceNo">\t{{ {index + 10} }}',
                  f'<ParamLong."ChronSliceNo">\t{{ {index + 20} }}',
                  f'<ParamLong."NumberInSeries">\t{{ {index + 30} }}',
                  f'<ParamLong."ProtocolSliceNumber">\t{{ {index + 40} }}',
                  f'<ParamLong."SliceNo">\t{{ {index + 50} }}',
              ]
          ) + "\n"
          return base64.b64encode(minihead_text.encode("utf-8")).decode("ascii")

      def make_source(index):
          image = ismrmrd.Image.from_array(
              np.ones((1, 1, 4, 4), dtype=np.float32) * (index + 1),
              transpose=False,
          )
          header = image.getHead()
          header.image_type = ismrmrd.IMTYPE_MAGNITUDE
          header.image_series_index = 1
          header.image_index = index + 1
          header.slice = index
          header.position = (0.0, 0.0, float(index))
          header.read_dir = (1.0, 0.0, 0.0)
          header.phase_dir = (0.0, 1.0, 0.0)
          header.slice_dir = (0.0, 0.0, 1.0)
          header.field_of_view = (4.0, 4.0, 2.0)
          image.setHead(header)

          meta = ismrmrd.Meta()
          meta["SeriesDescription"] = "tof_fl3d_tra"
          meta["SequenceDescription"] = "tof_fl3d_tra"
          meta["ProtocolName"] = "tof_fl3d_tra"
          meta["SeriesNumberRangeNameUID"] = "tof_fl3d_tra"
          meta["SeriesInstanceUID"] = "1.2.3.4"
          meta["SOPInstanceUID"] = f"1.2.3.4.{index + 1}"
          meta["ImageTypeValue4"] = "TOF"
          meta["IceMiniHead"] = make_minihead(
              "tof_fl3d_tra",
              "1.2.3.4",
              f"1.2.3.4.{index + 1}",
              "TOF",
              index,
          )
          image.attribute_string = meta.serialize()
          return image

      sources = [make_source(0), make_source(1)]
      source_identity = module._resolve_source_series_identity(
          module._meta_from_image(sources[0])
      )
      segmentation_identity = module._build_openrecon_output_identity(
          source_identity,
          series_index=2,
      )

      outputs = []
      for index, source_image in enumerate(sources):
          output = ismrmrd.Image.from_array(
              np.asarray(source_image.data, dtype=np.int16),
              transpose=False,
          )
          output.setHead(source_image.getHead())
          module._stamp_vesselboost_output_image(
              output,
              source_image,
              segmentation_identity,
              source_identity,
              2,
              index,
              source_identity["source_type_token"],
              ["PYTHON", "VESSELBOOST"],
              extra_meta=module._explicit_header_geometry_meta(output.getHead()),
          )
          outputs.append(output)

      reformat_identity = module._build_openrecon_output_identity(
          source_identity,
          orientation="sagittal",
          series_index=3,
      )
      reformat = ismrmrd.Image.from_array(np.ones((1, 1, 4, 4), dtype=np.int16), transpose=False)
      reformat.setHead(sources[0].getHead())
      extra_meta = {
          "partition_count": "1",
          "slice_count": "1",
      }
      extra_meta.update(module._explicit_header_geometry_meta(reformat.getHead()))
      module._stamp_vesselboost_output_image(
          reformat,
          sources[0],
          reformat_identity,
          source_identity,
          3,
          0,
          source_identity["source_type_token"],
          ["PYTHON", "VESSELBOOST", "RESLICE_SAGITTAL"],
          extra_meta=extra_meta,
          keep_image_geometry=0,
          patch_minihead=False,
      )
      outputs.append(reformat)

      module._validate_vesselboost_output_contract(
          outputs,
          [1],
          source_identity,
          "unit smoke",
      )
      meta = ismrmrd.Meta.deserialize(outputs[0].attribute_string)
      minihead_text = base64.b64decode(first(meta.get("IceMiniHead"))).decode("utf-8")
      assert first(meta.get("SeriesDescription")) == "tof_fl3d_tra_vesselboost_segmentation"
      assert first(meta.get("SequenceDescriptionAdditional")) == "openrecon"
      assert first(meta.get("SeriesInstanceUID")).startswith("2.25.")
      assert first(meta.get("SOPInstanceUID")).startswith("2.25.")
      assert module._extract_minihead_long_value(minihead_text, "SliceNo") == 0
      assert (
          module._extract_minihead_long_value(
              '<ParamLong."EmptyLong">\t{ }',
              "EmptyLong",
          )
          is None
      )
      patched_minihead, changed = module._replace_or_append_minihead_long_param(
          '<ParamLong."EmptyLong">\t{ }',
          "EmptyLong",
          7,
      )
      assert changed
      assert patched_minihead.count('ParamLong."EmptyLong"') == 1
      assert module._extract_minihead_long_value(patched_minihead, "EmptyLong") == 7
      assert module._extract_minihead_array_tokens(minihead_text, "ImageTypeValue4") == [
          "vesselboost_segmentation"
      ]
      reformat_meta = ismrmrd.Meta.deserialize(reformat.attribute_string)
      assert not first(reformat_meta.get("IceMiniHead"))
      assert first(reformat_meta.get("Keep_image_geometry")) == "0"
      assert first(reformat_meta.get("slice_count")) == "1"
      assert module.OPENRECON_DEFAULTS["sendoriginal"] is True
      PY