name: vesselboost
version: 2.0.11
copyright:
  - license: MIT
    url: https://github.com/stebo85/VesselBoost/blob/memory_optimizations/LICENSE
architectures:
  - x86_64
variables:
  vesselboost_branch: fix-brain-extraction
  vesselboost_source_version: 2.0.1
  vesselboost_archive_url: "https://github.com/stebo85/VesselBoost/archive/refs/heads/{{ context.vesselboost_branch }}.zip"
  synthstrip_weights_url: "https://surfer.nmr.mgh.harvard.edu/docs/synthstrip/requirements/synthstrip.1.pt"
files:
  - name: vesselboost_zip
    url: "{{ context.vesselboost_archive_url }}"
  - name: synthstrip_weights
    url: "{{ context.synthstrip_weights_url }}"
build:
  kind: neurodocker
  base-image: pytorch/pytorch:2.4.1-cuda11.8-cudnn9-runtime
  pkg-manager: apt
  directives:
    - deploy:
        bins:
          - python
    - environment:
        DEBIAN_FRONTEND: noninteractive
    - install: bzip2 ca-certificates git unzip build-essential
    - include: macros/openrecon/neurodocker.yaml
    - workdir: /opt
    - run:
        - unzip -q {{ get_file("vesselboost_zip") }} -d /opt
        - mv /opt/VesselBoost-* /opt/VesselBoost
        - cd /opt/VesselBoost
        - chmod a+x train.py angiboost.py boost.py prediction.py test_time_adaptation.py
    - workdir: /opt/VesselBoost/
    - run:
        - ls -a
        - sed -i "s/scikit-learn==1.1.1/scikit-learn==1.2.2/" requirements.txt || true
        - sed -i -E '/^[[:space:]]*(torch|torchvision|torchaudio)[[:space:]]*==/d' requirements.txt
        - sed -i '/^[[:space:]]*--extra-index-url[[:space:]]\+https:\/\/download\.pytorch\.org\/whl\/cu124[[:space:]]*$/d' requirements.txt
        - sed -i 's|\.\./saved_models/|/opt/VesselBoost/saved_models/|g' library/synthstrip_utils.py
        - pip install --prefer-binary --no-cache-dir -r requirements.txt
    - workdir: /opt/VesselBoost/saved_models
    - run:
        - cp {{ get_file("synthstrip_weights") }} synthstrip.1.pt
    - run:
        - osf -p abk4p fetch osfstorage/pretrained_models/manual_0429
    - run:
        - osf -p abk4p fetch osfstorage/pretrained_models/omelette1_0429
    - run:
        - osf -p abk4p fetch osfstorage/pretrained_models/omelette2_0429
    - run:
        - osf -p abk4p fetch osfstorage/pretrained_models/t2s_mod_ep1k2_0728
    - workdir: /opt/VesselBoost/
    - environment:
        PATH: $PATH:/opt/VesselBoost/
        VESSELBOOST_HOME: /opt/VesselBoost
    - copy: vesselboost.py /opt/code/python-ismrmrd-server/vesselboost.py
    - copy: nifti2mrd.py /opt/code/python-ismrmrd-server/nifti2mrd.py

readme: |2-
    ----------------------------------
    ## Vesselboost/{{ context.version }} ##
    This container provides VesselBoost {{ context.vesselboost_source_version }} from the latest `{{ context.vesselboost_branch }}` branch.

    Example:
    ```
    prediction.py --image_path $path_to_images --output_path $path_to_output --pretrained $path_to_pretrained_model --prep_mode 4
    ```

    More documentation can be found here: https://github.com/stebo85/VesselBoost/tree/{{ context.vesselboost_branch }}

    To run applications outside of this container: ml vesselboost/{{ context.version }}

    ----------------------------------
categories:
  - image segmentation
icon: data:image/png;base64,
