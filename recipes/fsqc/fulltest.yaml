# fsqc container test suite
# Minimal no-rebuild verification for the installed fsqc Conda environment.

name: fsqc
version: 2.1.4
container: fsqc_2.1.4.simg

test_data:
  output_dir: test_output

setup:
  script: |
    #!/usr/bin/env bash
    set -e
    mkdir -p ${output_dir}

tests:
  - name: fsqc env Python runtime
    description: Verify the named fsqc Conda environment is usable
    command: bash -lc "source /opt/miniconda-latest/etc/profile.d/conda.sh && conda activate fsqc && python --version"
    expected_output_contains: "Python 3.13.12"

  - name: fsqc package metadata
    description: Verify the installed fsqc package metadata from the active env
    command: bash -lc "source /opt/miniconda-latest/etc/profile.d/conda.sh && conda activate fsqc && python -m pip show fsqc 2>&1 | sed -n '1,12p'"
    expected_output_contains: "Author-email: Kersten Diers <kersten.diers@dzne.de>, Martin Reuter <martin.reuter@dzne.de>"

  - name: fsqc system info CLI
    description: Verify the fsqc console script works from the active env
    command: bash -lc "source /opt/miniconda-latest/etc/profile.d/conda.sh && conda activate fsqc && fsqc-sys_info | sed -n '1,12p'"
    expected_output_contains: "fsqc:                     2.1.8.dev0"

  - name: run_fsqc help
    description: Verify the main run_fsqc entrypoint is installed and usable
    command: bash -lc "source /opt/miniconda-latest/etc/profile.d/conda.sh && conda activate fsqc && run_fsqc --help | sed -n '1,20p'"
    expected_output_contains: "usage: run_fsqc --subjects_dir <directory> --output_dir <directory>"

  - name: fsqc module install location
    description: Verify the module imports from the named Conda env site-packages tree
    command: bash -lc "source /opt/miniconda-latest/etc/profile.d/conda.sh && conda activate fsqc && python -c 'import fsqc; print(fsqc.__file__)'"
    expected_output_contains: "/opt/miniconda-latest/envs/fsqc/lib/python3.13/site-packages/fsqc/__init__.py"
