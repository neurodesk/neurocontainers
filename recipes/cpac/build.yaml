name: cpac
version: 1.8.7

copyright:
  - license: LGPL-3.0
    url: https://github.com/FCP-INDI/C-PAC/blob/main/COPYING.LESSER

architectures:
  - x86_64

build:
  kind: neurodocker

  base-image: fcpindi/c-pac:release-v{{ context.version }}.post1.dev3
  pkg-manager: apt

  directives:
    - copy: cpac-run /usr/local/bin/cpac-run
    - run:
        - chmod +x /usr/local/bin/cpac-run
        - pip install "setuptools<81"
  add-default-template: false
  add-tzdata: false

deploy:
  bins:
    - cpac
    - cpac-run

categories:
  - functional imaging
  - workflows
  - bids apps

files:
  - name: cpac-run
    contents: |
      #!/usr/bin/env bash
      set -e
      exec /code/run-with-freesurfer.sh "$@"

icon: https://fcp-indi.github.io/images/cpac_logo.svg

readme: |
  ## cpac/{{ context.version }} ##

  ## C-PAC (Configurable Pipeline for the Analysis of Connectomes)

  C-PAC is a configurable, open-source, Nipype-based automated processing pipeline for resting-state fMRI data. It combines tools from packages such as AFNI, FSL, and ANTs for preprocessing, quality control, and functional connectivity analysis.

  Repository: [C-PAC GitHub](https://github.com/FCP-INDI/C-PAC)

  BIDS App example:
  ```
  cpac-run /path/to/bids_dir \
    /path/to/output_dir \
    participant \
    --preconfig default \
    --participant-label <label>
  ```

  C-PAC CLI utilities are available through the `cpac` command:
  ```
  cpac version
  cpac utils pipe_config new-template
  ```

  To run the container outside of this environment: `ml cpac/{{ context.version }}`

  More documentation can be found here: https://fcp-indi.github.io/docs/latest/

  Citation:
  ```
  Craddock, R. C., Sikka, S., Cheung, B., Khanuja, R., Ghosh, S. S., Yan, C., ... & Milham, M. P. (2013). Towards automated analysis of connectomes: The configurable pipeline for the analysis of connectomes (C-PAC). Frontiers in Neuroinformatics, 7, 42. doi:10.3389/fninf.2013.00042.
  ```

  Please also cite the Zenodo DOI for the version you're referencing.

  License: GNU Lesser General Public License v3.0

  License details: https://github.com/FCP-INDI/C-PAC/blob/main/COPYING.LESSER
