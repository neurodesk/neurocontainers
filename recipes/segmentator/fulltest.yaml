# segmentator container test suite
name: segmentator
version: 1.6.1
container: segmentator_1.6.1_20260519.simg

test_data:
  output_dir: test_output

setup:
  script: |
    #!/usr/bin/env bash
    set -e
    mkdir -p ${output_dir}

tests:
  - name: Segmentator command line help
    command: segmentator --help
    expected_output_contains: "Path to input"

  - name: Segmentator filters help
    command: segmentator_filters --help
    expected_output_contains: "Path to input"

  - name: Segmentator Python imports
    command: python -c "from importlib.metadata import version; import segmentator, nibabel, scipy, compoda; from segmentator.deriche_3D import deriche_3D; print(version('segmentator'))"
    expected_output_contains: "1.6.1"

  - name: Segmentator no-GUI histogram smoke test
    command: |
      tmpdir="$(mktemp -d)"
      cd "${tmpdir}"
      python - <<'PY'
      import numpy as np
      import nibabel as nib

      data = np.arange(64, dtype=np.float32).reshape((4, 4, 4))
      nib.save(nib.Nifti1Image(data, np.eye(4)), "synthetic.nii.gz")
      PY
      MPLBACKEND=Agg segmentator synthetic.nii.gz --nogui --gramag numpy
      test -f synthetic_volHist_pcMax97pt5_pcMin2pt5_sc400.npy
