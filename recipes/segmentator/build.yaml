name: segmentator
version: 1.6.1

copyright:
  - license: BSD-3-Clause
    url: https://github.com/ofgulban/segmentator?tab=BSD-3-Clause-1-ov-file

architectures:
  - x86_64
  - aarch64

structured_readme:
  description: |-
    Segmentator is a free and open-source package for multi-dimensional data exploration and segmentation of 3D images, mainly developed and tested with ultra-high-field MRI brain data.
  example: |-
    segmentator --help
    segmentator_filters --help
    segmentator /path/to/file.nii.gz
  documentation: https://github.com/ofgulban/segmentator/wiki
  citation: |-
    Gulban, O. F., Schneider, M., Marquardt, I., Haast, R., & De Martino, F. (2023). A scalable method to improve gray matter segmentation at ultra high field MRI. In (Version v{{ context.version }}) Zenodo.
    Gulban, O. F., Schneider, M., Marquardt, I., Haast, R. A. M., & De Martino, F. (2018). A scalable method to improve gray matter segmentation at ultra high field MRI. PLoS One, 13(6), e0198335. https://doi.org/10.1371/journal.pone.0198335

build:
  kind: neurodocker
  base-image: ubuntu:24.04
  pkg-manager: apt
  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive

    - install:
        - build-essential
        - ca-certificates
        - libgl1
        - libice6
        - libsm6
        - libxext6
        - libxrender1

    - template:
        name: miniconda
        version: py310_25.5.1-0
        install_path: /opt/miniconda
        env_name: segmentator
        env_exists: "false"
        conda_install: "python=3.10 numpy=1.23.5 scipy matplotlib nibabel scikit-image=0.19 tk pip setuptools<81"
        pip_install: compoda==0.3.5
        mamba: true

    - environment:
        PATH: /opt/miniconda/envs/segmentator/bin:$PATH

    - workdir: /opt

    - run:
        - mkdir -p /opt/segmentator
        - tar -xzf {{ get_file("segmentator_source") }} -C /opt/segmentator --strip-components=1
        - python -m pip install --no-build-isolation --no-deps -e /opt/segmentator
        - python -c "from importlib.metadata import version; import segmentator, compoda; from segmentator.deriche_3D import deriche_3D; print(version('segmentator'))"

deploy:
  path: []
  bins:
    - segmentator
    - segmentator_filters

icon: data:image/png;base64,
readme: |-
  ----------------------------------
  ## segmentator/{{ context.version }} ##

  Segmentator is a free and open-source package for multi-dimensional data exploration and segmentation of 3D images, mainly developed and tested with ultra-high-field MRI brain data.

  Example:
  ```
  segmentator --help
  segmentator_filters --help
  segmentator /path/to/file.nii.gz
  ```

  More documentation can be found here: https://github.com/ofgulban/segmentator/wiki

  Citation:
  ```
  Gulban, O. F., Schneider, M., Marquardt, I., Haast, R., & De Martino, F. (2023). A scalable method to improve gray matter segmentation at ultra high field MRI. In (Version v{{ context.version }}) Zenodo.
  Gulban, O. F., Schneider, M., Marquardt, I., Haast, R. A. M., & De Martino, F. (2018). A scalable method to improve gray matter segmentation at ultra high field MRI. PLoS One, 13(6), e0198335. https://doi.org/10.1371/journal.pone.0198335
  ```

  To run container outside of this environment: ml segmentator/{{ context.version }}

  ----------------------------------
categories:
  - structural imaging
  - image segmentation

files:
  - name: segmentator_source
    url: https://github.com/ofgulban/segmentator/archive/refs/tags/v{{ context.version }}.tar.gz
