name: totalsegmentator
version: 2.5.0
copyright:
  - license: Apache-2.0
    url: https://github.com/wasserth/TotalSegmentator?tab=Apache-2.0-1-ov-file
architectures:
  - x86_64
structured_readme:
  description: "Tool for segmentation of most major anatomical structures in any CT or MR image. It was trained on a wide range of different CT and MR images (different scanners, institutions, protocols,...) and therefore works well on most images. A large part of the training dataset can be downloaded here: CT dataset (1228 subjects) and MR dataset (616 subjects). You can also try the tool online at totalsegmentator.com or as 3D Slicer extension."
  example: |-
    # Example usage

    ```bash
    TotalSegmentator -i mri.nii.gz -o segmentations --task total_mr

    ```
  documentation: |-
    This container includes:
    - Python 3.13 via Miniconda
    - The Python package from https://github.com/wasserth/TotalSegmentator
    - Additional conda packages: none
    - Additional pip packages: none
    - Deployed binaries: none

    For detailed package documentation, see: https://github.com/wasserth/TotalSegmentator
  citation: "Wasserthal, J., Breit, H.-C., Meyer, M.T., Pradella, M., Hinck, D., Sauter, A.W., Heye, T., Boll, D., Cyriac, J., Yang, S., Bach, M., Segeroth, M., 2023. TotalSegmentator: Robust Segmentation of 104 Anatomic Structures in CT Images. Radiology: Artificial Intelligence. https://doi.org/10.1148/ryai.230024"
readme: |-
  ----------------------------------
  ## totalsegmentator/{{ context.version }} ##

  Tool for segmentation of most major anatomical structures in any CT or MR image. It was trained on a wide range of different CT and MR images (different scanners, institutions, protocols,...) and therefore works well on most images. A large part of the training dataset can be downloaded here: CT dataset (1228 subjects) and MR dataset (616 subjects). You can also try the tool online at totalsegmentator.com or as 3D Slicer extension.

  Example:
  ```
  # Example usage

  ```bash
  TotalSegmentator -i mri.nii.gz -o segmentations --task total_mr

  ```
  ```

  More documentation can be found here: This container includes:
  - Python 3.13 via Miniconda
  - The Python package from https://github.com/wasserth/TotalSegmentator
  - Additional conda packages: none
  - Additional pip packages: none
  - Deployed binaries: none

  For detailed package documentation, see: https://github.com/wasserth/TotalSegmentator

  Citation:
  ```
  Wasserthal, J., Breit, H.-C., Meyer, M.T., Pradella, M., Hinck, D., Sauter, A.W., Heye, T., Boll, D., Cyriac, J., Yang, S., Bach, M., Segeroth, M., 2023. TotalSegmentator: Robust Segmentation of 104 Anatomic Structures in CT Images. Radiology: Artificial Intelligence. https://doi.org/10.1148/ryai.230024
  ```

  To run container outside of this environment: ml totalsegmentator/{{ context.version }}

  ----------------------------------
build:
  kind: neurodocker
  base-image: ubuntu:24.04
  pkg-manager: apt
  directives:
    - template:
        name: miniconda
        version: latest
        conda_install: python=3.12
        pip_install: setuptools TotalSegmentator torch torchvision
    - deploy:
        bins: []
    - test:
        name: verify_installation
        script: |-
          # Test Python and conda installation
          python --version
          conda --version
          # Test that pip packages were installed
          python -c "import sys; print('Python path:', sys.path)"
          pip list | grep -i "totalsegmentator" || echo "Warning: totalsegmentator not found in pip list"
          # Attempt to import the main package
          python -c "
          import importlib.util
          import sys

          # Try common package name variations
          package_names = ['totalsegmentator', 'totalsegmentator', 'totalsegmentator']
          imported = False

          for pkg_name in package_names:
              try:
                  __import__(pkg_name)
                  print(f'Successfully imported {pkg_name}')
                  imported = True
                  break
              except ImportError:
                  continue

          if not imported:
              print('Warning: Could not import main package. This may be normal if the package has a different import name.')
              print('Available packages:')
              import pkg_resources
              for dist in pkg_resources.working_set:
                  if 'totalsegmentator' in dist.project_name.lower():
                      print(f'  - {dist.project_name} ({dist.version})')
          else:
              print('Package installation verified successfully!')
          "
    - deploy:
        path: []
        bins: 
          - TotalSegmentator
          - totalseg_combine_masks
          - totalseg_download_weights
          - crop_to_body
    - test:
        name: Simple Deploy Bins/Path Test
        builtin: test_deploy.sh
categories:
  - image segmentation
icon: data:image/png;base64,
