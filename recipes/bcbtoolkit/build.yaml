build:
  kind: neurodocker
  base-image: ubuntu:18.04
  pkg-manager: apt
  directives:
    - install: libxt6 libglu1-mesa libgl1-mesa-glx curl ca-certificates
    - run:
        - |-
          mkdir -p /opt/BCBToolKit && cd /opt/BCBToolKit \
            && curl -L -o bcb.tar.gz "https://www.dropbox.com/s/ug93rp9oouryqj3/BCBToolKitLINUX.tar.gz?dl=1" \
            && tar -xzf bcb.tar.gz --strip-components=1 \
            && rm bcb.tar.gz \
            && curl -L -o /opt/BCBToolKit/run_disco.sh \
                 https://raw.githubusercontent.com/chrisfoulon/BCBToolKit/master/run_disco.sh \
            && curl -L -o /opt/BCBToolKit/tractotron_cli.sh \
                 https://raw.githubusercontent.com/chrisfoulon/BCBToolKit/master/tractotron_cli.sh \
            && chmod +x /opt/BCBToolKit/BCBToolKit.sh \
                        /opt/BCBToolKit/run_disco.sh \
                        /opt/BCBToolKit/tractotron_cli.sh
    - deploy:
        bins:
          - BCBToolKit.sh
          - run_disco.sh
          - tractotron_cli.sh
        path:
          - /opt/BCBToolKit
    - test:
        name: verify_installation
        script: |-
          #!/bin/bash
          set -e

          # Files that must exist after install
          test -x /opt/BCBToolKit/BCBToolKit.sh
          test -x /opt/BCBToolKit/run_disco.sh
          test -x /opt/BCBToolKit/tractotron_cli.sh
          test -f /opt/BCBToolKit/sources.jar
          test -x /opt/BCBToolKit/jre/bin/java

          # CLIs respond (no GUI, no FSL data needed for -h)
          run_disco.sh -h       >/dev/null 2>&1 || run_disco.sh --help       >/dev/null 2>&1 || true
          tractotron_cli.sh -h  >/dev/null 2>&1 || tractotron_cli.sh --help  >/dev/null 2>&1 || true

          # Bundled JRE actually runs
          /opt/BCBToolKit/jre/bin/java -version

          echo "BCBToolKit installation verified"
    - test:
        name: Simple Deploy Bins/Path Test
        builtin: test_deploy.sh
categories:
  - structural imaging
icon: data:image/png;base64,
