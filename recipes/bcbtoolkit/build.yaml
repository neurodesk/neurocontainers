    url: https://github.com/chrisfoulon/BCBToolKit?tab=BSD-3-Clause-1-ov-file
architectures:
  - x86_64
structured_readme:
  description: |-
    Tools to indirectly assess brain disconnections from lesion masks in MNI
    space. Provides disconnectome maps (run_disco.sh), Tractotron probability
    of disconnection (tractotron_cli.sh), and a Java GUI launcher
    (BCBToolKit.sh). Bundles a stripped FSL plus a Java runtime — there is no
    Python package to import. Includes the HCP-1065 probabilistic tract atlas
    (64 tracts, 2mm MNI152) at /opt/BCBToolKit/Tools/HCP1065/prob.
  example: |-
    # Disconnectome maps from a folder of MNI-space lesion masks
    run_disco.sh -l /data/lesions -o /data/disco_out

    # Or in BIDS mode — discovers *lesion*.nii.gz under any anat/ dir
    run_disco.sh -B /data/bids_root

    # Custom filename pattern (e.g. Linda's "Lesion_in_MNI.nii.gz")
    run_disco.sh -B /data/bids_root -p "Lesion_in_MNI.nii.gz"

    # Tractotron — probability of disconnection per individual tract
    tractotron_cli.sh -l /data/lesions -o /data/tractotron_out
    
    # Tractotron — using bundled HCP-1065 probabilistic tract atlas (2mm MNI)
    # Reslice lesion to 2mm first if it's in 1mm space
    tractotron_cli.sh -l /data/lesions_2mm -t /opt/BCBToolKit/Tools/HCP1065/prob -o /data/tractotron_out

    # Java GUI (requires X forwarding)
    BCBToolKit.sh
  documentation: https://www.dropbox.com/scl/fi/crlns14gd7flckow067ig/USER_MANUALBCB.pdf?rlkey=49vnztok9brqaa769d42zey2w&e=1&dl=0
  citation: |-
    Foulon C. et al. (2018) Advanced lesion symptom mapping analyses and implementation as BCBtoolkit. GigaScience 7, 1–17.
    Thiebaut de Schotten M. et al. (2014) Damage to white matter pathways in subacute and chronic spatial neglect: a group study and 2 single-case studies with complete virtual "in vivo" tractography dissection. Cereb Cortex 24, 691–706.
    Thiebaut de Schotten M. et al. (2011) Atlasing location, asymmetry and inter-subject variability of white matter tracts in the human brain with MR diffusion tractography. Neuroimage 54, 49–59.
    Thiebaut de Schotten M. et al. (2012) Monkey to human comparative anatomy of the frontal lobe association tracts. Cortex 48, 82–96.
    Catani M. et al. (2012) Short frontal lobe connections of the human brain. Cortex 48, 273–291.
readme: |-
  ----------------------------------
  ## bcbtoolkit/{{ context.version }} ##

  Tools to indirectly assess brain disconnections from lesion masks in MNI
  space. Provides disconnectome maps (run_disco.sh), Tractotron probability
  of disconnection (tractotron_cli.sh), and a Java GUI launcher
  (BCBToolKit.sh). Bundles a stripped FSL plus a Java runtime — there is no
  Python package to import. Includes the HCP-1065 probabilistic tract atlas
  (64 tracts, 2mm MNI152) at /opt/BCBToolKit/Tools/HCP1065/prob.

  Example:
  ```bash
  # Disconnectome maps from a folder of MNI-space lesion masks
  run_disco.sh -l /data/lesions -o /data/disco_out

  # Or in BIDS mode — discovers *lesion*.nii.gz under any anat/ dir
  run_disco.sh -B /data/bids_root

  # Custom filename pattern (e.g. Linda's "Lesion_in_MNI.nii.gz")
  run_disco.sh -B /data/bids_root -p "Lesion_in_MNI.nii.gz"

  # Tractotron — probability of disconnection per individual tract
  tractotron_cli.sh -l /data/lesions -o /data/tractotron_out

  # Tractotron — using bundled HCP-1065 probabilistic tract atlas (2mm MNI)
  # Reslice lesion to 2mm first if it's in 1mm space
  tractotron_cli.sh -l /data/lesions_2mm -t /opt/BCBToolKit/Tools/HCP1065/prob -o /data/tractotron_out

  # Java GUI (requires X forwarding)
  BCBToolKit.sh
  ```

  More documentation: https://www.dropbox.com/scl/fi/crlns14gd7flckow067ig/USER_MANUALBCB.pdf?rlkey=49vnztok9brqaa769d42zey2w&e=1&dl=0

  Citation:
  ```
  Foulon C. et al. (2018) Advanced lesion symptom mapping analyses and implementation as BCBtoolkit. GigaScience 7, 1–17.
  Thiebaut de Schotten M. et al. (2014) Damage to white matter pathways in subacute and chronic spatial neglect: a group study and 2 single-case studies with complete virtual "in vivo" tractography dissection. Cereb Cortex 24, 691–706.
  Thiebaut de Schotten M. et al. (2011) Atlasing location, asymmetry and inter-subject variability of white matter tracts in the human brain with MR diffusion tractography. Neuroimage 54, 49–59.
  Thiebaut de Schotten M. et al. (2012) Monkey to human comparative anatomy of the frontal lobe association tracts. Cortex 48, 82–96.
  Catani M. et al. (2012) Short frontal lobe connections of the human brain. Cortex 48, 273–291.
  ```

  To run container outside of this environment: ml bcbtoolkit/{{ context.version }}

  ----------------------------------
files:
  - name: bcbtoolkit_archive
    url: https://www.dropbox.com/s/ug93rp9oouryqj3/BCBToolKitLINUX.tar.gz?dl=1
  - name: run_disco_sh
    url: https://raw.githubusercontent.com/chrisfoulon/BCBToolKit/master/run_disco.sh
  - name: tractotron_cli_sh
    url: https://raw.githubusercontent.com/chrisfoulon/BCBToolKit/master/tractotron_cli.sh
  - name: hcp_atlas_zip
    url: https://github.com/data-others/atlas/releases/download/hcp1065/hcp1065_prob_coverage_nifti.zip
build:
  kind: neurodocker
  base-image: ubuntu:18.04
  pkg-manager: apt
  directives:
    - install: libxt6 libxrender1 libxtst6 libxi6 libglu1-mesa libgl1-mesa-glx curl ca-certificates unzip

    # ---------------------------------------------------------------------
    # Bundled-FSL environment.
    #
    # BCBToolKit ships a stripped FSL split across two trees:
    #   /opt/BCBToolKit/Tools/binaries/   (fslhd, flirt, fslmaths, track_vis…)
    #   /opt/BCBToolKit/Tools/libraries/  (libfslio.so, libniftiio.so, …)
    #
    # Without these three vars set, every internal FSL call fails with either
    # "libfslio.so: cannot open shared object file" or "FSLOUTPUTTYPE not set".
    # The disco/tractotron pipelines do not check exit codes from their inner
    # FSL calls, so they silently produce no output while still reporting
    # "Completed successfully". These ENVs are the fix.
    # ---------------------------------------------------------------------
    - environment:
        FSLDIR: /opt/BCBToolKit/Tools/binaries
        LD_LIBRARY_PATH: /opt/BCBToolKit/Tools/libraries/lib
        FSLOUTPUTTYPE: NIFTI_GZ
        BCBTOOLKIT_ROOT: /opt/BCBToolKit

    # The BCBToolKitLINUX.tar.gz from Dropbox is missing
    # Tools/extraFiles/nulldeform.mat, an identity 4x4 affine that
    # run_disco.sh feeds to flirt -applyxfm -init when it has to reslice
    # between the SPM 181x217x181 MNI grid and the FSL 182x218x182 MNI grid.
    # Without it, reslicing fails and downstream track_vis calls produce empty
    # output while the script can still report success.
    - run:
        - |-
          mkdir -p /opt/BCBToolKit && cd /opt/BCBToolKit \
            && cp {{ get_file("bcbtoolkit_archive") }} bcb.tar.gz \
            && tar --no-same-owner -xzf bcb.tar.gz --strip-components=1 \
            && rm bcb.tar.gz \
            && cp {{ get_file("run_disco_sh") }} /opt/BCBToolKit/run_disco.sh \
            && cp {{ get_file("tractotron_cli_sh") }} /opt/BCBToolKit/tractotron_cli.sh \
            && chmod +x /opt/BCBToolKit/BCBToolKit.sh \
                        /opt/BCBToolKit/run_disco.sh \
                        /opt/BCBToolKit/tractotron_cli.sh \
            && ln -sf /opt/BCBToolKit/run_disco.sh /usr/local/bin/run_disco.sh \
            && ln -sf /opt/BCBToolKit/tractotron_cli.sh /usr/local/bin/tractotron_cli.sh \
            && cp {{ get_file("hcp_atlas_zip") }} /tmp/hcp_atlas.zip \
            && mkdir -p /opt/BCBToolKit/Tools/HCP1065 \
            && unzip /tmp/hcp_atlas.zip -d /opt/BCBToolKit/Tools/HCP1065 \
            && rm /tmp/hcp_atlas.zip \
            && printf '%s\n' \
                 '1.000000 0.000000 0.000000 0.000000' \
                 '0.000000 1.000000 0.000000 0.000000' \
                 '0.000000 0.000000 1.000000 0.000000' \
                 '0.000000 0.000000 0.000000 1.000000' \
                 > /opt/BCBToolKit/Tools/extraFiles/nulldeform.mat \
            && chown -R root:root /opt/BCBToolKit \
            && chmod -R a+rX /opt/BCBToolKit \
            && rm -f /usr/local/bin/BCBToolKit.sh \
            && printf '%s\n' \
                 '#!/usr/bin/env bash' \
                 'cd /opt/BCBToolKit' \
                 'exec ./BCBToolKit.sh "$@"' \
                 > /usr/local/bin/BCBToolKit.sh \
            && chmod 0755 /usr/local/bin/BCBToolKit.sh
    - deploy:
        bins:
          - BCBToolKit.sh
          - run_disco.sh
          - tractotron_cli.sh
        path:
          - /opt/BCBToolKit

    - test:
        name: verify_installation
        script: |-
          #!/bin/bash
          set -euo pipefail

          # Core scripts must exist and be executable
          test -x /opt/BCBToolKit/BCBToolKit.sh \
              || { echo "BCBToolKit.sh not found or not executable"; exit 1; }
          test -x /opt/BCBToolKit/run_disco.sh \
              || { echo "run_disco.sh not found or not executable"; exit 1; }
          test -x /opt/BCBToolKit/tractotron_cli.sh \
              || { echo "tractotron_cli.sh not found or not executable"; exit 1; }

          # Identity transform required for MNI reslicing (not in upstream tarball)
          test -f /opt/BCBToolKit/Tools/extraFiles/nulldeform.mat \
              || { echo "nulldeform.mat missing — SPM<->FSL reslice will fail"; exit 1; }

          # Bundled FSL env vars must be set and FSLDIR must exist
          test -n "${FSLDIR:-}" \
              || { echo "FSLDIR not set in image"; exit 1; }
          test -n "${FSLOUTPUTTYPE:-}" \
              || { echo "FSLOUTPUTTYPE not set in image"; exit 1; }
          test -d "${FSLDIR}" \
              || { echo "FSLDIR does not exist: $FSLDIR"; exit 1; }

          # Upstream archive ships as uid/gid 1000 with restrictive group/other
          # permissions. Normal runtime users must still be able to traverse
          # bundled tools, libraries, the Java runtime, and data files.
          unreadable_path="$(find /opt/BCBToolKit \( -type d ! -perm -0005 -o -type f ! -perm -0004 \) -print -quit)"
          test -z "${unreadable_path}" \
              || { echo "BCBToolKit path is not world-readable/traversable: ${unreadable_path}"; exit 1; }

          blocked_exec="$(find /opt/BCBToolKit -type f -perm /0111 ! -perm -0001 -print -quit)"
          test -z "${blocked_exec}" \
              || { echo "BCBToolKit executable is not world-executable: ${blocked_exec}"; exit 1; }

          test ! -L /usr/local/bin/BCBToolKit.sh \
              || { echo "BCBToolKit launcher must be a wrapper, not a symlink"; exit 1; }
          grep -q '/opt/BCBToolKit' /usr/local/bin/BCBToolKit.sh \
              || { echo "BCBToolKit launcher does not enter /opt/BCBToolKit"; exit 1; }

          runtime_check="$(mktemp /tmp/bcb-runtime-check.XXXXXX)"
          trap 'rm -f "${runtime_check}"' EXIT
          cat > "${runtime_check}" <<'EOF'
          #!/bin/bash
          set -euo pipefail
          test -x /opt/BCBToolKit/Tools/binaries/bin/fslmaths
          test -x /opt/BCBToolKit/jre/bin/java
          test -r /opt/BCBToolKit/sources.jar

          # The Java GUI loads libawt_xawt.so, which needs system X11
          # libraries such as libXrender.so.1.
          awt_ldd="$(
              LD_LIBRARY_PATH="/opt/BCBToolKit/jre/lib/amd64:/opt/BCBToolKit/jre/lib/amd64/server:${LD_LIBRARY_PATH:-}" \
                  ldd /opt/BCBToolKit/jre/lib/amd64/libawt_xawt.so
          )"
          if echo "${awt_ldd}" | grep -q "not found"; then
              echo "${awt_ldd}"
              exit 1
          fi

          BCBTOOLKIT_ROOT=/opt/BCBToolKit run_disco.sh -l /tmp/nope -o /tmp/out 2>&1 |
              grep -q "neither an existing file nor directory"
          EOF
          chmod 0755 "${runtime_check}"

          if [ "$(id -u)" -eq 0 ]; then
              if command -v runuser >/dev/null 2>&1; then
                  runuser -u nobody -- "${runtime_check}"
              else
                  su -s /bin/bash nobody -c "${runtime_check}"
              fi
          else
              "${runtime_check}"
          fi

          echo "=== /opt/BCBToolKit contents ==="
          ls /opt/BCBToolKit/
          echo "BCBToolKit installation verified"
    - test:
        name: Simple Deploy Bins/Path Test
        builtin: test_deploy.sh
categories:
  - structural imaging
icon: data:image/png;base64,
