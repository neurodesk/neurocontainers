name: lcmodel
version: "6.3"
icon: data:image/svg+xml;base64,

architectures:
  - x86_64

variables:
  lcm_64_url: https://www.lcmodel.com/pub/LCModel/programs/lcm-64.tar
  basis_3t_url: https://www.s-provencher.com/pub/LCModel/3t.zip
  basis_1_5t_url: https://www.s-provencher.com/pub/LCModel/1.5t.zip
  basis_7t_url: https://www.s-provencher.com/pub/LCModel/7t.zip
  basis_9_4t_url: https://www.s-provencher.com/pub/LCModel/9.4t.zip
  basisset_lcmodel_url: https://www.ismrm.org/workshops/Spectroscopy16/mrs_fitting_challenge/basisset_LCModel.zip
  raw_basis_4000_url: https://juchem.bme.columbia.edu/sites/default/files/2021-01/RawBasis_for_sLASERSiemens_TE_20_BW_4000_NPts_2048.zip
  raw_basis_2500_url: https://juchem.bme.columbia.edu/sites/default/files/2021-01/RawBasis_for_sLASERSiemens_TE_20_BW_2500_NPts_1024.zip
  testdata_url: https://zenodo.org/record/3904443/files/Spectra_hippocampus%28rat%29_TE02.rar?download=1
  manual_url: https://www.lcmodel.com/pub/LCModel/manual/manual.pdf

files:
  - name: lcm_64_tar
    url: "{{ context.lcm_64_url }}"
  - name: basis_3t_zip
    url: "{{ context.basis_3t_url }}"
  - name: basis_1_5t_zip
    url: "{{ context.basis_1_5t_url }}"
  - name: basis_7t_zip
    url: "{{ context.basis_7t_url }}"
  - name: basis_9_4t_zip
    url: "{{ context.basis_9_4t_url }}"
  - name: basisset_lcmodel_zip
    url: "{{ context.basisset_lcmodel_url }}"
  - name: raw_basis_4000_zip
    url: "{{ context.raw_basis_4000_url }}"
  - name: raw_basis_2500_zip
    url: "{{ context.raw_basis_2500_url }}"
  - name: testdata_rar
    url: "{{ context.testdata_url }}"
  - name: manual_pdf
    url: "{{ context.manual_url }}"

build:
  kind: neurodocker
  base-image: ubuntu:16.04
  pkg-manager: apt
  directives:
    - install:
        - curl
        - ca-certificates
        - libxft2
        - libxss1
        - libtk8.5
        - libnet-ifconfig-wrapper-perl
        - vim
        - nano
        - unzip
        - gv
        - unrar
    - workdir: /opt/lcmodel-{{ context.version }}/
    - run:
        - tar xf '{{ get_file("lcm_64_tar") }}'
        - gunzip -c lcm-core.tar.gz | tar xf -
        - rm -rf lcm-core.tar.gz
    - workdir: /opt/lcmodel-{{ context.version }}/.lcmodel/basis-sets
    - run:
        - unzip '{{ get_file("basis_3t_zip") }}'
        - unzip '{{ get_file("basis_1_5t_zip") }}'
        - unzip '{{ get_file("basis_7t_zip") }}'
        - unzip '{{ get_file("basis_9_4t_zip") }}'
        - unzip '{{ get_file("basisset_lcmodel_zip") }}'
        - unzip '{{ get_file("raw_basis_4000_zip") }}'
        - unzip '{{ get_file("raw_basis_2500_zip") }}'
    - copy:
        - license
        - /opt/lcmodel-{{ context.version }}/.lcmodel/license
    - workdir: /opt/datasets
    - run:
        - unrar x '{{ get_file("testdata_rar") }}'
        - cp '{{ get_file("manual_pdf") }}' /opt/lcmodel-{{ context.version }}/manual.pdf
    - copy:
        - setup_lcmodel.sh
        - /opt/lcmodel-{{ context.version }}/.lcmodel/bin/setup_lcmodel.sh
    - workdir: /opt/lcmodel-{{ context.version }}/.lcmodel/profiles/1/control-defaults
    - copy:
        - controlfiledefault
        - /opt/lcmodel-{{ context.version }}/.lcmodel/profiles/1/control-defaults/controlfiledefault
    - copy:
        - gui-defaults
        - /opt/lcmodel-{{ context.version }}/.lcmodel/profiles/1/gui-defaults
    - run:
        - chmod a+rwx /opt/lcmodel-{{ context.version }} -R
    - environment:
        PATH: /opt/lcmodel-{{ context.version }}/.lcmodel/bin/:/opt/lcmodel-{{ context.version }}/.lcmodel/:$PATH

deploy:
  path:
    - /opt/lcmodel-{{ context.version }}/.lcmodel/bin/
    - /opt/lcmodel-{{ context.version }}/.lcmodel/

readme: |-
  
  ----------------------------------
  ## lcmodel/{{ context.version }} ##
  Automatic quantification of in vivo proton MR spectra. 
  
  When using this for the first time, run:
  ```
  setup_lcmodel.sh
  ```
  
  Example:
  ```
  lcmgui
  ```
  
  More documentation can be found here: http://www.lcmodel.com/lcmodel.shtml
  The manual contains a lot of useful information: http://www.lcmodel.com/pub/LCModel/manual/manual.pdf (or /opt/lcmodel-{{ context.version }}/manual.pdf)
  
  To run container outside of this environment: ml lcmodel/{{ context.version }}
  
  ----------------------------------

categories:
  - spectroscopy
