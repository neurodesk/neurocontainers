name: mne
version: 1.12.1
container: mne_${version}_REFERENCE.simg

test_data:
  output_dir: test_output

setup:
  script: |
    set -e
    mkdir -p ${output_dir}

tests:
  - name: MNE conda environment exists
    description: Verify the current MNE conda environment is present
    command: test -x /opt/miniconda-latest/envs/mne-1.12.1/bin/python
    expected_exit_code: 0

  - name: MNE version check
    description: Verify MNE imports from the shipped conda environment
    command: /opt/miniconda-latest/envs/mne-1.12.1/bin/python -c "import mne; print(mne.__version__)"
    expected_output_contains: "1.12.1"

  - name: MNE core dependencies import
    description: Verify core MNE dependencies are available
    command: >-
      /opt/miniconda-latest/envs/mne-1.12.1/bin/python -c "import numpy, scipy, sklearn, matplotlib; print('dependencies ok')"
    expected_output_contains: "dependencies ok"

  - name: MNE creates synthetic raw data
    description: Exercise a small in-memory MNE workflow
    command: |
      /opt/miniconda-latest/envs/mne-1.12.1/bin/python - <<'PY'
      import numpy as np
      import mne

      data = np.zeros((3, 1000))
      info = mne.create_info(["Fz", "Cz", "Pz"], sfreq=1000, ch_types="eeg")
      raw = mne.io.RawArray(data, info)
      print(raw.info["sfreq"])
      print(len(raw.ch_names))
      PY
    expected_output_contains: "3"

  - name: VS Code wrapper resolves
    description: Verify the deployed code wrapper is present
    command: which code
    expected_output_contains: "/usr/local/sbin/code"
