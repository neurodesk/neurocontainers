# MNE-Python container test suite
# Minimal no-rebuild verification for the installed MNE Conda environment.

name: mne
version: 1.7.1
container: mne_1.7.1.simg

test_data:
  output_dir: test_output

setup:
  script: |
    #!/usr/bin/env bash
    set -e
    mkdir -p ${output_dir}

tests:
  - name: MNE env Python runtime
    description: Verify the named MNE Conda environment is usable
    command: bash -lc "source /opt/miniconda-latest/etc/profile.d/conda.sh && conda activate mne-1.7.1 && python --version"
    expected_output_contains: "Python 3.11"

  - name: MNE package import
    description: Verify the main MNE package imports successfully from the named env
    command: bash -lc "source /opt/miniconda-latest/etc/profile.d/conda.sh && conda activate mne-1.7.1 && python -c 'import mne; print(mne.__version__)'"
    expected_output_contains: "1.7.1"

  - name: MNE package metadata
    description: Verify pip metadata reports the installed mne package
    command: bash -lc "source /opt/miniconda-latest/etc/profile.d/conda.sh && conda activate mne-1.7.1 && python -m pip show mne 2>&1 | sed -n '1,12p'"
    expected_output_contains: "Version: 1.7.1"

  - name: MNE install location
    description: Verify the module imports from the named Conda env site-packages tree
    command: bash -lc "source /opt/miniconda-latest/etc/profile.d/conda.sh && conda activate mne-1.7.1 && python -c 'import mne; print(mne.__file__)'"
    expected_output_contains: "/opt/miniconda-latest/envs/mne-1.7.1/lib/python3.11/site-packages/mne/"

  - name: VS Code launcher available
    description: Verify the shipped VS Code launcher is present in the image
    command: bash -lc "command -v code"
    expected_output_contains: "/usr/local/sbin/code"
