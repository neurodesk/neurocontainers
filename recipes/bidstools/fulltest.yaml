# bidstools container test suite
# Focused ARM64 verification for the packaged DICOM/BIDS utilities.

name: bidstools
version: 1.0.4
container: bidstools_1.0.4.sif

setup:
  script: |
    #!/usr/bin/env bash
    set -e
    mkdir -p test_output/bidstools

tests:
  - name: Native ARM64 runtime
    description: Verify the rebuilt local image runs natively on ARM64
    script: |
      uname -m | grep -x 'aarch64'

  - name: Shipped tool paths
    description: Verify the key packaged CLIs are installed in the expected locations
    script: |
      command -v Bru2 | grep -x '/opt/bru2/Bru2'
      command -v dcm2niix | grep -x '/opt/dcm2niix-latest/bin/dcm2niix'
      command -v dcmdump | grep -x '/usr/bin/dcmdump'
      command -v heudiconv | grep -x '/opt/miniconda/envs/bidstools/bin/heudiconv'
      command -v xmedcon | grep -x '/usr/bin/xmedcon'

  - name: Bru2 help output
    description: Verify the ARM64 Bru2 binary starts and reports its usage banner
    script: |
      timeout 5 /opt/bru2/Bru2 2>&1 | grep -F 'Bruker2NIfTI v1.0.20180909'

  - name: dcm2niix version
    description: Verify the packaged dcm2niix build reports the expected ARM64 version
    script: |
      dcm2niix --version | grep -F 'v1.0.20250505'

  - name: dcmtk version
    description: Verify the shipped dcmtk binary runs on ARM64
    script: |
      dcmdump --version | grep -F 'dcmdump v3.6.6'

  - name: Heudiconv python package
    description: Verify the conda environment includes the expected Python package versions
    script: |
      python - <<'PY'
      import heudiconv, traits
      assert heudiconv.__version__ == "1.3.4"
      assert traits.__version__ == "7.1.0"
      print("python package versions ok")
      PY

cleanup:
  script: |
    #!/usr/bin/env bash
    echo "Test outputs preserved in test_output/bidstools/"
