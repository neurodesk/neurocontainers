# Focused ARM64 verification for the packaged DICOM/BIDS utilities.

name: bidstools
version: 1.0.4
container: bidstools_1.0.4.sif

setup:
  script: |
    #!/usr/bin/env bash
    set -e
    mkdir -p test_output/bidstools

tests:
  - name: Architecture is aarch64
    description: Verify the container is running on ARM64
    command: uname -m
    expected_output_contains: aarch64

  - name: Bru2 binary installed
    description: Verify the ARM64-built Bru2 binary is present
    command: test -x /opt/bru2/Bru2 && echo ok
    expected_output_contains: ok

  - name: Bru2 command works
    description: Verify Bru2 executes and prints its banner
    command: Bru2 2>&1 || true
    expected_output_contains: Bru2

  - name: dcm2niix binary installed
    description: Verify the source-built dcm2niix binary is present
    command: test -x /opt/dcm2niix-latest/bin/dcm2niix && echo ok
    expected_output_contains: ok

  - name: dcm2niix version check
    description: Verify the pinned ARM64 dcm2niix build reports the expected version
    command: dcm2niix --version 2>&1 || true
    expected_output_contains: v1.0.20250505

  - name: dcmdump available
    description: Verify dcmtk is installed
    command: test -x /usr/bin/dcmdump && echo ok
    expected_output_contains: ok

  - name: dcmdump version check
    description: Verify dcmtk reports the expected major version
    command: dcmdump --version 2>&1
    expected_output_contains: dcmdump v3.6.6

  - name: heudiconv executable available
    description: Verify the bidstools conda environment exposes heudiconv
    command: test -x /opt/miniconda/envs/bidstools/bin/heudiconv && echo ok
    expected_output_contains: ok

  - name: heudiconv package version
    description: Verify the packaged heudiconv version
    command: python -c 'import heudiconv; print(heudiconv.__version__)'
    expected_output_contains: "1.3.4"

  - name: traits package version
    description: Verify the packaged traits version
    command: python -c 'import traits; print(traits.__version__)'
    expected_output_contains: "7.1.0"

  - name: xmedcon available
    description: Verify xmedcon is installed
    command: test -x /usr/bin/xmedcon && echo ok
    expected_output_contains: ok
