name: bidstools
version: 1.0.4

architectures:
  - x86_64
  - aarch64

variables:
  miniconda_installer:
    try:
      - value: Miniconda3-latest-Linux-x86_64.sh
        condition: arch == "x86_64"
      - value: Miniconda3-latest-Linux-aarch64.sh
        condition: arch == "aarch64"

build:
  kind: neurodocker

  base-image: ubuntu:22.04
  pkg-manager: apt

  directives:
    - install:
        - build-essential
        - cmake
        - gcc
        - git
        - make

    - environment:
        CONDA_DIR: /opt/miniconda
        PATH: /opt/miniconda/envs/bidstools/bin:/opt/miniconda/bin:$PATH

    - run:
        - cp {{ get_file(context.miniconda_installer) }} /tmp/miniconda.sh
        - bash /tmp/miniconda.sh -b -p /opt/miniconda
        - rm -f /tmp/miniconda.sh
        - conda tos accept || true
        - conda config --system --prepend channels conda-forge
        - conda config --set channel_priority strict
        - conda config --system --set auto_update_conda false
        - conda config --system --set show_channel_urls true
        - conda init bash
        - conda create -y -q --name bidstools python=3.11 pip
        - bash -lc 'source /opt/miniconda/etc/profile.d/conda.sh && conda activate bidstools && python -m pip install --no-cache-dir heudiconv traits'
        - sync && conda clean --all --yes && sync
        - rm -rf /root/.cache/pip/*

    - install:
        - dcmtk
        - fp-compiler
        - fp-units-base
        - fp-units-fcl
        - libgl1
        - libgtk2.0-0
        - libxcb-cursor0
        - pigz
        - xmedcon
        - zip
        - zlib1g-dev

    - workdir: /opt/bru2

    - run:
        - bash -lc 'if [ "{{ arch }}" = "aarch64" ]; then mkdir -p /tmp/bru2-src && tar -xz -C /tmp/bru2-src --strip-components 1 -f {{ get_file("bru2nii_v1_0_20180303_tar_gz") }} && cd /tmp/bru2-src && fpc Bru2.lpr && install -m 0755 Bru2 /opt/bru2/Bru2 && install -m 0755 Bru2 /opt/bru2/Bru2Nii && rm -rf /tmp/bru2-src; else cp {{ get_file("Bru2_Linux_zip") }} Bru2_Linux.zip && unzip -q Bru2_Linux.zip && rm -f Bru2_Linux.zip; fi'

    - run:
        - mkdir -p /tmp/dcm2niix-src
        - tar -xz -C /tmp/dcm2niix-src --strip-components 1 -f {{ get_file("dcm2niix_v1_0_20250505_tar_gz") }}
        - mkdir -p /tmp/dcm2niix-src/build

    - workdir: /tmp/dcm2niix-src/build

    - run:
        - cmake -DCMAKE_INSTALL_PREFIX:PATH=/opt/dcm2niix-latest ..
        - make -j1
        - make install
        - rm -rf /tmp/dcm2niix-src

    - environment:
        PATH: /opt/dcm2niix-latest/bin:/opt/bru2:$PATH

deploy:
  bins:
    - heudiconv

readme: |-
  ----------------------------------
  ## bidstools/{{ context.version }} ##
  Contains a collection of tools useful for DICOM to BIDS conversion

  Tools included:
  ```
  dcm2niix: https://github.com/rordenlab/dcm2niix
  dcmtk: https://support.dcmtk.org/docs/pages.html
      dcmdump
      dump2dcm
      dcmconv
      dcm2json
      dcmodify
      img2dcm
      dcm2pnm
      dcmicmp
  xmedcon: https://xmedcon.sourceforge.io/
  heudiconv: https://heudiconv.readthedocs.io/en/latest/heuristics.html
  Bru2Nii: https://github.com/neurolabusc/Bru2Nii
  ```

  Example converting Bruker data to Nifti
  ```
  Bru2 -o /Users/cr/dir2/out /Users/cr/dir/acqp
  ```

  To run container outside of this environment: ml bidstools/{{ context.version }}

  ----------------------------------

categories:
  - "data organisation"

files:
  - name: Miniconda3-latest-Linux-x86_64.sh
    url: https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh
  - name: Miniconda3-latest-Linux-aarch64.sh
    url: https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-aarch64.sh
  - name: Bru2_Linux_zip
    url: https://github.com/neurolabusc/Bru2Nii/releases/download/v1.0.20180303/Bru2_Linux.zip
  - name: bru2nii_v1_0_20180303_tar_gz
    url: https://github.com/neurolabusc/Bru2Nii/archive/refs/tags/v1.0.20180303.tar.gz
  - name: dcm2niix_v1_0_20250505_tar_gz
    url: https://github.com/rordenlab/dcm2niix/archive/refs/tags/v1.0.20250505.tar.gz
