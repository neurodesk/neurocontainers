name: aidamri
version: "2.0"
container: aidamri_${version}_REFERENCE.simg

test_data:
  output_dir: test_output/aidamri

env_setup: |
  export FSLDIR=/opt/fsl-5.0.11
  export PATH=/opt/aidamri-2.0:/opt/aidamri-2.0/bin:/opt/aidamri-2.0/NiftyReg/bin:/opt/fsl-5.0.11/bin:/opt/miniconda-4.7.12.1/bin:$PATH

setup:
  script: |
    set -e
    mkdir -p ${output_dir}

tests:
  - name: AIDAmri source tree exists
    description: Verify the current AIDAmri version was unpacked under /opt
    command: test -d /opt/aidamri-2.0/bin
    expected_exit_code: 0

  - name: Miniconda Python dependencies import
    description: Verify the AIDAmri Python dependency stack imports
    command: >-
      /opt/miniconda-4.7.12.1/bin/python -c "import nipype, nibabel, numpy, scipy; print('aidamri python dependencies ok')"
    expected_output_contains: "aidamri python dependencies ok"

  - name: AIDAmri batch processor help
    description: Verify the main AIDAmri batch processing script starts
    command: >-
      /opt/miniconda-4.7.12.1/bin/python /opt/aidamri-2.0/bin/batchProc.py --help
    expected_output_contains: "Batch processing of all data"

  - name: NiftyReg tools available
    description: Verify compiled NiftyReg binaries are installed in the current AIDAmri tree
    command: >-
      bash -lc 'reg_aladin --help 2>&1 | head -5 && reg_resample --help 2>&1 | head -5'
    expected_output_contains: "reg_resample"

  - name: FSL tools available
    description: Verify the bundled FSL tools are on PATH
    command: bash -lc 'bet 2>&1 | head -20 && fslmaths 2>&1 | head -5'
    expected_output_contains: "bet <input> <output>"

  - name: Deploy path excludes macOS and lock files
    description: Guard against hidden editor files being exposed as deploy entries
    command: >-
      bash -lc "find /opt/aidamri-2.0/bin -name '.DS_Store' -o -name '.~lock.*' | wc -l"
    expected_output_contains: "0"
