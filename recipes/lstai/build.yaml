name: lst-ai
version: 1.2.0

copyright:
  - license: MIT
    url: https://github.com/CompImg/LST-AI/blob/main/LICENSE

architectures:
  - x86_64

readme: |
  ## LST-AI {{ context.version }}

  LST-AI is a deep learning ensemble for accurate MS (Multiple Sclerosis)
  lesion segmentation. It is the deep learning-based successor of the original
  Lesion Segmentation Toolbox (LST) by Schmidt et al., developed at the
  Technical University of Munich.

  LST-AI requires a 3D T1-weighted and a 3D FLAIR image (non-skull-stripped
  by default). It wraps HD-BET (skull stripping) and greedy (registration to
  MNI152), then applies a 3D U-Net ensemble to produce a binary lesion mask
  and a lesion annotation map according to McDonald's criteria.

  ### Modes

  - **Default** (segmentation + annotation): runs the full pipeline
  - **Segmentation only** (`--segment_only`): outputs the binary mask only
  - **Annotation only** (`--annotate_only --existing_seg /path/to/mask.nii.gz`):
    labels an existing binary mask

  ### Usage

  ```bash
  lst --t1 t1.nii.gz --flair flair.nii.gz \
      --output /path/to/output \
      --temp /path/to/temp
  ```

  Key options:
  - `--t1`            3D T1-weighted image (.nii.gz)
  - `--flair`         3D FLAIR image (.nii.gz)
  - `--output`        Output directory for results
  - `--temp`          Directory for intermediate files (optional)
  - `--device`        GPU id (integer) or `cpu` (default: cpu)
  - `--stripped`      Bypass skull-stripping for already-stripped images
  - `--segment_only`  Output binary mask only, skip annotation
  - `--annotate_only` Skip segmentation, annotate an existing mask
  - `--existing_seg`  Path to existing binary mask (used with --annotate_only)
  - `--threshold`     Probability threshold for binary mask (default: 0.5)
  - `--clipping`      Intensity percentile clipping, e.g. `0.5 99.5` (default)
  - `--probability_map` Save per-model probability maps (requires --temp)

  ### Citation

  Wiltgen T, McGinnis J, et al. (2024). LST-AI: A deep learning ensemble for
  accurate MS lesion segmentation. *NeuroImage: Clinical*, 103611.
  https://doi.org/10.1016/j.nicl.2024.103611

  Please also cite HD-BET and greedy if used in your pipeline.

  More information: https://github.com/CompImg/LST-AI

build:
  kind: neurodocker
  base-image: jqmcginnis/lst-ai:v1.2.0
  pkg-manager: apt

  directives:
    - environment:
        PATH: /usr/local/bin:/usr/bin:/bin:$PATH
        PYTHONUNBUFFERED: "1"

deploy:
  bins:
    - lst

categories:
  - image segmentation
