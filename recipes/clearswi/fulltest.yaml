# CLEARSWI container test suite
# Tests for CLEARSWI 1.0.0 - Susceptibility Weighted Imaging in Julia
#
# Tests focus on the packaged Julia runtime and the installed CLEARSWI package
# as it exists in the built image.

name: clearswi
version: 1.0.0
container: clearswi_1.0.0.simg

setup:
  script: |
    #!/usr/bin/env bash
    set -e
    mkdir -p test_output/clearswi

tests:
  - name: julia version
    description: Verify Julia starts and reports the packaged version
    command: julia --version
    expected_output_contains: "julia version 1.9.3"

  - name: CLEARSWI package directory exists
    description: Verify the CLEARSWI package was installed into the Julia depot
    command: ls -d /opt/julia_depot/packages/CLEARSWI
    expected_output_contains: "/opt/julia_depot/packages/CLEARSWI"

  - name: CLEARSWI entry file exists
    description: Verify the CLEARSWI source entrypoint is present
    command: ls /opt/julia_depot/packages/CLEARSWI/*/src/CLEARSWI.jl
    expected_output_contains: "CLEARSWI.jl"

  - name: CLEARSWI resolves in Julia
    description: Verify Julia can locate the installed CLEARSWI package
    command: julia -e 'println(Base.find_package("CLEARSWI"))'
    expected_output_contains: "CLEARSWI.jl"

  - name: CLEARSWI metadata matches installed package
    description: Verify the installed package metadata is present and matches the Julia compatibility line
    command: sed -n '1,20p' /opt/julia_depot/packages/CLEARSWI/*/Project.toml
    expected_output_contains: 'julia = "1.9"'

cleanup:
  script: |
    #!/usr/bin/env bash
    echo "Test outputs preserved in test_output/clearswi/"
