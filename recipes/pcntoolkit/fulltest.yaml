# pcntoolkit container test suite
# Tests for pcntoolkit v0.35 on ARM64.
#
# The current ARM64 recipe installs the package into a named conda environment.
# This suite verifies the Python runtime, installed distribution metadata, and
# a small set of representative module imports from the built image.

name: pcntoolkit
version: 0.35
container: pcntoolkit_0.35*.simg

setup:
  script: |
    #!/usr/bin/env bash
    set -e
    mkdir -p test_output/pcntoolkit

tests:
  - name: python available
    description: Verify the deployed Python interpreter is available
    command: python --version
    expected_output_contains: "Python"

  - name: pcntoolkit distribution metadata
    description: Verify the installed Python distribution metadata is present
    command: python -c "import importlib.metadata as md; print(md.metadata('pcntoolkit')['Name'])"
    expected_output_contains: "pcntoolkit"

  - name: import pcntoolkit
    description: Verify the top-level pcntoolkit package imports successfully
    command: python -c "import pcntoolkit"
    expected_exit_code: 0

  - name: import normative functions
    description: Verify the normative entrypoints import successfully
    command: python -c "from pcntoolkit.normative import estimate, predict"
    expected_exit_code: 0

  - name: import NormBLR
    description: Verify a representative normative model class imports successfully
    command: python -c "from pcntoolkit.normative_model.norm_blr import NormBLR"
    expected_exit_code: 0

cleanup:
  script: |
    #!/usr/bin/env bash
    echo "Test outputs preserved in test_output/pcntoolkit/"
