# nftsim container test suite
# Minimal ARM64 verification for the source-built nftsim image.

name: nftsim
version: 1.0.2
container: nftsim_1.0.2.simg

test_data:
  time_validation: /opt/nftsim/configs/test_time-validation.conf
  e_cortical: /opt/nftsim/configs/e-cortical.conf
  output_dir: test_output

setup:
  script: |
    #!/usr/bin/env bash
    set -e
    mkdir -p "${output_dir}"

tests:
  - name: ARM64 runtime
    description: Verify the container runs natively on arm64
    command: uname -m
    expected_output_contains: "aarch64"

  - name: nftsim help
    description: Verify the nftsim CLI is present and responds
    command: nftsim -h 2>&1
    expected_output_contains: "Usage: nftsim"

  - name: Config path present
    description: Verify the built-in config path from the source tree is present
    command: ls ${time_validation}
    expected_output_contains: "/opt/nftsim/configs/test_time-validation.conf"

  - name: Time validation simulation
    description: Run a small built-in validation simulation
    command: >-
      nftsim -i ${time_validation} -o ${output_dir}/time-validation.output
    validate:
      - output_exists: ${output_dir}/time-validation.output

  - name: Time validation output header
    description: Verify the time validation output contains simulation metadata
    command: sed -n '1,12p' ${output_dir}/time-validation.output
    depends_on: Time validation simulation
    expected_output_contains: "Time: 0.15625"

  - name: E cortical simulation
    description: Run the built-in cortical example from the source tree
    command: >-
      nftsim -i ${e_cortical} -o ${output_dir}/e-cortical.output
    validate:
      - output_exists: ${output_dir}/e-cortical.output

  - name: E cortical output header
    description: Verify the cortical example output contains the expected node count
    command: sed -n '1,12p' ${output_dir}/e-cortical.output
    depends_on: E cortical simulation
    expected_output_contains: "Nodes: 900"
