name: qsmxt
version: 9.8.1
copyright:
  - license: GPL-3.0-only
    url: https://github.com/QSMxT/QSMxT/blob/main/LICENSE
  - license: BSD-2-Clause
    url: https://github.com/rordenlab/dcm2niix/blob/master/license.txt
architectures:
  - x86_64
  - aarch64

variables:
  qsmxt_source_version: 9.8.0
  qsmxt_tarball:
    try:
      - value: qsmxt_x86_64_tar_gz
        condition: arch == "x86_64"
      - value: qsmxt_aarch64_tar_gz
        condition: arch == "aarch64"

build:
  kind: neurodocker
  # QSMxT v9 is a single self-contained Rust binary (https://github.com/QSMxT/QSMxT).
  # The release archive bundles a pinned dcm2niix for DICOM -> BIDS conversion.
  # ubuntu:24.04 provides glibc >= 2.39, which the prebuilt binary requires.
  base-image: ubuntu:24.04
  pkg-manager: apt

  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive

    - install:
        - bzip2
        - ca-certificates
        - python3-dev
        - python-is-python3
        - python3-pip

    - variables:
        openrecon_ubuntu_version: "24.04"

    - include: macros/openrecon/neurodocker.yaml

    - workdir: /opt/qsmxt

    - run:
        - tar -xzf {{ get_file(context.qsmxt_tarball) }} -C /opt/qsmxt
        - chmod +x /opt/qsmxt/qsmxt /opt/qsmxt/dcm2niix

    - environment:
        PATH: /opt/qsmxt:$PATH
        # qsmxt resolves dcm2niix via this env var first; the bundled copy sits
        # alongside the binary, so conversion works out of the box.
        QSMXT_DCM2NIIX: /opt/qsmxt/dcm2niix

    - run:
        - cp {{ get_file("qsmxt.py") }} /opt/code/python-ismrmrd-server/qsmxt.py
        - cp {{ get_file("OpenReconLabel.json") }} /opt/code/python-ismrmrd-server/OpenReconLabel.json
        - cp {{ get_file("OpenReconREADME.md") }} /opt/code/python-ismrmrd-server/OpenReconREADME.md
        - mkdir -p /tmp/share/qsmxt_openrecon
        - chmod 1777 /tmp/share /tmp/share/qsmxt_openrecon

    - deploy:
        path:
          - /opt/qsmxt
        bins:
          - qsmxt
          - dcm2niix
          - python
          - siemens_to_ismrmrd

tests:
  - name: qsmxt version and help
    script: |
      qsmxt --version
      qsmxt --help
      qsmxt run --help
      qsmxt dicom-convert --help

  - name: dcm2niix available
    script: |
      dcm2niix --version > /tmp/dcm2niix-version.txt 2>&1 || [ "$?" -eq 3 ]
      grep -iq dcm2niix /tmp/dcm2niix-version.txt

  - name: OpenRecon runtime import
    script: |
      python /opt/code/python-ismrmrd-server/main.py -h 2>&1 | grep 'Example server for MRD streaming format'
      PYTHONPATH=/opt/code/python-ismrmrd-server python -c "import qsmxt, ismrmrd, nibabel, scipy, skimage; print(qsmxt.__file__)" | grep -x '/opt/code/python-ismrmrd-server/qsmxt.py'
      test -f /opt/code/python-ismrmrd-server/OpenReconLabel.json

categories:
  - image reconstruction
  - phase processing
  - quantitative imaging
  - structural imaging
  - workflows

structured_readme:
  description: QSMxT is an end-to-end software toolbox for Quantitative Susceptibility Mapping (QSM), rebuilt in Rust as a single self-contained binary. This container packages upstream QSMxT {{ context.qsmxt_source_version }}. It reconstructs QSM from BIDS datasets, converts DICOMs to BIDS, and provides an interactive TUI.
  example: |-
    ml qsmxt/{{ context.version }}

    # Easiest: do everything interactively (convert, configure, run)
    qsmxt tui

    # Or non-interactively on the command line:
    qsmxt dicom-convert <INPUT_DICOM_DIR> <OUTPUT_BIDS_DIR>
    qsmxt run <INPUT_BIDS_DIR> [<OPTIONAL_OUTPUT_DIR>]
    qsmxt --help
  documentation: https://qsmxt.github.io/QSMxT/
  citation: "Stewart AW, Robinson SD, O’Brien K, Jin J, Widhalm G, Hangel G, Walls A, Goodwin J, Eckstein K, Tourell M, Morgan C, Narayanan A, Barth M, Bollmann S. “QSMxT: Robust masking and artifact reduction for quantitative susceptibility mapping”. Magnetic resonance in medicine 87.3 (2022): 1289-1300. https://doi.org/10.1002/mrm.29048"

readme: |-
  ----------------------------------
  ## qsmxt/{{ context.version }} ##

  QSMxT is an end-to-end software toolbox for Quantitative Susceptibility Mapping
  (QSM). This container packages upstream QSMxT {{ context.qsmxt_source_version }}.
  Version 9 is a ground-up reimplementation in Rust: a single
  self-contained binary that reconstructs QSM from BIDS datasets, converts DICOMs
  to BIDS, and includes an interactive TUI. A pinned dcm2niix is bundled.

  Example:
  ```
  ml qsmxt/{{ context.version }}

  # Easiest: do everything interactively (convert, configure, run)
  qsmxt tui

  # Or non-interactively:
  qsmxt dicom-convert <INPUT_DICOM_DIR> <OUTPUT_BIDS_DIR>
  qsmxt run <INPUT_BIDS_DIR> [<OPTIONAL_OUTPUT_DIR>]
  qsmxt --help
  ```

  More documentation can be found here: https://qsmxt.github.io/QSMxT/

  Citation:
  ```
  Stewart AW, Robinson SD, O’Brien K, Jin J, Widhalm G, Hangel G, Walls A, Goodwin J, Eckstein K, Tourell M, Morgan C, Narayanan A, Barth M, Bollmann S. “QSMxT: Robust masking and artifact reduction for quantitative susceptibility mapping”. Magnetic resonance in medicine 87.3 (2022): 1289-1300. https://doi.org/10.1002/mrm.29048
  ```

  To run container outside of this environment: ml qsmxt/{{ context.version }}

  ----------------------------------
icon: data:image/png;base64,

files:
  - name: qsmxt.py
    filename: qsmxt.py
  - name: OpenReconLabel.json
    filename: OpenReconLabel.json
  - name: OpenReconREADME.md
    filename: OpenReconREADME.md
  - name: qsmxt_x86_64_tar_gz
    url: https://github.com/QSMxT/QSMxT/releases/download/v{{ context.qsmxt_source_version }}/qsmxt-v{{ context.qsmxt_source_version }}-x86_64-unknown-linux-gnu.tar.gz
  - name: qsmxt_aarch64_tar_gz
    url: https://github.com/QSMxT/QSMxT/releases/download/v{{ context.qsmxt_source_version }}/qsmxt-v{{ context.qsmxt_source_version }}-aarch64-unknown-linux-gnu.tar.gz
