name: vmtk
version: 1.5.0

copyright:
  - license: BSD-3-Clause
    url: https://github.com/vmtk/vmtk

architectures:
  - x86_64

variables:
  miniforge_version: 24.7.1-2
  python_version: "3.10"

build:
  kind: neurodocker
  base-image: ubuntu:24.04
  pkg-manager: apt

  directives:
    - install:
        - libgl1
        - libglu1-mesa
        - ca-certificates
        - bzip2

    - run:
        - printf '#!/bin/bash\nls -la' > /usr/bin/ll
        - chmod +x /usr/bin/ll
        - mkdir -p /neurodesktop-storage /neurodesktop-home /neurodesktop-share /neurodesktop-trash

    - run:
        - cp {{ get_file("miniforge_installer") }} /tmp/Miniforge3-Linux-x86_64.sh
        - bash /tmp/Miniforge3-Linux-x86_64.sh -b -p /opt/miniforge3
        - rm /tmp/Miniforge3-Linux-x86_64.sh
        - /opt/miniforge3/bin/mamba install -y -c conda-forge vtk itk vmtk={{ context.version }} python={{ context.python_version }}
        - /opt/miniforge3/bin/conda clean -afy

    - environment:
        PATH: /opt/miniforge3/bin:$PATH
        CONDA_PATH: /opt/miniforge3

deploy:
  path:
    - /opt/miniforge3/bin

categories:
  - image segmentation
  - visualization
  - shape analysis

readme: |-
  ----------------------------------
  ## vmtk/{{ context.version }} ##

  The Vascular Modeling Toolkit is a collection of libraries and tools for 3D reconstruction, geometric analysis, mesh generation, and surface data analysis for image-based modeling of blood vessels.

  VMTK can be used through its command line tools, as Python/C++ libraries, or as part of 3D Slicer workflows. This container installs VMTK {{ context.version }} from conda-forge with VTK, ITK, and Python {{ context.python_version }}.

  Homepage: http://www.vmtk.org/
  Documentation: http://www.vmtk.org/documentation/

  Example:
  ```sh
  vmtkcenterlines -ifile foo.vtp -ofile foo_centerlines.vtp
  vmtksurfacereader -ifile foo.vtp --pipe vmtkcenterlines --pipe vmtkrenderer --pipe vmtksurfaceviewer -opacity 0.25 --pipe vmtksurfaceviewer -i @vmtkcenterlines.o -array MaximumInscribedSphereRadius
  ```

  To make VMTK commands available in Neurodesk environments, run:
  ```sh
  ml vmtk/{{ context.version }}
  ```

  License: BSD-3-Clause

  ----------------------------------

files:
  - name: miniforge_installer
    url: https://github.com/conda-forge/miniforge/releases/download/{{ context.miniforge_version }}/Miniforge3-Linux-x86_64.sh

icon: data:image/png;base64,
