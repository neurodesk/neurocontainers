# AutoDock Vina container test suite
# Minimal ARM64 verification for the Ubuntu-package-based vina image.

name: vina
version: 1.2.3
container: vina_1.2.3.simg

test_data:
  output_dir: test_output

setup:
  script: |
    #!/usr/bin/env bash
    set -e
    mkdir -p "${output_dir}"
    cat > "${output_dir}/multi.pdbqt" <<'EOF'
    MODEL 1
    ATOM      1  C   UNL     1       0.000   0.000   0.000  0.00  0.00    +0.000 C
    ENDMDL
    MODEL 2
    ATOM      1  C   UNL     1       1.000   0.000   0.000  0.00  0.00    +0.000 C
    ENDMDL
    EOF

tests:
  - name: ARM64 runtime
    description: Verify the container runs natively on arm64
    command: uname -m
    expected_output_contains: "aarch64"

  - name: Ubuntu package metadata
    description: Verify the installed Ubuntu package versions match the rebuilt image
    command: dpkg-query -W autodock autodock-vina
    expected_output_contains: "autodock-vina\t1.2.5-2build1"

  - name: vina help
    description: Verify the vina CLI is present and responds
    command: vina --help
    expected_output_contains: "Input:"

  - name: vina version
    description: Verify the packaged vina binary version
    command: vina --version
    expected_output_contains: "AutoDock Vina v1.2.5"

  - name: vina_split version
    description: Verify the packaged vina_split binary version
    command: vina_split --version
    expected_output_contains: "AutoDock Vina PDBQT Split v1.2.5"

  - name: autodock4 version
    description: Verify the packaged autodock4 binary is present
    command: autodock4 --version
    expected_output_contains: "AutoDock 4.2.6"

  - name: vina_split basic split
    description: Split a minimal multi-model PDBQT file into ligand outputs
    command: >-
      bash -lc "cd ${output_dir} && vina_split --input multi.pdbqt --ligand lig --flex flex"
    validate:
      - output_exists: ${output_dir}/lig1.pdbqt
      - output_exists: ${output_dir}/lig2.pdbqt
