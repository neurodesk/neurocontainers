tests:
  - name: Test freesurfer
    script: |
      set +x
      set -e
      set -o pipefail

      LAST_OUTPUT=""
      LAST_STATUS=0

      print_last_output() {
          local name="$1"
          if [ -n "$LAST_OUTPUT" ]; then
              printf '\n[%s] exit=%s\n%s\n' "$name" "$LAST_STATUS" "$LAST_OUTPUT" >&2
          else
              printf '\n[%s] exit=%s\n(no output)\n' "$name" "$LAST_STATUS" >&2
          fi
      }

      fail_with_last_output() {
          local name="$1"
          local message="$2"
          echo "$message" >&2
          print_last_output "$name"
          exit 1
      }

      run_and_capture() {
          local name="$1"
          shift
          set +e
          LAST_OUTPUT=$("$@" 2>&1)
          LAST_STATUS=$?
          set -e
      }

      assert_no_runtime_link_errors() {
          local name="$1"
          if [ "$LAST_STATUS" -eq 127 ]; then
              fail_with_last_output "$name" "Command failed to execute in $name"
          fi
          if printf '%s\n' "$LAST_OUTPUT" | grep -Eiq \
              'libqt5core\.so\.5|error while loading shared libraries|cannot open shared object file|symbol lookup error|undefined symbol|version `[^`]+` not found|Could not find version [0-9]+\.[0-9]+ of the MATLAB Runtime|no version information available'; then
              fail_with_last_output "$name" "Unexpected runtime/linker error in $name"
          fi
      }

      FREEVIEW_POLLUTED_LD="${FREESURFER_HOME}/MCRv97/bin/glnxa64:${FREESURFER_HOME}/MCRv97/runtime/glnxa64:${LD_LIBRARY_PATH:-}"

      run_and_capture "segmentSubjectT1_autoEstimateAlveusML" segmentSubjectT1_autoEstimateAlveusML
      assert_no_runtime_link_errors "segmentSubjectT1_autoEstimateAlveusML"

      run_and_capture "checkMCR.sh" checkMCR.sh
      assert_no_runtime_link_errors "checkMCR.sh"
      if [ "$LAST_STATUS" -ne 0 ]; then
          fail_with_last_output "checkMCR.sh" "checkMCR.sh exited with non-zero status."
      fi

      run_and_capture "segmentThalamicNuclei.sh --help" segmentThalamicNuclei.sh --help
      assert_no_runtime_link_errors "segmentThalamicNuclei.sh --help"
      if [ "$LAST_STATUS" -ne 0 ]; then
          fail_with_last_output "segmentThalamicNuclei.sh --help" "segmentThalamicNuclei.sh --help exited with non-zero status."
      fi

      run_and_capture "mris_left_right_register" mris_left_right_register
      if [ "$LAST_STATUS" -eq 127 ]; then
          fail_with_last_output "mris_left_right_register" "mris_left_right_register failed to execute."
      fi
      if printf '%s\n' "$LAST_OUTPUT" | grep -Eiq 'permission denied|apparmor'; then
          fail_with_last_output "mris_left_right_register" "Unexpected permission failure in mris_left_right_register"
      fi

      run_and_capture "segmentNuclei" segmentNuclei
      assert_no_runtime_link_errors "segmentNuclei"

      run_and_capture "fast_selxavg3b.glnxa64" fast_selxavg3b.glnxa64
      assert_no_runtime_link_errors "fast_selxavg3b.glnxa64"

      run_and_capture "ldd freeview_bin_real" ldd "${FREESURFER_HOME}/bin/freeview_bin_real"
      if printf '%s\n' "$LAST_OUTPUT" | grep -Eiq '=>[[:space:]]+not found'; then
          fail_with_last_output "ldd freeview_bin_real" "freeview_bin_real has unresolved runtime libraries."
      fi

      # Verify libQt5Core.so.5 does not carry PT_INTERP. Qt 5.12 builds
      # libQt5Core as a PIE-capable library (executable + shared object) which
      # causes glibc 2.37+ to refuse dlopen, breaking freeview in Apptainer
      # on hosts with newer glibc. We patch PT_INTERP and .interp in place.
      run_and_capture "readelf Qt5Core PT_INTERP" readelf -l "${FREESURFER_HOME}/lib/qt/lib/libQt5Core.so.5"
      if printf '%s\n' "$LAST_OUTPUT" | grep -q 'INTERP'; then
          fail_with_last_output "readelf Qt5Core PT_INTERP" "libQt5Core.so.5 still has PT_INTERP segment (breaks glibc 2.37+ dlopen in Apptainer)."
      fi

      # Verify libQt5Core.so.5 does not carry .note.ABI-tag. Older kernels
      # (for example 3.10) can reject the Qt library when this note advertises
      # a newer minimum Linux ABI, surfacing as a loader "cannot open" error.
      run_and_capture "readelf Qt5Core ABI-tag" readelf -n "${FREESURFER_HOME}/lib/qt/lib/libQt5Core.so.5"
      if printf '%s\n' "$LAST_OUTPUT" | grep -q '\.note.ABI-tag'; then
          fail_with_last_output "readelf Qt5Core ABI-tag" "libQt5Core.so.5 still has .note.ABI-tag (can break loading on older host kernels)."
      fi

      # Verify libQt5Core.so.5 is truly dlopen-able via ctypes.
      run_and_capture "ctypes.CDLL Qt5Core" python3 -c "import ctypes; ctypes.CDLL('${FREESURFER_HOME}/lib/qt/lib/libQt5Core.so.5')"
      if [ "$LAST_STATUS" -ne 0 ]; then
          fail_with_last_output "ctypes.CDLL Qt5Core" "libQt5Core.so.5 cannot be dlopen'd (ctypes.CDLL failed)."
      fi

      # Verify Qt5 resolves without any LD_LIBRARY_PATH (relies on ldconfig cache).
      # This catches missing ldconfig entries that cause failures in Singularity.
      run_and_capture "ldd freeview_bin_real (empty LD)" env LD_LIBRARY_PATH="" ldd "${FREESURFER_HOME}/bin/freeview_bin_real"
      if printf '%s\n' "$LAST_OUTPUT" | grep -Eiq '=>[[:space:]]+not found'; then
          fail_with_last_output "ldd freeview_bin_real (empty LD)" "freeview_bin_real has unresolved libraries without LD_LIBRARY_PATH (ldconfig cache missing?)."
      fi

      # Verify Qt5 resolves when LD_LIBRARY_PATH contains only MCR paths.
      # In NeuroDesk the module system may set LD to MCR-only, dropping system paths.
      # This catches MCR's bundled Qt5 (5.5) shadowing FreeSurfer's Qt5 (5.12).
      FREEVIEW_MCR_ONLY_LD="${FREESURFER_HOME}/MCRv97/bin/glnxa64:${FREESURFER_HOME}/MCRv97/runtime/glnxa64:${FREESURFER_HOME}/MCRv97/sys/os/glnxa64"
      run_and_capture "ldd freeview_bin_real (MCR-only LD)" env LD_LIBRARY_PATH="${FREEVIEW_MCR_ONLY_LD}" ldd "${FREESURFER_HOME}/bin/freeview_bin_real"
      if printf '%s\n' "$LAST_OUTPUT" | grep -Eiq '=>[[:space:]]+not found'; then
          fail_with_last_output "ldd freeview_bin_real (MCR-only LD)" "freeview_bin_real has unresolved libraries with MCR-only LD_LIBRARY_PATH."
      fi
      if printf '%s\n' "$LAST_OUTPUT" | grep -Eiq 'no version information available'; then
          fail_with_last_output "ldd freeview_bin_real (MCR-only LD)" "freeview_bin_real resolved Qt5 from MCR (version mismatch). MCR Qt5 libs must be removed."
      fi

      # Run freeview wrappers with MCR-only LD_LIBRARY_PATH.
      # This replicates the Apptainer/NeuroDesk scenario where the module system
      # sets LD_LIBRARY_PATH to only MCR paths. The wrappers must strip MCR paths
      # to avoid MCR's bundled libstdc++/Qt5 shadowing system/FreeSurfer libraries.
      # Note: xvfb-run runs with clean LD (only the wrapper gets MCR LD) because
      # in practice Xvfb is a system service unaffected by module-system LD changes.
      run_and_capture "freeview_bin wrapper (xvfb, MCR-only LD)" timeout 20s xvfb-run -a env LD_LIBRARY_PATH="${FREEVIEW_MCR_ONLY_LD}" "${FREESURFER_HOME}/bin/freeview_bin"
      assert_no_runtime_link_errors "freeview_bin wrapper (xvfb, MCR-only LD)"
      if [ "$LAST_STATUS" -ne 0 ] && [ "$LAST_STATUS" -ne 124 ]; then
          fail_with_last_output "freeview_bin wrapper (xvfb, MCR-only LD)" "freeview_bin wrapper failed with MCR-only LD_LIBRARY_PATH (Apptainer scenario)."
      fi

      run_and_capture "freeview wrapper (xvfb, MCR-only LD)" timeout 20s xvfb-run -a env LD_LIBRARY_PATH="${FREEVIEW_MCR_ONLY_LD}" freeview
      assert_no_runtime_link_errors "freeview wrapper (xvfb, MCR-only LD)"
      if [ "$LAST_STATUS" -ne 0 ] && [ "$LAST_STATUS" -ne 124 ]; then
          fail_with_last_output "freeview wrapper (xvfb, MCR-only LD)" "freeview wrapper failed with MCR-only LD_LIBRARY_PATH (Apptainer scenario)."
      fi

      # Run freeview_bin_real directly (bypassing wrappers) with polluted LD.
      # This catches library errors that the wrapper scripts would mask.
      run_and_capture "freeview_bin_real direct (xvfb, timeout, polluted LD)" env LD_LIBRARY_PATH="${FREEVIEW_POLLUTED_LD}" timeout 10s xvfb-run -a "${FREESURFER_HOME}/bin/freeview_bin_real"
      assert_no_runtime_link_errors "freeview_bin_real direct (xvfb, timeout, polluted LD)"
      if [ "$LAST_STATUS" -ne 0 ] && [ "$LAST_STATUS" -ne 124 ]; then
          fail_with_last_output "freeview_bin_real direct (xvfb, timeout, polluted LD)" "freeview_bin_real failed to start directly (bypassing wrappers)."
      fi

      # Force MCR paths to the front to replicate common runtime contamination
      # and ensure freeview wrappers still resolve Qt libraries correctly.
      run_and_capture "freeview_bin startup probe (xvfb, timeout, polluted LD)" env LD_LIBRARY_PATH="${FREEVIEW_POLLUTED_LD}" timeout 20s xvfb-run -a "${FREESURFER_HOME}/bin/freeview_bin"
      assert_no_runtime_link_errors "freeview_bin startup probe (xvfb, timeout, polluted LD)"
      if [ "$LAST_STATUS" -ne 0 ] && [ "$LAST_STATUS" -ne 124 ]; then
          fail_with_last_output "freeview_bin startup probe (xvfb, timeout, polluted LD)" "freeview_bin startup probe exited unexpectedly."
      fi

      # Probe real startup path (same as users running `freeview`) and tolerate timeout
      # because a healthy GUI process may keep running.
      run_and_capture "freeview startup probe (xvfb, timeout, polluted LD)" env LD_LIBRARY_PATH="${FREEVIEW_POLLUTED_LD}" timeout 20s xvfb-run -a freeview
      assert_no_runtime_link_errors "freeview startup probe (xvfb, timeout, polluted LD)"
      if [ "$LAST_STATUS" -ne 0 ] && [ "$LAST_STATUS" -ne 124 ]; then
          fail_with_last_output "freeview startup probe (xvfb, timeout, polluted LD)" "freeview startup probe exited unexpectedly."
      fi

      run_and_capture "freeview -h (xvfb, polluted LD)" env LD_LIBRARY_PATH="${FREEVIEW_POLLUTED_LD}" xvfb-run -a freeview -h
      assert_no_runtime_link_errors "freeview -h (xvfb, polluted LD)"
      if ! printf '%s\n' "$LAST_OUTPUT" | grep -Eiq 'Usage:[[:space:]]*freeview'; then
          fail_with_last_output "freeview -h (xvfb, polluted LD)" "freeview help output did not contain expected marker."
      fi

      [ "$FSF_OUTPUT_FORMAT" = "nii.gz" ]
      if ! touch /scratch/test 2>/dev/null; then
          touch /tmp/freesurfer_scratch_test
      fi

      # Optional long-running validation.
      if [ "${FREESURFER_FULL_TEST:-0}" = "1" ]; then
          [ -f ./mp2rage.nii ] || wget https://imaging.org.au/uploads/Human7T/mp2rageModel_L13_work03-plus-hippocampus-7T-sym-norm-mincanon_v0.8.nii -O ./mp2rage.nii
          mkdir -p ./freesurfer_output
          recon-all -subject subjectname -i mp2rage.nii -all -sd ./freesurfer_output
          export ITK_GLOBAL_DEFAULT_NUMBER_OF_THREADS=16
          SegmentAAN.sh subjectname ./freesurfer_output
      fi
