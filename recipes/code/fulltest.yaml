name: code
version: "240320"
container: code_240320.simg

test_data:
  output_dir: test_output

setup:
  script: |
    #!/usr/bin/env bash
    set -e
    mkdir -p ${output_dir}

tests:
  - name: VS Code help
    description: Verify the VS Code CLI responds on ARM64
    command: /usr/bin/code --help 2>&1 | head -5
    expected_output_contains:
      - "Visual Studio Code"
      - "Usage: code"
    expected_exit_code: 0

  - name: VS Code extensions
    description: Verify the expected editor extensions are installed
    command: /usr/bin/code --list-extensions --extensions-dir=/opt/vscode-extensions 2>&1
    expected_output_contains:
      - "ms-python.python"
      - "julialang.language-julia"
      - "ms-toolsai.jupyter"
    expected_exit_code: 0

  - name: Julia version
    description: Verify the packaged Julia runtime is available
    command: julia --version
    expected_output_contains: "julia version 1.6.3"
    expected_exit_code: 0

  - name: Singularity version
    description: Verify the packaged Singularity CLI is available
    command: singularity --version
    expected_output_contains: "singularity-ce version 3.9.3"
    expected_exit_code: 0

  - name: Conda Python version
    description: Verify the packaged Miniconda Python runtime is available
    command: /opt/miniconda/bin/python --version
    expected_output_contains: "Python 3.11"
    expected_exit_code: 0

  - name: Scientific Python imports
    description: Verify the core Python stack imports correctly on ARM64
    command: /opt/miniconda/bin/python -c "import numpy, scipy, h5py, seaborn, nipype; print('numpy', numpy.__version__); print('scipy', scipy.__version__); print('h5py', h5py.__version__); print('seaborn', seaborn.__version__); print('nipype', nipype.__version__)"
    expected_output_contains:
      - "numpy 2."
      - "scipy 1."
      - "h5py 3."
      - "seaborn 0."
      - "nipype 1."
    expected_exit_code: 0

  - name: HDF5 write and read
    description: Verify the Python stack can create and read an HDF5 file in the mounted workdir
    command: /opt/miniconda/bin/python -c "import h5py, numpy as np; f = h5py.File('${output_dir}/demo.h5', 'w'); f.create_dataset('x', data=np.arange(5)); f.close(); f = h5py.File('${output_dir}/demo.h5', 'r'); print('dataset', f['x'][:].tolist()); f.close()" && test -f ${output_dir}/demo.h5
    expected_output_contains: "dataset [0, 1, 2, 3, 4]"
    expected_exit_code: 0

cleanup:
  script: |
    #!/usr/bin/env bash
    echo "Test outputs preserved in test_output/"
