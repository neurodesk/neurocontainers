name: palmettobug
version: 0.0.3 # https://github.com/immunecells/HARMONI
architectures:
  - aarch64
  - x86_64
build:
  kind: neurodocker

  base-image: python:3.10-slim-bookworm
  pkg-manager: apt

  directives:
    - install:
        - ca-certificates
        - wget
        - unzip
        - build-essential
        - gfortran
        - libopenblas-dev
        - tk
        - libx11-6
        - fontconfig
        - libgles2
        - libglib2.0-0
        - libdbus-1-3
        - libxkbcommon-x11-0
        - libxcb-cursor0
    - workdir: /opt
    - run:
        - cp {{ get_file("HARMONI_main_250424_zip") }} HARMONI-main-250424.zip
        - unzip HARMONI-main-250424.zip
        - rm -rf HARMONI-main-250424.zip
        - cd HARMONI-main
        - sed -i 's/PySide6 = "<6.5"/PySide6 = ">=6.5.3,<6.6"/' pyproject.toml
        - python -m pip install --no-cache-dir --upgrade pip
        - python -m pip install --no-cache-dir .
        - cd ..
        - rm -rf HARMONI-main


deploy:
  bins:
    - palmettobug

readme: |
  ----------------------------------
  ## palmettobug/{{ context.version }} ##

  HARMONI is a pure-python GUI in customtinker that, along with its sister package isoSegDenoise, can preprocess, segment, and analyze high-dimensional image or flow cytometry data, especially mass cytometry / imaging mass cytometry data

  Example: 
  ```
  palmettobug
  ```

  More documentation can be found here: https://github.com/immunecells/HARMONI

  Citation:
  ```
  TBD
  ```

  To run container outside of this environment: ml palmettobug/{{ context.version }}

  WARNING: THIS TOOL CURRENLTY ALTERS .fonts directory and messes up the fonts in Neurodesk terminals. Needs to be removed when container stops.
  ----------------------------------

categories:
  - "molecular biology"

gui_apps:
  - name: "palmettobugGUI"
    exec: "palmettobug"

files:
  - name: HARMONI_main_250424_zip
    url: https://object-store.rc.nectar.org.au/v1/AUTH_dead991e1fa847e3afcca2d3a7041f5d/build/HARMONI-main-250424.zip
