# palmettobug container test suite
# Focused arm64 runtime verification for the rebuilt palmettobug image.

name: palmettobug
version: 0.0.3
container: palmettobug_0.0.3.simg

test_data:
  output_dir: test_output

setup:
  script: |
    #!/usr/bin/env bash
    set -e
    mkdir -p "${output_dir}"

tests:
  - name: Native arm64 runtime
    description: Verify the rebuilt image runs as a native aarch64 container
    command: uname -m
    expected_output_contains: "aarch64"

  - name: Python runtime version
    description: Verify the rebuilt image uses the expected Python runtime
    command: python3 --version
    expected_output_contains: "Python 3.10.20"

  - name: Python executable path
    description: Verify python3 resolves from the image's system Python install
    command: which python3
    expected_output_contains: "/usr/local/bin/python3"

  - name: Palmettobug package metadata
    description: Verify the installed palmettobug package metadata in the rebuilt image
    command: python3 -m pip show palmettobug 2>&1 | sed -n '1,20p'
    expected_output_contains: "Version: 0.1.9"

  - name: Palmettobug module import path
    description: Verify the shipped palmettobug package imports from site-packages
    command: python3 -c "import palmettobug; print(palmettobug.__file__)"
    expected_output_contains: "/usr/local/lib/python3.10/site-packages/palmettobug/"

  - name: Scanpy PCA workflow
    description: Verify scanpy and anndata can execute a basic PCA workflow
    command: |
      python3 - <<'PY'
      import anndata as ad
      import numpy as np
      import scanpy as sc

      adata = ad.AnnData(np.random.rand(20, 8))
      sc.pp.pca(adata, n_comps=5)
      print(adata.obsm["X_pca"].shape)
      PY
    expected_output_contains: "(20, 5)"

  - name: Squidpy spatial neighbors workflow
    description: Verify squidpy can build the expected spatial graph outputs
    command: |
      python3 - <<'PY'
      import anndata as ad
      import numpy as np
      import squidpy as sq

      adata = ad.AnnData(np.random.rand(20, 5))
      adata.obsm["spatial"] = np.random.rand(20, 2)
      sq.gr.spatial_neighbors(adata)
      print(sorted(adata.obsp.keys()))
      PY
    expected_output_contains: "spatial_connectivities"

  - name: Spatialdata import
    description: Verify the spatialdata dependency imports successfully
    command: python3 -c "import spatialdata; print(spatialdata.__version__)"
    expected_output_contains: "0.5.0"
