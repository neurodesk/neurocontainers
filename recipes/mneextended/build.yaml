name: mneextended
version: 1.1.0

architectures:
  - x86_64

build:
  kind: neurodocker
  base-image: debian:9
  pkg-manager: apt
  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive
    - install:
        - midori
        - xdg-utils
        - python-pyqt5
        - unzip
        - git
        - apt-transport-https
        - ca-certificates
        - coreutils
        - curl
        - gnome-keyring
        - gnupg
        - libnotify4
        - wget
        - libnss3
        - libxkbfile1
        - libsecret-1-0
        - libgtk-3-0
        - libxss1
        - libgbm1
        - libxshmfence1
        - libasound2
        - libglu1-mesa
        - libgl1-mesa-dri
        - mesa-utils
        - libgl1-mesa-glx
        - spyder
    - copy: mne-extended.yml /opt/mne-extended.yml
    - template:
        name: miniconda
        version: 4.7.12
        env_name: base
    - run:
        - conda install -c conda-forge -n base mamba=0.24.0
        - mamba env create --file /opt/mne-extended.yml
        - cp {{ get_file("vscode_deb") }} vscode.deb
        - apt install ./vscode.deb
        - rm -rf ./vscode.deb
        - code --extensions-dir=/opt/vscode-extensions --user-data-dir=/opt/vscode-data --install-extension ms-python.python && code --extensions-dir=/opt/vscode-extensions --user-data-dir=/opt/vscode-data --install-extension ms-python.vscode-pylance && code --extensions-dir=/opt/vscode-extensions --user-data-dir=/opt/vscode-data --install-extension ms-toolsai.jupyter && code --extensions-dir=/opt/vscode-extensions --user-data-dir=/opt/vscode-data --install-extension ms-toolsai.jupyter-keymap && code --extensions-dir=/opt/vscode-extensions --user-data-dir=/opt/vscode-data --install-extension ms-toolsai.jupyter-renderers
    - environment:
        DONT_PROMPT_WSL_INSTALL: "1"
    - workdir: /opt/
    - run:
        - tar xz -f {{ get_file("mne_bids_pipeline_main_tar_gz") }}
        - chmod a+rwx /opt/mne-bids-pipeline-main -R
    - copy: code /usr/local/sbin/code
    - run:
        - chmod a+x /usr/local/sbin/code
        - chmod a+rwx /opt/vscode-extensions -R
    - environment:
        XDG_RUNTIME_DIR: /neurodesktop-storage
        RUNLEVEL: "3"
    - user: neuro

deploy:
  bins:
    - code

readme: |-
  
  ----------------------------------
  ## mneextended/{{ context.version }} ##
  Python MNE environment with VScode 
  
  This environment contains MNE Python and some additional tools with dependencies (MNE BIDS Pipeline, MNE-connectivity, MNE-icalabel, Neurokit2)   
  
  Example:
  ```
  source /opt/miniconda-4.7.12/etc/profile.d/conda.sh
  conda activate mne-extended 
  ```
  
  More documentation can be found here: https://mne.tools/stable/index.html
  To cite MNE Python see here: https://mne.tools/stable/overview/cite.html
  
  
  To use the MNE BIDS Pipeline (https://mne.tools/mne-bids-pipeline/)
  ```
  python /opt/mne-bids-pipeline-main/run.py --config=/path/to/your/custom_config.py 
  ```
  
  To run applications outside of this container: ml mneextended/{{ context.version }}
  Note the use of the module system does not currently interface with MNE and conda environments in this container
  
  ----------------------------------

files:
  - name: mne_extended_yml
    filename: mne-extended.yml
  - name: code
    filename: code
  - name: vscode_deb
    url: https://code.visualstudio.com/sha/download?build=stable&os=linux-deb-x64
  - name: mne_bids_pipeline_main_tar_gz
    url: https://github.com/mne-tools/mne-bids-pipeline/archive/refs/heads/main.tar.gz

categories:
  - electrophysiology
  - programming

icon: data:image/png;base64,
