name: neurodock
version: 1.0.0

copyright:
  - name: neurodock license
    url: https://github.com/muscbridge/PyDesigner?tab=License-1-ov-file#readme
    
architectures:
  - x86_64
  - aarch64

build:
  kind: neurodocker

  base-image: python:3.10-slim
  pkg-manager: apt
  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive

    - install:
        - bzip2
        - curl
        - git
        - mrtrix3

    - run:
        - python -m venv /opt/pydesigner
        - /opt/pydesigner/bin/pip install --upgrade pip setuptools wheel
        - /opt/pydesigner/bin/pip install "numpy<2" "scipy<1.15" "dipy==1.8.0" git+https://github.com/muscbridge/PyDesigner.git@v{{ context.version }}
        - curl -Ls https://micro.mamba.pm/api/micromamba/linux-aarch64/latest | tar -xj -C /tmp bin/micromamba
        - install -m 0755 /tmp/bin/micromamba /usr/local/bin/micromamba
        - /usr/local/bin/micromamba create -y -p /opt/fsl -c https://fsl.fmrib.ox.ac.uk/fsldownloads/fslconda/public -c conda-forge fsl-base fsl-flirt

    - environment:
        FSLDIR: /opt/fsl
        PATH: /opt/fsl/bin:/opt/pydesigner/bin:$PATH

deploy:
  path:
    - /opt/pydesigner/bin
    - /opt/fsl/bin
  bins:
    - flirt
    - mrinfo
    - pydesigner

readme: |-
  ----------------------------------
  ## neurodock/{{ context.version }} ##
  PyD is an installable Python package deisgned to perform pre- and post- processing of dMRI acquisitions.

  Example:
  ```
  pydesigner -s --verbose \
  ~/Dataset/DKI_B0.nii,~/Dataset/DKI_B1000.nii,~/Dataset/DKI_B2000.nii
  ```

  More documentation can be found here: https://pydesigner.readthedocs.io/en/latest/processing/running_pyd.html

  To make the executables and scripts inside this container transparently available in the command line of environments where Neurocommand is installed: ml neurodock/{{ context.version }}

  Citation:
  ```
  Siddhartha Dhiman, Joshua B Teves, Kathryn E Thorn, Emilie T McKinnon,
  Hunter G Moss, Vitria Adisetiyo, Benjamin Ades-Aron, Jelle Veraart, Jenny Chen,
  Els Fieremans, Andreana Benitez, Joseph A Helpern, Jens H Jensen. PyDesigner: A
  Pythonic Implementation of the DESIGNER Pipeline for Diffusion Tensor and
  Diffusional Kurtosis Imaging. bioRxiv 2021.10.20.465189. doi:
  https://doi.org/10.1101/2021.10.20.465189```

  License: Custom license non-commerical, non-clinical care: https://github.com/muscbridge/PyDesigner?tab=License-1-ov-file#readme

  ----------------------------------

categories:
  - "diffusion imaging"
