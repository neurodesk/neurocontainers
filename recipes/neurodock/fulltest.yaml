# neurodock container test suite
# Compact ARM64 verification for the rebuilt PyDesigner + MRtrix3 + FSL image.

name: neurodock
version: 1.0.0
container: neurodock_1.0.0.simg

required_files:
  - dataset: ds000001
    files:
      - sub-01/anat/sub-01_T1w.nii.gz

test_data:
  t1w: ds000001/sub-01/anat/sub-01_T1w.nii.gz
  output_dir: test_output

setup:
  script: |
    #!/usr/bin/env bash
    set -e
    mkdir -p "${output_dir}"

tests:
  - name: ARM64 runtime
    description: Verify the container runs natively on arm64
    command: uname -m
    expected_output_contains: "aarch64"

  - name: Python runtime
    description: Verify the shipped PyDesigner venv uses Python 3.10
    command: /opt/pydesigner/bin/python --version
    expected_output_contains: "Python 3.10"

  - name: PyDesigner help
    description: Verify the PyDesigner CLI is functional
    command: pydesigner --help
    expected_output_contains: "The diffusion dataset you would like to process."

  - name: PyDesigner package metadata
    description: Verify the installed PyDesigner package version
    command: /opt/pydesigner/bin/python -m pip show PyDesigner
    expected_output_contains: "Version: 1.0.0"

  - name: Dipy compatibility import
    description: Verify the pinned dipy stack exposes the symbols PyDesigner expects
    command: >-
      /opt/pydesigner/bin/python -c "from dipy.direction import gfa, peak_directions; from scipy.special import sph_harm; print('compat-ok')"
    expected_output_contains: "compat-ok"

  - name: MRtrix3 available
    description: Verify MRtrix3 is installed for PyDesigner
    command: mrinfo --version 2>&1
    expected_output_contains: "mrinfo 3.0.4"

  - name: FSL flirt available
    description: Verify the required FSL FLIRT binary is present
    command: flirt -version 2>&1
    expected_output_contains: "FLIRT"

  - name: PyDesigner mask help
    description: Verify the CLI exposes masking support that depends on the bundled FSL tools
    command: pydesigner --help
    expected_output_contains: "--maskthr n"
