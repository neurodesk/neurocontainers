name: meica
version: 4.0.1
copyright:
  - license: CC-BY-NC-SA-4.0
    url: https://github.com/ME-ICA/me-ica/blob/{{ context.version }}/LICENSE
architectures:
  - x86_64

build:
  kind: neurodocker
  base-image: ubuntu:24.04
  pkg-manager: apt
  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive

    - install:
        - bash
        - bzip2
        - ca-certificates
        - coreutils
        - gzip
        - patch
        - python3-pip
        - python3-venv
        - python-is-python3
        - tar
        - tcsh

    - variables:
        openrecon_ubuntu_version: "24.04"

    - include: macros/openrecon/neurodocker.yaml

    - workdir: /opt/meica

    - run:
        - mkdir -p /opt/meica/me-ica
        - tar -xzf {{ get_file("meica_source") }} -C /opt/meica/me-ica --strip-components=1
        - patch -d /opt/meica/me-ica -p1 < {{ get_file("meica_skullstrip_patch") }}
        - tar -xzf {{ get_file("meica_afni_runtime") }} -C /opt/meica/me-ica
        - python3 -m venv /opt/meica/venv
        - /opt/meica/venv/bin/pip install --no-cache-dir --upgrade pip
        - /opt/meica/venv/bin/pip install --no-cache-dir -r /opt/meica/me-ica/requirements.txt
        - chmod +x /opt/meica/me-ica/meica.py /opt/meica/me-ica/meica-afni-runtime/activate_meica_afni
        - test -x /opt/meica/me-ica/meica-afni-runtime/bin/3dinfo
        - test -x /opt/meica/me-ica/meica-afni-runtime/utils/dcm2niix

    - environment:
        MEICA_REPO: /opt/meica/me-ica
        MEICA_SOURCE_TAG: "{{ context.version }}"
        MEICA_RUNTIME_TAG: "{{ context.version }}"
        MEICA_AFNI_RUNTIME: /opt/meica/me-ica/meica-afni-runtime
        MEICA_AFNI_RUNTIME_ACTIVATE: /opt/meica/me-ica/meica-afni-runtime/activate_meica_afni
        MEICA_REQUIRE_DISTRIBUTED_AFNI: "1"
        PATH: /opt/meica/me-ica/meica-afni-runtime/utils:$PATH

    - run:
        - cp {{ get_file("meica_launcher") }} /usr/local/bin/meica.py
        - chmod +x /usr/local/bin/meica.py
        - cp {{ get_file("meica_skullstrip_fallback") }} /usr/local/bin/meica-skullstrip-fallback
        - chmod +x /usr/local/bin/meica-skullstrip-fallback
        - cp {{ get_file("meica_openrecon") }} /opt/code/python-ismrmrd-server/meica.py
        - cp {{ get_file("OpenReconLabel.json") }} /opt/code/python-ismrmrd-server/OpenReconLabel.json
        - cp {{ get_file("OpenReconREADME.md") }} /opt/code/python-ismrmrd-server/OpenReconREADME.md
        - mkdir -p /tmp/share/meica_openrecon
        - chmod 1777 /tmp/share /tmp/share/meica_openrecon

    - deploy:
        bins:
          - meica.py

tests:
  - name: ME-ICA command and runtime
    script: |
      meica.py -h
      test -x "${MEICA_AFNI_RUNTIME}/bin/3dinfo"
      dcm2niix --version > /tmp/dcm2niix-version.txt 2>&1 || [ "$?" -eq 3 ]
      grep -iq dcm2niix /tmp/dcm2niix-version.txt

  - name: OpenRecon bridge imports
    script: |
      python /opt/code/python-ismrmrd-server/main.py -h 2>&1 | grep 'Example server for MRD streaming format'
      PYTHONPATH=/opt/code/python-ismrmrd-server python -c "import meica, ismrmrd, nibabel, numpy; print(meica.__file__)" | grep -x /opt/code/python-ismrmrd-server/meica.py
      test -f /opt/code/python-ismrmrd-server/OpenReconLabel.json
      test -f /opt/code/python-ismrmrd-server/OpenReconREADME.md

categories:
  - functional imaging
  - image reconstruction
  - quality control
  - workflows

structured_readme:
  description: ME-ICA v4 is a comprehensive multi-echo fMRI processing and denoising pipeline. This container packages the tagged ME-ICA source, its matched distributed AFNI runtime, and an OpenRecon image-to-image adapter that converts multi-echo MRD magnitude images to NIfTI, runs ME-ICA, and returns the denoised BOLD-like apparent dR2* series and T2* map.
  example: |-
    ml meica/{{ context.version }}

    # Standard command-line usage with three echo NIfTI time series:
    meica.py -d rest_e1.nii.gz rest_e2.nii.gz rest_e3.nii.gz -e 12 28 44

    # The OpenRecon adapter is selected with config=meica and requires
    # at least three reconstructed magnitude echoes.
  documentation: https://github.com/ME-ICA/me-ica
  citation: "Kundu P, Brenowitz ND, Voon V, Worbe Y, Vertes PE, Inati SJ, Saad ZS, Bandettini PA, Bullmore ET. Integrated strategy for improving functional connectivity mapping using multiecho fMRI. PNAS 110.40 (2013): 16187-16192. https://doi.org/10.1073/pnas.1301725110"

readme: |-
  ----------------------------------
  ## meica/{{ context.version }} ##

  ME-ICA v4 is a comprehensive multi-echo fMRI processing pipeline. It uses
  echo-time dependence to separate BOLD-like signals from non-BOLD artifacts.
  This recipe includes the matched upstream AFNI runtime and an OpenRecon
  adapter for reconstructed multi-echo magnitude image streams.

  Command-line example:
  ```bash
  ml meica/{{ context.version }}
  meica.py -d rest_e1.nii.gz rest_e2.nii.gz rest_e3.nii.gz -e 12 28 44
  ```

  OpenRecon expects at least three echoes. Echo times are read from the MRD
  sequence header, and ME-ICA runs with 24 CPU workers.
  OpenRecon always returns the denoised BOLD-like apparent dR2* series and the
  T2* map (`dr2s_epi` and `t2s_epi`); there is no scanner output selector.

  Documentation: https://github.com/ME-ICA/me-ica

  ME-ICA is a research tool and is not intended for standard clinical use.

  License: CC-BY-NC-SA-4.0
  ----------------------------------

icon: data:image/png;base64,

files:
  - name: meica_source
    url: https://github.com/ME-ICA/me-ica/archive/refs/tags/{{ context.version }}.tar.gz
  - name: meica_afni_runtime
    url: https://github.com/ME-ICA/meica-afni/releases/download/{{ context.version }}/meica-afni-runtime-linux-x86_64.tar.gz
  - name: meica_launcher
    filename: meica-launcher
  - name: meica_skullstrip_fallback
    filename: meica-skullstrip-fallback
  - name: meica_skullstrip_patch
    filename: meica-skullstrip-fallback.patch
  - name: meica_openrecon
    filename: meica.py
  - name: OpenReconLabel.json
    filename: OpenReconLabel.json
  - name: OpenReconREADME.md
    filename: OpenReconREADME.md
