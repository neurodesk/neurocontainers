# ME-ICA container test suite
# Exercises the packaged CLI/runtime and the OpenRecon image bridge.

name: meica
version: 4.0.1
container: meica_${version}_REFERENCE.simg

test_data:
  output_dir: test_output
  fake_meica: test_output/fake-meica

setup:
  script: |
    #!/usr/bin/env bash
    set -euo pipefail
    mkdir -p "${output_dir}"
    cat > "${fake_meica}" <<'PY'
    #!/usr/bin/env python3
    import sys
    from pathlib import Path

    import nibabel as nib
    import numpy as np

    args = sys.argv[1:]
    data_start = args.index("-d") + 1
    echo_start = args.index("-e")
    cpu_start = args.index("-j")
    prefix_start = args.index("--prefix")
    datasets = args[data_start:echo_start]
    echo_times = [float(value) for value in args[echo_start + 1:cpu_start]]
    assert echo_times == [10.0, 25.0, 40.0]
    assert args[cpu_start + 1] == "24"
    assert args[prefix_start + 1] == "openrecon"
    assert "--OVERWRITE_NOWAIT" in args

    images = [nib.load(path) for path in datasets]
    data = np.mean([image.get_fdata(dtype=np.float32) for image in images], axis=0)
    nib.save(
        nib.Nifti1Image(data.astype(np.float32), images[0].affine),
        Path.cwd() / "openrecon_dr2s_epi.nii.gz",
    )
    nib.save(
        nib.Nifti1Image(data.mean(axis=3).astype(np.float32), images[0].affine),
        Path.cwd() / "openrecon_t2s_epi.nii.gz",
    )
    PY
    chmod +x "${fake_meica}"

tests:
  - name: ME-ICA CLI and matched AFNI runtime
    description: Verify the tagged ME-ICA command and distributed runtime are installed
    script: |
      set -euo pipefail
      command -v meica.py | grep -x /usr/local/bin/meica.py
      meica.py -h > "${output_dir}/meica-help.txt"
      grep -q '^Usage: meica.py \[options\]' "${output_dir}/meica-help.txt"
      test -x "${MEICA_AFNI_RUNTIME}/bin/3dinfo"
      test -x "${MEICA_AFNI_RUNTIME}/utils/dcm2niix"

  - name: Functional phantom skull stripping fallback
    description: Fill the complete nonzero phantom envelope when functional 3dSkullStrip fails
    script: |
      set -euo pipefail
      OUTPUT_DIR="${output_dir}" python - <<'PY'
      import os
      from pathlib import Path

      import nibabel as nib
      import numpy as np

      data = np.zeros((12, 12, 12), dtype=np.float32)
      data[2:10, 2:10, 2:10] = 10
      data[4:8, 4:8, 4:8] = 0
      data[3, 3, 3] = -5
      nib.save(
          nib.Nifti1Image(data, np.eye(4)),
          Path(os.environ["OUTPUT_DIR"]) / "phantom-functional.nii.gz",
      )
      nib.save(
          nib.Nifti1Image(np.zeros_like(data), np.eye(4)),
          Path(os.environ["OUTPUT_DIR"]) / "empty-functional.nii.gz",
      )
      PY
      PATH="${MEICA_AFNI_RUNTIME}/bin:${PATH}" \
        MEICA_3DSKULLSTRIP=/usr/bin/false meica-skullstrip-fallback \
        -no_avoid_eyes \
        -prefix "${output_dir}/phantom-functional-mask.nii.gz" \
        -overwrite \
        -input "${output_dir}/phantom-functional.nii.gz"
      OUTPUT_DIR="${output_dir}" python - <<'PY'
      import os
      from pathlib import Path

      import nibabel as nib
      import numpy as np

      mask = nib.load(
          Path(os.environ["OUTPUT_DIR"]) / "phantom-functional-mask.nii.gz"
      ).get_fdata()
      assert set(np.unique(mask)) == {0.0, 1.0}
      assert np.count_nonzero(mask) == 8**3
      assert np.all(mask[2:10, 2:10, 2:10] == 1)
      assert np.all(mask[:2] == 0)
      assert np.all(mask[10:] == 0)
      print("segmented the complete phantom envelope")
      PY
      if PATH="${MEICA_AFNI_RUNTIME}/bin:${PATH}" \
        MEICA_3DSKULLSTRIP=/usr/bin/false meica-skullstrip-fallback \
        -prefix "${output_dir}/empty-functional-mask.nii.gz" \
        -input "${output_dir}/empty-functional.nii.gz"; then
        echo "empty phantom fallback input unexpectedly succeeded" >&2
        exit 1
      fi

  - name: OpenRecon metadata contract
    description: Verify the scanner label exposes the ME-ICA adapter and focused controls
    script: |
      set -euo pipefail
      python - <<'PY'
      import json
      from pathlib import Path

      path = Path("/opt/code/python-ismrmrd-server/OpenReconLabel.json")
      data = json.loads(path.read_text())
      assert data["general"]["id"] == "meica"
      assert data["reconstruction"]["emitter"] == "image"
      assert data["reconstruction"]["injector"] == "image"
      assert data["reconstruction"]["content_qualification_type"] == "RESEARCH"
      assert {item["id"] for item in data["parameters"]} == {"config"}
      assert data["reconstruction"]["min_count_required_cpu_cores"] == 24
      print(path)
      PY

  - name: OpenRecon bridge import
    description: Verify the OpenRecon server and ME-ICA adapter import together
    script: |
      set -euo pipefail
      python /opt/code/python-ismrmrd-server/main.py -h > "${output_dir}/server-help.txt" 2>&1
      grep 'Example server for MRD streaming format' "${output_dir}/server-help.txt"
      PYTHONPATH=/opt/code/python-ismrmrd-server python -c "import meica, ismrmrd, nibabel, numpy; print(meica.__file__)" | grep -x /opt/code/python-ismrmrd-server/meica.py

  - name: OpenRecon bridge processes multi-echo time series
    description: Convert three packed MRD echoes to NIfTI, run a fake ME-ICA command, and return a derived dynamic series
    timeout: 180
    script: |
      set -euo pipefail
      FAKE_MEICA="${fake_meica}" OUTPUT_DIR="${output_dir}" PYTHONPATH=/opt/code/python-ismrmrd-server python - <<'PY'
      import os
      from pathlib import Path

      import ismrmrd
      import numpy as np
      import meica


      class SequenceParameters:
          TE = [10.0, 25.0, 40.0]
          TR = [1500.0]


      class Metadata:
          sequenceParameters = SequenceParameters()


      class Connection:
          def __init__(self, images):
              self.images = images
              self.sent = []
              self.logs = []
              self.closed = False

          def __iter__(self):
              yield from self.images
              yield None

          def send_image(self, images):
              self.sent.append(images if isinstance(images, list) else [images])

          def send_logging(self, level, message):
              self.logs.append((level, message))

          def send_close(self):
              self.closed = True


      def set_vector(target, values):
          for index, value in enumerate(values):
              target[index] = value


      def mrd_image(echo, repetition):
          data = np.full((2, 3, 4), 100 * echo + 10 * repetition, dtype=np.float32)
          image = ismrmrd.Image.from_array(data, transpose=False)
          header = image.getHead()
          header.image_type = ismrmrd.IMTYPE_MAGNITUDE
          header.image_series_index = 7
          header.image_index = repetition * 3 + echo
          header.contrast = echo - 1
          header.repetition = repetition
          set_vector(header.matrix_size, [4, 3, 2])
          set_vector(header.field_of_view, [8.0, 6.0, 2.5])
          set_vector(header.position, [0.0, 0.0, 0.0])
          set_vector(header.read_dir, [1.0, 0.0, 0.0])
          set_vector(header.phase_dir, [0.0, 1.0, 0.0])
          set_vector(header.slice_dir, [0.0, 0.0, 1.0])
          image.setHead(header)
          meta = ismrmrd.Meta()
          meta["SequenceDescription"] = "multi_echo_epi"
          image.attribute_string = meta.serialize()
          return image


      images = [
          mrd_image(echo, repetition)
          for repetition in range(2)
          for echo in range(1, 4)
      ]
      connection = Connection(images)
      meica.OPENRECON_WORK_ROOT = Path(os.environ["OUTPUT_DIR"]) / "openrecon-work"
      meica.process(
          connection,
          {
              "parameters": {
                  "meicabinary": os.environ["FAKE_MEICA"],
              }
          },
          Metadata(),
      )

      assert connection.closed
      assert not connection.logs, connection.logs
      assert len(connection.sent) == 2
      by_role = {}
      for derived in connection.sent:
          roles = {
              ismrmrd.Meta.deserialize(image.attribute_string)["ImageTypeValue4"]
              for image in derived
          }
          assert len(roles) == 1
          by_role[roles.pop()] = derived
          assert len({int(image.getHead().image_series_index) for image in derived}) == 1
          for image in derived:
              meta = ismrmrd.Meta.deserialize(image.attribute_string)
              assert meta["Keep_image_geometry"] == "1"
              assert "IceMiniHead" not in meta

      assert set(by_role) == {"MEICA_DR2S", "MEICA_T2S"}
      assert len(by_role["MEICA_DR2S"]) == 4
      assert {int(image.getHead().repetition) for image in by_role["MEICA_DR2S"]} == {0, 1}
      assert {int(image.getHead().slice) for image in by_role["MEICA_DR2S"]} == {0, 1}
      assert len(by_role["MEICA_T2S"]) == 2
      assert {int(image.getHead().repetition) for image in by_role["MEICA_T2S"]} == {0}
      assert {int(image.getHead().slice) for image in by_role["MEICA_T2S"]} == {0, 1}
      print("returned apparent dR2* and T2* ME-ICA MRD series")
      PY
