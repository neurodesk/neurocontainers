  - name: wrap_kernels
    contents: |
      #!/usr/bin/env python3
      import json
      from pathlib import Path

      wrapper = "/opt/neurodesktop/kernel_wrapper.sh"
      search_roots = [
          Path("/opt/conda/share/jupyter/kernels"),
          Path("/usr/local/share/jupyter/kernels"),
          Path("/usr/share/jupyter/kernels"),
      ]

      for root in search_roots:
          if not root.is_dir():
              continue
          for spec_file in root.glob("*/kernel.json"):
              try:
                  spec = json.loads(spec_file.read_text())
              except (json.JSONDecodeError, OSError) as exc:
                  print(f"[WARN] Skipping {spec_file}: {exc}")
                  continue
              argv = spec.get("argv")
              if not isinstance(argv, list) or not argv or argv[0] == wrapper:
                  continue
              spec["argv"] = [wrapper] + argv
              spec_file.write_text(json.dumps(spec, indent=1))
              print(f"[INFO] Wrapped kernel spec: {spec_file}")

  - name: bashrc_append
    contents: |
      source /opt/neurodesktop/environment_variables.sh

      # Neurodesk persistent bash history
      if [[ $- == *i* ]]; then
          shopt -s histappend

          if [ -d "${HOME}/neurodesktop-storage" ] && [ -w "${HOME}/neurodesktop-storage" ]; then
              export HISTFILE="${HOME}/neurodesktop-storage/.bash_history"
          elif [ -d "/neurodesktop-storage" ] && [ -w "/neurodesktop-storage" ]; then
              export HISTFILE="/neurodesktop-storage/.bash_history"
          else
              export HISTFILE="${HISTFILE:-$HOME/.bash_history}"
          fi

          export HISTSIZE=100000
          export HISTFILESIZE=200000
          export HISTCONTROL=ignoredups:erasedups

          if [[ "${PROMPT_COMMAND:-}" != *"history -a"* ]]; then
              if [ -n "${PROMPT_COMMAND:-}" ]; then
                  export PROMPT_COMMAND="history -a; history -n; ${PROMPT_COMMAND}"
              else
                  export PROMPT_COMMAND="history -a; history -n"
              fi
          fi
      fi

  - name: start-neurodesktop-jupyterlab
    contents: |
      #!/usr/bin/env bash
      set -euo pipefail

      export JUPYTER_TOKEN="${JUPYTER_TOKEN:-}"
      export JUPYTER_PASSWORD="${JUPYTER_PASSWORD:-}"
      export NEURODESKTOP_JUPYTER_PORT="${NEURODESK_WEBAPP_PORT:-${NEURODESKTOP_JUPYTER_PORT:-8888}}"

      if [ -x /opt/neurodesktop/jupyterlab_startup.sh ]; then
          /opt/neurodesktop/jupyterlab_startup.sh
      fi

      exec jupyter lab \
          --ip=0.0.0.0 \
          --port="${NEURODESKTOP_JUPYTER_PORT}" \
          --no-browser \
          --ServerApp.token="${JUPYTER_TOKEN}" \
          --ServerApp.password="${JUPYTER_PASSWORD}"

  - name: start-neurodesktop-guacamole
    contents: |
      #!/usr/bin/env bash
      set -euo pipefail
      if [ -n "${NEURODESK_WEBAPP_PORT:-}" ] && [ -z "${NEURODESKTOP_TOMCAT_PORT:-}" ]; then
          export NEURODESKTOP_TOMCAT_PORT="${NEURODESK_WEBAPP_PORT}"
      fi
      exec /opt/neurodesktop/guacamole.sh
