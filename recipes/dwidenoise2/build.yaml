name: dwidenoise2
version: "20260603"

description: Updated implementation of MP-PCA denoising using the MRtrix3 API.

copyright:
  - license: PolyForm-Noncommercial-1.0.0
    url: https://github.com/Lestropie/dwidenoise2/blob/main/LICENSE

architectures:
  - x86_64

variables:
  upstream_commit: 2cd437203f737d680042053b11000421e42e38c9
  mrtrix3_commit: fa6ee952913fbc1df79aeca745600852155f533f
  dwidenoise2_source_dir: /src/dwidenoise2
  mrtrix3_source_dir: /src/mrtrix3
  install_path: /opt/mrtrix3

build:
  kind: neurodocker
  base-image: debian:bookworm-slim
  pkg-manager: apt

  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive
        PATH: "{{ context.install_path }}/bin:$PATH"
        LD_LIBRARY_PATH: "{{ context.install_path }}/cpp/core/"

    - install:
        - less
        - libfftw3-double3
        - libfftw3-single3
        - libpng16-16

    - run:
        - apt-get update -qq
        - apt-get install -y --no-install-recommends build-essential cmake libfftw3-dev libpng-dev libtiff-dev ninja-build pkg-config zlib1g-dev
        - mkdir -p "{{ context.dwidenoise2_source_dir }}" "{{ context.mrtrix3_source_dir }}"
        - tar -xzf {{ get_file("dwidenoise2_source_tar_gz") }} -C "{{ context.dwidenoise2_source_dir }}" --strip-components=1
        - tar -xzf {{ get_file("mrtrix3_source_tar_gz") }} -C "{{ context.mrtrix3_source_dir }}" --strip-components=1
        - cp "{{ context.dwidenoise2_source_dir }}/cpp/cmd/dwidenoise2.cpp" "{{ context.mrtrix3_source_dir }}/cpp/cmd/dwidenoise2.cpp"
        - cp "{{ context.dwidenoise2_source_dir }}/cpp/cmd/dwi2noise.cpp" "{{ context.mrtrix3_source_dir }}/cpp/cmd/dwi2noise.cpp"
        - cp -a "{{ context.dwidenoise2_source_dir }}/cpp/core/denoise" "{{ context.mrtrix3_source_dir }}/cpp/core/denoise"
        - cd "{{ context.mrtrix3_source_dir }}"
        - cmake -Bbuild -GNinja -DMRTRIX_BUILD_GUI=OFF -DCMAKE_COMPILE_WARNING_AS_ERROR=ON --preset=release
        - cmake --build build --target dwidenoise2 dwi2noise mrcalc mrcat mrconvert
        - mkdir -p "{{ context.install_path }}"
        - cp -a build/. "{{ context.install_path }}/"
        - chmod -R a+rX "{{ context.install_path }}"
        - rm -rf "{{ context.dwidenoise2_source_dir }}" "{{ context.mrtrix3_source_dir }}"
        - apt-get purge -y --auto-remove build-essential cmake libfftw3-dev libpng-dev libtiff-dev ninja-build pkg-config zlib1g-dev
        - rm -rf /var/lib/apt/lists/*

deploy:
  path:
    - "{{ context.install_path }}/bin"

structured_readme:
  description: >-
    dwidenoise2 is a reworked implementation of Marchenko-Pastur Principal
    Components Analysis denoising of greater-than-3D MRI data, building on the
    MRtrix3 dwidenoise command.
  example: dwidenoise2 input.mif denoised.mif -noise_out noise.mif
  documentation: https://github.com/Lestropie/dwidenoise2
  citation: >-
    Smith RE. dwidenoise2: Updated implementation of MP-PCA denoising using the
    MRtrix3 API. https://github.com/Lestropie/dwidenoise2

readme: |-
  ----------------------------------
  ## dwidenoise2/{{ context.version }} ##

  dwidenoise2 is a reworked implementation of Marchenko-Pastur Principal
  Components Analysis denoising of greater-than-3D MRI data. It builds on the
  MRtrix3 dwidenoise command and provides the `dwidenoise2` and `dwi2noise`
  commands, plus the MRtrix3 helper commands `mrcalc`, `mrcat`, and `mrconvert`.

  This recipe follows the upstream Dockerfile build strategy by pinning
  dwidenoise2 to upstream commit {{ context.upstream_commit }}, pinning MRtrix3
  to {{ context.mrtrix3_commit }}, copying the dwidenoise2 sources into the
  MRtrix3 tree before CMake configuration, and installing the resulting build
  tree under {{ context.install_path }}.

  Example:
  ```bash
  dwidenoise2 input.mif denoised.mif -noise_out noise.mif
  dwi2noise input.mif noise.mif
  ```

  More documentation can be found here: https://github.com/Lestropie/dwidenoise2

  License: PolyForm Noncommercial License 1.0.0.
  https://github.com/Lestropie/dwidenoise2/blob/main/LICENSE

  To run container outside of this environment: ml dwidenoise2/{{ context.version }}

  ----------------------------------

categories:
  - diffusion imaging

icon: data:image/png;base64,

files:
  - name: dwidenoise2_source_tar_gz
    url: https://github.com/Lestropie/dwidenoise2/archive/{{ context.upstream_commit }}.tar.gz
  - name: mrtrix3_source_tar_gz
    url: https://github.com/MRtrix3/mrtrix3/archive/{{ context.mrtrix3_commit }}.tar.gz
