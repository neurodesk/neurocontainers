name: cartool
version: 5.06.04
icon: data:image/png;base64,

architectures:
  - x86_64

variables:
  cartool_release_hash: 8FCF
  cartool_installer: "Cartool64Setup.{{ context.version }}.{{ context.cartool_release_hash }}.exe"
  cartool_installer_url: "https://github.com/DenisBrunet/Cartool/releases/download/{{ context.version }}/{{ context.cartool_installer }}"

files:
  - name: cartool_installer
    url: "{{ context.cartool_installer_url }}"

build:
  kind: neurodocker
  base-image: ubuntu:22.04
  pkg-manager: apt
  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive
    - workdir: /opt
    - install:
        - wget
        - git
        - curl
        - ca-certificates
        - p7zip-full
        - unzip
        - wine
        - xvfb
    - environment:
        WINEPREFIX: /opt/wine
    - run:
        - mkdir -p /opt/cartool-{{ context.version }} /opt/cartool-{{ context.version }}/bin /opt/wine
        - 7z x -y -o/opt/cartool-{{ context.version }} {{ get_file("cartool_installer") }}
        - sh -c 'Xvfb :99 -screen 0 1024x768x16 & xvfb_pid=$!; DISPLAY=:99 wineboot --init; status=$?; kill "$xvfb_pid"; exit "$status"'
        - printf '#!/usr/bin/env bash\nexport WINEPREFIX=/opt/wine\nexec wine /opt/cartool-{{ context.version }}/Cartool64.exe "$@"\n' > /opt/cartool-{{ context.version }}/bin/cartool
        - chmod -R a+rX /opt/cartool-{{ context.version }}
        - chmod -R a+rwX /opt/wine
        - chmod a+x /opt/cartool-{{ context.version }}/bin/cartool
        - dpkg --add-architecture i386
    - install:
        - wine32
    - environment:
        PATH: $PATH:/opt/cartool-{{ context.version }}/bin
    - copy: license.txt /license.txt

deploy:
  path:
    - /opt/cartool-{{ context.version }}/bin/

readme: |-
  
  ----------------------------------
  ## cartool/{{ context.version }} ##
  The Cartool EEG Analysis software
  
  Example:
  ```
  ```
  
  More documentation can be found here: https://sites.google.com/site/cartoolcommunity/about-cartool?authuser=0
  
  To make the executables and scripts inside this container transparently available in the command line of environments where Neurocommand is installed: ml cartool/{{ context.version }}
  
  License:
  ```
  Please register and make sure to read and adhere to the license if you use Cartool: https://sites.google.com/site/cartoolcommunity/about-cartool/cartool-registration?authuser=0
  Cartool is free if you use it for public research and non-commercial purposes. Cartool is not free if you are either working with private funding (private research), and/or using Cartool for some commercial purpose (making money through its use)
  ```
  
  Citation:
  ```
  It is required to cite Cartool in subsequent publications, if it has been effectively used to process, manipulate or display the data. Likewise, the support for this software development must also be properly acknowledged (this is a lot of public money put into this software). Therefore, we ask to add the following sentence in the Acknowledgments section:
  
  The Cartool software (cartoolcommunity.unige.ch) has been programmed by Denis Brunet, from the Functional Brain Mapping Laboratory (FBMLab), Geneva, Switzerland, and is supported by the Center for Biomedical Imaging (CIBM) of Geneva and Lausanne.
  
  In addition, reference to Cartool within the Material and Methods section should be done in the following way:
  
  The analysis was performed using the Cartool software by Denis Brunet (cartoolcommunity.unige.ch).
  ```
  
  ----------------------------------

categories:
  - electrophysiology
  - visualization
