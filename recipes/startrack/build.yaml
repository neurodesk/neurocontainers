name: startrack
version: "20250920"

copyright:
  - license: LicenseRef-StarTrack
    url: https://nbl-research.github.io/startrack.html

architectures:
  - x86_64

variables:
  matlab_runtime_version: 2023b
  matlab_runtime_root: /opt/MCR-{{ context.matlab_runtime_version }}/R{{ context.matlab_runtime_version }}
  install_path: /opt/{{ context.name }}-{{ context.version }}

build:
  kind: neurodocker
  base-image: ubuntu:20.04
  pkg-manager: apt
  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive
        MCR_CACHE_ROOT: /tmp/mcr_cache

    - template:
        name: matlabmcr
        curl_opts: "-fsSL --retry 5 --retry-delay 5 --connect-timeout 20 --max-time 3600"
        install_path: /opt/MCR-{{ context.matlab_runtime_version }}
        version: "{{ context.matlab_runtime_version }}"

    - run:
        - mkdir -p "{{ context.install_path }}" /tmp/startrack-unpack
        - unzip -q {{ get_file("startrack_linux_zip") }} -d /tmp/startrack-unpack
        - cp /tmp/startrack-unpack/ST_Linux_x86/StarTrack "{{ context.install_path }}/StarTrack"
        - cp /tmp/startrack-unpack/ST_Linux_x86/StarTrack.sh "{{ context.install_path }}/StarTrack.sh"
        - cp /tmp/startrack-unpack/ST_Linux_x86/readme.txt "{{ context.install_path }}/readme.txt"
        - chmod 0755 "{{ context.install_path }}/StarTrack" "{{ context.install_path }}/StarTrack.sh"
        - rm -rf /tmp/startrack-unpack

    - copy:
        - startrack_wrapper
        - /usr/local/bin/startrack

    - run:
        - chmod 0755 /usr/local/bin/startrack

deploy:
  bins:
    - startrack

files:
  - name: startrack_linux_zip
    url: https://www.dropbox.com/scl/fi/3iovmntgm129hzxarmjnm/ST_Linux_x86.zip?rlkey=xcz8y2mrcpeo1ehxtfd6exhbt&dl=1
  - name: startrack_wrapper
    contents: |
      #!/usr/bin/env bash
      set -euo pipefail

      mcr_root="${MCRROOT:-{{ context.matlab_runtime_root }}}"
      export MCR_CACHE_ROOT="${MCR_CACHE_ROOT:-/tmp/mcr_cache}"
      mkdir -p "${MCR_CACHE_ROOT}"

      export LD_LIBRARY_PATH=".:${mcr_root}/runtime/glnxa64:${mcr_root}/bin/glnxa64:${mcr_root}/sys/os/glnxa64:${mcr_root}/sys/opengl/lib/glnxa64:${mcr_root}/extern/bin/glnxa64:${LD_LIBRARY_PATH:-}"

      if command -v ldd >/dev/null 2>&1 && ldd --version 2>&1 | grep -q "(GNU libc) 2\\.17"; then
        export LD_PRELOAD="${mcr_root}/bin/glnxa64/glibc-2.17_shim.so"
      fi

      exec "{{ context.install_path }}/StarTrack" "$@"

categories:
  - diffusion imaging

gui_apps:
  - name: StarTrack
    exec: startrack

icon: data:image/png;base64,

structured_readme:
  description: >-
    StarTrack is a diffusion MRI analysis and tractography application for DTI,
    spherical deconvolution, fibre orientation distribution visualization, and
    whole-brain tractography.
  example: startrack
  documentation: https://nbl-research.github.io/startrack.html

readme: |-
  ----------------------------------
  ## startrack/{{ context.version }} ##

  StarTrack is a diffusion MRI analysis and tractography application for DTI,
  spherical deconvolution, fibre orientation distribution visualization, and
  whole-brain tractography.

  Example:
  ```bash
  startrack
  ```

  The container installs StarTrack with MATLAB Runtime {{ context.matlab_runtime_version }}.
  Runtime cache files are written under `/tmp/mcr_cache` by default.

  More documentation:
  https://nbl-research.github.io/startrack.html

  To run applications outside of this container: ml startrack/{{ context.version }}

  ----------------------------------
