name: emuses
version: 1.3.0

copyright:
  - license: MIT
    url: https://github.com/chrisfoulon/emuses/blob/v{{ context.version }}/.lad/LICENSE.md

architectures:
  - x86_64

auto_update:
  method: github_release
  repo: chrisfoulon/emuses

variables:
  install_path: /opt/{{ context.name }}-{{ context.version }}

build:
  kind: neurodocker
  base-image: python:3.11-slim-bookworm
  pkg-manager: apt

  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive
        EMUSES_DEPLOYMENT_MODE: local
        EMUSES_JOB_STORAGE: /tmp/emuses/jobs
        HOME: /tmp
        MPLCONFIGDIR: /tmp/matplotlib-emuses
        NUMBA_CACHE_DIR: /tmp/numba-emuses
        TORCH_HOME: /tmp/torch-emuses
        XDG_CACHE_HOME: /tmp/cache-emuses

    - install:
        - build-essential
        - ca-certificates
        - libgomp1
        - libpq5

    - run:
        - python -m pip install --no-cache-dir --upgrade pip setuptools wheel pip-tools
        - mkdir -p "{{ context.install_path }}" /tmp/emuses-src /tmp/emuses/jobs
        - tar -xzf {{ get_file("emuses_source") }} --strip-components=1 -C /tmp/emuses-src
        - pip-sync /tmp/emuses-src/requirements-prod.txt
        - python -m pip install --no-cache-dir --no-deps /tmp/emuses-src
        - cp -a /tmp/emuses-src/README.md "{{ context.install_path }}/README.md"
        - rm -rf /tmp/emuses-src /root/.cache/pip /tmp/cache-emuses /tmp/matplotlib-emuses /tmp/numba-emuses /tmp/torch-emuses

deploy:
  bins:
    - emuses

files:
  - name: emuses_source
    url: https://github.com/chrisfoulon/emuses/archive/refs/tags/v{{ context.version }}.tar.gz

categories:
  - machine learning
  - statistical analysis
  - modeling

structured_readme:
  description: >-
    EMUSES (Emerging-properties Mapping Using Spatial Embedding Statistics) is
    a predictive modeling and interpretability tool for high-dimensional data,
    including image, NIfTI, and tabular datasets. It combines UMAP-based latent
    spaces with clustering, heatmap, and prediction workflows.
  example: |-
    emuses --help
    emuses full output_folder input_dataset.csv
    emuses umap output_folder input_dataset.csv
    emuses heatmap output_folder input_dataset.csv --scores scores.csv
  documentation: https://github.com/chrisfoulon/emuses
  citation: |-
    Foulon C, Ovando-Tellez M, Talozzi L, Corbetta M, Matsulevits A, Thiebaut de Schotten M.
    Emerging-properties Mapping Using Spatial Embedding Statistics: EMUSES.
    arXiv:2406.14309, 2024.

readme: |-
  ----------------------------------
  ## emuses/{{ context.version }} ##

  EMUSES (Emerging-properties Mapping Using Spatial Embedding Statistics) is a
  predictive modeling and interpretability tool for high-dimensional data. It
  supports image, NIfTI, and tabular inputs, then builds UMAP latent spaces for
  clustering, heatmap, and prediction workflows.

  Examples:
  ```bash
  emuses --help
  emuses full output_folder input_dataset.csv
  emuses umap output_folder input_dataset.csv
  emuses heatmap output_folder input_dataset.csv --scores scores.csv
  ```

  Runtime cache and service job files default to /tmp so the tool does not
  depend on a persistent home directory inside the container.

  More documentation can be found here:
  https://github.com/chrisfoulon/emuses

  Citation:
  ```
  Foulon C, Ovando-Tellez M, Talozzi L, Corbetta M, Matsulevits A, Thiebaut de Schotten M.
  Emerging-properties Mapping Using Spatial Embedding Statistics: EMUSES.
  arXiv:2406.14309, 2024.
  ```

  To run container outside of this environment: ml emuses/{{ context.version }}

  ----------------------------------

