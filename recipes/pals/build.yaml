name: pals
version: 2.0.1

copyright:
  - license: custom
    url: https://github.com/npnl/PALS

architectures:
  - x86_64

readme: |
  ## PALS - Pipeline for Analyzing Lesions After Stroke {{ context.version }}

  PALS is a flexible, scalable toolbox for image processing and quality analysis
  of stroke lesion MRI data. It is the preprocessing pipeline associated with the
  ATLAS v2.0 dataset (Liew et al., 2022, *Scientific Data*).

  ### Pipeline steps

  1. Reorientation to MNI standard space (FSL `fslreorient2std`)
  2. Intensity inhomogeneity correction (ANTs `N4BiasFieldCorrection`)
  3. Brain extraction (FSL `BET`)
  4. Registration to MNI152 template (FSL `FLIRT`)
  5. Lesion load calculation (overlap with atlas ROIs)
  6. Quality-check GIF generation

  ### Inputs

  - T1-weighted MRI (NIfTI format)
  - Stroke lesion segmentation mask (NIfTI format)

  ### Usage

  **Command-line (single scan):**
  ```bash
  python /opt/pals-{{ context.version }}/run_pals.py \
      -s SESSION_ID \
      -i /path/to/T1.nii.gz \
      -l /path/to/lesion_mask.nii.gz \
      -o /path/to/output_dir
  ```

  **Configuration file:**
  ```bash
  python /opt/pals-{{ context.version }}/run_pals.py -c /path/to/config.json
  ```

  **Before first use** — edit `/opt/pals-{{ context.version }}/presets.json` to set
  `ants_path`, `fsl_path`, `rois_path`, and `template_directory`. Inside this
  container these resolve to:
  - `ants_path`: `/opt/ants-2.4.3/bin`
  - `fsl_path`: `/opt/miniconda/bin`
  - `rois_path`: `/opt/pals-{{ context.version }}/ROIs`
  - `template_directory`: `/opt/pals-{{ context.version }}/templates`

  ### Citations

  If you use PALS please cite:
  - Liew S-L et al. (2022). A large, curated, open-source stroke neuroimaging
    dataset to improve lesion segmentation algorithms. *Scientific Data*, 9, 320.
    https://doi.org/10.1038/s41597-022-01401-7
  - Ngo D et al. (2018). PALS: Pipeline for Analyzing Lesions after Stroke.
    *Frontiers in Neuroinformatics*, 12, 63.
    https://doi.org/10.3389/fninf.2018.00063

  ### More information

  https://github.com/npnl/PALS

files:
  - name: presets.json
    contents: |
      {
          "ants_path": "/opt/ants-2.4.3",
          "fsl_path": "/opt/miniconda/bin",
          "rois_path": "/opt/pals-2.0.1/ROIs",
          "template_directory": "/opt/pals-2.0.1/templates"
      }
 
build:
  kind: neurodocker
 
  base-image: ubuntu:22.04
  pkg-manager: apt
 
  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive
 
    - install:
        - git
        - wget
        - curl
        - bc
        - dc
        - libgomp1
 
    # ── ANTs 2.4.3 ───────────────────────────────────────────────────────────
    - template:
        name: ants
        version: 2.4.3
        method: binaries
 
    # ── Miniconda (manual install to avoid conda tos bug) ────────────────────
    - run:
        - curl -fsSL -o /tmp/miniconda.sh https://repo.continuum.io/miniconda/Miniconda3-py310_23.3.1-0-Linux-x86_64.sh
        - bash /tmp/miniconda.sh -b -p /opt/miniconda
        - rm -f /tmp/miniconda.sh
        - /opt/miniconda/bin/conda config --system --prepend channels conda-forge
        - /opt/miniconda/bin/conda config --set channel_priority strict
        - /opt/miniconda/bin/conda config --system --set auto_update_conda false
        - /opt/miniconda/bin/conda config --system --set show_channel_urls true
        - /opt/miniconda/bin/conda clean --all --yes
 
    # ── FSL 6.0.7.1 via conda (must come after miniconda install) ────────────
    - run:
        /opt/miniconda/bin/conda install -y -c https://fsl.fmrib.ox.ac.uk/fsldownloads/fslconda/public/ -c conda-forge fsl-base=2306.1
 
    # ── PALS v2.0.1 ──────────────────────────────────────────────────────────
    - run:
        - /opt/miniconda/bin/pip install --no-cache-dir 'matplotlib>=3.5' 'nibabel>=3.2' 'numpy>=1.21' 'scipy>=1.7' 'pandas>=1.3' 'Pillow>=8.0'
        - git clone --depth 1 --branch main https://github.com/npnl/PALS /opt/pals-2.0.1
        - grep -iv matplotlib /opt/pals-2.0.1/requirements.txt | /opt/miniconda/bin/pip install --no-cache-dir -r /dev/stdin
 
    - copy:
      - presets.json
      - /opt/pals-2.0.1/presets.json
 
    - environment:
        PALS_DIR: /opt/pals-2.0.1
        PATH: /opt/pals-2.0.1:/opt/ants-2.4.3:/opt/miniconda/bin:$PATH
 
deploy:
  path:
    - /opt/pals-2.0.1
    - /opt/ants-2.4.3
    - /opt/miniconda/bin
  bins:
    - python
 
categories:
  - image segmentation
 
icon: data:image/png;base64,
