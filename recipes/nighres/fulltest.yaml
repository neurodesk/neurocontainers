# nighres container test suite
# Minimal ARM64 verification for the rebuilt Python/JCC payload.

name: nighres
version: 1.5.2
container: nighres_1.5.2.simg

test_data:
  output_dir: test_output

setup:
  script: |
    #!/usr/bin/env bash
    set -e
    mkdir -p "${output_dir}"
    python3 - <<'PY'
    import numpy as np
    import nibabel as nib
    from pathlib import Path

    out = Path("test_output")
    data = np.arange(27, dtype=np.float32).reshape((3, 3, 3))
    nib.save(nib.Nifti1Image(data, np.eye(4)), out / "synthetic.nii.gz")
    PY

tests:
  - name: ARM64 runtime
    description: Verify the container runs natively on arm64
    command: uname -m
    expected_output_contains: "aarch64"

  - name: Python runtime
    description: Verify the rebuilt image exposes the expected Python runtime
    command: python3 --version
    expected_output_contains: "Python 3.12.3"

  - name: nighres package metadata
    description: Verify the installed nighres package metadata matches the rebuilt image
    command: >-
      python3 -m pip show nighres
    expected_output_contains: "Version: 1.5.2"

  - name: Java bridge imports
    description: Verify the JCC and nighresjava bridge imports cleanly
    command: >-
      python3 -c "import jcc, nighres, nighresjava; print('jcc ok'); print('nighres ok'); print('nighresjava ok')"
    expected_output_contains: "nighresjava ok"

  - name: nighres modules visible
    description: Verify the rebuilt package exposes the expected top-level modules
    command: >-
      python3 -c "import nighres; print('modules', sorted([n for n in dir(nighres) if not n.startswith('_')]))"
    expected_output_contains: "registration"

  - name: nighres io synthetic roundtrip
    description: Load and save a synthetic NIfTI volume through nighres.io
    command: >-
      python3 -c "import nibabel as nib; from nighres.io import load_volume, save_volume; vol = load_volume('${output_dir}/synthetic.nii.gz'); save_volume('${output_dir}/roundtrip.nii.gz', vol); print('roundtrip', nib.load('${output_dir}/roundtrip.nii.gz').shape)"
    expected_output_contains: "roundtrip (3, 3, 3)"
    validate:
      - output_exists: ${output_dir}/roundtrip.nii.gz
      - same_dimensions: ["${output_dir}/roundtrip.nii.gz", "${output_dir}/synthetic.nii.gz"]
