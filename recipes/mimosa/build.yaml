name: mimosa
version: 0.5.8
copyright:
  - license: GPL-2.0-only
    url: https://www.gnu.org/licenses/old-licenses/gpl-2.0-standalone.html
architectures:
  - x86_64
structured_readme:
  description: Trains and makes predictions from the 'MIMoSA' method
  example: mimosa_model
  documentation: |-
    This container includes:
    - R
    - The R package mimosa from https://github.com/avalcarcel9/mimosa
    - Additional CRAN packages: ANTsRCore (>= 0.3.4), dplyr, extrantsr (>= 3.1), fslr (>= 2.24.1), neurobase (>= 1.27.11), oasis (>= 3.0.1), parallel (>= 2.14.0), rlist (>= 0.4.5), stats, utils (>= 3.2.5), WhiteStripe (>= 2.3.1), covr, knitr, rmarkdown, spelling, testthat
    - Additional Bioconductor packages: none
    - System dependencies: none
    - Deployed scripts: none

    For detailed package documentation, see: https://github.com/avalcarcel9/mimosa
  citation: "Please cite the original authors of the mimosa package when using this container. Repository: https://github.com/avalcarcel9/mimosa"
readme: |-
  ----------------------------------
  ## mimosa/{{ context.version }} ##

  Trains and makes predictions from the 'MIMoSA' method

  Example:
  ```
  mimosa_model
  ```

  More documentation can be found here: This container includes:
  - R
  - The R package mimosa from https://github.com/avalcarcel9/mimosa
  - Additional CRAN packages: ANTsRCore (>= 0.3.4), dplyr, extrantsr (>= 3.1), fslr (>= 2.24.1), neurobase (>= 1.27.11), oasis (>= 3.0.1), parallel (>= 2.14.0), rlist (>= 0.4.5), stats, utils (>= 3.2.5), WhiteStripe (>= 2.3.1), covr, knitr, rmarkdown, spelling, testthat
  - Additional Bioconductor packages: none
  - System dependencies: none
  - Deployed scripts: none

  For detailed package documentation, see: https://github.com/avalcarcel9/mimosa

  Citation:
  ```
  Please cite the original authors of the mimosa package when using this container. Repository: https://github.com/avalcarcel9/mimosa
  ```

  To run container outside of this environment: ml mimosa/{{ context.version }}

  ----------------------------------
build:
  kind: neurodocker
  base-image: ubuntu:24.04
  pkg-manager: apt
  directives:
    - template:
        name: fsl
        version: 6.0.7.16
    - template:
        name: ants
        version: 2.4.3
    - install: r-base r-base-dev cmake git build-essential libhdf5-dev libfftw3-dev libpng-dev libjpeg-dev zlib1g-dev libssl-dev libcurl4-openssl-dev libxml2-dev
    - run:
        - R --slave -e " options(repos = c(CRAN = 'https://cloud.r-project.org')); pkgs <- c('ANTsRCore', 'dplyr', 'extrantsr', 'fslr', 'neurobase', 'oasis', 'rlist', 'WhiteStripe', 'covr', 'knitr', 'rmarkdown', 'spelling', 'testthat'); mis <- setdiff(pkgs, rownames(installed.packages())); if (length(mis)) install.packages(mis, dependencies = TRUE); cat('Installed CRAN packages:\n'); if (length(pkgs)) cat(paste(pkgs, collapse = ', '), '\n') "
        - R --slave -e " options(repos = c(CRAN = 'https://cloud.r-project.org')); if (!requireNamespace('remotes', quietly = TRUE)) install.packages('remotes'); remotes::install_github('avalcarcel9/mimosa', dependencies = NA, upgrade = 'never', build_vignettes = FALSE); cat('Installed mimosa from GitHub (avalcarcel9/mimosa)\n') "
    - test:
        name: verify_r_installation
        script: |-
          # Test R installation
          R --version
          echo "Testing R package installation..."
          R --slave -e "
            # Check R version
            cat('R version:', R.version.string, '\n')

            # Test main package
            tryCatch({
              library("mimosa")
              cat('Successfully loaded mimosa\n')

              # Try to get package info
              pkg_info <- packageDescription('mimosa')
              if (!is.na(pkg_info)) {
                cat('Package version:', pkg_info[['Version']], '\n')
                cat('Package title:', pkg_info[['Title']], '\n')
              }
            }, error = function(e) {
              cat('Warning: Could not load mimosa:',
                  e[['message']], '\n')
              cat('Installed packages:\n')
              print(installed.packages()[,c('Package', 'Version')])
            })

            # List key installed packages
            key_packages <- c('ANTsRCore', 'dplyr', 'extrantsr', 'fslr', 'neurobase', 'oasis', 'rlist', 'WhiteStripe', 'covr', 'knitr', 'rmarkdown', 'spelling', 'testthat')
            if (length(key_packages) > 0) {
              cat('Checking additional packages:\n')
              for (pkg in key_packages) {
                if (require(pkg, character.only = TRUE, quietly = TRUE)) {
                  cat('  ✓', pkg, '\n')
                } else {
                  cat('  ✗', pkg, '(not found)\n')
                }
              }
            }
          "
categories:
  - image segmentation
icon: data:image/png;base64,
