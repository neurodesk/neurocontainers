readme: |-
  ----------------------------------
  ## mimosa/{{ context.version }} ##
  Trains and makes predictions from the 'MIMoSA' method
  Example:
  ```
  mimosa_model
  ```
  More documentation can be found here: This container includes:
  - R
  - The R package mimosa from https://github.com/avalcarcel9/mimosa
  - Additional CRAN packages: ANTsRCore (>= 0.3.4), dplyr, extrantsr (>= 3.1), fslr (>= 2.24.1), neurobase (>= 1.27.11), oasis (>= 3.0.1), parallel (>= 2.14.0), rlist (>= 0.4.5), stats, utils (>= 3.2.5), WhiteStripe (>= 2.3.1), covr, knitr, rmarkdown, spelling, testthat
  - Additional Bioconductor packages: none
  - System dependencies: none
  - Deployed scripts: none
  For detailed package documentation, see: https://github.com/avalcarcel9/mimosa
  Citation:
  ```
  Please cite the original authors of the mimosa package when using this container. Repository: https://github.com/avalcarcel9/mimosa
  ```
  To run container outside of this environment: ml mimosa/{{ context.version }}
  ----------------------------------
build:
  kind: neurodocker
  base-image: ubuntu:24.04
  pkg-manager: apt
  directives:
  - template:
      name: fsl
      version: 6.0.7.16

  # ----------------------------------------------------------------------
  # System libraries.
  # The original recipe was missing libuv1-dev (required by R 'fs', whose
  # failure cascades into sass -> bslib -> rmarkdown -> rticles ->
  # neuroconductor's oro.nifti fork -> neurobase -> mimosa).
  # libbz2-dev/liblzma-dev are needed by RNifti/oro.nifti when building
  # from source; zlib1g-dev is reinstalled here because the FSL template
  # earlier in this build can leave a stale sysroot where /usr/include/zlib.h
  # is unreachable (that's what caused the RNifti compile to fail with
  # "fatal error: zlib.h: No such file or directory" despite zlib1g-dev
  # being listed previously).
  # ----------------------------------------------------------------------
  # NB: do not add pandoc-citeproc here -- removed from Ubuntu 22.10+;
  # its functionality is built into the pandoc binary on noble.
  - install: r-base r-base-dev cmake git build-essential libhdf5-dev libfftw3-dev libpng-dev libjpeg-dev zlib1g-dev libbz2-dev liblzma-dev libuv1-dev libssl-dev libcurl4-openssl-dev libxml2-dev libgit2-dev libfontconfig1-dev libfreetype6-dev libharfbuzz-dev libfribidi-dev libtiff5-dev pandoc ca-certificates pkg-config

  - environment:
      # Use Posit Package Manager binary packages for Ubuntu 24.04 (noble).
      # This sidesteps source-builds of fs, sass, bslib, rmarkdown, RNifti,
      # oro.nifti and everything else on CRAN -- which is what was failing.
      R_REPOS: "https://packagemanager.posit.co/cran/__linux__/noble/latest"
      R_DEFAULT_INTERNET_TIMEOUT: "600"
      # Relax gcc-13 strictness. ITKR vendors an old HDF5 that emits
      # "assignment from incompatible pointer type" -- a warning in gcc-11
      # but a HARD ERROR in gcc-13 (which is what ships in Ubuntu 24.04).
      # These flags are picked up by R's compile rules via $(CFLAGS) /
      # $(CXXFLAGS), and by ITKR's CMake sub-build via $CFLAGS/$CXXFLAGS.
      CFLAGS: "-O2 -g -Wno-incompatible-pointer-types -Wno-error=incompatible-pointer-types -Wno-error"
      CXXFLAGS: "-O2 -g -Wno-incompatible-pointer-types -Wno-error=incompatible-pointer-types -Wno-error"

  # IMPORTANT neurodocker behaviour:
  # every list item under `run:` becomes a separate shell statement
  # joined to its neighbours with ` && `, AND every PHYSICAL LINE inside
  # a single item (e.g. `- |` block) is also joined with ` && `. So R
  # scripts MUST be flattened onto one physical line with `;` separators,
  # otherwise neurodocker will prepend `&&` to every R line and break it.
  - run:
      # Step 1: relax gcc-13 strictness for ITKR's bundled HDF5.
      - mkdir -p /root/.R && printf '%s\n' 'CFLAGS = -O2 -g -fpic -Wno-incompatible-pointer-types -Wno-error=incompatible-pointer-types -Wno-error' 'CXXFLAGS = -O2 -g -fpic -Wno-incompatible-pointer-types -Wno-error=incompatible-pointer-types -Wno-error' 'CXX11FLAGS = -O2 -g -fpic -Wno-incompatible-pointer-types -Wno-error=incompatible-pointer-types -Wno-error' 'CXX14FLAGS = -O2 -g -fpic -Wno-incompatible-pointer-types -Wno-error=incompatible-pointer-types -Wno-error' 'CXX17FLAGS = -O2 -g -fpic -Wno-incompatible-pointer-types -Wno-error=incompatible-pointer-types -Wno-error' > /root/.R/Makevars
      - SCHEME=https && CRAN_BASE="${SCHEME}://cloud.r-project.org" && wget -qO- "${CRAN_BASE}/bin/linux/ubuntu/marutter_pubkey.asc" | tee /etc/apt/trusted.gpg.d/cran_ubuntu_key.asc && echo "deb ${CRAN_BASE}/bin/linux/ubuntu noble-cran44/" > /etc/apt/sources.list.d/cran-r44.list && apt-get update -qq && apt-get install -y --no-install-recommends r-base r-base-dev && R --version | head -1
      # Step 2: bootstrap CRAN packages from Posit PM binaries (skips source compile of fs/sass/RNifti/etc).
      - R --slave -e "options(repos = c(CRAN = Sys.getenv('R_REPOS')), HTTPUserAgent = sprintf('R/%s R (%s)', getRversion(), paste(getRversion(), R.version['platform'], R.version['arch'], R.version['os'])), timeout = as.integer(Sys.getenv('R_DEFAULT_INTERNET_TIMEOUT', 600)), Ncpus = max(1L, parallel::detectCores() - 1L)); install.packages(c('remotes', 'devtools', 'dplyr', 'rlist', 'fs', 'sass', 'bslib', 'rmarkdown', 'rticles', 'RNifti', 'oro.nifti')); for (p in c('remotes', 'fs', 'rmarkdown', 'RNifti', 'oro.nifti')) if (!requireNamespace(p, quietly = TRUE)) stop('CRAN install failed for ', p); cat('CRAN bootstrap OK\\n')"

      # Step 3: neuroconductor GitHub installs.
      # ITKR first (ANTsRCore LinkingTo's it). Each remotes::install_github call retried up to 3x
      # with backoff to absorb transient github API 403 / rate-limit failures.
      # Tip: set GITHUB_PAT in the build env to lift the 60 req/hr anonymous limit.
      - R --slave -e "options(repos = c(nconductor = paste0('https', '://neuroconductor.r-universe.dev'), CRAN = Sys.getenv('R_REPOS'))); install.packages('mimosa')"

      # Step 4: sanity check.
      - R --slave -e "stopifnot(requireNamespace('mimosa', quietly = TRUE)); cat('mimosa installed OK\\n')"

  - test:
      name: verify_r_installation
      script: |-
        # Test R installation
        R --version
        echo "Testing R package installation..."
        R --slave -e "
        # Check R version
        cat('R version:', R.version.string, '\n')
        # Test main package
        tryCatch({
        library(\"mimosa\")
        cat('Successfully loaded mimosa\n')
        # Try to get package info
        pkg_info <- packageDescription('mimosa')
        if (!is.na(pkg_info)) {
        cat('Package version:', pkg_info[['Version']], '\n')
        cat('Package title:', pkg_info[['Title']], '\n')
        }
        }, error = function(e) {
        cat('Warning: Could not load mimosa:',
        e[['message']], '\n')
        cat('Installed packages:\n')
        print(installed.packages()[,c('Package', 'Version')])
        })
        # List key installed packages
        key_packages <- c('mimosa', 'ANTsRCore', 'dplyr', 'extrantsr', 'fslr', 'neurobase', 'oasis', 'rlist', 'WhiteStripe')
        if (length(key_packages) > 0) {
        cat('Checking additional packages:\n')
        for (pkg in key_packages) {
        if (require(pkg, character.only = TRUE, quietly = TRUE)) {
        cat('  v', pkg, '\n')
        } else {
        cat('  x', pkg, '(not found)\n')
        }
        }
        }
        "

  - deploy:
      bins:
      - R
      - Rscript
categories:
- image segmentation
icon: data:image/png;base64,
