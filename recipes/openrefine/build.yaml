name: openrefine
version: 3.10.1

architectures:
  - x86_64
  - aarch64

copyright:
  - license: BSD-3-Clause
    url: https://github.com/OpenRefine/OpenRefine/blob/master/LICENSE.txt

categories:
  - data organisation

icon: data:image/png;base64,

build:
  kind: neurodocker
  base-image: ubuntu:24.04
  pkg-manager: apt
  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive

    - install:
        - ca-certificates
        - curl
        - openjdk-17-jre-headless

    - workdir: /opt

    - run:
        - tar -xzf {{ get_file("openrefine_tar") }} -C /opt
        - mv /opt/openrefine-{{ context.version }} /opt/openrefine
        - chmod +x /opt/openrefine/refine

    - copy: openrefine /usr/local/bin/openrefine
    - copy: openrefine /usr/local/bin/refine

    - run:
        - chmod +x /usr/local/bin/openrefine /usr/local/bin/refine

    - test:
        name: check OpenRefine web server
        script: |
          #!/usr/bin/env bash
          set -euo pipefail

          expected_version="$(awk '/^version:/{print $2; exit}' /build.yaml)"
          openrefine --version | grep "${expected_version}"
          export OPENREFINE_DATA_DIR="$(mktemp -d)"
          openrefine start > /tmp/openrefine-test.log 2>&1 &
          pid="$!"
          trap 'kill "$pid" 2>/dev/null || true' EXIT

          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3333/ >/dev/null; then
              kill "$pid" 2>/dev/null || true
              wait "$pid" 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done

          cat /tmp/openrefine-test.log
          exit 1

deploy:
  bins:
    - openrefine
    - refine
  webapp:
    title: OpenRefine
    icon: icon.svg
    startup_command: "openrefine start"
    startup_timeout: 180
    description: "Data cleaning and transformation tool"
    port: 3333

readme: |
  ----------------------------------
  ## openrefine/{{ context.version }} ##

  OpenRefine is a tool for working with messy data: cleaning it, transforming it from one format into another, and extending it with web services and external data.

  Example:
  ```
  openrefine start
  ```

  This starts the OpenRefine server on `${NEURODESK_WEBAPP_PORT}` when set, otherwise on `${OPENREFINE_PORT}` or port `3333`. Runtime project data is stored in `${OPENREFINE_DATA_DIR}` when set, otherwise in `/tmp/openrefine-workspace`.

  More documentation can be found here: https://openrefine.org/docs

  To run container outside of this environment: ml openrefine/{{ context.version }}

  ----------------------------------

files:
  - name: openrefine_tar
    url: https://github.com/OpenRefine/OpenRefine/releases/download/{{ context.version }}/openrefine-linux-{{ context.version }}.tar.gz

  - name: openrefine
    contents: |
      #!/usr/bin/env bash
      set -euo pipefail

      case "${1:-start}" in
        start|server)
          if [ "$#" -gt 0 ]; then
            shift
          fi
          port="${NEURODESK_WEBAPP_PORT:-${OPENREFINE_PORT:-3333}}"
          interface="${OPENREFINE_INTERFACE:-0.0.0.0}"
          data_dir="${OPENREFINE_DATA_DIR:-/tmp/openrefine-workspace}"
          mkdir -p "$data_dir"
          exec /opt/openrefine/refine \
            -i "$interface" \
            -p "$port" \
            -d "$data_dir" \
            -x refine.headless=true \
            "$@"
          ;;
        version|--version)
          printf '%s\n' "{{ context.version }}"
          ;;
        help|--help|-h)
          exec /opt/openrefine/refine -h
          ;;
        *)
          exec /opt/openrefine/refine "$@"
          ;;
      esac
