name: vesselvio
version: 1.1.2
# https://github.com/JacobBumgarner/VesselVio/releases

architectures:
  - x86_64
  - aarch64

variables:
  miniforge_installer:
    try:
      - value: Miniforge3-Linux-x86_64.sh
        condition: arch == "x86_64"
      - value: Miniforge3-Linux-aarch64.sh
        condition: arch == "aarch64"

build:
  kind: neurodocker
  base-image: ubuntu:22.04
  pkg-manager: apt

  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive

    - install:
        - git
        - ca-certificates
        - libqt5gui5
        - qt5-qmake
        - qtbase5-dev

    - environment:
        CONDA_DIR: /opt/miniforge
        PATH: /opt/miniforge/bin:/opt/miniforge/envs/vesselvio/bin:$PATH

    - run:
        - cp {{ get_file(context.miniforge_installer) }} /tmp/miniforge.sh
        - bash /tmp/miniforge.sh -b -p /opt/miniforge
        - rm -f /tmp/miniforge.sh
        - conda config --system --prepend channels conda-forge
        - conda config --set channel_priority strict
        - conda config --system --set auto_update_conda false
        - conda config --system --set show_channel_urls true
        - conda create -y -n vesselvio python=3.10 pip pyqt=5.15
        - conda clean --all --yes

    - run:
        - git clone https://github.com/JacobBumgarner/VesselVio.git /opt/vesselvio-{{ context.version }}/
        - sed -i '/^PyQt5==/d;/^PyQt5-Qt5==/d;/^PyQt5-sip==/d' /opt/vesselvio-{{ context.version }}/requirements.txt
        - conda run -n vesselvio python -m pip install -r /opt/vesselvio-{{ context.version }}/requirements.txt

    - copy:
        - vesselvio
        - /opt/vesselvio-{{ context.version }}/vesselvio

    - run:
        - chmod a+x /opt/vesselvio-{{ context.version }}/vesselvio

    - environment:
        PATH: $PATH:/opt/vesselvio-{{ context.version }}

deploy:
  path:
    - /opt/vesselvio-{{ context.version }}

files:
  - name: Miniforge3-Linux-x86_64.sh
    url: https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh
  - name: Miniforge3-Linux-aarch64.sh
    url: https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-aarch64.sh
  - name: vesselvio
    contents: |
      #!/usr/bin/env bash
      cd ~
      mkdir -p ~/library/cache/

      FILE=~/library/cache/preferences.json
      if [ -f "$FILE" ]; then
          echo "$FILE exists. Not overwriting."
      else
          echo "$FILE does not exist. Copying file template."
          cp /opt/vesselvio-1.1.2/library/cache/preferences.json ~/library/cache/preferences.json
      fi

      cp -r /opt/vesselvio-1.1.2/library/annotation/ ~/library/
      cp -r /opt/vesselvio-1.1.2/library/volumes/ ~/library/
      python /opt/vesselvio-1.1.2/VesselVio.py

categories:
  - quantitative imaging
  - visualization
icon: data:image/png;base64,

gui_apps:
  - name: vesselvioGUI
    exec: vesselvio

readme: |
  ----------------------------------
  ## vesselvio/{{ context.version }} ##
  VesselVio is an open-source application designed to allow researchers to analyze and visualize segmented vasculature datasets.

  Example:
  ```
  vesselvio
  ```

  More documentation can be found here: https://jacobbumgarner.github.io/VesselVio/

  To run container outside of this environment: ml vesselvio/{{ context.version }}

  Citation: https://doi.org/10.1016/j.crmeth.2022.100189
  ----------------------------------
