name: synthstroke
version: 0.0.0
copyright:
  - license: MIT
    url: https://github.com/liamchalcroft/SynthStroke/blob/main/LICENSE
architectures:
  - x86_64
structured_readme:
  description: |-
    This repository contains the implementation of our MELBA 2025 paper on synthetic data generation for stroke lesion segmentation. The method uses synthetic data to improve model generalization across different imaging protocols and patient populations.

    Features:

    Synthetic data generation pipeline using healthy brain MRI
    Multi-tissue segmentation (lesions and healthy brain tissue)
    Mixed precision training with configurable loss functions
    Test-time augmentation (TTA) for improved inference accuracy
    Hugging Face Hub integration with PyTorchModelHubMixin
    6 pre-trained models available for immediate use
    Easy model loading and inference via synthstroke_model.py
  example: |-
    # Example usage

    ```bash
    synthstroke \
        --files "/path/to/input.nii.gz" \
        --tta \
        --savedir /path/to/output/
    ```
  documentation: |-
    This container includes:
    - Python 3.10 via Miniconda
    - The Python package from https://github.com/liamchalcroft/SynthStroke
    - Additional conda packages: none
    - Additional pip packages: monai, torch, nibabel, numpy, scikit-image, tqdm, wandb, cornucopia, huggingface_hub, safetensors
    - Deployed binaries: none

    For detailed package documentation, see: https://github.com/liamchalcroft/SynthStroke
  citation: Chalcroft, L., Pappas, I., Price, C. J., & Ashburner, J. (2025). Synthetic Data for Robust Stroke Segmentation. Machine Learning for Biomedical Imaging, 3, 317–346.
readme: |-
  ----------------------------------
  ## synthstroke/{{ context.version }} ##

  This repository contains the implementation of our MELBA 2025 paper on synthetic data generation for stroke lesion segmentation. The method uses synthetic data to improve model generalization across different imaging protocols and patient populations.

  Features:

  Synthetic data generation pipeline using healthy brain MRI
  Multi-tissue segmentation (lesions and healthy brain tissue)
  Mixed precision training with configurable loss functions
  Test-time augmentation (TTA) for improved inference accuracy
  Hugging Face Hub integration with PyTorchModelHubMixin
  6 pre-trained models available for immediate use
  Easy model loading and inference via synthstroke_model.py

  Example:
  ```
  # Example usage

  ```bash
  python test.py \
      --weights ./synthstroke_model/checkpoint.pt \
      --tta \
      --mb \
      --patch 128 \
      --savedir /path/to/output/ \
      --files "/path/to/input/*.nii.gz"
  ```
  ```

  More documentation can be found here: This container includes:
  - Python 3.10 via Miniconda
  - The Python package from https://github.com/liamchalcroft/SynthStroke
  - Additional conda packages: none
  - Additional pip packages: monai, torch, nibabel, numpy, scikit-image, tqdm, wandb, cornucopia, huggingface_hub, safetensors
  - Deployed binaries: none

  For detailed package documentation, see: https://github.com/liamchalcroft/SynthStroke

  Citation:
  ```
  Chalcroft, L., Pappas, I., Price, C. J., & Ashburner, J. (2025). Synthetic Data for Robust Stroke Segmentation. Machine Learning for Biomedical Imaging, 3, 317–346.
  ```

  To run container outside of this environment: ml synthstroke/{{ context.version }}

  ----------------------------------
files:
  - name: run.py
    contents: |
      import argparse
      import nibabel as nib
      from pathlib import Path
      from synthstroke_model import SynthStrokeModel

      parser = argparse.ArgumentParser()
      parser.add_argument("--input", required=True, help="Input T1w NIfTI file")
      parser.add_argument("--outdir", required=True, help="Output directory")
      parser.add_argument("--tta", action="store_true", help="Enable test-time augmentation")
      parser.add_argument("--weights", default="/opt/synthstroke/weights/baseline/model.safetensors")
      args = parser.parse_args()

      img = nib.load(args.input)
      model = SynthStrokeModel.from_checkpoint(args.weights)
      model.eval()

      result = model.predict_comprehensive_with_preprocessing(
          img.get_fdata(), affine=img.affine,
          use_tta=args.tta, use_sliding_window=True, patch_size=128
      )
      Path(args.outdir).mkdir(parents=True, exist_ok=True)
      model.save_prediction(result, args.outdir, affine=img.affine)
      print("Done. Output saved to:", args.outdir)
      
  build:
  kind: neurodocker
  base-image: ubuntu:24.04
  pkg-manager: apt
  directives:
    - template:
        name: miniconda
        version: latest
        conda_install: python=3.10
        pip_install: monai torch nibabel numpy scikit-image tqdm wandb cornucopia huggingface_hub safetensors scipy einops
    - install: git libgl1 curl ca-certificates
    - run:
        - git clone https://github.com/liamchalcroft/SynthStroke.git /opt/synthstroke
        - hf download liamchalcroft/synthstroke-baseline --local-dir /opt/synthstroke/weights/baseline
        - cp {{ get_file("run.py") }} /opt/synthstroke/run.py
        - printf '#!/bin/bash\npython /opt/synthstroke/run.py "$@"\n' > /usr/local/bin/synthstroke && chmod +x /usr/local/bin/synthstroke
    - deploy:
        bins:
          - synthstroke
    - test:
        name: verify_installation
        script: |-
          # Test Python and conda installation
          python --version
          conda --version
          # Test that pip packages were installed
          python -c "import sys; print('Python path:', sys.path)"
          pip list | grep -i "synthstroke" || echo "Warning: synthstroke not found in pip list"
          # Attempt to import the main package
          python -c "
          import importlib.util
          import sys

          # Try common package name variations
          package_names = ['synthstroke', 'synthstroke', 'synthstroke']
          imported = False

          for pkg_name in package_names:
              try:
                  __import__(pkg_name)
                  print(f'Successfully imported {pkg_name}')
                  imported = True
                  break
              except ImportError:
                  continue

          if not imported:
              print('Warning: Could not import main package. This may be normal if the package has a different import name.')
              print('Available packages:')
              import pkg_resources
              for dist in pkg_resources.working_set:
                  if 'synthstroke' in dist.project_name.lower():
                      print(f'  - {dist.project_name} ({dist.version})')
          else:
              print('Package installation verified successfully!')
          "
    - test:
        name: Simple Deploy Bins/Path Test
        builtin: test_deploy.sh
categories:
  - image segmentation
icon: data:image/png;base64,
