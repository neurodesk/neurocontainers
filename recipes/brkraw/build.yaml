name: brkraw
version: 0.3.11

copyright:
  - license: GPL-3.0
    url: https://spdx.org/licenses/GPL-3.0.html

architectures:
  - x86_64

build:
  kind: neurodocker
  base-image: ubuntu:22.04
  pkg-manager: apt
  directives:
    - install:
        - python3-pip
        - python3-tk
    - run:
        - pip install "brkraw[SimpleITK]=={{ context.version }}"
    - environment:
        PATH: $PATH:/usr/local/bin/

deploy:
  bins:
    - brkraw

categories:
  - "data organisation"
