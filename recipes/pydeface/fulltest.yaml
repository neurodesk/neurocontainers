# pydeface container test suite
# Minimal ARM64 verification for the rebuilt pydeface + FSL image.

name: pydeface
version: 2.0.2
container: pydeface_2.0.2.simg

required_files:
  - dataset: ds000001
    files:
      - sub-01/anat/sub-01_T1w.nii.gz

test_data:
  t1w: ds000001/sub-01/anat/sub-01_T1w.nii.gz
  output_dir: test_output

setup:
  script: |
    #!/usr/bin/env bash
    set -e
    mkdir -p "${output_dir}"

tests:
  - name: ARM64 runtime
    description: Verify the container runs natively on arm64
    command: uname -m
    expected_output_contains: "aarch64"

  - name: Python runtime
    description: Verify the rebuilt image exposes the expected Python runtime
    command: /opt/pydeface/bin/python --version
    expected_output_contains: "Python 3.12"

  - name: pydeface help
    description: Verify the pydeface CLI is present and responds
    command: pydeface --help
    expected_output_contains: "Path to input nifti."

  - name: pydeface package metadata
    description: Verify the installed pydeface package metadata matches the rebuilt image
    command: /opt/pydeface/bin/python -m pip show pydeface
    expected_output_contains: "Version: 2.0.2"

  - name: FSL flirt available
    description: Verify the required FSL FLIRT binary is present in the rebuilt image
    command: flirt -version 2>&1
    expected_output_contains: "FLIRT"

  - name: pydeface packaged resources
    description: Verify the packaged template and facemask exist
    command: >-
      /opt/pydeface/bin/python -c "from pathlib import Path; import pydeface; root = Path(pydeface.__file__).resolve().parent; print((root / 'data' / 'facemask.nii.gz').exists()); print((root / 'data' / 'mean_reg2mean.nii.gz').exists())"
    expected_output_contains: "True"

  - name: pydeface T1 deface
    description: Deface a real T1w input with the rebuilt ARM64 image
    command: >-
      pydeface ${t1w} --outfile ${output_dir}/t1w_defaced.nii.gz --force --cost corratio
    timeout: 600
    validate:
      - output_exists: ${output_dir}/t1w_defaced.nii.gz
      - same_dimensions: ["${output_dir}/t1w_defaced.nii.gz", "${t1w}"]
