              # so LINDA's internal n4_skull_strip() is bypassed.
              # Useful for stroke patients where template-based brain
              # extraction over-strips cortex near the lesion. Pass an
              # HD-BET (or SynthStrip) mask and LINDA will use it as-is.
              #
              # Usage:
              #   linda_predict_with_mask.sh \
              #       --t1     /path/to/T1.nii.gz       \
              #       --mask   /path/to/brain_mask.nii.gz \
