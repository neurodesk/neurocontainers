name: petprep
version: 0.0.5
copyright:
  - license: Apache-2.0
    url: https://github.com/nipreps/petprep/blob/main/LICENSE
architectures:
  - x86_64
build:
  kind: neurodocker
  base-image: nipreps/petprep:0.0.5
  pkg-manager: apt
  directives:
    - deploy:
        path: []
        bins:
          - petprep
categories:
  - quantitative imaging
  - structural imaging
icon: data:image/png;base64,
structured_readme:
  description: PETPrep is a positron emission tomography (PET) data preprocessing pipeline that is designed to provide an easily accessible, state-of-the-art interface that is robust to variations in scan acquisition protocols and that requires minimal user input, while providing easily interpretable and comprehensive error and output reporting. It performs comprehensive processing steps—such as motion correction, segmentation, registration, partial volume correction, and extraction of time activity curves, providing outputs that can be easily submitted to a variety of group level analyses, pharmacokinetic modelling, graph theory measures, and surface or volume-based statistics.
  example: |-
    |-
      ----------------------------------
      ## petprep/{{ context.version }} ##
      PetPrep is a positron emission tomography (PET) data preprocessing pipeline designed to provide an accessible, state-of-the-art interface that is robust to variations in acquisition protocols and requires minimal user input, while offering clear and comprehensive reporting of outputs and errors. It performs essential preprocessing steps (coregistration, normalization, motion correction, partial volume correction, segmentation, skull stripping, etc.), producing outputs suitable for a wide range of downstream analyses, including kinetic modeling, regional uptake analysis, and multimodal integration with MRI data.

      usage:
      ```
      petprep replace_with_bidsdirectory replace_with_outputdirecotry participant --fs-license-file ~/.license.txt

      ```

      More documentation can be found here: https://petprep.readthedocs.io/en/latest/

      To run applications outside of this container: ml petprep/{{ context.version }}

      ----------------------------------
  documentation: https://petprep.readthedocs.io/en/latest/
  citation: ""
readme: |-
  ----------------------------------
  ## petprep/{{ context.version }} ##

  PETPrep is a positron emission tomography (PET) data preprocessing pipeline that is designed to provide an easily accessible, state-of-the-art interface that is robust to variations in scan acquisition protocols and that requires minimal user input, while providing easily interpretable and comprehensive error and output reporting. It performs comprehensive processing steps—such as motion correction, segmentation, registration, partial volume correction, and extraction of time activity curves, providing outputs that can be easily submitted to a variety of group level analyses, pharmacokinetic modelling, graph theory measures, and surface or volume-based statistics.

  Example:
  ```
  |-
    ----------------------------------
    ## petprep/{{ context.version }} ##
    PetPrep is a positron emission tomography (PET) data preprocessing pipeline designed to provide an accessible, state-of-the-art interface that is robust to variations in acquisition protocols and requires minimal user input, while offering clear and comprehensive reporting of outputs and errors. It performs essential preprocessing steps (coregistration, normalization, motion correction, partial volume correction, segmentation, skull stripping, etc.), producing outputs suitable for a wide range of downstream analyses, including kinetic modeling, regional uptake analysis, and multimodal integration with MRI data.

    usage:
    ```
    petprep replace_with_bidsdirectory replace_with_outputdirecotry participant --fs-license-file ~/.license.txt

    ```

    More documentation can be found here: https://petprep.readthedocs.io/en/latest/

    To run applications outside of this container: ml petprep/{{ context.version }}

    ----------------------------------
  ```

  More documentation can be found here: https://petprep.readthedocs.io/en/latest/

  Citation:
  ```

  ```

  To run container outside of this environment: ml petprep/{{ context.version }}

