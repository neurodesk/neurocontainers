tests:
  - name: BrainSuite BIDS App runner is available
    script: |
      set -eu
      command -v run.py
      test -x /BrainSuite/run.py
      run.py --help 2>&1 | grep "BrainSuite23a BIDS-App"

  - name: BrainSuite tool directories are present
    script: |
      set -eu
      test -n "${BrainSuiteVersion:?}"
      test -d "/opt/BrainSuite${BrainSuiteVersion}/bin"
      test -d "/opt/BrainSuite${BrainSuiteVersion}/svreg/bin"
      test -d "/opt/BrainSuite${BrainSuiteVersion}/bdp"
      test -d "/opt/BrainSuite${BrainSuiteVersion}/bfp"

  - name: BrainSuite BFP runtime entrypoint is present
    script: |
      set -eu
      test -n "${BrainSuiteVersion:?}"
      test -s "/opt/BrainSuite${BrainSuiteVersion}/bfp/bfp.sh"
