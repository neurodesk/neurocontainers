name: brainsuite
version: 23a

copyright:
  - license: GPL-2.0-only
    url: https://github.com/bids-apps/BrainSuite/blob/master/LICENSE

architectures:
  - x86_64

build:
  kind: neurodocker
  base-image: bids/brainsuite:v{{ context.version }}
  pkg-manager: apt

  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive
        PATH: /BrainSuite:/opt/BrainSuite{{ context.version }}/bin:/opt/BrainSuite{{ context.version }}/svreg/bin:/opt/BrainSuite{{ context.version }}/bdp:/opt/BrainSuite{{ context.version }}/bfp:/BrainSuite/QC:$PATH

    - entrypoint: bash

deploy:
  bins:
    - run.py
  path:
    - /BrainSuite
    - /BrainSuite/QC
    - /opt/BrainSuite{{ context.version }}/bin
    - /opt/BrainSuite{{ context.version }}/svreg/bin
    - /opt/BrainSuite{{ context.version }}/bdp
    - /opt/BrainSuite{{ context.version }}/bfp

categories:
  - bids apps
  - structural imaging
  - diffusion imaging
  - functional imaging
  - quality control

structured_readme:
  description: |
    BrainSuite BIDS App packages BrainSuite workflows for anatomical, diffusion, and functional MRI processing in the BIDS App framework. This recipe uses the public BrainSuite v{{ context.version }} BIDS App image.
  example: |
    run.py /path/to/bids /path/to/output participant --stages CSE

    run.py /path/to/bids /path/to/output participant --stages DASHBOARD --localWebserver --port 9095
  documentation: https://brainsuite.org/BIDS/
  citation: |
    Kim Y, Joshi AA, Choi S, Joshi SH, Bhushan C, Varadarajan D, Haldar JP, Leahy RM, Shattuck DW. BrainSuite BIDS App: Containerized Workflows for MRI Analysis. bioRxiv 2023.03.14.532686.

readme: |
  ----------------------------------
  ## brainsuite/{{ context.version }} ##

  BrainSuite BIDS App packages BrainSuite workflows for anatomical, diffusion, and functional MRI processing in the BIDS App framework. This recipe uses the public BrainSuite v{{ context.version }} BIDS App image.

  Example:
  ```
  run.py /path/to/bids /path/to/output participant --stages CSE
  run.py /path/to/bids /path/to/output participant --stages DASHBOARD --localWebserver --port 9095
  ```

  More documentation can be found here: https://brainsuite.org/BIDS/

  Citation:
  ```
  Kim Y, Joshi AA, Choi S, Joshi SH, Bhushan C, Varadarajan D, Haldar JP, Leahy RM, Shattuck DW. BrainSuite BIDS App: Containerized Workflows for MRI Analysis. bioRxiv 2023.03.14.532686.
  ```

  To run container outside of this environment: ml brainsuite/{{ context.version }}

  ----------------------------------

