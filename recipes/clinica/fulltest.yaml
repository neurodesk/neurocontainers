name: clinica
version: 0.10.0
container: clinica_${version}_REFERENCE.simg
default_timeout: 60
tests:
- name: clinica resolves on PATH
  command: command -v clinica
  expected_exit_code: 0
- name: clinica is executable
  command: test -x "$(command -v clinica)"
  expected_exit_code: 0
- name: clinica has no missing shared libraries
  command: target="$(command -v clinica)" && test -n "$target" && ldd "$target" 2>&1 | awk '/not found/ { missing=1 } END { exit missing }'
  expected_exit_code: 0
- name: clinica package version
  command: /opt/miniconda/bin/python -c 'from importlib.metadata import version; assert version("clinica") == "0.10.0"'
  expected_exit_code: 0
- name: python resolves on PATH
  command: command -v python
  expected_exit_code: 0
- name: python is executable
  command: test -x "$(command -v python)"
  expected_exit_code: 0
- name: python has no missing shared libraries
  command: target="$(command -v python)" && test -n "$target" && ldd "$target" 2>&1 | awk '/not found/ { missing=1 } END { exit missing }'
  expected_exit_code: 0
- name: python target exists
  command: test -e "$(readlink -f "$(command -v python)")"
  expected_exit_code: 0
