name: apptainer
version: 1.4.4

architectures:
  - x86_64
  - aarch64

copyright:
  - license: BSD-3-Clause
    url: https://spdx.org/licenses/BSD-3-Clause.html

categories:
  - programming

build:
  kind: neurodocker
  base-image: ubuntu:24.04
  pkg-manager: apt

  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive

    - install:
        - ca-certificates
        - curl
        - fuse3
        - libglib2.0-0
        - libseccomp2
        - squashfs-tools
        - uidmap
        - wget

    - condition: arch == "aarch64"
      install:
        - build-essential
        - libseccomp-dev
        - fakeroot
        - cryptsetup
        - tzdata
        - dh-apparmor
        - git
        - libsubid-dev
        - pkg-config

    - file:
        name: apptainer.deb
        url: "https://github.com/apptainer/apptainer/releases/download/v{{ context.version }}/apptainer_{{ context.version }}_amd64.deb"
      condition: arch == "x86_64"

    - file:
        name: apptainer-src.tar.gz
        url: "https://github.com/apptainer/apptainer/releases/download/v{{ context.version }}/apptainer-{{ context.version }}.tar.gz"
      condition: arch == "aarch64"

    - file:
        name: go.tar.gz
        url: "https://dl.google.com/go/go1.23.6.linux-arm64.tar.gz"
      condition: arch == "aarch64"

    - run:
        - apt-get update
        - apt-get install -y {{ get_file("apptainer.deb") }}
        - rm -rf /var/lib/apt/lists/*
      condition: arch == "x86_64"

    - workdir: /tmp
      condition: arch == "aarch64"

    - run:
        - rm -rf /usr/local/go
        - tar -C /usr/local -xzf {{ get_file("go.tar.gz") }}
        - tar -xzf {{ get_file("apptainer-src.tar.gz") }}
        - cd apptainer-{{ context.version }}
        - export PATH=/usr/local/go/bin:$PATH
        - ./mconfig --without-suid
        - cd builddir
        - make -j2
        - make install
      condition: arch == "aarch64"

    - run:
        - apptainer --version

    - test:
        name: check apptainer version
        script: |
          apptainer --version

    - deploy:
        bins:
          - apptainer
          - singularity

readme: |-
  ----------------------------------
  ## apptainer/{{ context.version }} ##

  Apptainer provides an open-source container runtime designed for high-performance and scientific computing workflows. Use it to build, run, and convert Apptainer (formerly Singularity) images on systems where Docker is not available.

  Examples:
  ```
  apptainer --version
  apptainer pull docker://alpine:latest
  apptainer exec alpine_latest.sif cat /etc/os-release
  ```

  For full documentation visit: https://apptainer.org/docs/user/main/

  To run container outside of this environment: ml apptainer/{{ context.version }}

  ----------------------------------
