# apptainer container test suite
# Tests for apptainer v1.4.4 on ARM64.
#
# This suite validates the built CLI surface that the image actually exposes
# and avoids heavyweight nested-runtime workflows that are not needed to prove
# the ARM64 port is complete.

name: apptainer
version: 1.4.4
container: apptainer_1.4.4*.simg

setup:
  script: |
    #!/usr/bin/env bash
    set -e
    mkdir -p test_output/apptainer

tests:
  - name: apptainer version
    description: Verify the main apptainer binary runs and reports the packaged version
    command: apptainer --version
    expected_output_contains: "apptainer version 1.4.4"

  - name: singularity alias version
    description: Verify the backward-compatible singularity alias is available
    command: singularity --version
    expected_output_contains: "apptainer version 1.4.4"

  - name: apptainer help
    description: Verify the top-level help output is available
    command: apptainer --help
    expected_output_contains: "Available Commands"

  - name: apptainer exec help
    description: Verify the exec subcommand help is available
    command: apptainer exec --help
    expected_output_contains: "Run a command within a container"

  - name: apptainer build help
    description: Verify the build subcommand help is available
    command: apptainer build --help
    expected_output_contains: "Build an Apptainer image"

cleanup:
  script: |
    #!/usr/bin/env bash
    echo "Test outputs preserved in test_output/apptainer/"
