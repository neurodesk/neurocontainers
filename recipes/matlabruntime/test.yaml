tests:
  - name: Test MATLAB Runtime environment
    script: |
      test -n "${MCRROOT}"
      test -d "${MCRROOT}/runtime/glnxa64"
      test -d "${MCRROOT}/bin/glnxa64"
      test -d "${MCRROOT}/toolbox/matlab"

  - name: Test MATLAB Runtime info command
    script: |
      matlabruntime-info | grep "MATLAB Runtime"
      matlabruntime-info | grep "${MCRROOT}"

  - name: Test MATLAB Runtime license agreement environment
    script: |
      test "${AGREE_TO_MATLAB_RUNTIME_LICENSE}" = "yes"
