name: matlabruntime
version: 2025b

copyright:
  - name: MATLAB Runtime
    url: https://www.mathworks.com/products/compiler/matlab-runtime.html

architectures:
  - x86_64

variables:
  matlab_release: R{{ context.version }}
  matlab_runtime_root: /opt/matlabruntime/{{ context.matlab_release }}

build:
  kind: neurodocker
  base-image: containers.mathworks.com/matlab-runtime:r{{ context.version }}
  pkg-manager: apt
  directives:
    - environment:
        AGREE_TO_MATLAB_RUNTIME_LICENSE: "yes"
        MCRROOT: "{{ context.matlab_runtime_root }}"
        MATLABCMD: "{{ context.matlab_runtime_root }}/toolbox/matlab"
        XAPPLRESDIR: "{{ context.matlab_runtime_root }}/x11/app-defaults"
        LD_LIBRARY_PATH: >-
          $LD_LIBRARY_PATH:{{ context.matlab_runtime_root }}/runtime/glnxa64:{{ context.matlab_runtime_root }}/bin/glnxa64:{{ context.matlab_runtime_root }}/sys/os/glnxa64:{{ context.matlab_runtime_root }}/sys/opengl/lib/glnxa64:{{ context.matlab_runtime_root }}/extern/bin/glnxa64
        PATH: "{{ context.matlab_runtime_root }}/bin/glnxa64:$PATH"

    - copy:
        - matlabruntime-info
        - /usr/local/bin/matlabruntime-info

    - run:
        - chmod 0755 /usr/local/bin/matlabruntime-info
        - test -d "{{ context.matlab_runtime_root }}/runtime/glnxa64"
        - test -d "{{ context.matlab_runtime_root }}/bin/glnxa64"
        - test -d "{{ context.matlab_runtime_root }}/toolbox/matlab"

deploy:
  bins:
    - matlabruntime-info

files:
  - name: matlabruntime-info
    contents: |
      #!/usr/bin/env bash
      set -euo pipefail

      release="R{{ context.version }}"
      runtime_root="${MCRROOT:-/opt/matlabruntime/${release}}"
      matlab_cmd="${MATLABCMD:-${runtime_root}/toolbox/matlab}"

      test -d "${runtime_root}/runtime/glnxa64"
      test -d "${runtime_root}/bin/glnxa64"
      test -d "${runtime_root}/toolbox/matlab"

      printf 'MATLAB Runtime\n'
      printf 'Release: %s\n' "${release}"
      printf 'Root: %s\n' "${runtime_root}"
      printf 'MATLABCMD: %s\n' "${matlab_cmd}"
      printf 'AGREE_TO_MATLAB_RUNTIME_LICENSE: %s\n' "${AGREE_TO_MATLAB_RUNTIME_LICENSE:-unset}"

categories:
  - programming

icon: data:image/png;base64,

structured_readme:
  description: >-
    Standalone MATLAB Runtime environment for running applications compiled with
    MATLAB Compiler or MATLAB Compiler SDK.
  example: matlabruntime-info
  documentation: https://www.mathworks.com/products/compiler/matlab-runtime.html

readme: |-
  ----------------------------------
  ## matlabruntime/R{{ context.version }} ##

  Standalone MATLAB Runtime environment for running applications compiled with MATLAB Compiler or MATLAB Compiler SDK.

  This image is based on the MathWorks MATLAB Runtime container image and exposes the Runtime root through `MCRROOT`.

  Environment:
  ```
  MCRROOT={{ context.matlab_runtime_root }}
  MATLABCMD={{ context.matlab_runtime_root }}/toolbox/matlab
  AGREE_TO_MATLAB_RUNTIME_LICENSE=yes
  ```

  Examples:
  ```bash
  matlabruntime-info
  echo "$MCRROOT"
  ```

  More documentation:
  - https://www.mathworks.com/products/compiler/matlab-runtime.html
  - https://www.mathworks.com/help/compiler_sdk/ml_code/get-matlab-runtime-container.html

  To run applications outside of this environment: ml matlabruntime/{{ context.version }}

  ----------------------------------
