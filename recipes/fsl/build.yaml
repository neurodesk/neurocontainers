name: fsl
# check for latest version: https://fsl.fmrib.ox.ac.uk/fsl/docs/development/history/index.html
# check or add latest version is in neurodocker https://github.com/ReproNim/neurodocker/blob/master/neurodocker/templates/fsl.yaml
version: 6.0.7.22

copyright:
  - name: fsl license
    url: https://fsl.fmrib.ox.ac.uk/fsl/docs/#/license

categories:
  - "functional imaging"
  - "structural imaging"
  - "diffusion imaging"
  - "image segmentation"
  - "image registration"

gui_apps:
  - name: "fsleyesGUI"
    exec: "fsleyes"

options:
  workshop:
    description: "Include FSL course data"
    default: false
    version_suffix: ".workshop"

architectures:
  - x86_64

build:
  kind: neurodocker

  base-image: ubuntu:24.04
  pkg-manager: apt

  directives:
    - install: git ca-certificates ltrace strace wget libxml2 gcc build-essential nvidia-cuda-toolkit xdg-utils gnupg

    # Install Firefox from Mozilla's official APT repo so xdg-open has a working
    # browser. The default Ubuntu 24.04 `firefox` package is a snap transitional
    # that does not work inside containers.
    - run:
        - install -d -m 0755 /etc/apt/keyrings
        - wget -q https://packages.mozilla.org/apt/repo-signing-key.gpg -O /etc/apt/keyrings/packages.mozilla.org.asc
        - echo "deb [signed-by=/etc/apt/keyrings/packages.mozilla.org.asc] https://packages.mozilla.org/apt mozilla main" > /etc/apt/sources.list.d/mozilla.list
        - "echo 'Package: *' > /etc/apt/preferences.d/mozilla"
        - "echo 'Pin: origin packages.mozilla.org' >> /etc/apt/preferences.d/mozilla"
        - "echo 'Pin-Priority: 1000' >> /etc/apt/preferences.d/mozilla"
        - apt-get update -qq && apt-get install -y --no-install-recommends firefox && rm -rf /var/lib/apt/lists/*

    - environment:
        BROWSER: firefox

    - template:
        name: fsl
        version: "{{ context.original_version }}"

    - environment:
        FSLOUTPUTTYPE: NIFTI_GZ

    - install: locales

    - run:
        - sed -i -e 's/# en_US.UTF-8 UTF-8/en_US.UTF-8 UTF-8/' /etc/locale.gen
        - locale-gen

    - environment:
        LANG: en_US.UTF-8
        LANGUAGE: en_US:en
        LC_ALL: en_US.UTF-8
        USER: fsluser

    - workdir: /opt/ICA-AROMA

    - run:
        - tar -xzC /opt/ICA-AROMA --strip-components 1 -f {{ get_file("v0_4_3_beta_tar_gz") }}
        - chmod +x /opt/ICA-AROMA/ICA_AROMA.py

    - environment:
        PATH: "/opt/ICA-AROMA/:$PATH"
        LD_LIBRARY_PATH: "/opt/fsl-{{ context.original_version }}/lib"
        DEPLOY_ENV_FSLDIR: "BASEPATH/opt/fsl-{{ context.original_version }}"
        # This will add: setenv FSLDIR "/cvmfs/neurodesk.ardc.edu.au/containers/fsl_*/fsl_*simg/opt/fsl-*" to the module load commmand or 
        # in LUA: setenv("FSLDIR", "/cvmfs/neurodesk.ardc.edu.au/containers/fsl_6.0.7.18_20250928/fsl_6.0.7.18_20250928.simg/opt/fsl-6.0.7.18")

    # course material links are from here: https://fsl.fmrib.ox.ac.uk/fslcourse/downloads/manifest.json
    - condition: context.options.workshop
      run:
        - mkdir -p /opt/fsl_course_data/UnixIntro /opt/fsl_course_data/preCourse /opt/fsl_course_data/registration /opt/fsl_course_data/structural /opt/fsl_course_data/fmri1 /opt/fsl_course_data/fmri2 /opt/fsl_course_data/fmri3 /opt/fsl_course_data/fmri_extras /opt/fsl_course_data/rest /opt/fsl_course_data/fdt /opt/fsl_course_data/mrs /opt/fsl_course_data/asl
        - cp {{ get_file("UnixIntro_tar_gz") }} /opt/fsl_course_data/UnixIntro/UnixIntro.tar.gz
        - cp {{ get_file("preCourse_tar_gz") }} /opt/fsl_course_data/preCourse/preCourse.tar.gz
        - cp {{ get_file("registration_tar_gz") }} /opt/fsl_course_data//registration.tar.gz
        - cp {{ get_file("structural_tar_gz") }} /opt/fsl_course_data/structural/structural.tar.gz
        - cp {{ get_file("fmri1_tar_gz") }} /opt/fsl_course_data/fmri1/fmri1.tar.gz
        - cp {{ get_file("fmri2_tar_gz") }} /opt/fsl_course_data/fmri2/fmri2.tar.gz
        - cp {{ get_file("fmri3_tar_gz") }} /opt/fsl_course_data/fmri3/fmri3.tar.gz
        - cp {{ get_file("fmri_extras_tar_gz") }} /opt/fsl_course_data/fmri_extras/fmri_extras.tar.gz
        - cp {{ get_file("rest_tar_gz") }} /opt/fsl_course_data/rest/rest.tar.gz
        - cp {{ get_file("fdt_tar_gz") }} /opt/fsl_course_data/fdt/fdt.tar.gz
        - cp {{ get_file("mrs_tar_gz") }} /opt/fsl_course_data/mrs/mrs.tar.gz
        - cp {{ get_file("asl_tar_gz") }} /opt/fsl_course_data/asl/asl.tar.gz
        - for dir in /opt/fsl_course_data/*; do [ -f \"$dir/*.tar.gz\" ] && tar -xzf $dir/*.tar.gz -C $dir --strip-components=1; done
        - rm /opt/fsl_course_data/*/*.tar.gz

    - run:
        - fslpython -m pip install Cython
        - fslpython -m pip install --no-build-isolation maskslic
        - fslpython -m pip install oxasl oxasl_ve oxasl_mp regtricks
        - rm -rf /root/.cache

    - run:
        - cp /opt/fsl-{{ context.original_version }}/bin/eddy_cuda11.0 /opt/fsl-{{ context.original_version }}/bin/eddy_cuda

    - copy:
        - eddy
        - /opt/fsl-{{ context.original_version }}/bin/eddy
    - run:
        - chmod +x /opt/fsl-{{ context.original_version }}/bin/eddy

    # doesn't work yet
    # - run:
    #   - conda install fsl-truenet

    - condition: context.options.workshop
      environment:
        FSL_COURSE_DATA: /opt/fsl_course_data

    - user: jovyan
    - workdir: /home/jovyan

deploy:
  path:
    - /opt/{{ context.name }}-{{ context.original_version }}/bin
    - /opt/ICA-AROMA/

files:
  - name: v0_4_3_beta_tar_gz
    url: https://github.com/rhr-pruim/ICA-AROMA/archive/v0.4.3-beta.tar.gz

  - name: UnixIntro_tar_gz
    condition: context.options.workshop
    url: http://fsl.fmrib.ox.ac.uk/fslcourse/downloads/UnixIntro.tar.gz

  - name: preCourse_tar_gz
    condition: context.options.workshop
    url: http://fsl.fmrib.ox.ac.uk/fslcourse/downloads/preCourse.tar.gz

  - name: registration_tar_gz
    condition: context.options.workshop
    url: http://fsl.fmrib.ox.ac.uk/fslcourse/downloads/registration.tar.gz

  - name: structural_tar_gz
    condition: context.options.workshop
    url: http://fsl.fmrib.ox.ac.uk/fslcourse/downloads/structural.tar.gz

  - name: fmri1_tar_gz
    condition: context.options.workshop
    url: http://fsl.fmrib.ox.ac.uk/fslcourse/downloads/fmri1.tar.gz

  - name: fmri2_tar_gz
    condition: context.options.workshop
    url: http://fsl.fmrib.ox.ac.uk/fslcourse/downloads/fmri2.tar.gz

  - name: fmri3_tar_gz
    condition: context.options.workshop
    url: http://fsl.fmrib.ox.ac.uk/fslcourse/downloads/fmri3.tar.gz

  - name: fmri_extras_tar_gz
    condition: context.options.workshop
    url: http://fsl.fmrib.ox.ac.uk/fslcourse/downloads/fmri_extras.tar.gz

  - name: rest_tar_gz
    condition: context.options.workshop
    url: http://fsl.fmrib.ox.ac.uk/fslcourse/downloads/rest.tar.gz

  - name: fdt_tar_gz
    condition: context.options.workshop
    url: http://fsl.fmrib.ox.ac.uk/fslcourse/downloads/fdt.tar.gz

  - name: mrs_tar_gz
    condition: context.options.workshop
    url: http://fsl.fmrib.ox.ac.uk/fslcourse/downloads/mrs.tar.gz

  - name: asl_tar_gz
    condition: context.options.workshop
    url: http://fsl.fmrib.ox.ac.uk/fslcourse/downloads/asl.tar.gz

  - name: eddy
    filename: eddy

readme: |
  ----------------------------------
  ## fsl/{{ context.version }}##
  FSL is a comprehensive library of analysis tools for FMRI, MRI and DTI brain imaging data. Most of the tools can be run both from the command line and as GUIs ("point-and-click" graphical user interfaces). To quote the relevant references for FSL tools you should look in the individual tools' manual pages, and also please reference one or more of the FSL overview papers:
  1. M.W. Woolrich, S. Jbabdi, B. Patenaude, M. Chappell, S. Makni, T. Behrens, C. Beckmann, M. Jenkinson, S.M. Smith. Bayesian analysis of neuroimaging data in FSL. NeuroImage, 45:S173-86, 2009
  2. S.M. Smith, M. Jenkinson, M.W. Woolrich, C.F. Beckmann, T.E.J. Behrens, H. Johansen-Berg, P.R. Bannister, M. De Luca, I. Drobnjak, D.E. Flitney, R. Niazy, J. Saunders, J. Vickers, Y. Zhang, N. De Stefano, J.M. Brady, and P.M. Matthews. Advances in functional and structural MR image analysis and implementation as FSL. NeuroImage, 23(S1):208-19, 2004
  3. M. Jenkinson, C.F. Beckmann, T.E. Behrens, M.W. Woolrich, S.M. Smith. FSL. NeuroImage, 62:782-90, 2012

  Examples:
  ```
  fsl
  fslmaths
  bet
  flirt
  fnirt
  ```

  This container also includes the [oxasl](https://github.com/physimals/oxasl) ASL (Arterial Spin Labelling) analysis pipeline from the Physimals group, along with the `oxasl_ve` (vessel-encoded ASL) and `oxasl_mp` (multi-phase ASL) extensions. The pipeline wraps FSL's BASIL toolbox and provides a single-command interface for preprocessing, kinetic model fitting, calibration, and output of perfusion maps.

  Examples:
  ```
  oxasl --version
  oxasl -i asl_data.nii.gz --casl --iaf=tc --ibf=rpt --plds=0.25,0.5,0.75,1.0,1.25,1.5 --bolus=1.4 -o oxasl_out
  ```

  oxasl documentation: https://oxasl.readthedocs.io/

  This container also includes [regtricks](https://github.com/tomfrankkirk/regtricks), a Python library for manipulating and applying transformations between neuroimaging volumes. It wraps FSL/FLIRT and other tools to handle registration chains, resampling, and coordinate transforms with a consistent API.

  Example:
  ```
  fslpython -c "import regtricks as rt; print(rt.__version__)"
  ```


  More documentation can be found here: https://fsl.fmrib.ox.ac.uk/fsl/fslwiki/

  Citation:
  ```
  To quote the relevant references for FSL tools you should look in the individual tools' manual pages, and also please reference one or more of the FSL overview papers:


  1. M.W. Woolrich, S. Jbabdi, B. Patenaude, M. Chappell, S. Makni, T. Behrens, C. Beckmann, M. Jenkinson, S.M. Smith. Bayesian analysis of neuroimaging data in FSL. NeuroImage, 45:S173-86, 2009

  2. S.M. Smith, M. Jenkinson, M.W. Woolrich, C.F. Beckmann, T.E.J. Behrens, H. Johansen-Berg, P.R. Bannister, M. De Luca, I. Drobnjak, D.E. Flitney, R. Niazy, J. Saunders, J. Vickers, Y. Zhang, N. De Stefano, J.M. Brady, and P.M. Matthews. Advances in functional and structural MR image analysis and implementation as FSL. NeuroImage, 23(S1):208-19, 2004

  3. M. Jenkinson, C.F. Beckmann, T.E. Behrens, M.W. Woolrich, S.M. Smith. FSL. NeuroImage, 62:782-90, 2012
  ```

  IMPORTANT: Before using fsl you need to agree to this license: https://fsl.fmrib.ox.ac.uk/fsl/fslwiki/Licence

  To run container outside of this environment: ml fsl/{{ context.version }}

  License: solely for non-commercial use https://fsl.fmrib.ox.ac.uk/fsl/fslwiki/Licence

  ----------------------------------
