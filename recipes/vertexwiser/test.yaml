tests:
  - name: VertexWiseR package loads
    script: |
      R --slave -e "library(VertexWiseR); cat('VertexWiseR', as.character(packageVersion('VertexWiseR')), '\n')"

  - name: Reticulate Python is configured
    script: |
      R --slave -e "library(reticulate); cat(py_config()[['python']], '\n')"

  - name: BrainStat Python stack imports
    script: |
      python - <<'PY'
      import brainstat
      import nilearn
      import numpy
      import vtk
      print("brainstat", getattr(brainstat, "__version__", "installed"))
      print("nilearn", nilearn.__version__)
      print("numpy", numpy.__version__)
      print("vtk", vtk.vtkVersion.GetVTKVersion())
      PY
