name: functionnectome
version: 2.5.0

description: Functionnectome projects functional MRI signal onto white matter circuits using probabilistic structural priors.

copyright:
  - license: GPL-3.0-or-later
    url: https://github.com/NotaCS/Functionnectome/blob/main/LICENSE

architectures:
  - x86_64
  - aarch64

build:
  kind: neurodocker
  base-image: ubuntu:24.04
  pkg-manager: apt

  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive
        FUNCTIONNECTOME_VENV: /opt/functionnectome-{{ context.version }}
        MPLCONFIGDIR: /tmp/matplotlib-functionnectome
        XDG_CACHE_HOME: /tmp/cache-functionnectome
        PYTHONNOUSERSITE: "1"
        PATH: /opt/functionnectome-{{ context.version }}/bin:$PATH

    - install:
        - ca-certificates
        - fonts-dejavu-core
        - libgl1
        - libgomp1
        - libsm6
        - libxext6
        - libxrender1
        - python3
        - python3-pip
        - python3-tk
        - python3-venv

    - run:
        - python3 -m venv "${FUNCTIONNECTOME_VENV}"
        - . "${FUNCTIONNECTOME_VENV}/bin/activate" && python -m pip install --no-cache-dir --upgrade pip setuptools wheel
        - . "${FUNCTIONNECTOME_VENV}/bin/activate" && python -m pip install --no-cache-dir {{ get_file("functionnectome_source_tar_gz") }}
        - chmod -R a+rX "${FUNCTIONNECTOME_VENV}"
        - chmod -R a+rwX "${FUNCTIONNECTOME_VENV}"/lib/python*/site-packages/Functionnectome
        - rm -rf /root/.cache/pip /tmp/cache-functionnectome /tmp/matplotlib-functionnectome

deploy:
  bins:
    - Functionnectome
    - FunctionnectomeGUI
    - MakeH5
    - WhiteRest
    - QuickDisco
    - dFC_Fun
    - MNIzor
    - Funtome
    - DecompressH5
    - MakeRegionwiseH5
  path:
    - /opt/functionnectome-{{ context.version }}/bin

gui_apps:
  - name: FunctionnectomeGUI
    exec: FunctionnectomeGUI

categories:
  - "functional imaging"
  - "connectomics"
  - "tractography"

files:
  - name: functionnectome_source_tar_gz
    url: https://github.com/NotaCS/Functionnectome/archive/refs/tags/v{{ context.version }}.tar.gz

readme: |
  ----------------------------------
  ## functionnectome/{{ context.version }} ##

  Functionnectome projects functional MRI signal from grey matter volumes onto
  white matter circuits using probabilistic structural priors. The container
  also includes WhiteRest and the command line utilities installed by the
  upstream Functionnectome package.

  Example:
  ```
  FunctionnectomeGUI
  Functionnectome settings_file.fcntm
  QuickDisco --help
  WhiteRest --help
  ```

  Connectivity priors are not bundled in this container. Download them from
  the Functionnectome GUI, or pass a full path to an existing priors HDF5 file
  for command line workflows such as QuickDisco and WhiteRest.

  More documentation can be found here:
  https://github.com/NotaCS/Functionnectome

  To run container outside of this environment:
  ml functionnectome/{{ context.version }}

  Citation:
  ```
  Nozais V, Forkel SJ, Foulon C, et al. Functionnectome as a framework to
  analyse the contribution of brain circuits to fMRI. Communications Biology.
  2021;4:1035. https://doi.org/10.1038/s42003-021-02530-2
  ```

  License: GPL-3.0-or-later
  ----------------------------------

