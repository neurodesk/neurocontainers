name: openreconi2iexample
version: 1.0.57
architectures:
  - x86_64

icon: data:image/svg+xml;base64,

copyright:
  - license: MIT
    url: https://opensource.org/license/mit/

files:
  - name: openreconi2iexample.py
    filename: openreconi2iexample.py
  - name: OpenReconLabel.json
    filename: OpenReconLabel.json
  - name: OpenReconREADME.md
    filename: OpenReconREADME.md
  - name: openreconi2iexample
    contents: |-
      #!/usr/bin/env bash
      printf 'openreconi2iexample {{ context.version }}\n'

build:
  kind: neurodocker
  base-image: ubuntu:22.04
  pkg-manager: apt

  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive
    - install: bzip2 ca-certificates git build-essential python3-pip python-is-python3

    - include: macros/openrecon/neurodocker.yaml

    - copy: openreconi2iexample.py /opt/code/python-ismrmrd-server/openreconi2iexample.py
    - copy: OpenReconLabel.json /opt/code/python-ismrmrd-server/OpenReconLabel.json
    - run:
        - pip install pillow==10.4.0
        - python -c "from PIL import Image, ImageDraw, ImageFont"
        - install -m 0755 {{ get_file("openreconi2iexample") }} /usr/local/bin/openreconi2iexample
        - mkdir -p /tmp/share/debug
        - chmod 1777 /tmp/share /tmp/share/debug

deploy:
  bins:
    - openreconi2iexample

categories:
  - image reconstruction

readme: |-
  ----------------------------------
  ## openreconi2iexample/{{ context.version }} ##

  Minimal OpenRecon image-to-image reference. Receives reconstructed MRD
  image messages and sends no output by default. Enable `sendoriginal` to
  pass the original 2D image stream through on `image_series_index = 100`.
  Enable `invert` to return inverted magnitude images as `<source>-inverted` on
  `image_series_index = 99`. Enable `segment` to extract the brightest foreground
  object and send `<source>-segment` outputs starting on
  `image_series_index = 101`. The `outputgeometry` choice controls the
  segmentation send path: `3d` packs one explicit 3D segmentation volume per
  source volume group, while `2d_like_original` sends source-geometry 2D masks
  for scanner postprocessing. Multi-contrast inputs with repeated slice
  positions are split into one segmentation output per source volume group.
  Enable `segmentationcolormap` with `segment` to add `MicroDeltaHotMetal.pal`
  LUT metadata to segmentation outputs. Enable
  `upsampled` to send one double-slice-count `<source>-upsampled` volume on
  `image_series_index = 102`. Enable `mip` to send one `<source>-mip` maximum
  intensity projection image on `image_series_index = 103`. Enable
  `sendmetrics` to send segmented-region volume in image comments and a
  `<source>-metrics` DICOM image table on `image_series_index = 120`.
  The metrics table is sent as a standalone explicit derived output so scanner
  inline postprocessing does not attach to it. The rendered pixels are
  pre-oriented for scanner display and use standalone identity geometry instead
  of inheriting scan orientation.

  Original copies are sent first as source-native 2D images with
  `Keep_image_geometry = 1`. The pass-through keeps the source protocol,
  sequence, image-type, MiniHead, and slice metadata as intact as possible while
  assigning new returned-series UIDs. Scanner partition counters are kept at
  zero for the returned single-partition 2D stream. Returned originals use a
  one-based per-series `image_index`. Meta and MiniHead storage counters are
  restamped from the returned stream so `NumberInSeries`, `ChronSliceNo`, and
  `SliceNo` remain consistent with the MRD header. If a source group cannot be
  sent safely as a 2D stream, the job fails before send rather than packing the
  originals, because scanner MIP/MPR postprocessing depends on the original
  stream.
  With `outputgeometry = 3d`, segmentation outputs use
  `Keep_image_geometry = 0`, `DataRole = Segmentation`,
  `SegmentExplicitVolume = 1`, and one MRD volume that uses the first sorted
  source slice as the volume position and sorted source spacing for the
  through-plane FOV. With
  `outputgeometry = 2d_like_original`, masks keep the source physical geometry,
  use `Keep_image_geometry = 1`, preserve source composer-facing image-type
  identity, sort by projected slice position, and restamp returned-stream header,
  Meta, and MiniHead counters so wrapped source slice numbers do not collide in
  scanner postprocessing. Source grouping header fields such as contrast,
  phase, repetition, set, and average are reset to zero on the returned 2D
  segment stream so it composes as one derived stream instead of clashing with
  source children. If `sendoriginal` is also enabled with
  `outputgeometry = 2d_like_original`, the original source-native 2D stream is
  sent first in a separate MRD image message.
  Returned outputs strip scanner `ImageTypeValue3` metadata and `IceMiniHead`
  `ImageTypeValue3` entries because some sequences reject that protocol field
  during OpenRecon conversion. Original pass-through preserves Dixon subtype
  identity; `outputgeometry = 2d_like_original` segment outputs preserve source
  identity, including Dixon subtype tokens, so the masks can follow the same
  scanner compose route as their source scan.

  OpenRecon runtime notes: `recipes/openreconi2iexample/OpenReconREADME.md`.

  Build and validate:
  ```bash
  python -m builder test openreconi2iexample --recreate --build --architecture x86_64
  ```
  ----------------------------------
