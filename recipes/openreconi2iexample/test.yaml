          "mixed_water-upsampled",
          module.UPSAMPLED_SERIES_INDEX,
          module.UPSAMPLED_SERIES_NAME,
          0,
          expect_minihead=False,
      )
      module._validate_output_images(
          mixed_inverted
          + mixed_segment
          + mixed_upsampled
          + mixed_mip
          + mixed_originals,
          mixed_images,
      )

      for make_output in (
          module._make_upsampled_image,
          module._make_interpolated_image,
      ):
          try:
              make_output(
                  images[0],
                  np.asarray(images[0].data),
                  0,
                  module._header_position(images[0].getHead()),
                  module._interpolated_half_step(images),
                  None,
              )
          except ValueError as exc:
              assert "output_slice_count is required" in str(exc), str(exc)
          else:
              raise AssertionError("expected missing output_slice_count failure")

      out_of_bounds = module._make_upsampled_image(
          images[-1],
          np.asarray(images[-1].data),
          2 * len(images),
          module._header_position(images[-1].getHead()),
          module._interpolated_half_step(images),
          2 * len(images),
      )
      try:
          module._validate_output_images([out_of_bounds], images)
      except ValueError as exc:
          assert "outside source image bounds" in str(exc), str(exc)
      else:
          raise AssertionError("expected source slice bounds validation failure")

      bad_originals = module._restamp_originals(images)
      bad_meta = ismrmrd.Meta.deserialize(bad_originals[1].attribute_string)
      bad_minihead = base64.b64decode(first(bad_meta.get("IceMiniHead"))).decode("utf-8")
      bad_minihead, _ = module._replace_or_append_minihead_string_param(
          bad_minihead,
          "SOPInstanceUID",
          "9.9.9",
      )
      bad_meta["IceMiniHead"] = base64.b64encode(bad_minihead.encode("utf-8")).decode("ascii")
      bad_originals[1].attribute_string = bad_meta.serialize()
      try:
          module._validate_output_images(bad_originals, images)
      except ValueError as exc:
          assert "Meta/IceMiniHead sop_uid mismatch" in str(exc), str(exc)
      else:
          raise AssertionError("expected mismatched MiniHead identity validation failure")

      bad_original_classifier = module._restamp_originals(images)
      bad_original_classifier_meta = ismrmrd.Meta.deserialize(
          bad_original_classifier[0].attribute_string
      )
      bad_original_classifier_meta["ImageTypeValue3"] = "MAP"
      bad_original_classifier[0].attribute_string = (
          bad_original_classifier_meta.serialize()
      )
      try:
          module._validate_output_images(bad_original_classifier, images)
      except ValueError as exc:
          assert "original Meta ImageTypeValue3=MAP" in str(exc), str(exc)
      else:
          raise AssertionError("expected original Meta ImageTypeValue3 validation failure")

      bad_original_minihead_classifier = module._restamp_originals(images)
      bad_original_minihead_classifier_meta = ismrmrd.Meta.deserialize(
          bad_original_minihead_classifier[0].attribute_string
      )
      bad_original_minihead = base64.b64decode(
          first(bad_original_minihead_classifier_meta.get("IceMiniHead"))
      ).decode("utf-8")
      bad_original_minihead, _ = module._replace_or_append_minihead_array_token(
          bad_original_minihead,
          "ImageTypeValue3",
          "MAP",
      )
      bad_original_minihead_classifier_meta["IceMiniHead"] = base64.b64encode(
          bad_original_minihead.encode("utf-8")
      ).decode("ascii")
      bad_original_minihead_classifier[0].attribute_string = (
          bad_original_minihead_classifier_meta.serialize()
      )
      try:
          module._validate_output_images(bad_original_minihead_classifier, images)
      except ValueError as exc:
          assert "original IceMiniHead ImageTypeValue3" in str(exc), str(exc)
      else:
          raise AssertionError(
              "expected original IceMiniHead ImageTypeValue3 validation failure"
          )

      unsafe_meta_outputs = module._invert_images(images)
      unsafe_meta = ismrmrd.Meta.deserialize(
          unsafe_meta_outputs[0].attribute_string
      )
      unsafe_meta["ImageTypeValue3"] = "M"
      unsafe_meta_outputs[0].attribute_string = unsafe_meta.serialize()
      try:
          module._validate_output_images(unsafe_meta_outputs, images)
      except ValueError as exc:
          assert "unsafe scanner Meta ImageTypeValue3" in str(exc), str(exc)
      else:
          raise AssertionError("expected unsafe Meta ImageTypeValue3 validation failure")

      unsafe_minihead_outputs = module._invert_images(images)
      unsafe_minihead_meta = ismrmrd.Meta.deserialize(
          unsafe_minihead_outputs[0].attribute_string
      )
      unsafe_minihead = base64.b64decode(
          first(unsafe_minihead_meta.get("IceMiniHead"))
      ).decode("utf-8")
      assert not module._minihead_string_value(unsafe_minihead, "ImageTypeValue3")
      unsafe_minihead, _ = module._replace_or_append_minihead_string_param(
          unsafe_minihead,
          "ImageTypeValue3",
          "M",
      )
      unsafe_minihead_meta["IceMiniHead"] = base64.b64encode(
          unsafe_minihead.encode("utf-8")
      ).decode("ascii")
      unsafe_minihead_outputs[0].attribute_string = (
          unsafe_minihead_meta.serialize()
      )
      try:
          module._validate_output_images(unsafe_minihead_outputs, images)
      except ValueError as exc:
          assert "unsafe scanner IceMiniHead ImageTypeValue3" in str(exc), str(exc)
      else:
          raise AssertionError(
              "expected unsafe IceMiniHead ImageTypeValue3 validation failure"
          )

      class FakeConnection:
          def __init__(self, items):
              self.items = iter(items)
              self.sent_images = []
              self.logging = []
              self.closed = False

          def __iter__(self):
              return self

          def __next__(self):
              return next(self.items)

          def send_image(self, images_to_send):
              self.sent_images.append(images_to_send)

          def send_logging(self, level, message):
              self.logging.append((level, message))

          def send_close(self):
              self.closed = True

      upsample_with_original_connection = FakeConnection(images + [None])
      module.process(
          upsample_with_original_connection,
          {"parameters": {"upsampled": True, "sendoriginal": True}},
          None,
      )
      assert len(upsample_with_original_connection.sent_images) == 1
      upsample_with_original_outputs = upsample_with_original_connection.sent_images[0]
      upsample_with_original_upsampled = [
          image for image in upsample_with_original_outputs
          if int(image.image_series_index) == module.UPSAMPLED_SERIES_INDEX
      ]
      upsample_with_original_originals = [
          image for image in upsample_with_original_outputs
          if int(image.image_series_index) == module.ORIGINAL_SERIES_INDEX
      ]
      assert len(upsample_with_original_upsampled) == 1
      assert list(upsample_with_original_upsampled[0].getHead().matrix_size) == [8, 8, 8]
      assert len(upsample_with_original_originals) == len(images)
      for index, original in enumerate(upsample_with_original_originals):
          assert_original_passthrough_identity(
              original,
              images[index],
              "i2i_example_send_org-original",
              module.ORIGINAL_SERIES_INDEX,
          )
          assert np.asarray(original.data).shape == (1, 1, 8, 8)

      default_connection = FakeConnection(images + [None])
      module.process(default_connection, {"parameters": {}}, None)
      assert default_connection.sent_images == []
      assert default_connection.closed is True

      segment_connection = FakeConnection(
          [make_sparse_image(i) for i in range(4)] + [None]
      )
      module.process(segment_connection, {"parameters": {"segment": True}}, None)
      assert len(segment_connection.sent_images) == 1
      segment_meta = ismrmrd.Meta.deserialize(
          segment_connection.sent_images[0][0].attribute_string
      )
      assert first(segment_meta.get("LUTFileName")) is None
      assert int(first(segment_meta.get("Keep_image_geometry"))) == 0

      sparse_segment_original_sources = [make_sparse_image(i) for i in range(4)]
      segment_with_original_connection = FakeConnection(
          sparse_segment_original_sources + [None]
      )
      module.process(
          segment_with_original_connection,
          {"parameters": {"segment": True, "sendoriginal": True}},
          None,
      )
      assert segment_with_original_connection.logging == []
      assert len(segment_with_original_connection.sent_images) == 1
      segment_with_original_outputs = segment_with_original_connection.sent_images[0]
      assert len(segment_with_original_outputs) == 5
      assert [
          int(image.image_series_index)
          for image in segment_with_original_outputs
      ] == [module.ORIGINAL_SERIES_INDEX] * 4 + [module.SEGMENT_SERIES_INDEX]
      segment_with_original_segments = [
          image for image in segment_with_original_outputs
          if int(image.image_series_index) == module.SEGMENT_SERIES_INDEX
      ]
      segment_with_original_originals = [
          image for image in segment_with_original_outputs
          if int(image.image_series_index) == module.ORIGINAL_SERIES_INDEX
      ]
      assert len(segment_with_original_segments) == 1
      assert len(segment_with_original_originals) == 4
      segment_with_original_meta = ismrmrd.Meta.deserialize(
          segment_with_original_segments[0].attribute_string
      )
      assert int(first(segment_with_original_meta.get("Keep_image_geometry"))) == 0
      assert int(first(segment_with_original_meta.get("slice_count"))) == 4
      storage_keys = [storage_key(image) for image in segment_with_original_outputs]
      assert len(set(storage_keys)) == len(storage_keys), storage_keys
      for index, (original, source_image) in enumerate(
          zip(segment_with_original_originals, sparse_segment_original_sources)
      ):
          meta = ismrmrd.Meta.deserialize(original.attribute_string)
          assert first(meta.get("OriginalGeometryPassThrough")) is None
          assert int(first(meta.get("Keep_image_geometry"))) == 1
          assert_original_passthrough_identity(
              original,
              source_image,
              "i2i_example_send_org-original",
              module.ORIGINAL_SERIES_INDEX,
          )
          assert int(original.getHead().image_index) == index + 1
          assert int(original.getHead().slice) == index
          assert np.array_equal(np.asarray(original.data), np.asarray(source_image.data))

      multi_contrast_connection = FakeConnection(multi_contrast_images + [None])
      module.process(
          multi_contrast_connection,
          {"parameters": {"segment": True, "sendoriginal": True}},
          None,
      )
      assert multi_contrast_connection.logging == []
      assert len(multi_contrast_connection.sent_images) == 1
      multi_contrast_outputs = multi_contrast_connection.sent_images[0]
      assert len(multi_contrast_outputs) == len(multi_contrast_images) + 2
      assert [
          int(image.image_series_index)
          for image in multi_contrast_outputs
      ] == (
          [module.ORIGINAL_SERIES_INDEX] * 4
          + [module._grouped_series_index(module.ORIGINAL_SERIES_INDEX, 1)] * 4
          + [module.SEGMENT_SERIES_INDEX, module._segment_series_index(1)]
      )
      multi_contrast_output_originals = [
          image for image in multi_contrast_outputs
          if int(image.image_series_index)
          in (
              module.ORIGINAL_SERIES_INDEX,
              module._grouped_series_index(module.ORIGINAL_SERIES_INDEX, 1),
