          else:
              assert first(meta.get(module.SEGMENT_DERIVED_IMAGE_HEADER_META_KEY)) is None
          if expected_output_geometry is not None:
              assert first(meta.get(module.SEGMENT_OUTPUT_GEOMETRY_META_KEY)) == (
                  expected_output_geometry
              )
          assert first(meta.get(module.SEGMENT_POSTPROCESSING_META_KEY)) is None
          if expect_scanner_postprocessing:
              assert int(first(meta.get(module.SEGMENT_POSTPROCESSING_CHILD_ROLE_META_KEY))) == (
                  expected_child_role
              )
          else:
              assert first(meta.get(module.SEGMENT_POSTPROCESSING_CHILD_ROLE_META_KEY)) is None
              assert first(meta.get("ExamDataRole")) is None
          assert_header_geometry_meta(image)
          assert image.image_series_index == expected_series_index
          assert image.getHead().image_series_index == expected_series_index
          assert int(image.getHead().image_index) == expected_header_image_index
          assert int(image.getHead().slice) == int(source_header.slice)
          assert int(image.getHead().contrast) == int(source_header.contrast)
          assert int(image.getHead().matrix_size[2]) == int(source_header.matrix_size[2])
          assert np.array_equal(np.asarray(image.data), (np.asarray(image.data) > 0).astype(np.asarray(image.data).dtype))
          for key in (
              "Actual3DImagePartNumber",
              "AnatomicalPartitionNo",
              "NumberInSeries",
              "SliceNo",
              "AnatomicalSliceNo",
              "ChronSliceNo",
              "ProtocolSliceNumber",
          ):
