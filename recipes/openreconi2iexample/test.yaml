      assert module._config_bool_any({"parameters": {"sendthresholdmip": "true"}}, ("mip", "sendthresholdmip"), default=False) is True
      assert module._config_bool_any({"parameters": {"sendmetrics": "true"}}, ("sendmetrics", "metrics"), default=False) is True

      print("optional original invert segment MIP upsample and metrics tests passed")
