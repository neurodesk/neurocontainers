              return int(expected_storage_fields[key])

          assert first(meta.get("DataRole")) == expected_data_role
          assert first(meta.get("ImageType")) == expected_image_type
          assert first(meta.get("DicomImageType")) == expected_image_type
          assert first(meta.get("SeriesDescription")) == expected_name
          assert first(meta.get("SequenceDescription")) == expected_name
          assert first(meta.get("ProtocolName")) == expected_name
          assert first(meta.get("ImageComments")) == expected_comment
          assert first(meta.get("ImageComment")) == expected_comment
          assert first(meta.get("ImageTypeValue3")) is None
          assert first(meta.get("ImageTypeValue4")) == expected_image_type_value4
          assert not module._has_magnitude_image_type_value3_token(
              [first(meta.get("ImageType")), first(meta.get("DicomImageType"))]
          )
          assert int(first(meta.get("Keep_image_geometry"))) == 1
          assert int(first(meta.get(module.SEGMENT_SOURCE_GEOMETRY_META_KEY))) == 1
          assert first(meta.get(module.SEGMENT_SOURCE_IMAGE_HEADER_META_KEY)) is None
