          )
          expected_header_image_index = int(source_header.image_index)
          if expected_header_image_index < 1:
              expected_header_image_index = output_index + 1
          source_slice = int(source_header.slice)
          expected_slice_index = source_slice if source_slice >= 0 else output_index
          expected_storage_fields = module._original_storage_fields(
              source_image,
              output_index,
