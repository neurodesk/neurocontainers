tests:
 - name: Manual OpenRecon image-to-image smoke test
   manual: true
   script: |
      source .venv/bin/activate
      ./builder/build.py generate openreconi2iexample --recreate --build --login --architecture x86_64 --offline_mode true

      set -eux
      input_h5=/buildhostdirectory/input_image_dataset.h5
      output_h5=/buildhostdirectory/openreconi2iexample_output.h5

      if [ ! -f "${input_h5}" ]; then
        echo "Manual test skipped: place an MRD image dataset at ${input_h5} to run it."
        exit 0
      fi

      python3 /opt/code/python-ismrmrd-server/main.py \
        -v -r -H=0.0.0.0 -p=9002 -s -S=/tmp/share/saved_data &
      server_pid=$!
      trap 'kill ${server_pid} || true' EXIT
      sleep 2

      rm -f "${output_h5}"
      python3 /opt/code/python-ismrmrd-server/client.py \
        -G dataset \
        -o "${output_h5}" \
        "${input_h5}" \
        -c openreconi2iexample

      test -s "${output_h5}"
      echo "Inspect ${output_h5} with an HDF5 viewer; output series 99 should be named openrecon_invert, series 100 should contain the original scan when sendoriginal is true, series 101 should contain one openrecon_threshold_mip slice when sendthresholdmip is true, and series 102 should contain openrecon_interpolated when sendinterpolated is true."

 - name: Invert optional original threshold MIP and interpolation unit smoke test
   manual: true
   script: |
      python3 - <<'PY'
      import importlib.util
      import sys
      from pathlib import Path

      import ismrmrd
      import numpy as np

      wrapper_path = Path("/opt/code/python-ismrmrd-server/openreconi2iexample.py")
      spec = importlib.util.spec_from_file_location("openreconi2iexample", wrapper_path)
      module = importlib.util.module_from_spec(spec)
      sys.modules["openreconi2iexample"] = module
      spec.loader.exec_module(module)

      def make_image(slice_index):
          gradient = np.arange(64, dtype=np.float32).reshape(8, 8)
          data = (gradient + slice_index * 100.0).reshape(1, 1, 8, 8)
          image = ismrmrd.Image.from_array(data, transpose=False)
          header = image.getHead()
          header.image_type = ismrmrd.IMTYPE_MAGNITUDE
          header.image_series_index = 1
          header.slice = slice_index
          header.position = (0.0, 0.0, float(slice_index * 2))
          header.slice_dir = (0.0, 0.0, 1.0)
          header.field_of_view = (8.0, 8.0, 2.0)
          image.setHead(header)
          meta = ismrmrd.Meta()
          meta["DataRole"] = "Image"
          meta["SeriesDescription"] = "i2i_example_send_org"
          meta["SequenceDescription"] = "i2i_example_send_org"
          meta["ProtocolName"] = "i2i_example_send_org"
          meta["SequenceDescriptionAdditional"] = "source_extra"
          image.attribute_string = meta.serialize()
          return image

      def make_sparse_image(slice_index):
          data = np.zeros((1, 1, 8, 8), dtype=np.float32)
          if slice_index == 2:
              data[0, 0, 3, 4] = 10.0
          image = ismrmrd.Image.from_array(data, transpose=False)
          header = image.getHead()
          header.image_type = ismrmrd.IMTYPE_MAGNITUDE
          header.image_series_index = 1
          header.slice = slice_index
          image.setHead(header)
          meta = ismrmrd.Meta()
          meta["DataRole"] = "Image"
          meta["SeriesDescription"] = "i2i_example_send_org"
          meta["SequenceDescription"] = "i2i_example_send_org"
          meta["ProtocolName"] = "i2i_example_send_org"
          image.attribute_string = meta.serialize()
          return image

      images = [make_image(i) for i in range(4)]
      outputs = module._invert_images(images)
      assert len(outputs) == 4

      def first(value):
          return value[0] if isinstance(value, list) else value

      for img in outputs:
          meta = ismrmrd.Meta.deserialize(img.attribute_string)
          assert first(meta.get("DataRole")) == "Image"
          assert first(meta.get("ImageType")) == "DERIVED\\PRIMARY\\M\\openrecon_invert"
          assert first(meta.get("SeriesDescription")) == "i2i_example_send_org-inverted"
          assert first(meta.get("SequenceDescription")) == "i2i_example_send_org-inverted"
          assert first(meta.get("ProtocolName")) == "i2i_example_send_org-inverted"
          assert first(meta.get("ImageComments")) == "i2i_example_send_org-inverted"
          assert first(meta.get("SequenceDescriptionAdditional")) == ""
          assert "None" not in img.attribute_string
          assert int(first(meta.get("Keep_image_geometry"))) == 1
          assert img.image_series_index == module.INVERT_SERIES_INDEX

      source = np.asarray(images[0].data)
      inverted = np.asarray(outputs[0].data)
      assert np.allclose(inverted, 363.0 - source)

      mip_outputs = module._threshold_mip_image([make_sparse_image(i) for i in range(4)])
      assert len(mip_outputs) == 1
      mip = mip_outputs[0]
      meta = ismrmrd.Meta.deserialize(mip.attribute_string)
      assert first(meta.get("DataRole")) == "Segmentation"
      assert first(meta.get("ImageType")) == "DERIVED\\PRIMARY\\M\\openrecon_threshold_mip"
      assert first(meta.get("SeriesDescription")) == "i2i_example_send_org-mip"
      assert first(meta.get("SequenceDescription")) == "i2i_example_send_org-mip"
      assert first(meta.get("ProtocolName")) == "i2i_example_send_org-mip"
      assert first(meta.get("ImageComments")) == "i2i_example_send_org-mip"
      assert first(meta.get("SequenceDescriptionAdditional")) == ""
      assert "None" not in mip.attribute_string
      assert int(first(meta.get("Keep_image_geometry"))) == 1
      assert mip.image_series_index == module.THRESHOLD_MIP_SERIES_INDEX
      mip_data = np.asarray(mip.data)
      assert mip_data.shape == (1, 1, 8, 8), mip_data.shape
      assert set(np.unique(mip_data).tolist()) == {0, 1}
      assert int(mip_data[0, 0, 3, 4]) == 1
      assert int(np.sum(mip_data)) == 1

      interpolated = module._interpolated_images(images)
      assert len(interpolated) == 8
      assert [img.image_series_index for img in interpolated] == [module.INTERPOLATED_SERIES_INDEX] * 8
      interp_meta = ismrmrd.Meta.deserialize(interpolated[0].attribute_string)
      assert first(interp_meta.get("DataRole")) == "Image"
      assert first(interp_meta.get("ImageType")) == "DERIVED\\PRIMARY\\M\\openrecon_interpolated"
      assert first(interp_meta.get("SeriesDescription")) == "i2i_example_send_org-upsampled"
      assert first(interp_meta.get("SequenceDescription")) == "i2i_example_send_org-upsampled"
      assert first(interp_meta.get("ProtocolName")) == "i2i_example_send_org-upsampled"
      assert first(interp_meta.get("ImageComments")) == "i2i_example_send_org-upsampled"
      assert first(interp_meta.get("SequenceDescriptionAdditional")) == ""
      assert "None" not in interpolated[0].attribute_string
      assert int(first(interp_meta.get("Keep_image_geometry"))) == 1
      assert np.allclose(np.asarray(interpolated[1].data), np.asarray(images[0].data) + 50.0)
      assert np.allclose(np.asarray(interpolated[-1].data), np.asarray(images[-1].data))
      assert np.isclose(float(interpolated[1].getHead().position[2]), 1.0)
      assert np.isclose(float(interpolated[-1].getHead().position[2]), 7.0)
      assert np.isclose(float(interpolated[1].getHead().field_of_view[2]), 1.0)

      originals = module._restamp_originals(images)
      assert len(originals) == 4
      for img in originals:
          meta = ismrmrd.Meta.deserialize(img.attribute_string)
          assert int(first(meta.get("Keep_image_geometry"))) == 1
          assert img.image_series_index == module.ORIGINAL_SERIES_INDEX

      assert module._config_bool({"parameters": {}}, "sendoriginal", default=True) is True
      assert module._config_bool({"parameters": {"sendoriginal": True}}, "sendoriginal", default=True) is True
      assert module._config_bool({"parameters": {"sendoriginal": "false"}}, "sendoriginal", default=True) is False
      assert module._config_bool('{"parameters": {"sendoriginal": false}}', "sendoriginal", default=True) is False
      assert module._config_bool({"parameters": {}}, "sendthresholdmip", default=False) is False
      assert module._config_bool({"parameters": {"sendthresholdmip": "true"}}, "sendthresholdmip", default=False) is True
      assert module._config_bool({"parameters": {}}, "sendinterpolated", default=False) is False
      assert module._config_bool({"parameters": {"sendinterpolated": "true"}}, "sendinterpolated", default=False) is True

      print("invert optional original threshold MIP and interpolation tests passed")
      PY
