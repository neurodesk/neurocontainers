      metrics_only_meta = ismrmrd.Meta.deserialize(metrics_only_outputs[0].attribute_string)
      assert first(metrics_only_meta.get("SeriesDescription")) == "i2i_example_send_org-metrics"
      assert "Region volume:" in first(metrics_only_meta.get("ImageComments"))
      module._validate_output_images(metrics_only_outputs, metrics_only_sources)

      metrics_segment_sources = [make_sparse_image(i) for i in range(4)]
      metrics_segment_connection = FakeConnection(metrics_segment_sources + [None])
      module.process(
