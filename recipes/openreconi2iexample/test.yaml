      assert module._config_bool({"parameters": {}}, "sendoriginal", default=False) is False
      assert module._config_bool({"parameters": {"sendoriginal": True}}, "sendoriginal", default=False) is True
      assert module._config_bool({"parameters": {"sendoriginal": "false"}}, "sendoriginal", default=True) is False
      assert module._config_bool('{"parameters": {"sendoriginal": false}}', "sendoriginal", default=True) is False
      assert module._config_bool_any({"parameters": {}}, ("invert", "sendinvert"), default=False) is False
      assert module._config_bool_any({"parameters": {"invert": "true"}}, ("invert", "sendinvert"), default=False) is True
      assert module._config_bool_any({"parameters": {"sendinterpolated": "true"}}, ("upsampled", "sendinterpolated"), default=False) is True
      assert module._config_bool_any({"parameters": {"segment": "true"}}, ("segment", "sendsegment"), default=False) is True
