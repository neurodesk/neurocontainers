      assert [
          first(ismrmrd.Meta.deserialize(image.attribute_string).get("SeriesDescription"))
          for image in multi_contrast_output_originals
      ] == ["wholebody_i2i_seg+org_W"] * len(multi_contrast_output_originals)
      for original in multi_contrast_output_originals:
          original_meta = ismrmrd.Meta.deserialize(original.attribute_string)
          assert int(first(original_meta.get("Keep_image_geometry"))) == 1
          assert not first(original_meta.get("IceMiniHead"))
          assert np.asarray(original.data).shape == (1, 1, 8, 8)
      multi_contrast_output_segments = [
          image for image in multi_contrast_outputs
          if int(image.image_series_index)
          in (module.SEGMENT_SERIES_INDEX, module._segment_series_index(1))
