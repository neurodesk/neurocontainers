name: slicer
version: 5.10.0

architectures:
  - x86_64

variables:
  slicer_revision: 34045
  monailabel_extension_item: 6912128dac7b1c95e7938b38

build:
  kind: neurodocker
  base-image: ubuntu:22.04
  pkg-manager: apt

  directives:
    - environment:
        DEBIAN_FRONTEND: noninteractive

    - install:
        - python3-dev
        - gcc
        - libopenslide0
        - curl
        - ca-certificates
        - libxdamage1
        - libpulse-dev
        - libnss3
        - libglu1-mesa
        - libsm6
        - libxrender1
        - libxt6
        - libxcomposite1
        - libfreetype6
        - libasound2
        - libfontconfig1
        - libxkbcommon0
        - libxcursor1
        - libxi6
        - libxrandr2
        - libxtst6
        - libqt5svg5-dev
        - wget
        - libqt5opengl5-dev
        - libqt5opengl5
        - libqt5gui5
        - libqt5core5a

    - template:
        name: miniconda
        version: latest
        conda_install: pytorch torchvision torchaudio pytorch-cuda=11.6 -c pytorch -c nvidia

    - run:
        - pip install h11==0.11 monailabel

    - run:
        - curl -fsSL --retry 5 "https://download.slicer.org/download?os=linux&stability=release&version={{ context.version }}" | tar -xz -C /opt/

    - run:
        - mkdir -p /opt/slicer-extensions/MONAILabel
        - curl -fsSL --retry 5 "https://slicer-packages.kitware.com/api/v1/item/{{ context.monailabel_extension_item }}/download" | tar -xz -C /opt/slicer-extensions/MONAILabel --strip-components 1

    - copy:
        - slicer-entrypoint.sh
        - /usr/local/bin/Slicer

    - run:
        - chmod +x /usr/local/bin/Slicer

    - install:
        - nvidia-cuda-toolkit

    - environment:
        PATH: /miniconda3/bin:/usr/local/bin:/usr/bin:/opt/Slicer-{{ context.version }}-linux-amd64/bin:/opt/Slicer-{{ context.version }}-linux-amd64

deploy:
  path:
    - /opt/Slicer-{{ context.version }}-linux-amd64/bin
  bins:
    - Slicer

categories:
  - visualization
  - image segmentation

gui_apps:
  - name: slicerGUI
    exec: Slicer

files:
  - name: slicer-entrypoint.sh
    contents: |
      #!/usr/bin/env bash
      set -u

      SLICER_HOME="/opt/Slicer-{{ context.version }}-linux-amd64"
      SLICER_CMD="${SLICER_HOME}/Slicer"
      EXTENSION_REVISION="{{ context.slicer_revision }}"
      EXTENSION_SOURCE="/opt/slicer-extensions/MONAILabel"
      SLICER_MODULE_PATH_SUFFIX="lib/Slicer-5.10/qt-scripted-modules"

      if [ -n "${HOME:-}" ] && [ -d "${HOME}" ] && [ -d "${EXTENSION_SOURCE}" ]; then
        EXTENSION_PARENT="${HOME}/.config/NA-MIC/Extensions-${EXTENSION_REVISION}"
        EXTENSION_TARGET="${EXTENSION_PARENT}/MONAILabel"
        SETTINGS_FILE="${HOME}/.config/NA-MIC/Slicer-${EXTENSION_REVISION}.ini"

        if [ ! -d "${EXTENSION_TARGET}" ] && mkdir -p "${EXTENSION_PARENT}" 2>/dev/null; then
          cp -a "${EXTENSION_SOURCE}" "${EXTENSION_TARGET}" 2>/dev/null || true
        fi

        if [ -d "${EXTENSION_TARGET}" ] && [ ! -f "${SETTINGS_FILE}" ] && mkdir -p "$(dirname "${SETTINGS_FILE}")" 2>/dev/null; then
          cat > "${SETTINGS_FILE}" <<EOF
      [Extensions]
      FrontendServerUrl=https://extensions.slicer.org
      InstallPath=${HOME}/.config/NA-MIC/Extensions-${EXTENSION_REVISION}
      LastServerAPI=Girder_v1
      ManagerEnabled=true
      MetadataFromServerUrl=https://slicer-packages.kitware.com
      ServerUrl=https://slicer-packages.kitware.com

      [LibraryPaths]
      1\path=${EXTENSION_TARGET}/lib/Slicer-5.10
      size=1

      [Modules]
      AdditionalPaths=${EXTENSION_TARGET}/${SLICER_MODULE_PATH_SUFFIX}
      IgnoreModules=@Invalid()

      [PYTHONPATH]
      1\path=${EXTENSION_TARGET}/${SLICER_MODULE_PATH_SUFFIX}
      size=1

      [Paths]
      size=0

      [QT_PLUGIN_PATH]
      size=0
      EOF
        fi
      fi

      exec "${SLICER_CMD}" "$@"

readme: |
  ----------------------------------
  ## slicer/{{ context.version }} ##
  3D Slicer is a software application for visualization and analysis of medical image computing data sets. Supports images, segmentations, surfaces, annotations, transformations in 2D, 3D, and 4D.

  Example:
  ```
  Slicer
  ```

  More documentation can be found here: https://slicer.readthedocs.io/en/latest/user_guide/getting_started.html

  To run container outside of this environment: ml slicer/{{ context.version }}
  ----------------------------------
