name: hdbet
version: 2.0.1
container: hdbet_${version}_REFERENCE.simg

test_data:
  output_dir: test_output

setup:
  script: |
    set -e
    mkdir -p ${output_dir}

tests:
  - name: HD-BET conda Python is available
    description: Verify the shipped HD-BET conda environment is usable
    command: /opt/miniconda-latest/envs/hdbet/bin/python --version
    expected_output_contains: "Python 3.10"

  - name: HD_BET package imports from project
    description: Verify the editable HD-BET package imports from the installed source tree
    command: >-
      /opt/miniconda-latest/envs/hdbet/bin/python -c "import HD_BET; print(HD_BET.__file__)"
    expected_output_contains: "/opt/HD-BET/HD_BET/__init__.py"

  - name: HD-BET parameter metadata exists
    description: Verify bundled parameters satisfy HD-BET without runtime download
    command: |
      /opt/miniconda-latest/envs/hdbet/bin/python - <<'PY'
      from pathlib import Path

      from HD_BET import paths
      from HD_BET import checkpoint_download

      sentinel = Path(paths.folder_with_parameter_files) / "fold_all" / "checkpoint_final.pth"
      print(paths.folder_with_parameter_files)
      print(sentinel)
      print(sentinel.is_file())

      def fail_download(*args, **kwargs):
          raise RuntimeError("download attempted")

      checkpoint_download.download_file = fail_download
      checkpoint_download.maybe_download_parameters()
      print("model download skipped")
      PY
    expected_output_contains:
      - "True"
      - "model download skipped"

  - name: HD-BET console entrypoint is on PATH
    description: Verify the deployed hd-bet command resolves to the conda environment
    command: which hd-bet
    expected_output_contains: "/opt/miniconda-latest/envs/hdbet/bin/hd-bet"

  - name: HD-BET help displays usage
    description: Verify the command starts without importing errors
    command: hd-bet --help 2>&1 | head -20
    expected_output_contains: "usage: hd-bet"
