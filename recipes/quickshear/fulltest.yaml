# quickshear container test suite
# Minimal verification for the rebuilt Python-based quickshear image.

name: quickshear
version: 1.1.0
container: quickshear_1.1.0.simg

test_data:
  output_dir: test_output

setup:
  script: |
    #!/usr/bin/env bash
    set -e
    mkdir -p "${output_dir}"
    python3 - <<'PY'
    import numpy as np
    import nibabel as nib
    from pathlib import Path

    out = Path("test_output")
    anat = np.zeros((8, 8, 8), dtype=np.float32)
    anat[:4, :, :] = 100
    mask = np.zeros((8, 8, 8), dtype=np.uint8)
    mask[2:6, 2:6, 2:6] = 1

    nib.save(nib.Nifti1Image(anat, np.eye(4)), out / "anat.nii.gz")
    nib.save(nib.Nifti1Image(mask, np.eye(4)), out / "mask.nii.gz")
    PY

tests:
  - name: ARM64 runtime
    description: Verify the container runs natively on arm64
    command: uname -m
    expected_output_contains: "aarch64"

  - name: Python runtime
    description: Verify the shipped Python runtime matches the rebuilt image
    command: python3 --version
    expected_output_contains: "Python 3.12.3"

  - name: quickshear help
    description: Verify the quickshear CLI is present and responds
    command: quickshear --help
    expected_output_contains: "Quickshear defacing for neuroimages"

  - name: quickshear package metadata
    description: Verify the installed quickshear package metadata matches the rebuilt image
    command: >-
      python3 -m pip show quickshear
    expected_output_contains: "Version: 1.2.0"

  - name: quickshear synthetic defacing
    description: Deface a synthetic NIfTI volume using a synthetic brain mask
    command: >-
      quickshear ${output_dir}/anat.nii.gz ${output_dir}/mask.nii.gz ${output_dir}/defaced.nii.gz 2
    validate:
      - output_exists: ${output_dir}/defaced.nii.gz
      - same_dimensions: ["${output_dir}/defaced.nii.gz", "${output_dir}/anat.nii.gz"]
