- name: DeepISLES conda metadata exists
  command: test -d /opt/miniconda/envs/deepisles/conda-meta
  expected_exit_code: 0
- name: DeepISLES has broad package coverage
  command: test "$(find /opt/miniconda/envs/deepisles/conda-meta -name '*.json' | wc -l)" -ge 100
  expected_exit_code: 0
- name: DeepISLES source checkout exists
  command: test -d /opt/DeepIsles
  expected_exit_code: 0
- name: DeepISLES prediction script exists
  command: test -f /opt/DeepIsles/scripts/predict.py
  expected_exit_code: 0
- name: SEALS source exists
