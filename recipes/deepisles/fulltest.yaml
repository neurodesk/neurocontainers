  expected_exit_code: 0
- name: Factorizer source exists
  command: test -d /opt/DeepIsles/src/FACTORIZER
  expected_exit_code: 0
- name: HD-BET source exists
  command: test -d /opt/DeepIsles/src/HD-BET
  expected_exit_code: 0
- name: DeepISLES weight files exist
  command: find /opt/DeepIsles -type f \( -name '*.pth' -o -name '*.pt' -o -name '*.ckpt' \) | grep -q .
  expected_exit_code: 0
- name: 7-Zip is available
  command: command -v 7za
  expected_exit_code: 0
- name: Base Conda is executable
  command: test -x /opt/miniconda/bin/conda
  expected_exit_code: 0
- name: Python reports a version
  command: /opt/miniconda/envs/deepisles/bin/python --version
  expected_exit_code: 0
- name: PyTorch creates a tensor
  command: /opt/miniconda/envs/deepisles/bin/python -c 'import torch; assert torch.ones(2).sum().item() == 2'
  expected_exit_code: 0
- name: NumPy performs linear algebra
  command: /opt/miniconda/envs/deepisles/bin/python -c 'import numpy as n; assert n.linalg.det(n.eye(2)) == 1'
  expected_exit_code: 0
- name: SciPy performs convolution
  command: /opt/miniconda/envs/deepisles/bin/python -c 'import numpy as n; from scipy.ndimage import convolve; assert convolve(n.ones((2,2)), n.ones((1,1))).shape == (2,2)'
  expected_exit_code: 0
- name: scikit-image creates a transform
  command: /opt/miniconda/envs/deepisles/bin/python -c 'import numpy as n; from skimage.transform import resize; assert resize(n.ones((2,2)), (4,4)).shape == (4,4)'
  expected_exit_code: 0
- name: Nibabel creates a NIfTI image
  command: /opt/miniconda/envs/deepisles/bin/python -c 'import nibabel as n, numpy as x; assert n.Nifti1Image(x.zeros((2,2,2)), x.eye(4)).shape == (2,2,2)'
  expected_exit_code: 0
- name: SimpleITK creates an image
  command: /opt/miniconda/envs/deepisles/bin/python -c 'import SimpleITK as s; assert s.Image(2,2,s.sitkUInt8).GetSize() == (2,2)'
  expected_exit_code: 0
- name: Connected components labels data
  command: /opt/miniconda/envs/deepisles/bin/python -c 'import cc3d, numpy as n; assert cc3d.connected_components(n.ones((2,2,2), dtype=n.uint8)).max() == 1'
  expected_exit_code: 0
- name: OpenCV resizes an image
  command: /opt/miniconda/envs/deepisles/bin/python -c 'import cv2, numpy as n; assert cv2.resize(n.ones((2,2)), (4,4)).shape == (4,4)'
  expected_exit_code: 0
- name: Pydicom creates a dataset
  command: /opt/miniconda/envs/deepisles/bin/python -c 'from pydicom.dataset import Dataset; d=Dataset(); d.PatientName="Test"; assert str(d.PatientName)=="Test"'
  expected_exit_code: 0
- name: DeepISLES PATH uses its environment
  command: case "$PATH" in /opt/miniconda/envs/deepisles/bin:*) exit 0;; *) exit 1;; esac
  expected_exit_code: 0
