# lashis container test suite
# Tests for LASHiS v2.0.0 — Longitudinal Automatic Segmentation of Hippocampal Subfields.
#
# v2 is a Python/Nipype rewrite of the original bash LASHiS.sh; the
# entry point is now the `lashis` console script. The full LASHiS
# pipeline takes hours and needs an ASHS atlas + paired T1w/T2w per
# timepoint, so the suite below limits itself to:
#   * verifying every dependency binary lands on PATH
#   * verifying the `lashis` CLI itself loads, parses help, and
#     successfully runs `--check-deps` against the in-container
#     installs of ANTs, ASHS, FSL and Convert3D.
# That is enough to catch every realistic packaging failure (missing
# binary, wrong PATH, wrong wrapper exec bits, broken pip install).
#
# Reference: Shaw et al. (2020) https://doi.org/10.1016/j.neuroimage.2020.116923

name: lashis
version: 2.0.0
container: lashis_2.0.0.simg

tests:
  # ==========================================================================
  # LASHIS CLI
  # ==========================================================================
  - name: lashis CLI loads
    description: The `lashis` console script imports and parses --help
    command: lashis --help
    expected_output_contains: "Longitudinal Automatic Segmentation of Hippocampal Subfields"

  - name: lashis dependency check
    description: lashis --check-deps confirms ANTs, ASHS, c3d are all reachable
    command: lashis --check-deps
    expected_exit_code: 0

  # ==========================================================================
  # ANTs (used for AMTC2, antsRegistration, antsJointLabelFusion, etc.)
  # ==========================================================================
  - name: ANTs antsRegistration
    description: antsRegistration binary runs and reports version
    command: antsRegistration --version
    expected_output_contains: "ANTs Version"

  - name: ANTs antsApplyTransforms
    description: antsApplyTransforms binary loads
    command: antsApplyTransforms --help
    expected_output_contains: "antsApplyTransforms"

  - name: ANTs antsJointLabelFusion
    description: antsJointLabelFusion.sh on PATH
    command: bash -lc 'command -v antsJointLabelFusion.sh && antsJointLabelFusion.sh -h 2>&1 | head -5'
    ignore_exit_code: true
    expected_output_contains: "antsJointLabelFusion"

  - name: ANTs antsMultivariateTemplateConstruction2
    description: antsMultivariateTemplateConstruction2.sh on PATH
    command: bash -lc 'command -v antsMultivariateTemplateConstruction2.sh && antsMultivariateTemplateConstruction2.sh -h 2>&1 | head -5'
    ignore_exit_code: true
    expected_output_contains: "Usage"

  - name: ANTs ImageMath
    description: ImageMath binary runs
    command: ImageMath --help
    ignore_exit_code: true
    expected_output_contains: "ImageMath"

  # ==========================================================================
  # Convert3D
  # ==========================================================================
  - name: c3d binary
    description: Convert3D binary runs and reports version
    command: bash -lc 'command -v c3d && c3d 2>&1 | head -5'
    ignore_exit_code: true
    expected_output_contains: "convert3d"

  # ==========================================================================
  # ASHS
  # ==========================================================================
  - name: ASHS_ROOT environment variable
    description: ASHS_ROOT is exported and points at a real directory
    command: bash -lc 'test -d "$ASHS_ROOT" && echo "ASHS_ROOT=$ASHS_ROOT"'
    expected_output_contains: "ASHS_ROOT="

  - name: ashs_main.sh executable
    description: The ASHS entry script is on PATH and executable
    command: bash -lc 'test -x $ASHS_ROOT/bin/ashs_main.sh && echo "ashs_main executable"'
    expected_output_contains: "ashs_main executable"

  - name: ashs_main.sh help output
    description: ashs_main.sh prints its usage banner
    command: bash -lc '$ASHS_ROOT/bin/ashs_main.sh -h 2>&1 || true'
    expected_output_contains: "ashs_main"

  # ==========================================================================
  # FSL (consumed internally by ASHS)
  # ==========================================================================
  - name: FSL fslmaths
    description: fslmaths is on PATH
    command: bash -lc 'fslmaths 2>&1 | head -3'
    ignore_exit_code: true
    expected_output_contains: "fslmaths"

  # ==========================================================================
  # Python install of LASHiS package
  # ==========================================================================
  - name: lashis Python package importable
    description: "`import lashis` succeeds inside the container"
    command: python3 -c "import lashis; print(lashis.__name__)"
    expected_output_contains: "lashis"
