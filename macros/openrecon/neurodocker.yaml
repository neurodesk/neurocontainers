builder: neurodocker

directives:
  - workdir: /opt/code

  - install:
      - build-essential
      - libxslt1.1
      - libpugixml1v5
      - vim
      - dos2unix
      - git
      - cmake
      - g++
      - libhdf5-dev
      - libxml2-dev
      - libxslt1-dev
      - libboost-all-dev
      - libfftw3-dev
      - libpugixml-dev

  - install:
      - libboost-program-options1.74.0
    condition: (openrecon_ubuntu_version | default("22.04")) != "24.04"

  - install:
      - libboost-program-options1.83.0
    condition: (openrecon_ubuntu_version | default("22.04")) == "24.04"

  - run:
      - git clone https://github.com/ismrmrd/ismrmrd.git
      - cd ismrmrd
      - cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - cmake --build build --parallel {{ parallel_jobs }}
      - cmake --install build
      - ldconfig

  - run:
      - git clone https://github.com/ismrmrd/siemens_to_ismrmrd.git
      - cd siemens_to_ismrmrd
      - cmake -S . -B build -DBUILD_DYNAMIC=ON -DCMAKE_BUILD_TYPE=Release
      - cmake --build build --parallel {{ parallel_jobs }}
      - cmake --install build
      - ldconfig

  - run:
      - python3 -m pip install $(python3 -m pip install --help | grep -q -- "--break-system-packages" && echo "--break-system-packages") --no-cache-dir h5py ismrmrd matplotlib pydicom==3.0.1 pynetdicom nibabel scipy scikit-image

  - run:
      - git clone https://github.com/ismrmrd/ismrmrd-python-tools.git
      - cd ismrmrd-python-tools
      - python3 -m pip install $(python3 -m pip install --help | grep -q -- "--break-system-packages" && echo "--break-system-packages") --no-cache-dir .

  - run:
      - git clone --branch fix/ismrmrd-compatibility https://github.com/astewartau/python-ismrmrd-server
      - find /opt/code/python-ismrmrd-server -name "*.sh" -exec chmod +x {} \;
      - find /opt/code/python-ismrmrd-server -name "*.sh" | xargs dos2unix
    # replace 'invertcontrast' in main.py with 'default_replace_with_valid_name' to avoid running 
      - sed -i 's/invertcontrast/default_replace_with_valid_name/g' /opt/code/python-ismrmrd-server/main.py
